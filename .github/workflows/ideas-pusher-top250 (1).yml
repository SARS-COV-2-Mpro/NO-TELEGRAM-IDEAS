                const edgeL  = tp_l / Math.max(1, LONG_EDGE_MULT_MIN * costLong);
                const evScoreL = evLCBL / Math.max(8, EXP_LCB_MIN_BPS_BASE);
                const viabMultL = clamp(0.5 * clamp(edgeL, 0.3, 1.4) + 0.5 * clamp(evScoreL, 0.3, 1.4), 0.3, 1.3);
                candLong = { side: "long", p_lcb: pLong_lcb, p_raw: pLong0, ev_bps: simL.ev_bps, exp_lcb_bps: evLCBL, tp_bps: tp_l, sl_bps: sl_l, cost_bps: costLong, style: "mr", regime, viab_mult: viabMultL };
              }

              let candShort = null;
              if (DIRECTION !== "long") {
                let tp_s = Math.round(atr_bps * 1.0);
                let sl_s = Math.round(atr_bps * 0.5);
                sl_s = Math.min(sl_s, MAX_SL_BPS);
                tp_s = Math.max(tp_s, Math.round(sl_s * 1.5));
                const simS   = pathEVHeavy({ entry: candMetrics.mark_price, tp_bps: tp_s, sl_bps: sl_s, side: "short", retSeries: yR, mu: mu5, sigma: sig5, steps: 4, N: 192, cost_bps: costShort });
                const evLCBS = Math.round(pShort_lcb * tp_s - (1 - pShort_lcb) * sl_s - costShort);
                const edgeS  = tp_s / Math.max(1, 4 * costShort);
                const evScoreS = evLCBS / Math.max(8, EXP_LCB_MIN_BPS_BASE);
                const viabMultS = clamp(0.5 * clamp(edgeS, 0.3, 1.4) + 0.5 * clamp(evScoreS, 0.3, 1.4), 0.3, 1.3);
                candShort = { side: "short", p_lcb: pShort_lcb, p_raw: pShort0, ev_bps: simS.ev_bps, exp_lcb_bps: evLCBS, tp_bps: tp_s, sl_bps: sl_s, cost_bps: costShort, style: "mr", regime, viab_mult: viabMultS };
              }

              const chosen = candLong && candShort
                ? (candLong.exp_lcb_bps >= candShort.exp_lcb_bps ? candLong : candShort)
                : (candLong || candShort || null);

              if (!chosen) { log(`   ⏭️  ${symbol}: no valid candidate (DIRECTION=${DIRECTION})`); return null; }

              // FIX BUG 2: Apply ALL gates from first pusher
              const gDir    = (chosen.side === "long" && noLongDown) ? 0.8 : 1.0;
              const gBTC    = (chosen.side === "long" && !btcUp1h) ? 0.85 : 1.0;
              const gMR     = mrLocked ? 0.7 : 1.05;
              const gEV     = clamp(chosen.viab_mult || 1, 0.3, 1.3);
              // FIX BUG 2+3: Add gSpread, gCost, gVol (spread_bps available from candMetrics)
              const gSpread = clamp(1 - Math.max(0, (candMetrics.spread_bps - MAX_SPREAD_BPS)) / MAX_SPREAD_BPS, 0.2, 1.1);
              const gCost   = clamp(1 - Math.max(0, (chosen.cost_bps - COST_BPS)) / 20, 0.2, 1.1);
              const gVol    = clamp((candMetrics.volume_1h_usd || 0) / Math.max(1, MIN_VOL_1H_USD), 0.2, 1.1);

              const gateMult = clamp(gDir * gBTC * gMR * gEV * gSpread * gCost * gVol, 0.2, 1.4);

              // FIX BUG 4: Use confidenceScore function (exact from first pusher)
              const microQ = (Math.max(0, 1 - (candMetrics.spread_bps || 0) / 20)) * (1 - Math.min(0.6, (chosen.cost_bps - COST_BPS) / 20));
              const regimeQ = 0.7 + 0.4 * 0.5; // simplified (no TF align for Bybit)
              const conf = confidenceScore({
                p_cal: chosen.p_lcb,
                ev_bps: chosen.ev_bps,
                atr_bps,
                micro: microQ,
                regime: regimeQ,
                reliability: 1,
                riskAdj: 1
              }) * gateMult;

              log(`   ✅ ${symbol}: ${chosen.side} ev=${chosen.exp_lcb_bps} conf=${Math.round(conf)} gateMult=${gateMult.toFixed(3)}`);

              return {
                side:        chosen.side,
                p_lcb:       chosen.p_lcb,
                p_raw:       chosen.p_raw,
                ev_bps:      chosen.ev_bps,
                exp_lcb_bps: chosen.exp_lcb_bps,
                tp_bps:      chosen.tp_bps,
                sl_bps:      chosen.sl_bps,
                cost_bps:    chosen.cost_bps,
                regime,
                atr_bps,
                gateMult,
                confidence:  Math.round(conf), // FIX BUG 4: computed confidence, not hedge_confidence
                adx5,
                rsi14,
                z_vwap,
                mrLocked,
                noLongDown
              };
            } catch(e) {
              log(`   ⚠️  MEXC-method error for ${symbol}: ${e?.message || e}`);
              return null;
            }
          }

          // ---------- Main ----------
          let reason="ok", selectionTier="confidence";
          try{
            const { state, persist } = await loadState();

            state.run_counter = (state.run_counter || 0) + 1;
            log(`🔄 Run ${state.run_counter}/6`);
            const SHOULD_WIPE = (state.run_counter >= 6);

            if (SHOULD_WIPE) {
              log("🗑️  RUN 6: WIPE GIST AND RESTART FRESH");
              await saveState(persist, { run_counter: 0 }, {}, 2, true);
              state.v = "bybit-hedge-1.0"; state.run_counter = 1;
              state.cooldown = {}; state.cooldown_side = {}; state.pending = [];
              state.equity = []; state.closed = []; state.mr_lockout = {};
              state.sym_stats = {}; state.sym_stats_real = {}; state.calibCoeffs = {};
              state.lastReconcileTs = 0; state.calibration_holdout = [];
              state.learned_trade_keys = []; state.calib_symbol_counts = {};
              state.calib_last_version = CALIB_VERSION;
              log("♻️  State reset to fresh.");
            }

            learnFromGistRealFills(state);
            cleanExpiredCooldowns(state);
            cleanExpiredClosedTrades(state);

            const preserved = {
              v: state.v || "bybit-hedge-1.0", run_counter: state.run_counter || 0,
              cooldown: state.cooldown || {}, cooldown_side: state.cooldown_side || {},
              mr_lockout: state.mr_lockout || {}, calibCoeffs: state.calibCoeffs || {},
              learned_trade_keys: state.learned_trade_keys || [],
              calib_symbol_counts: state.calib_symbol_counts || {},
              calib_last_version: state.calib_last_version || CALIB_VERSION,
              pending: [], closed: state.closed || [], equity: state.equity || [],
              sym_stats_real: state.sym_stats_real || {}, sym_stats: {},
              calibration_holdout: [], lastReconcileTs: 0
            };
            Object.assign(state, preserved);

            const calibHealth = validateCalibration(state);
            if(!todOK) reason="tod_gate";

            let btcUp1h = true;
            if (!IS_HEDGE) {
              try {
                const btcK = await fetchBybitKlines("BTCUSDT", "1h", K1H);
                if (btcK && btcK.length >= EMA_SLOW) {
                  const btcC = btcK.map(x => +x[4]);
                  btcUp1h = btcC.at(-1) >= ema(btcC, EMA_FAST) && btcC.at(-1) >= ema(btcC, EMA_SLOW);
                }
                log(`📊 BTC trend: ${btcUp1h ? "UP" : "DOWN"}`);
              } catch(e) { log("BTC trend warn", e?.message||e); }
            }

            log("📡 Fetching Bybit Linear universe...");
            const bybitSymbols = await fetchBybitLinearSymbols();
            if (!bybitSymbols || bybitSymbols.length === 0) {
              log("❌ No Bybit Linear symbols found");
              reason = "no_bybit_symbols";
              throw new Error("No Bybit Linear symbols available");
            }

            const equityStats=(eq)=>{ const day=Date.now()-24*3600*1000; let pnl24=0,cum=0,peak=0,dd=0; for(const e of eq||[]){ if(e.ts_ms>=day) pnl24+=e.pnl_bps; cum+=e.pnl_bps; if(cum>peak) peak=cum; dd=Math.min(dd,cum-peak); } return { pnl24_bps:Math.round(pnl24), peak_dd_bps:Math.round(dd) }; };
            const { pnl24_bps, peak_dd_bps } = equityStats(state.equity);
            const throttle=(pnl24_bps<=DD_24H_LIMIT_BPS) || (peak_dd_bps<=DD_PEAK_LIMIT_BPS);

            log("📊 Fetching golden metrics for all symbols...");
            const BATCH_SIZE = 10, BATCH_DELAY = 500;
            const allMetrics = [];

            const eligibleSymbols = bybitSymbols.filter(sym => {
              const lastTs = state.cooldown?.[sym.base] || 0;
              return !(lastTs && (Date.now() - lastTs) < COOLDOWN_MS);
            });

            for (let i = 0; i < eligibleSymbols.length; i += BATCH_SIZE) {
              const batch = eligibleSymbols.slice(i, i + BATCH_SIZE);
              const batchResults = await Promise.all(
                batch.map(async (sym) => {
                  try {
                    const metrics = await fetchGoldenMetricsWithSpread(sym.symbol);
                    if (!metrics) return null;
                    return { ...sym, ...metrics, hedge_confidence: calculateHedgeConfidence(metrics) };
                  } catch (e) { return null; }
                })
              );
              for (const r of batchResults) if (r && r.mark_price > 0) allMetrics.push(r);
              if (i + BATCH_SIZE < eligibleSymbols.length) await sleep(BATCH_DELAY);
            }

            allMetrics.sort((a, b) => b.hedge_confidence - a.hedge_confidence);

            const TOP_10_COUNT = 10;
            const topCandidates = allMetrics.slice(0, TOP_10_COUNT);

            const TARGET_TOP_N = Math.max(1, TOP_N || 3);

            let ideasForBuild = [];

            if (IS_HEDGE) {
              log("🔀 HEDGE=on: Using funding-rate side + mirrored flip");

              const selected = [];
              for (const cand of topCandidates) {
                if (selected.length >= TARGET_TOP_N) break;
                if (selected.some(s => s.base === cand.base)) continue;

                const klines1m = await fetchBybit1mKlines(cand.symbol, 5);
                const isStable = checkRecentStability(klines1m, MAX_1M_FLUCTUATION_PCT);
                if (!isStable) { log(`   ⏭️  Skip ${cand.symbol}: 1m fluctuation`); continue; }

                const atr_bps = Math.round(cand.vol_1h_pct * 100);
                const tp_bps  = Math.max(30, Math.round(atr_bps * 0.9));
                const sl_bps  = Math.min(80, Math.max(20, Math.round(atr_bps * 0.5)));
                const cost_bps = COST_BPS + Math.round(cand.spread_bps / 2);
                const p_win   = 0.50 + 0.15 * Math.tanh(cand.vol_1h_pct / 3);
                const ev_bps  = Math.round(p_win * tp_bps - (1 - p_win) * sl_bps - cost_bps);

                if (ev_bps < 0) { log(`   ⏭️  Skip ${cand.symbol}: negative EV`); continue; }

                selected.push({ ...cand, atr_bps, tp_bps, sl_bps, cost_bps, p_win, ev_bps });
              }

              for (const cand of selected) {
                const side = cand.funding_rate_raw > 0 ? "short" : "long";
                const base = {
                  symbol: cand.symbol, base: cand.base, quote: cand.quote, side,
                  mark_price: cand.mark_price, spread_bps: cand.spread_bps,
                  tp_bps: cand.tp_bps, sl_bps: cand.sl_bps, cost_bps: cand.cost_bps,
                  rrr: +(cand.tp_bps / cand.sl_bps).toFixed(2),
                  p_win: +cand.p_win.toFixed(3), p_lcb: +cand.p_win.toFixed(3), p_raw: +cand.p_win.toFixed(3),
                  ev_bps: cand.ev_bps, exp_lcb_bps: cand.ev_bps,
                  regime: "hedge", style: "hedge",
                  vol_1h_pct: cand.vol_1h_pct, funding_rate: cand.funding_rate,
                  funding_rate_raw: cand.funding_rate_raw, oi_delta_pct: cand.oi_delta_pct,
                  volume_1h_usd: cand.volume_1h_usd, basis_bps: cand.basis_bps,
                  current_oi_usd: cand.current_oi_usd, confidence: cand.hedge_confidence,
                  hedge_confidence: cand.hedge_confidence, hold_sec: 3600, flipped: false,
                  reasons: reasonBuilder({ vol_1h_pct: cand.vol_1h_pct, funding_rate: cand.funding_rate, oi_delta_pct: cand.oi_delta_pct, volume_1h_usd: cand.volume_1h_usd, basis_bps: cand.basis_bps }),
                  ret5: []
                };
                const flippedIdea = { ...base, side: side === "long" ? "short" : "long", flipped: true, original_idea_id: cand.symbol + "_" + side };
                ideasForBuild.push(base);
                ideasForBuild.push(flippedIdea);
              }

            } else {
              log("🎯 HEDGE=off: Using MEXC technical analysis");

              const selected = [];
              for (const cand of topCandidates) {
                if (selected.length >= TARGET_TOP_N) break;
                if (selected.some(s => s.base === cand.base)) continue;

                const klines1m = await fetchBybit1mKlines(cand.symbol, 5);
                const isStable = checkRecentStability(klines1m, MAX_1M_FLUCTUATION_PCT);
                if (!isStable) { log(`   ⏭️  Skip ${cand.symbol}: 1m fluctuation`); continue; }

                const dirResult = await determineSideViaMEXCMethod(cand.symbol, cand, state, btcUp1h);

                if (!dirResult) { log(`   ⏭️  Skip ${cand.symbol}: MEXC method returned null`); continue; }
                if (dirResult.exp_lcb_bps < 0) { log(`   ⏭️  Skip ${cand.symbol}: negative EV`); continue; }

                selected.push({ ...cand, dirResult });
              }

              for (const cand of selected) {
                const { dirResult } = cand;
                // FIX BUG 5: Apply symAdj
                const symAdj = getSymbolAdj(state, cand.base);
                const finalConf = Math.round(dirResult.confidence * symAdj);

                ideasForBuild.push({
                  symbol: cand.symbol, base: cand.base, quote: cand.quote, side: dirResult.side,
                  mark_price: cand.mark_price, spread_bps: cand.spread_bps,
                  tp_bps: dirResult.tp_bps, sl_bps: dirResult.sl_bps, cost_bps: dirResult.cost_bps,
                  rrr: +(dirResult.tp_bps / dirResult.sl_bps).toFixed(2),
                  p_win: +dirResult.p_lcb.toFixed(3), p_lcb: +dirResult.p_lcb.toFixed(3),
                  p_raw: +dirResult.p_raw.toFixed(3),
                  ev_bps: dirResult.ev_bps, exp_lcb_bps: dirResult.exp_lcb_bps,
                  regime: dirResult.regime, style: "directional",
                  vol_1h_pct: cand.vol_1h_pct, funding_rate: cand.funding_rate,
                  funding_rate_raw: cand.funding_rate_raw, oi_delta_pct: cand.oi_delta_pct,
                  volume_1h_usd: cand.volume_1h_usd, basis_bps: cand.basis_bps,
                  current_oi_usd: cand.current_oi_usd,
                  confidence: finalConf,
                  hedge_confidence: cand.hedge_confidence, hold_sec: 3600, flipped: false,
                  direction_method: "mexc_technical",
                  atr_bps: dirResult.atr_bps, adx5: dirResult.adx5,
                  rsi14: dirResult.rsi14, z_vwap: dirResult.z_vwap,
                  mrLocked: dirResult.mrLocked, noLongDown: dirResult.noLongDown,
                  reasons: reasonBuilder({ vol_1h_pct: cand.vol_1h_pct, funding_rate: cand.funding_rate, oi_delta_pct: cand.oi_delta_pct, volume_1h_usd: cand.volume_1h_usd, basis_bps: cand.basis_bps }),
                  ret5: []
                });
              }
            }

            const wEv = softmax(ideasForBuild.map(x => x.exp_lcb_bps), 20);

            let picksV2 = ideasForBuild.map((x, i) => {
              const mid = x.mark_price;
              let entry_limit = null, tp_abs = null, sl_abs = null;
              if (mid != null) {
                const slF = x.sl_bps / 10000, tpF = x.tp_bps / 10000;
                if (x.side === "long") {
                  entry_limit = mid * (1 - Math.max(0.001, slF * 0.5));
                  tp_abs = entry_limit * (1 + tpF);
                  sl_abs = entry_limit * (1 - slF);
                } else {
                  entry_limit = mid * (1 + slF);
                  tp_abs = entry_limit * (1 - tpF);
                  sl_abs = entry_limit * (1 + slF);
                }
              }
              const idea_id = uuidv4();
              const client_order_id = mkClientOrderId("byh");
              const ttl = clamp(Math.round((x.hold_sec || 3600) + i * 12), TTL_MIN, TTL_MAX);
              const size_bps = (Number(process.env.FORCE_SIZE_BPS || "0") > 0)
                ? Math.round(Number(process.env.FORCE_SIZE_BPS))
                : (x.sl_bps > 0 ? Math.min(220, Math.round((wEv[i] * TARGET_PORT_RISK_BPS / x.sl_bps) * 100)) : 0);

              return {
                idea_id, client_order_id,
                symbol: x.base, symbol_full: x.symbol, symbolFull: x.symbol, quote: x.quote,
                side: x.side, rank: i + 1,
                target_exchange: TARGET_EXCHANGE, market_type: MARKET_TYPE, margin_mode: MARGIN_MODE, leverage: LEVERAGE,
                entry_policy: "maker_join", exec: { exec: "post_only" },
                entry_mid: mid, entry_limit, tp_abs, sl_abs,
                tp_bps: x.tp_bps, sl_bps: x.sl_bps, rrr: x.rrr,
                exp_lcb_bps: x.exp_lcb_bps, ev_bps: x.ev_bps, cost_bps: x.cost_bps,
                p_win: x.p_lcb, p_lcb: x.p_lcb, p_raw: x.p_raw,
                calib_key: `side:${x.side}|regime:${x.regime}`, regime: x.regime,
                ttl_sec: ttl, size_bps,
                predicted: {
                  ts_ms: Date.now(), p_cal: x.p_lcb,
                  ev_bps: x.exp_lcb_bps ?? x.ev_bps,
                  confidence_score: x.confidence,
                  flipped: x.flipped || false,
                  vol_1h_pct: x.vol_1h_pct, funding_rate: x.funding_rate,
                  oi_delta_pct: x.oi_delta_pct, volume_1h_usd: x.volume_1h_usd,
                  basis_bps: x.basis_bps, hedge_confidence: x.hedge_confidence,
                  hedge_mode: IS_HEDGE ? "on" : "off",
                  direction_method: x.direction_method || (IS_HEDGE ? "funding_rate" : "mexc_technical")
                },
                confidence: x.confidence, reasons: x.reasons,
                reasons_text: (x.reasons || []).slice(0, 3).map(r => `${r.factor}:${r.value}(${r.contribution >= 0 ? "+" : ""}${r.contribution})`),
                hedge_metrics: {
                  vol_1h_pct: x.vol_1h_pct, funding_rate_raw: x.funding_rate_raw,
                  oi_delta_pct: x.oi_delta_pct, volume_1h_usd: x.volume_1h_usd,
                  basis_bps: x.basis_bps, mark_price: x.mark_price,
                  spot_price: x.spot_price || 0, current_oi_usd: x.current_oi_usd
                }
              };
            });

            const toV1Compat = (pv2) => ({
              idea_id: pv2.idea_id, client_order_id: pv2.client_order_id,
              symbol: pv2.symbol, symbol_full: pv2.symbol_full, quote: pv2.quote,
              side: pv2.side, rank: pv2.rank,
              entry_policy: "smart_swing_limit", entry_type: "limit", activation: "on_fill",
              entry_mid: pv2.entry_mid, entry_limit: pv2.entry_limit, tp_abs: pv2.tp_abs, sl_abs: pv2.sl_abs,
              tp_bps: pv2.tp_bps, sl_bps: pv2.sl_bps, rrr: pv2.rrr,
              exp_lcb_bps: pv2.exp_lcb_bps, ev_bps: pv2.ev_bps, cost_bps: pv2.cost_bps,
              p_win: pv2.p_lcb, p_lcb: pv2.p_lcb, p_raw: pv2.p_raw,
              calib_key: pv2.calib_key, regime: pv2.regime, ttl_sec: pv2.ttl_sec, size_bps: pv2.size_bps,
              predicted: { ...pv2.predicted, meta: {
                strategy: STRATEGY_NAME, model_version: MODEL_VERSION, schema_version: SCHEMA_VERSION,
                git_sha: GIT_SHA, config_hash: CONFIG_HASH,
                hedge_mode: IS_HEDGE ? "on" : "off",
                futures_hint: { target_exchange: pv2.target_exchange, market_type: pv2.market_type, margin_mode: pv2.margin_mode, leverage: pv2.leverage, entry_policy_override: pv2.entry_policy, exec: pv2.exec }
              }},
              confidence: pv2.confidence, reasons: pv2.reasons, reasons_text: pv2.reasons_text,
              hedge_metrics: pv2.hedge_metrics
            });

            let picks = picksV2.map(toV1Compat);

            try {
              const maxVolPick = Math.max(...picks.map(p => p.predicted?.vol_1h_pct || 1));
              if (maxVolPick > 5) {
                const scale = clamp(5 / maxVolPick, 0.4, 1);
                picks = picks.map(p => ({ ...p, size_bps: Math.max(4, Math.round(p.size_bps * scale)) }));
              }
            } catch (e) { }

            try {
              const nowMs = Date.now(); const ideasTs = new Date(nowMs).toISOString();
              for (const p of picks) {
                state.cooldown[p.symbol] = nowMs;
                state.cooldown_side[p.symbol] = { side: p.side, ts_ms: nowMs };
                state.pending.push({
                  ts: ideasTs, ts_ms: nowMs, ttl_ts_ms: nowMs + p.ttl_sec * 1000,
                  symbolFull: p.symbol_full, flipped: p.predicted?.flipped || false,
                  base: p.symbol, quote: p.quote, side: p.side,
                  entry_limit: p.entry_limit, tp_abs: p.tp_abs, sl_abs: p.sl_abs,
                  hold_sec: p.ttl_sec, tp_bps: p.tp_bps, sl_bps: p.sl_bps, cost_bps: p.cost_bps,
                  tier: "confidence", p_lcb: p.p_lcb, p_raw: p.p_raw,
                  calib_key: p.calib_key, predicted: p.predicted, regime: p.regime,
                  decision_context: { source: IS_HEDGE ? "bybit_linear_hedge" : "bybit_linear_directional", golden_metrics: p.hedge_metrics, hedge_mode: IS_HEDGE ? "on" : "off" },
                  notional_usd: NOTIONAL, size_bps: p.size_bps,
                  idea_id: p.idea_id, client_order_id: p.client_order_id,
                  hedge_metrics: p.hedge_metrics,
                  status: "planned", entry_ts_ms: null, entry_price: null, qty: null
                });
              }
              if (state.pending.length > 550) state.pending = state.pending.slice(-550);
            } catch (e) { }

            const auditOut = buildAuditOutputs(state);
            await saveState(persist, state, auditOut, 2, true);

            const ideaLogs = picks.map(p => ({
              symbol: p.symbol_full, side: p.side, flipped: p.predicted?.flipped || false,
              confidence: p.confidence, hedge_confidence: p.predicted?.hedge_confidence || 0,
              vol_1h_pct: +(p.predicted?.vol_1h_pct || 0).toFixed(2),
              funding_rate: +(p.predicted?.funding_rate || 0).toFixed(5),
              oi_delta_pct: +(p.predicted?.oi_delta_pct || 0).toFixed(1),
              volume_1h_usd: Math.round((p.predicted?.volume_1h_usd || 0) / 1e6) + "M",
              reasons: p.reasons_text, p_cal: +p.p_lcb.toFixed(3), ev_bps: p.ev_bps,
              idea_id: p.idea_id, hedge_mode: IS_HEDGE ? "on" : "off",
              direction_method: p.predicted?.direction_method || "unknown"
            }));

            const meta = {
              origin: "github_actions", reason, exchange: "bybit_linear", execution_exchange: "bybit_linear",
              strategy: STRATEGY_NAME, model_version: MODEL_VERSION, schema_version: SCHEMA_VERSION,
              git_sha: GIT_SHA, config_hash: CONFIG_HASH,
              hedge_mode: IS_HEDGE ? "on" : "off",
              counts: { bybit_universe: bybitSymbols.length, metrics_fetched: allMetrics.length, ideas_generated: picks.length },
              dd_gate: { pnl24_bps, peak_dd_bps, throttle },
              tod: { active: S_H != null && E_H != null, start: S_H, end: E_H },
              heartbeat: { mismatches: 0, zombies: 0 }, tier: selectionTier, idea_logs: ideaLogs,
              calibration_health: calibHealth,
              golden_metrics_config: { ideal_vol_1h_pct: IDEAL_VOL_1H_PCT, ideal_funding_rate: IDEAL_FUNDING_RATE, ideal_oi_delta_pct: IDEAL_OI_DELTA_PCT, ideal_volume_1h_usd: IDEAL_VOLUME_1H_USD, weights: { vol_1h: WEIGHT_VOL_1H, funding: WEIGHT_FUNDING, oi_delta: WEIGHT_OI_DELTA, volume: WEIGHT_VOLUME } },
              extras: { v2_ideas: picksV2, features_requested: ["maker_join","post_only","linear","bybit_execution", IS_HEDGE ? "hedge_trading" : "directional_trading"] }
            };

            const payload = { ts: new Date().toISOString(), mode: "normal", source: "external_pusher", meta, top_n: picks.length || 0, ideas: picks || [] };
            log(`pushing ${picks.length} ideas (hedge=${IS_HEDGE ? "on" : "off"}) to ${PUSH_URL}`);
            try {
              const r = await fetchWithTimeout(PUSH_URL, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUSH_TOKEN }, body: JSON.stringify(payload) }, 15000);
              let txt = ""; try { txt = await r.text(); } catch { }
              log("push status", r?.status || "ERR", (txt || "").slice(0, 400));
            } catch (e) { log("push failed", e?.message || e); }

            if (PUSH_URL_V2) {
              const payloadV2 = { ts: new Date().toISOString(), mode: "normal", source: "external_pusher", meta: { origin: "github_actions_v2_bybit", strategy: "bybit-hedge-ultimate", data_source: "bybit_linear", golden_metrics: true, execution: "bybit_linear", hedge_mode: IS_HEDGE ? "on" : "off" }, top_n: picksV2.length, ideas: picksV2 };
              log(`pushing ${picksV2.length} v2 ideas to ${PUSH_URL_V2}`);
              try {
                const r2 = await fetchWithTimeout(PUSH_URL_V2, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUSH_TOKEN }, body: JSON.stringify(payloadV2) }, 15000);
                let txt2 = ""; try { txt2 = await r2.text(); } catch { }
                log("push v2 status", r2?.status || "ERR", (txt2 || "").slice(0, 400));
              } catch (e) { log("push v2 failed", e?.message || e); }
            }

          } catch (e) {
            reason = reason !== "ok" ? reason : "data_error";
            const payload = { ts: new Date().toISOString(), mode: "normal", source: "external_pusher", meta: { origin: "github_actions", reason, error: (e?.message || String(e)).slice(0, 220), exchange: "bybit_linear", hedge_mode: IS_HEDGE ? "on" : "off" }, top_n: 0, ideas: [] };
            log("pushing 0 ideas to", PUSH_URL);
            try {
              const r = await fetchWithTimeout(PUSH_URL, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUSH_TOKEN }, body: JSON.stringify(payload) }, 15000);
              let txt = ""; try { txt = await r.text(); } catch { }
              log("push status", r?.status || "ERR", (txt || "").slice(0, 200));
            } catch (e2) { log("push failed", e2?.message || e2); }
          }
          })();
          NODE

          EXIT_CODE=$?

          set -e
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "[gha] pusher exited with code $EXIT_CODE"
            raw_push_url="$(printf '%s' "${WORKER_PUSH_URL}" | tr -d '\r\n')"
            health_url="$(printf '%s' "${raw_push_url}" | sed -E 's#/signals/push(\?.*)?$#/health#')"
            echo "[gha] fallback health GET ${health_url}"
            http_code_h=$(curl -g -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${PUSH_TOKEN}" --max-time 8 "${health_url}" || true)
            echo "[gha] fallback health status ${http_code_h}"
            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            payload='{"ts":"'"${now}"'","mode":"normal","source":"external_pusher","meta":{"origin":"github_actions","reason":"fallback_node_error","exchange":"bybit_linear"},"top_n":0,"ideas":[]}'
            echo "[gha] pushing 0 ideas to ${raw_push_url}"
            mkdir -p /tmp
            : > /tmp/push_resp.txt
            http_code=$(curl -g -sS -o /tmp/push_resp.txt -w "%{http_code}" -X POST -H "Content-Type: application/json" -H "Authorization: Bearer ${PUSH_TOKEN}" --data-raw "${payload}" --max-time 12 "${raw_push_url}" || true)
            body="$(head -c 400 /tmp/push_resp.txt || true)"
            echo "[gha] push status ${http_code} ${body}"
            exit 0
          fi
