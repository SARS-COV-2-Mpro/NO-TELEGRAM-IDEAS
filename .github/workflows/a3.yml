name: 🔄 A3 (8 min)

on:
  repository_dispatch:
    types: [run_A3]   # <— must match what Worker sends

permissions:
  actions: write
  contents: write

jobs:
  a3:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🚀 A3 Work
        run: |
          echo "⏳ A3 started at $(date)"
          sleep 480  # 8 minutes = 480 seconds
          echo "✅ A3 done at $(date)"

      - name: 🔁 Trigger Ideas Pusher (run_B)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                event_type: 'run_B'
              });
              console.log('✅ Successfully triggered Ideas Pusher (run_B)');
            } catch (error) {
              core.setFailed(`❌ Failed to trigger run_B: ${error.message}`);
            }
