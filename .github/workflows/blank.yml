            state.closed.sort((a,b)=>(b.ts_exit_ms||b.exit_ts_ms||0)-(a.ts_exit_ms||a.exit_ts_ms||0));
            const removed=state.closed.length-MAX_CLOSED_TRADES;
            state.closed=state.closed.slice(0,MAX_CLOSED_TRADES);
            log(`🗑️  Kept ${MAX_CLOSED_TRADES} most recent closed trades, removed ${removed}`);
          }

          const getCoeffs=(state,side,regime)=>{ const key=`${side}_${regime}`; if(!state.calibCoeffs) state.calibCoeffs={}; if(!state.calibCoeffs[key]) return null; const existing=state.calibCoeffs[key]; if(existing.version!==CALIB_VERSION){ const def={ version:CALIB_VERSION, a:0, b:1, n:0, n_tp:0, n_sl:0, momentum_a:0, momentum_b:0, recent_errors:[], recent_predictions:[], last_reset_n:0, created_at:existing.created_at||Date.now(), last_updated:Date.now() }; state.calibCoeffs[key]=def; return def; } return existing; };

          function learnFromGistRealFills(state){
            if(!Array.isArray(state.learned_trade_keys)) state.learned_trade_keys=[];
            const learnedSet=new Set(state.learned_trade_keys);
            if(!state.calib_symbol_counts) state.calib_symbol_counts={};
            const learnable=(state.closed||[]).filter(c=>c.reconciliation==="exchange_trade_history"&&!c.learned&&c.p_raw!=null&&isFinite(c.p_raw)&&c.p_raw>0.01&&c.p_raw<0.99);
            if(learnable.length===0){ log("📚 No new fills to learn from this cycle."); return; }
            log(`📚 Learning from ${learnable.length} real fills...`);
            const pRawValues=learnable.map(c=>c.p_raw).filter(p=>p!=null);
            const pMean=mean(pRawValues), pStd=std(pRawValues)||0.1;
            const useOutlierFilter=learnable.length>=20&&pStd>0;
            let stats={ learned:0, skipped_ttl:0, skipped_dup:0, skipped_invalid:0, skipped_poison:0, skipped_outlier:0 };
            for(const c of learnable){
              const reg=c.regime||regFromKey(c.calib_key);
              if(!reg||!c.side){ stats.skipped_invalid++; continue; }
              if(useOutlierFilter&&Math.abs((c.p_raw-pMean)/pStd)>OUTLIER_ZSCORE){ stats.skipped_outlier++; continue; }
              const cid=c.client_order_id||c.trade_details?.client_order_id||"";
              const sym=c.symbolFull||c.symbol||"UNK", side=c.side||"?", exit=c.exit_reason||"";
              const tEntry=Math.floor((c.ts_entry_ms||c.entry_ts_ms||0)/1000), tExit=Math.floor((c.ts_exit_ms||c.exit_ts_ms||0)/1000);
              const learn_key=crypto.createHash('sha256').update(`${cid}|${sym}|${side}|${tEntry}|${tExit}|${exit}`).digest('hex').slice(0,32);
              if(learnedSet.has(learn_key)){ stats.skipped_dup++; continue; }
              const symCountKey=`${side}_${reg}_${sym}`;
              const currentTotal=state.calibCoeffs?.[`${side}_${reg}`]?.n||0, currentSymCount=state.calib_symbol_counts[symCountKey]||0;
              if((currentTotal+1)>20&&(currentSymCount+1)/(currentTotal+1)>MAX_SYMBOL_CONTRIBUTION){ stats.skipped_poison++; continue; }
              const tp_hit=exit==="tp"||c.realized?.tp_hit===true, sl_hit=exit==="sl"||c.realized?.sl_hit===true;
              if(!tp_hit&&!sl_hit){ stats.skipped_ttl++; c.learned_skip_reason="ttl_exit"; continue; }
              const pnl=c.pnl_bps||0;
              if((tp_hit&&pnl<-10)||(sl_hit&&pnl>10)){ stats.skipped_invalid++; continue; }
              const outcome=tp_hit?1:0;
              try{ updateCalibration(state,c.side,reg,c.p_raw,outcome); learnedSet.add(learn_key); state.calib_symbol_counts[symCountKey]=currentSymCount+1; c.learned=true; c.learned_at_ts=Date.now(); stats.learned++; }
              catch(e){ stats.skipped_invalid++; }
            }
            state.learned_trade_keys=Array.from(learnedSet).slice(-2000);
            log(`✅ Learned=${stats.learned} | Skipped: TTL=${stats.skipped_ttl} Dup=${stats.skipped_dup} Invalid=${stats.skipped_invalid} Poison=${stats.skipped_poison} Outlier=${stats.skipped_outlier}`);
          }

          function validateCalibration(state){
            const report={};
            for(const key of Object.keys(state.calibCoeffs||{})){
              const coeff=state.calibCoeffs[key];
              if(coeff.n<CALIB_MIN_SAMPLES){ report[key]={ status:"insufficient_data", n:coeff.n }; continue; }
              const predictions=coeff.recent_predictions||[];
              let brier_cal=null;
              if(predictions.length>=10){ const clamp01=p=>Math.max(1e-6,Math.min(1-1e-6,p)); brier_cal=mean(predictions.map(p=>(p.outcome-clamp01(p.p_cal))**2)); }
              const avg_error=mean(coeff.recent_errors||[]);
              const win_rate=coeff.n>0?(coeff.n_tp||0)/coeff.n:null;
              const is_healthy=avg_error<0.38&&coeff.b>0.1&&Math.abs(coeff.a)<COEFF_BOUND_A*0.8&&Math.abs(coeff.b)<COEFF_BOUND_B*0.8&&(brier_cal==null||brier_cal<0.23);
              report[key]={ n:coeff.n, n_tp:coeff.n_tp||0, n_sl:coeff.n_sl||0, win_rate:win_rate?.toFixed(3)||"N/A", a:coeff.a.toFixed(4), b:coeff.b.toFixed(4), avg_error:avg_error.toFixed(3), brier_cal:brier_cal?.toFixed(4)||"N/A", status:is_healthy?"healthy":"degraded" };
            }
            if(Object.keys(report).length>0){ log("📊 Calibration Health:"); for(const [k,v] of Object.entries(report)) log(`   ${k}: ${v.status} | n=${v.n} wr=${v.win_rate} brier=${v.brier_cal} a=${v.a} b=${v.b}`); }
            return report;
          }

          function updateCalibration(state,side,regime,pRaw,outcome){
            if(pRaw==null||!isFinite(pRaw)||pRaw<=0||pRaw>=1) return;
            const coeff=getCoeffs(state,side,regime);
            if(!coeff){ log(`⏭️  Skip learning [${side}_${regime}]: no existing calibration`); return; }
            if(!coeff.recent_predictions) coeff.recent_predictions=[];
            coeff.recent_predictions.push({ p_raw:pRaw, p_cal:calibrateP(state,side,regime,pRaw), outcome, ts:Date.now() });
            if(coeff.recent_predictions.length>100) coeff.recent_predictions.shift();
            const warmup_factor=Math.min(1,(coeff.n+1)/20);
            const lr=(MIN_LEARNING_RATE+(MAX_LEARNING_RATE-MIN_LEARNING_RATE)/Math.sqrt(1+coeff.n/10))*warmup_factor;
            const eps=1e-7, pSafe=Math.max(eps,Math.min(1-eps,pRaw));
            const x=Math.max(-6,Math.min(6,Math.log(pSafe/(1-pSafe))));
            const pHat=1/(1+Math.exp(-Math.max(-10,Math.min(10,coeff.a+coeff.b*x))));
            const error=outcome-pHat;
            coeff.momentum_a=MOMENTUM_RATE*coeff.momentum_a-lr*(-error);
            coeff.momentum_b=MOMENTUM_RATE*coeff.momentum_b-lr*(-error*x);
            const a_next=(1-LEARNING_DECAY*lr)*coeff.a+coeff.momentum_a;
            const b_next=(1-LEARNING_DECAY*lr)*coeff.b+coeff.momentum_b;
            if(b_next<0.05){ coeff.b=1.0; coeff.momentum_b=0; coeff.a=clamp(coeff.a,-1.0,1.0); }
            else{ coeff.a=clamp(a_next,-COEFF_BOUND_A,COEFF_BOUND_A); coeff.b=clamp(b_next,-COEFF_BOUND_B,COEFF_BOUND_B); }
            if(!coeff.recent_errors) coeff.recent_errors=[];
            coeff.recent_errors.push(Math.abs(error));
            if(coeff.recent_errors.length>CALIB_ERROR_WINDOW) coeff.recent_errors.shift();
            const alpha=0.1, weights=coeff.recent_errors.map((_,i)=>Math.exp(alpha*i)), ws=weights.reduce((a,b)=>a+b,0)||1;
            const weighted_error=coeff.recent_errors.reduce((acc,e,i)=>acc+e*weights[i],0)/ws;
            if(weighted_error>CALIBRATION_RESET_THRESHOLD&&coeff.n>CALIB_MIN_RESET_N&&(coeff.n-(coeff.last_reset_n||0))>20){ coeff.a=0; coeff.b=1; coeff.momentum_a=0; coeff.momentum_b=0; coeff.recent_errors=[]; coeff.last_reset_n=coeff.n; }
            coeff.n++; if(outcome===1) coeff.n_tp=(coeff.n_tp||0)+1; else coeff.n_sl=(coeff.n_sl||0)+1; coeff.last_updated=Date.now();
            state.calibCoeffs[`${side}_${regime}`]=coeff;
          }

          const calibrateP=(state,side,regime,pRaw)=>{ const coeff=getCoeffs(state,side,regime); if(!coeff||pRaw==null||!isFinite(pRaw)) return 0.5; const x=Math.max(-5,Math.min(5,logit(pRaw))); return sigmoid(coeff.a+coeff.b*x); };
          function getSymbolAdj(state,base){ const real=state.sym_stats_real?.[base]; const s=real||state.sym_stats?.[base]; if(!s||s.n<6) return 1.0; const winRate=s.wins/s.n; const avgPnL=s.pnl_sum/s.n; let m=1.0; if(winRate<0.4) m*=0.7; if(avgPnL<0) m*=0.8; return clamp(m,0.5,1.2); }
          function buildAuditOutputs(state){ const lastNClosed=(state.closed||[]).slice(-5000); const closedAudit=lastNClosed.map(x=>JSON.stringify(x)).join("\n"); return { closedAudit, disagreements:"", tradesCsv:"" }; }

          // ================================================================
          // MTF DIRECTION ANALYSIS ENGINE
          // ================================================================
          async function runMTFDirectionAnalysis(symbol, originalSide, markPrice) {
            log(`\n🔬 [MTF] Starting deep direction analysis for ${symbol}...`);
            const result = {
              symbol,
              original_side: originalSide,
              final_side: originalSide,
              overridden: false,
              long_prob_pct: 50,
              short_prob_pct: 50,
              confidence_pct: 0,
              signals: [],
              reasons: [],
              detail: ""
            };

            try {
              // fetch 1min(30 candles=30min), 5min(24 candles=2h), 15min(16 candles=4h) in parallel
              const [k1m, k5m, k15m] = await Promise.all([
                fetchBybitKlines(symbol, 1,  30),
                fetchBybitKlines(symbol, 5,  24),
                fetchBybitKlines(symbol, 15, 16)
              ]);

              const signals = [];

              // ── 1. SLOPE ALIGNMENT (5min + 15min primary direction) ──
              const slope1m  = k1m  && k1m.length  >= 5  ? calcLinearRegressionSlope(k1m.map(c=>+c[4]))  : null;
              const slope5m  = k5m  && k5m.length  >= 5  ? calcLinearRegressionSlope(k5m.map(c=>+c[4]))  : null;
              const slope15m = k15m && k15m.length >= 5  ? calcLinearRegressionSlope(k15m.map(c=>+c[4])) : null;

              if(slope5m !== null && slope15m !== null) {
                const dir5m  = Math.sign(slope5m);
                const dir15m = Math.sign(slope15m);
                const aligned = dir5m === dir15m;
                const score = aligned ? clamp((slope5m + slope15m) / 2 / 0.15, -1, 1) : 0;
                const reason = aligned
                  ? `5m slope ${slope5m.toFixed(3)}% and 15m slope ${slope15m.toFixed(3)}% both ${dir5m > 0 ? "BULLISH" : "BEARISH"}`
                  : `5m slope ${slope5m.toFixed(3)}% CONFLICTS with 15m slope ${slope15m.toFixed(3)}%`;
                signals.push({ name:"slope_align", score, weight:0.25, reason });
              }

              // ── 2. 1MIN MOMENTUM ──
              if(slope1m !== null && slope5m !== null) {
                const dir1m = Math.sign(slope1m);
                const dir5m = Math.sign(slope5m);
                const score = dir1m === dir5m ? clamp(slope1m / 0.10, -1, 1) : clamp(slope1m / 0.10, -1, 1) * 0.3;
                const reason = dir1m === dir5m
                  ? `1m momentum ${slope1m.toFixed(3)}% confirms ${dir1m > 0 ? "UP" : "DOWN"} direction`
                  : `1m momentum ${slope1m.toFixed(3)}% diverges from 5m — entry timing uncertain`;
                signals.push({ name:"momentum_1m", score, weight:0.15, reason });
              }

              // ── 3. RSI ANALYSIS (5min) ──
              if(k5m && k5m.length >= 16) {
                const closes5m = k5m.map(c => +c[4]);
                const rsi5m = rsi(closes5m, 14);
                if(rsi5m !== null) {
                  let score = 0, reason = "";
                  if(rsi5m >= 70)      { score = -0.85; reason = `5m RSI=${rsi5m.toFixed(1)} OVERBOUGHT — short pressure building`; }
                  else if(rsi5m >= 60) { score = -0.35; reason = `5m RSI=${rsi5m.toFixed(1)} elevated — slight short bias`; }
                  else if(rsi5m <= 30) { score =  0.85; reason = `5m RSI=${rsi5m.toFixed(1)} OVERSOLD — long bounce likely`; }
                  else if(rsi5m <= 40) { score =  0.35; reason = `5m RSI=${rsi5m.toFixed(1)} low — slight long bias`; }
                  else                 { score = (50 - rsi5m) / 50 * 0.2; reason = `5m RSI=${rsi5m.toFixed(1)} neutral zone`; }
                  signals.push({ name:"rsi_5m", score, weight:0.20, reason });
                }
              }

              // ── 4. RSI DIVERGENCE ──
              if(k5m && k5m.length >= 16) {
                const closes5m = k5m.map(c => +c[4]);
                const highs5m  = k5m.map(c => +c[2]);
                const lows5m   = k5m.map(c => +c[3]);
                const rsiSeries = closes5m.map((_, i) => {
                  if(i < 14) return null;
                  return rsi(closes5m.slice(0, i + 1), 14);
                }).filter(r => r !== null);

                if(rsiSeries.length >= 5) {
                  const recentLows  = lows5m.slice(-5);
                  const recentHighs = highs5m.slice(-5);
                  const recentRsi   = rsiSeries.slice(-5);
                  const priceNewLow  = recentLows.at(-1)  < Math.min(...recentLows.slice(0,-1));
                  const priceNewHigh = recentHighs.at(-1) > Math.max(...recentHighs.slice(0,-1));
                  const rsiRising    = recentRsi.at(-1) > recentRsi.at(-3);
                  const rsiFalling   = recentRsi.at(-1) < recentRsi.at(-3);

                  if(priceNewLow && rsiRising && recentRsi.at(-1) < 45) {
                    signals.push({ name:"rsi_divergence", score:0.75, weight:0.15, reason:`Bullish RSI divergence: price new low but RSI ${recentRsi.at(-1).toFixed(1)} rising — reversal signal` });
                  } else if(priceNewHigh && rsiFalling && recentRsi.at(-1) > 55) {
                    signals.push({ name:"rsi_divergence", score:-0.75, weight:0.15, reason:`Bearish RSI divergence: price new high but RSI ${recentRsi.at(-1).toFixed(1)} falling — reversal signal` });
                  } else {
                    signals.push({ name:"rsi_divergence", score:0, weight:0.15, reason:"No RSI divergence detected" });
                  }
                }
              }

              // ── 5. VOLUME DIRECTION (5min) ──
              if(k5m && k5m.length >= 8) {
                const last8 = k5m.slice(-8);
                let bullVol = 0, bearVol = 0;
                for(const c of last8) {
                  const open = +c[1], close = +c[4], vol = +c[5];
                  if(close >= open) bullVol += vol;
                  else              bearVol += vol;
                }
                const totalVol = bullVol + bearVol || 1;
                const volRatio = (bullVol - bearVol) / totalVol;
                const score    = clamp(volRatio * 2, -1, 1);
                const reason   = `Last 8×5m candles: bull_vol=${(bullVol/totalVol*100).toFixed(0)}% vs bear_vol=${(bearVol/totalVol*100).toFixed(0)}% — ${score > 0.2 ? "buyers dominant" : score < -0.2 ? "sellers dominant" : "balanced"}`;
                signals.push({ name:"volume_dir", score, weight:0.15, reason });
              }

              // ── 6. CANDLE BODY STRUCTURE (1min last 5) ──
              if(k1m && k1m.length >= 5) {
                const last5 = k1m.slice(-5);
                const dirs  = last5.map(c => Math.sign(+c[4] - +c[1]));
                const bullCount = dirs.filter(d => d > 0).length;
                const bearCount = dirs.filter(d => d < 0).length;
                const score = clamp((bullCount - bearCount) / 5, -1, 1);
                const reason = `Last 5×1m candles: ${bullCount} green, ${bearCount} red — ${bullCount >= 4 ? "strong bull momentum" : bearCount >= 4 ? "strong bear momentum" : "mixed structure"}`;
                signals.push({ name:"candle_body_1m", score, weight:0.10, reason });
              }

              // ── 7. PRICE STRUCTURE HH/LL (5min) ──
              if(k5m && k5m.length >= 8) {
                const last8highs = k5m.slice(-8).map(c => +c[2]);
                const last8lows  = k5m.slice(-8).map(c => +c[3]);
                const hh = last8highs.at(-1) > last8highs.at(-4);
                const hl = last8lows.at(-1)  > last8lows.at(-4);
                const lh = last8highs.at(-1) < last8highs.at(-4);
                const ll = last8lows.at(-1)  < last8lows.at(-4);
                let score = 0, reason = "";
                if(hh && hl)       { score =  0.7; reason = "Price structure: Higher Highs + Higher Lows = UPTREND structure"; }
                else if(lh && ll)  { score = -0.7; reason = "Price structure: Lower Highs + Lower Lows = DOWNTREND structure"; }
                else if(hh && ll)  { score =  0.1; reason = "Price structure: HH + LL = volatile / expanding range"; }
                else if(lh && hl)  { score = -0.1; reason = "Price structure: LH + HL = contracting range"; }
                else               { score =  0.0; reason = "Price structure: mixed signals"; }
                signals.push({ name:"price_structure", score, weight:0.10, reason });
              }

              // ── WEIGHTED SCORE AGGREGATION ──
              let totalWeight = 0, weightedScore = 0;
              for(const sig of signals) {
                weightedScore += sig.score * sig.weight;
                totalWeight   += sig.weight;
              }
              const netScore = totalWeight > 0 ? weightedScore / totalWeight : 0;

              // ── PROBABILITY CALCULATION ──
              const rawLongProb  = clamp(0.5 + netScore * 0.5, 0.05, 0.95);
              const rawShortProb = 1 - rawLongProb;

              // ── SIGNAL AGREEMENT ──
              const signalDirs   = signals.map(s => Math.sign(s.score));
              const longSignals  = signalDirs.filter(d => d > 0).length;
              const shortSignals = signalDirs.filter(d => d < 0).length;
              const totalSignals = signals.length || 1;
              const agreementRatio = Math.max(longSignals, shortSignals) / totalSignals;

              const confidencePct = Math.round(clamp(Math.abs(netScore) * 100 * agreementRatio, 5, 95));
              const longProbPct   = Math.round(rawLongProb  * 100);
              const shortProbPct  = Math.round(rawShortProb * 100);
              const mtfSide       = longProbPct >= 50 ? "long" : "short";
              const overridden    = mtfSide !== originalSide;

              // ── HUMAN READABLE REASONS ──
              const reasons = [];
              for(const sig of signals.sort((a,b) => Math.abs(b.score * b.weight) - Math.abs(a.score * a.weight))) {
                const dir = sig.score > 0.1 ? "📈" : sig.score < -0.1 ? "📉" : "➡️";
                reasons.push(`${dir} [${sig.name}] ${sig.reason}`);
              }

              // ── SUMMARY LOG ──
              log(`\n╔══════════════════════════════════════════════════════════`);
              log(`║ 🔬 MTF DIRECTION ANALYSIS: ${symbol}`);
              log(`║ Original side: ${originalSide.toUpperCase()} | MTF suggests: ${mtfSide.toUpperCase()}${overridden ? " ⚠️ OVERRIDE" : " ✅ CONFIRMED"}`);
              log(`║ Long probability:  ${longProbPct}%`);
              log(`║ Short probability: ${shortProbPct}%`);
              log(`║ Net score: ${netScore.toFixed(3)} | Confidence: ${confidencePct}%`);
              log(`║ Signal agreement: ${longSignals}L / ${shortSignals}S / ${totalSignals - longSignals - shortSignals}N out of ${totalSignals}`);
              log(`╠══════════════════════════════════════════════════════════`);
              for(const r of reasons) log(`║ ${r}`);
              log(`╠══════════════════════════════════════════════════════════`);
              if(overridden) {
                log(`║ ⚠️  MTF OVERRIDE: ${originalSide.toUpperCase()} → ${mtfSide.toUpperCase()} (prob: ${mtfSide === "long" ? longProbPct : shortProbPct}%)`);
              } else {
                log(`║ ✅ MTF CONFIRMED: ${originalSide.toUpperCase()} (prob: ${originalSide === "long" ? longProbPct : shortProbPct}%)`);
              }
              log(`╚══════════════════════════════════════════════════════════\n`);

              result.final_side     = mtfSide;
              result.overridden     = overridden;
              result.long_prob_pct  = longProbPct;
              result.short_prob_pct = shortProbPct;
              result.confidence_pct = confidencePct;
              result.net_score      = +netScore.toFixed(4);
              result.signals        = signals.map(s => ({ name:s.name, score:+s.score.toFixed(3), weight:s.weight }));
              result.reasons        = reasons;
              result.detail         = `score=${netScore.toFixed(3)} agree=${agreementRatio.toFixed(2)} long=${longProbPct}% short=${shortProbPct}% conf=${confidencePct}%`;

            } catch(e) {
              log(`[MTF] Error for ${symbol}:`, e?.message || e);
              result.detail = `error: ${e?.message || e}`;
            }

            return result;
          }

          // ================================================================
          // MAIN
          // ================================================================
          let reason="ok", selectionTier="confidence";
          try{
            const { state, persist }=await loadState();

            state.run_counter=(state.run_counter||0)+1;
            if(state.run_counter>10||state.run_counter<0){ state.run_counter=1; log("⚠️ Run counter corrupted — reset to 1"); }
            log(`🔄 Run ${state.run_counter}/6`);

            const SHOULD_WIPE=(state.run_counter>=6);
            if(SHOULD_WIPE){
              log("🗑️  RUN 6: WIPE GIST AND RESTART FRESH");
              await saveState(persist,{ run_counter:0 },{},2,true);
              state.v="bybit-hedge-7.0"; state.run_counter=1; state.cooldown={}; state.cooldown_side={};
              state.pending=[]; state.equity=[]; state.closed=[]; state.mr_lockout={}; state.sym_stats={};
              state.sym_stats_real={}; state.calibCoeffs={}; state.lastReconcileTs=0;
              state.calibration_holdout=[]; state.learned_trade_keys=[]; state.calib_symbol_counts={};
              state.calib_last_version=CALIB_VERSION; state.regime_state={}; state.regime_history={}; state.regime_last_update={};
              log("♻️  State reset to fresh. Continuing with idea generation...");
            }

            learnFromGistRealFills(state);
            cleanExpiredCooldowns(state);
            cleanExpiredClosedTrades(state);

            const nowMs2=Date.now();
            const activePending=(state.pending||[]).filter(p=>{ const ttlTs=p.ttl_ts_ms||0; return ttlTs>nowMs2; });
            if(activePending.length<(state.pending||[]).length){ log(`🗑️  Auto-expired ${(state.pending||[]).length-activePending.length} stale pending entries`); }
            state.pending=activePending;

            if(state.regime_state&&Object.keys(state.regime_state).length>300){ const sorted=Object.entries(state.regime_last_update||{}).sort((a,b)=>b[1]-a[1]).slice(0,300).map(x=>x[0]); const keep={}; for(const sym of sorted) keep[sym]=state.regime_state[sym]; state.regime_state=keep; }
            if(state.regime_history&&Object.keys(state.regime_history).length>100){ const sorted=Object.entries(state.regime_last_update||{}).sort((a,b)=>b[1]-a[1]).slice(0,100).map(x=>x[0]); const keep={}; for(const sym of sorted) if(state.regime_history[sym]) keep[sym]=state.regime_history[sym]; state.regime_history=keep; }

            const preserved={ v:state.v||"bybit-hedge-7.0", run_counter:state.run_counter||0, cooldown:state.cooldown||{}, cooldown_side:state.cooldown_side||{}, mr_lockout:state.mr_lockout||{}, calibCoeffs:state.calibCoeffs||{}, learned_trade_keys:state.learned_trade_keys||[], calib_symbol_counts:state.calib_symbol_counts||{}, calib_last_version:state.calib_last_version||CALIB_VERSION, regime_state:state.regime_state||{}, regime_history:state.regime_history||{}, regime_last_update:state.regime_last_update||{}, pending:state.pending||[], closed:state.closed||[], equity:state.equity||[], sym_stats_real:state.sym_stats_real||{}, sym_stats:{}, calibration_holdout:[], lastReconcileTs:0 };
            Object.assign(state,preserved);

            const cooldownCount=Object.keys(state.cooldown||{}).length;
            const qualityFloor=cooldownCount>=12?20:cooldownCount>=8?17:15;
            log(`♻️  Fresh cycle: ${cooldownCount} cooldowns, ${(state.closed||[]).length} closed trades, ${Object.keys(state.calibCoeffs||{}).length} calib models → min_conf=${qualityFloor}`);

            const calibHealth=validateCalibration(state);
            if(!todOK) reason="tod_gate";

            const PIPELINE_START=Date.now();
            const PIPELINE_TIMEOUT_MS=9*60*1000;

            log("📡 Fetching Bybit universe...");
            const bybitSymbols=await fetchBybitSymbols();
            if(!bybitSymbols||bybitSymbols.length===0){ log("❌ No Bybit symbols found"); reason="no_bybit_symbols"; throw new Error("No Bybit symbols available"); }
            log(`✅ Bybit universe: ${bybitSymbols.length} USDT linear perpetuals`);

            const equityStats=(eq)=>{ const day=Date.now()-24*3600*1000; let pnl24=0,cum=0,peak=0,dd=0; for(const e of eq||[]){ if(e.ts_ms>=day) pnl24+=e.pnl_bps; cum+=e.pnl_bps; if(cum>peak) peak=cum; dd=Math.min(dd,cum-peak); } return { pnl24_bps:Math.round(pnl24), peak_dd_bps:Math.round(dd) }; };
            const { pnl24_bps, peak_dd_bps }=equityStats(state.equity);
            const throttle=(pnl24_bps<=DD_24H_LIMIT_BPS)||(peak_dd_bps<=DD_PEAK_LIMIT_BPS);

            log("📊 Fetching golden metrics for all symbols...");
            const BATCH_SIZE=15, BATCH_DELAY=300;
            const allMetrics=[];

            for(let i=0;i<bybitSymbols.length;i+=BATCH_SIZE){
              if(Date.now()-PIPELINE_START>PIPELINE_TIMEOUT_MS){ log(`⏱️ PIPELINE TIMEOUT PROTECTION: stopping fetch at ${allMetrics.length} symbols`); break; }
              const batch=bybitSymbols.slice(i,i+BATCH_SIZE);
              const batchResults=await Promise.all(batch.map(async(sym)=>{
                try{
                  const lastTs=state.cooldown?.[sym.base]||0;
                  if(lastTs&&(Date.now()-lastTs)<COOLDOWN_MS) return null;
                  const metrics=await fetchGoldenMetrics(sym.symbol);
                  if(!metrics) return null;
                  return { ...sym, ...metrics, hedge_confidence:calculateHedgeConfidence(metrics) };
                }catch(e){ return null; }
              }));
              for(const r of batchResults) if(r&&r.mark_price>0) allMetrics.push(r);
              if(i+BATCH_SIZE<bybitSymbols.length) await sleep(BATCH_DELAY);
            }
            log(`📈 Fetched metrics for ${allMetrics.length}/${bybitSymbols.length} symbols`);

            const fetchRatio=allMetrics.length/bybitSymbols.length;
            if(fetchRatio<0.85){ log(`⚠️ DATA QUALITY WARNING: only ${(fetchRatio*100).toFixed(1)}% fetched`); }
            if(fetchRatio<0.70){ log(`🚨 DATA QUALITY CRITICAL: ${(fetchRatio*100).toFixed(1)}% fetch rate`); }
            const DATA_QUALITY_TOP_N=fetchRatio<0.70?1:fetchRatio<0.85?2:null;

            allMetrics.sort((a,b)=>b.hedge_confidence-a.hedge_confidence);
            log("🏆 Top 10 by hedge confidence:");
            for(let i=0;i<Math.min(10,allMetrics.length);i++){
              const m=allMetrics[i];
              log(`   ${i+1}. ${m.symbol} conf=${m.hedge_confidence} vol1h=${m.vol_1h_pct.toFixed(2)}% fund=${(m.funding_rate*100).toFixed(4)}% oi_delta=${m.oi_delta_pct.toFixed(1)}%`);
            }

            const marketVolSorted=allMetrics.slice(0,50).map(m=>m.vol_1h_pct).sort((a,b)=>a-b);
            const medianVol=marketVolSorted[Math.floor(marketVolSorted.length/2)]||0;
            const DYNAMIC_VOL_GATE=medianVol<1.0?1.0:medianVol<2.0?1.5:2.0;
            const DYNAMIC_TOP_N=DATA_QUALITY_TOP_N||(medianVol<1.0?1:medianVol<1.5?2:Math.max(1,TOP_N||3));
            log(`📊 Market median vol=${medianVol.toFixed(2)}% → VOL_GATE=${DYNAMIC_VOL_GATE}% TOP_N=${DYNAMIC_TOP_N}`);

            const top30Changes=allMetrics.slice(0,30).map(m=>m.price_change_1h||0);
            const bullCount=top30Changes.filter(c=>c>0.02).length;
            const bearCount=top30Changes.filter(c=>c<-0.02).length;
            const isMacroBull=bullCount>=20;
            const isMacroBear=bearCount>=20;
            if(isMacroBull) log(`🐂 MACRO BULL DETECTED: ${bullCount}/30`);
            if(isMacroBear) log(`🐻 MACRO BEAR DETECTED: ${bearCount}/30`);

            const top20Alts=allMetrics.filter(m=>m.symbol!=="BTCUSDT"&&m.symbol!=="ETHUSDT").slice(0,20);
            const avgAltChange=mean(top20Alts.map(m=>m.price_change_1h||0));
            const altCrash=avgAltChange<-0.03;
            const altPump=avgAltChange>0.03;
            if(altCrash) log(`🚨 ALTCOIN SECTOR CRASH: avg=${(avgAltChange*100).toFixed(2)}%`);
            if(altPump)  log(`🚀 ALTCOIN SECTOR PUMP: avg=${(avgAltChange*100).toFixed(2)}%`);

            const MAX_DETAILED=30;
            const topCandidates=allMetrics.slice(0,MAX_DETAILED);
            const btcMetrics=allMetrics.find(m=>m.symbol==="BTCUSDT");
            const btcUp1h=btcMetrics?(btcMetrics.price_change_1h>0):true;
            const btcCrash=btcMetrics?Math.abs(btcMetrics.price_change_1h)>0.05:false;
            if(btcCrash) log(`🚨 BTC CIRCUIT BREAKER: BTC moved ${(btcMetrics.price_change_1h*100).toFixed(2)}%`);

            log("📉 Pre-fetching regime candles...");
            const REG_INTERVAL=Number(process.env.REG_INTERVAL||"3");
            const REG_LIMIT=Math.max(30,Number(process.env.REG_LIMIT||"60"));
            const regimeCandlesMap=new Map();
            const REG_BATCH_SIZE=15, REG_BATCH_DELAY=300;

            for(let i=0;i<topCandidates.length;i+=REG_BATCH_SIZE){
              const batch=topCandidates.slice(i,i+REG_BATCH_SIZE);
              const results=await Promise.all(batch.map(async(cand)=>{
                try{ const klines=await fetchBybitKlines(cand.symbol,REG_INTERVAL,REG_LIMIT); return { symbol:cand.symbol, candles:klines }; }
                catch(e){ return { symbol:cand.symbol, candles:null }; }
              }));
              for(const r of results) regimeCandlesMap.set(r.symbol,r.candles);
              if(i+REG_BATCH_SIZE<topCandidates.length) await sleep(REG_BATCH_DELAY);
            }
            const validCandleCounts=[...regimeCandlesMap.values()].map(v=>Array.isArray(v)?v.length:0);
            const sufficientCount=validCandleCounts.filter(len=>len>=15).length;
            log(`📉 Regime candles: ${sufficientCount}/${topCandidates.length} symbols have sufficient data`);

            // ========== DETAILED REFINEMENT ==========
            const refined=[];

            for(const cand of topCandidates){
              try{
                const depth=await fetchBybitDepth(cand.symbol);
                let spreadBps=5, mid=cand.mark_price;
                if(cand.bid1&&cand.ask1){ mid=(cand.bid1+cand.ask1)/2; spreadBps=Math.round(((cand.ask1-cand.bid1)/mid)*10000); }
                const obi=computeOBI(depth,OBI_TOPN);
                const sideSlipL=slipFromDepth(depth,mid,"long",NOTIONAL);
                const sideSlipS=slipFromDepth(depth,mid,"short",NOTIONAL);
                const slipL=sideSlipL?.slip_bps??Math.round(spreadBps/2);
                const slipS=sideSlipS?.slip_bps??Math.round(spreadBps/2);
                const costLong=COST_BPS+slipL, costShort=COST_BPS+slipS;
                const d1=depthWithinPctUSD(depth,mid,0.01);
                const depth1pUSD=(d1.asksUSD||0)+(d1.bidsUSD||0);

                if(spreadBps>20){ log(`[LIQ-GATE] ${cand.symbol} skipped: spread=${spreadBps}bps`); continue; }
                if(depth1pUSD<10000){ log(`[LIQ-GATE] ${cand.symbol} skipped: depth1p=$${Math.round(depth1pUSD)}`); continue; }
                if(cand.vol_1h_pct<DYNAMIC_VOL_GATE){ log(`[VOL-GATE] ${cand.symbol} skipped: vol1h=${cand.vol_1h_pct.toFixed(2)}%`); continue; }

                const isPumpDump=cand.vol_1h_pct>15&&cand.oi_delta_pct>25;
                if(isPumpDump){ log(`[PND-GATE] ${cand.symbol} skipped`); continue; }
                const volToOIRatio=(cand.volume_1h_usd||0)/Math.max(1,(cand.current_oi_usd||1));
                const isWashTrading=cand.oi_delta_pct>20&&volToOIRatio<0.02&&cand.vol_1h_pct<5;
                if(isWashTrading){ log(`[WASH-GATE] ${cand.symbol} skipped`); continue; }
                const suspiciousOI=cand.oi_delta_pct>30&&(cand.volume_1h_usd||0)<5_000_000;
                if(suspiciousOI){ log(`[OI-GATE] ${cand.symbol} skipped`); continue; }

                let regime="meanrevert", slopeDir=0, v5Result=null;
                try{
                  const kReg=regimeCandlesMap.get(cand.symbol);
                  if(Array.isArray(kReg)&&kReg.length>=15){
                    v5Result=detectV5Regime(state,cand.symbol,kReg);
                    if(v5Result.regime==="Trending Up"){ regime="trend"; slopeDir=1; }
                    else if(v5Result.regime==="Trending Down"){ regime="trend"; slopeDir=-1; }
                    else if(v5Result.regime==="Volatile"){
                      if(Math.abs(v5Result.slopePct)>v5Result.slopeThreshold){ regime="trend"; slopeDir=v5Result.slopePct>=0?1:-1; }
                      else{ regime="meanrevert"; slopeDir=v5Result.slopePct>=0?1:-1; }
                    } else { regime="meanrevert"; slopeDir=v5Result.slopePct>=0?1:-1; }
                    log(`[V5-REG] ${cand.symbol} ${v5Result.regime} (${v5Result.candidate}) ${v5Result.confirmed?'✓':'⏳'} ${v5Result.detail}`);
                  } else {
                    log(`[V5-REG] ${cand.symbol} insufficient data — fallback meanrevert`);
                  }
                }catch(e){ regime="meanrevert"; slopeDir=0; }

                if(v5Result&&v5Result.regime==="Ranging"){ log(`[V5-GATE] ${cand.symbol} SKIP: Ranging`); continue; }
                if(v5Result&&v5Result.atrPercent<ATR_MIN_PCT){ log(`[ATR-GATE] ${cand.symbol} skipped: ATR=${v5Result.atrPercent.toFixed(2)}%`); continue; }
                const suspiciousRegime=v5Result&&v5Result.atrPercent>4.0&&regime==="meanrevert"; if(suspiciousRegime){ log(`[REG-GATE] ${cand.symbol} skipped`); continue; }
                const extremeVolTrend=v5Result&&v5Result.atrPercent>4.5&&regime==="trend"; if(extremeVolTrend){ log(`[VOL-EXTREME] ${cand.symbol} skipped`); continue; }
                const regimeLagRisk=v5Result&&regime==="meanrevert"&&Math.abs(v5Result.slopePct)>0.20;

                const priceMom1h=cand.price_change_1h||0;
                const momDirection=Math.sign(priceMom1h);
                const momScore=Math.tanh(Math.abs(priceMom1h)/0.02)*momDirection;
                const oiDir=Math.sign(cand.oi_delta_pct||0)*momDirection;
                const oiScore=Math.tanh((cand.oi_delta_pct||0)/10)*oiDir;
                const fundingScore=-Math.sign(cand.funding_rate_raw||0)*Math.tanh(Math.abs(cand.funding_rate_raw||0)/0.001);
                const volConfirm=Math.tanh((cand.volume_1h_usd||0)/IDEAL_VOLUME_1H_USD);
                const btcRegimeScore=btcUp1h?0.1:-0.1;

                const fundingDangerous=Math.abs(cand.funding_rate_raw||0)>0.01;
                const fundingExtreme=Math.abs(cand.funding_rate_raw||0)>0.005;
                if(fundingDangerous){ log(`[FUND-GATE] ${cand.symbol} skipped`); continue; }
                if(fundingExtreme) log(`[FUND-GATE] ${cand.symbol} WARNING`);
                const fundingWeight=fundingExtreme?0.05:0.20;
                const dirEdge=(momScore*0.40+oiScore*0.25+fundingScore*fundingWeight+btcRegimeScore*0.15)*(0.5+0.5*volConfirm);

                let forcedSide=null;
                if(DIRECTION==="long"){ forcedSide="long"; }
                else if(DIRECTION==="short"){ forcedSide="short"; }
                else if(regime==="trend"){
                  const slopeConfirmed=(slopeDir>0&&dirEdge>0)||(slopeDir<0&&dirEdge<0);
                  forcedSide=slopeDir>0?"long":"short";
                  if(!slopeConfirmed){ log(`[DIR] ${cand.symbol} slope/edge conflict — skipping`); continue; }
                } else {
                  if(fundingScore>0.4) forcedSide="long";
                  else if(fundingScore<-0.4) forcedSide="short";
                  else forcedSide=dirEdge>=0?"long":"short";
                }

                log(`[DIR] ${cand.symbol} regime=${regime} edge=${dirEdge.toFixed(3)} → ${forcedSide}`);

                if(Math.abs(dirEdge)<0.15){ log(`[EDGE-GATE] ${cand.symbol} skipped`); continue; }
                if(regimeLagRisk&&forcedSide==="long"&&v5Result.slopePct<0){ log(`[LAG-GATE] ${cand.symbol} skipped`); continue; }
                if(regimeLagRisk&&forcedSide==="short"&&v5Result.slopePct>0){ log(`[LAG-GATE] ${cand.symbol} skipped`); continue; }
                if((btcCrash||altCrash)&&forcedSide==="long"){ log(`[CRASH-GATE] ${cand.symbol} skipped`); continue; }
                if(altPump&&forcedSide==="short"&&regime==="meanrevert"){ log(`[PUMP-GATE] ${cand.symbol} skipped`); continue; }
                if(isMacroBull&&regime==="meanrevert"&&forcedSide==="short"){ log(`[MACRO-GATE] ${cand.symbol} skipped`); continue; }
                if(isMacroBear&&regime==="meanrevert"&&forcedSide==="long"){ log(`[MACRO-GATE] ${cand.symbol} skipped`); continue; }

                const pBase=0.45+0.35*Math.tanh(cand.vol_1h_pct/3);
                const pLong0=clamp(pBase+dirEdge*0.25,0.28,0.88);
                const pShort0=clamp(pBase-dirEdge*0.25,0.28,0.88);
                const coeffL=getCoeffs(state,"long",regime), coeffS=getCoeffs(state,"short",regime);
                const nL=Math.max(1,Math.min(500,coeffL?.n||0)), nS=Math.max(1,Math.min(500,coeffS?.n||0));
                const pLong=calibrateP(state,"long",regime,pLong0), pShort=calibrateP(state,"short",regime,pShort0);
                const pLong_lcb=wilsonLCB(pLong,nL,WILSON_Z), pShort_lcb=wilsonLCB(pShort,nS,WILSON_Z);

                const atr_bps=Math.round(cand.vol_1h_pct*100);
                const MAX_SL_BPS=80;
                let chosen=null;

                if(forcedSide==="long"&&DIRECTION!=="short"){
                  let tp=Math.round(atr_bps*LONG_BOUNCE_TP_ATR), sl=Math.round(atr_bps*LONG_BOUNCE_SL_ATR);
                  sl=Math.min(sl,MAX_SL_BPS); tp=Math.max(tp,Math.round(sl*1.5));
                  const evLCB=Math.round(pLong_lcb*tp-(1-pLong_lcb)*sl-costLong);
                  const edgeL=tp/Math.max(1,LONG_EDGE_MULT_MIN*costLong);
                  const evScoreL=evLCB/Math.max(8,EXP_LCB_MIN_BPS_BASE);
                  const viabMultL=clamp(0.5*clamp(edgeL,0.3,1.4)+0.5*clamp(evScoreL,0.3,1.4),0.3,1.3);
                  chosen={ side:"long", p_lcb:pLong_lcb, p_raw:pLong0, ev_bps:evLCB, exp_lcb_bps:evLCB, tp_bps:tp, sl_bps:sl, cost_bps:costLong, style:regime==="trend"?"trend_follow":"mean_revert", regime, viab_mult:viabMultL, dir_edge:dirEdge };
                } else if(forcedSide==="short"&&DIRECTION!=="long"){
                  let tp=Math.round(atr_bps*LONG_BOUNCE_TP_ATR), sl=Math.round(atr_bps*LONG_BOUNCE_SL_ATR);
                  sl=Math.min(sl,MAX_SL_BPS); tp=Math.max(tp,Math.round(sl*1.5));
                  const evLCB=Math.round(pShort_lcb*tp-(1-pShort_lcb)*sl-costShort);
                  const edgeS=tp/Math.max(1,4*costShort);
                  const evScoreS=evLCB/Math.max(8,EXP_LCB_MIN_BPS_BASE);
                  const viabMultS=clamp(0.5*clamp(edgeS,0.3,1.4)+0.5*clamp(evScoreS,0.3,1.4),0.3,1.3);
                  chosen={ side:"short", p_lcb:pShort_lcb, p_raw:pShort0, ev_bps:evLCB, exp_lcb_bps:evLCB, tp_bps:tp, sl_bps:sl, cost_bps:costShort, style:regime==="trend"?"trend_follow":"mean_revert", regime, viab_mult:viabMultS, dir_edge:dirEdge };
                }
                if(!chosen) continue;

                const baseConf=cand.hedge_confidence;
                const spreadMult=clamp(1-Math.max(0,(spreadBps-5))/30,0.5,1.1);
                const depthMult=clamp(depth1pUSD/Math.max(1,DEPTH_1P_MIN_USD),0.3,1.2);
                const slipMult=clamp(1-Math.max(0,(chosen.cost_bps-COST_BPS))/25,0.5,1.1);
                const oiMult=cand.current_oi_usd>0?clamp(cand.current_oi_usd/5_000_000,0.75,1.3):1.0;
                const evMult=clamp(chosen.viab_mult||1,0.3,1.3);
                const btcMult=(chosen.side==="long"&&!btcUp1h)?0.85:1.0;
                const fundingAlignBonus=((chosen.side==="short"&&(cand.funding_rate_raw||0)>0)||(chosen.side==="long"&&(cand.funding_rate_raw||0)<0))?1.1:1.0;
                const finalConf=Math.round(baseConf*spreadMult*depthMult*slipMult*oiMult*evMult*btcMult*fundingAlignBonus);
                const reasons=reasonBuilder({ vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate, oi_delta_pct:cand.oi_delta_pct, volume_1h_usd:cand.volume_1h_usd, basis_bps:cand.basis_bps });

                refined.push({
                  symbol:cand.symbol, base:cand.base, quote:cand.quote,
                  side:chosen.side, p_lcb:+chosen.p_lcb.toFixed(3), p_raw:+chosen.p_raw.toFixed(3),
                  exp_bps:chosen.ev_bps, exp_lcb_bps:chosen.exp_lcb_bps,
                  tp_bps:chosen.tp_bps, sl_bps:chosen.sl_bps, rrr:+(chosen.tp_bps/Math.max(1,chosen.sl_bps)).toFixed(2),
                  spread_bps:spreadBps, cost_bps:chosen.cost_bps, atr_bps, regime:chosen.regime, style:chosen.style,
                  vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate, funding_rate_raw:cand.funding_rate_raw,
                  oi_delta_pct:cand.oi_delta_pct, volume_1h_usd:cand.volume_1h_usd, basis_bps:cand.basis_bps,
                  current_oi_usd:cand.current_oi_usd, mark_price:cand.mark_price,
                  depth1p_usd:depth1pUSD, obi, slip_est:chosen.side==="long"?slipL:slipS,
                  hold_sec:clamp(3600,TTL_MIN,TTL_MAX),
                  confidence:clamp(finalConf,0,100), hedge_confidence:cand.hedge_confidence,
                  reasons, ret5:[]
                });

              }catch(e){ log(`Refine error for ${cand.symbol}:`,e?.message||e); }
            }

            log(`🔍 Refined ${refined.length} candidates`);

            refined.sort((a,b)=>b.confidence-a.confidence);
            const TARGET_TOP_N=DYNAMIC_TOP_N;
            const MIN_CONF_TO_TRADE=qualityFloor;
            const selected=[];
            for(const cand of refined){
              if(selected.length>=TARGET_TOP_N) break;
              if(cand.confidence<MIN_CONF_TO_TRADE){ log(`[CONF-GATE] ${cand.symbol} skipped: conf=${cand.confidence}`); continue; }
              if(!selected.some(s=>s.base===cand.base)) selected.push(cand);
            }
            if(selected.length<TARGET_TOP_N){
              const haveSyms=new Set(selected.map(s=>s.symbol));
              for(const c of refined){
                if(selected.length>=TARGET_TOP_N) break;
                if(c.confidence<MIN_CONF_TO_TRADE) continue;
                if(!haveSyms.has(c.symbol)){ selected.push(c); haveSyms.add(c.symbol); }
              }
            }
            log(`✅ Selected ${selected.length} ideas before MTF analysis`);

            // ================================================================
            // ── FINAL MTF DIRECTION ANALYSIS ──
            // ================================================================
            log("\n🔬 ════════════════════════════════════════════════════════");
            log("🔬  FINAL MTF DIRECTION ANALYSIS — running for all selected ideas");
            log("🔬 ════════════════════════════════════════════════════════\n");

            const selectedAfterMTF = [];
            let mtfStats = { dropped_coinflip:0, dropped_low_prob:0, overridden:0, confirmed:0 };

            for(const cand of selected) {
              try {
                const mtf = await runMTFDirectionAnalysis(cand.symbol, cand.side, cand.mark_price);

                const mtfWinProb = cand.side === "long" ? mtf.long_prob_pct : mtf.short_prob_pct;
                const mtfMaxProb = Math.max(mtf.long_prob_pct, mtf.short_prob_pct);

                // ── GATE 1: COIN FLIP — neither side has conviction ──
                // drop regardless of MTF confidence
                if(mtfMaxProb < MTF_COINFLIP_GATE) {
                  log(`[MTF-COINFLIP] ${cand.symbol}: max_prob=${mtfMaxProb}% < ${MTF_COINFLIP_GATE}% — no conviction, dropping`);
                  mtfStats.dropped_coinflip++;
                  continue;
                }

                // ── GATE 2: OUR SIDE HAS LOW PROBABILITY ──
                // drop regardless of MTF confidence — probability is the truth
                if(mtfWinProb < MTF_DROP_MIN_PROB) {
                  log(`[MTF-DROP] ${cand.symbol}: ${cand.side} win_prob=${mtfWinProb}% < ${MTF_DROP_MIN_PROB}% — dropping (MTF strongly disagrees)`);
                  mtfStats.dropped_low_prob++;
                  continue;
                }

                // ── GATE 3: OVERRIDE DIRECTION ──
                // override if MTF disagrees AND has enough confidence
                if(mtf.overridden && mtf.confidence_pct >= MTF_OVERRIDE_MIN_CONF) {
                  log(`[MTF-OVERRIDE] ${cand.symbol}: ${cand.side} → ${mtf.final_side} (conf=${mtf.confidence_pct}% prob=${mtf.final_side==="long"?mtf.long_prob_pct:mtf.short_prob_pct}%)`);
                  const newSide  = mtf.final_side;
                  const newPRaw  = newSide === "long"
                    ? clamp(mtf.long_prob_pct  / 100, 0.28, 0.88)
                    : clamp(mtf.short_prob_pct / 100, 0.28, 0.88);
                  const newPLcb  = calibrateP(state, newSide, cand.regime, newPRaw);
                  const newN     = getCoeffs(state, newSide, cand.regime)?.n || 0;
                  const newPLcbW = wilsonLCB(newPLcb, Math.max(1, Math.min(500, newN)), WILSON_Z);
                  cand.side           = newSide;
                  cand.p_raw          = +newPRaw.toFixed(3);
                  cand.p_lcb          = +newPLcbW.toFixed(3);
                  cand.mtf_overridden = true;
                  mtfStats.overridden++;
                } else {
                  cand.mtf_overridden = false;
                  mtfStats.confirmed++;
                }

                // GATE: Drop if our side has < 50% win probability after MTF check
                const winProbAfterMTF = cand.side === "long" ? mtf.long_prob_pct : mtf.short_prob_pct;
                if(winProbAfterMTF < 50) {
                  log(`[MTF-NEG-EV] ${cand.symbol}: win_prob=${winProbAfterMTF}% < 50% — dropping`);
                  mtfStats.dropped_low_prob++;
                  continue;
                }

                // ── ATTACH MTF DATA ──

                // ── ATTACH MTF DATA ──
                cand.mtf = {
                  long_prob_pct:  mtf.long_prob_pct,
                  short_prob_pct: mtf.short_prob_pct,
                  confidence_pct: mtf.confidence_pct,
                  net_score:      mtf.net_score,
                  overridden:     mtf.overridden,
                  final_side:     mtf.final_side,
                  signals:        mtf.signals,
                  reasons:        mtf.reasons,
                  detail:         mtf.detail
                };

                // ── CONFIDENCE ADJUSTMENT BASED ON MTF ALIGNMENT ──
                const mtfAlignBonus = (!mtf.overridden && mtf.confidence_pct >= 60) ?  1.08
                                    : (!mtf.overridden && mtf.confidence_pct >= 40) ?  1.03
                                    :  mtf.overridden                               ?  0.92
                                    :                                                   1.00;
                cand.confidence = clamp(Math.round(cand.confidence * mtfAlignBonus), 0, 100);

                selectedAfterMTF.push(cand);

              } catch(e) {
                log(`[MTF] Error for ${cand.symbol}:`, e?.message || e);
                // on error keep the idea but mark MTF as null
                cand.mtf = null;
                cand.mtf_overridden = false;
                selectedAfterMTF.push(cand);
              }
            }

            log(`\n✅ MTF Results: ${selectedAfterMTF.length}/${selected.length} passed`);
            log(`   Dropped (coinflip): ${mtfStats.dropped_coinflip} | Dropped (low prob): ${mtfStats.dropped_low_prob} | Overridden: ${mtfStats.overridden} | Confirmed: ${mtfStats.confirmed}`);
            log("📋 Final ideas summary:");
            for(const c of selectedAfterMTF) {
              const winProb = c.side === "long" ? c.mtf?.long_prob_pct : c.mtf?.short_prob_pct;
              log(`   ${c.symbol} → ${c.side.toUpperCase()} | conf=${c.confidence} | long=${c.mtf?.long_prob_pct??'?'}% short=${c.mtf?.short_prob_pct??'?'}% | win_prob=${winProb??'?'}% | ${c.mtf_overridden?"⚠️ OVERRIDDEN":"✅ CONFIRMED"}`);
            }

            const finalSelected = selectedAfterMTF;

            const flipped=HEDGE?finalSelected.map(orig=>({ ...orig, side:orig.side==="long"?"short":"long", flipped:true, original_idea_id:orig.symbol+"_"+orig.side })):[];
            const selectedWithFlipped=[...finalSelected,...flipped];
            log(`📦 Ideas: ${finalSelected.length} original + ${flipped.length} flipped = ${selectedWithFlipped.length} total`);

            const wEv=softmax(selectedWithFlipped.map(x=>x.exp_lcb_bps),20);

            let picksV2=selectedWithFlipped.map((x,i)=>{
              const mid=x.mark_price;
              let entry_limit=null, tp_abs=null, sl_abs=null;
              if(mid!=null){
                const slF=x.sl_bps/10000, tpF=x.tp_bps/10000;
                if(x.side==="long"){ entry_limit=mid*(1-Math.max(0.001,slF*0.5)); tp_abs=entry_limit*(1+tpF); sl_abs=entry_limit*(1-slF); }
                else{ entry_limit=mid*(1+slF); tp_abs=entry_limit*(1-tpF); sl_abs=entry_limit*(1+slF); }
              }
              const idea_id=uuidv4();
              const client_order_id=mkClientOrderId("byh");
              const ttl=clamp(Math.round((x.hold_sec||3600)+i*12),TTL_MIN,TTL_MAX);
              const size_bps=(Number(process.env.FORCE_SIZE_BPS||"0")>0)?Math.round(Number(process.env.FORCE_SIZE_BPS)):(x.sl_bps>0?Math.min(220,Math.round((wEv[i]*TARGET_PORT_RISK_BPS/x.sl_bps)*100)):0);
              return {
                idea_id, client_order_id,
                symbol:x.base, symbol_full:x.symbol, symbolFull:x.symbol, quote:x.quote, side:x.side, rank:i+1,
                target_exchange:TARGET_EXCHANGE, market_type:MARKET_TYPE, margin_mode:MARGIN_MODE, leverage:LEVERAGE,
                entry_policy:"maker_join", exec:{ exec:"post_only" },
                entry_mid:mid, entry_limit, tp_abs, sl_abs,
                tp_bps:x.tp_bps, sl_bps:x.sl_bps, rrr:x.rrr, exp_lcb_bps:x.exp_lcb_bps, ev_bps:x.exp_bps, cost_bps:x.cost_bps,
                p_win:x.p_lcb, p_lcb:x.p_lcb, p_raw:x.p_raw,
                calib_key:`side:${x.side}|regime:${x.regime}`, regime:x.regime,
                ttl_sec:ttl, size_bps,
                predicted:{
                  ts_ms:Date.now(), p_cal:x.p_lcb, ev_bps:x.exp_lcb_bps??x.exp_bps,
                  confidence_score:x.confidence, flipped:x.flipped||false,
                  vol_1h_pct:x.vol_1h_pct, funding_rate:x.funding_rate,
                  oi_delta_pct:x.oi_delta_pct, volume_1h_usd:x.volume_1h_usd,
                  basis_bps:x.basis_bps, hedge_confidence:x.hedge_confidence,
                  mtf_analysis: x.mtf || null
                },
                confidence:x.confidence, reasons:x.reasons,
                reasons_text:(x.reasons||[]).slice(0,3).map(r=>`${r.factor}:${r.value}(${r.contribution>=0?"+":""}${r.contribution})`),
                hedge_metrics:{ vol_1h_pct:x.vol_1h_pct, funding_rate_raw:x.funding_rate_raw, oi_delta_pct:x.oi_delta_pct, volume_1h_usd:x.volume_1h_usd, basis_bps:x.basis_bps, mark_price:x.mark_price, current_oi_usd:x.current_oi_usd },
                mtf_analysis: x.mtf || null,
                mtf_overridden: x.mtf_overridden || false
              };
            });

            const toV1Compat=(pv2)=>({ idea_id:pv2.idea_id, client_order_id:pv2.client_order_id, symbol:pv2.symbol, symbol_full:pv2.symbol_full, quote:pv2.quote, side:pv2.side, rank:pv2.rank, entry_policy:"smart_swing_limit", entry_type:"limit", activation:"on_fill", entry_mid:pv2.entry_mid, entry_limit:pv2.entry_limit, tp_abs:pv2.tp_abs, sl_abs:pv2.sl_abs, tp_bps:pv2.tp_bps, sl_bps:pv2.sl_bps, rrr:pv2.rrr, exp_lcb_bps:pv2.exp_lcb_bps, ev_bps:pv2.ev_bps, cost_bps:pv2.cost_bps, p_win:pv2.p_lcb, p_lcb:pv2.p_lcb, p_raw:pv2.p_raw, calib_key:pv2.calib_key, regime:pv2.regime, ttl_sec:pv2.ttl_sec, size_bps:pv2.size_bps, predicted:{ ...pv2.predicted, meta:{ strategy:STRATEGY_NAME, model_version:MODEL_VERSION, schema_version:SCHEMA_VERSION, git_sha:GIT_SHA, config_hash:CONFIG_HASH, futures_hint:{ target_exchange:pv2.target_exchange, market_type:pv2.market_type, margin_mode:pv2.margin_mode, leverage:pv2.leverage, entry_policy_override:pv2.entry_policy, exec:pv2.exec } } }, confidence:pv2.confidence, reasons:pv2.reasons, reasons_text:pv2.reasons_text, hedge_metrics:pv2.hedge_metrics, mtf_analysis:pv2.mtf_analysis||null, mtf_overridden:pv2.mtf_overridden||false });

            let picks=picksV2.map(toV1Compat);

            try{
              const maxVolPick=Math.max(...picks.map(p=>p.predicted?.vol_1h_pct||1));
              if(maxVolPick>5){ const scale=clamp(5/maxVolPick,0.65,1); picks=picks.map(p=>({...p,size_bps:Math.max(4,Math.round(p.size_bps*scale))})); log("[gha] High volatility detected, scaling sizes by",scale.toFixed(2)); }
            }catch(e){ log("[gha] Portfolio risk adjustment warn",e?.message||e); }

            const verifiedPicks=[];
            for(const p of picks){
              try{
                const freshDepth=await fetchBybitDepth(p.symbol_full);
                const freshMid=p.entry_mid||0;
                const fd1=depthWithinPctUSD(freshDepth,freshMid,0.01);
                const freshDepthUSD=(fd1.asksUSD||0)+(fd1.bidsUSD||0);
                const freshSpread=freshDepth?.asks?.[0]&&freshDepth?.bids?.[0]?
                  Math.round((+freshDepth.asks[0][0]-+freshDepth.bids[0][0])/(freshMid||1)*10000):99;
                if(freshDepthUSD<8000||freshSpread>25){
                  log(`[PRE-PUSH-LIQ] ${p.symbol_full} dropped: depth=$${Math.round(freshDepthUSD)} spread=${freshSpread}bps`);
                  continue;
                }
                verifiedPicks.push(p);
              }catch(e){ verifiedPicks.push(p); }
            }
            log(`✅ Pre-push liquidity check: ${verifiedPicks.length}/${picks.length} passed`);
            picks=verifiedPicks;
            picksV2=picksV2.filter(p=>verifiedPicks.some(v=>v.idea_id===p.idea_id));

            try{
              const nowMs=Date.now(), ideasTs=new Date(nowMs).toISOString();
              for(const p of picks){
                state.cooldown[p.symbol]=nowMs;
                state.cooldown_side[p.symbol]={ side:p.side, ts_ms:nowMs };
                state.pending.push({ ts:ideasTs, ts_ms:nowMs, ttl_ts_ms:nowMs+p.ttl_sec*1000, symbolFull:p.symbol_full, flipped:p.predicted?.flipped||false, base:p.symbol, quote:p.quote, side:p.side, entry_limit:p.entry_limit, tp_abs:p.tp_abs, sl_abs:p.sl_abs, hold_sec:p.ttl_sec, tp_bps:p.tp_bps, sl_bps:p.sl_bps, cost_bps:p.cost_bps, tier:"confidence", p_lcb:p.p_lcb, p_raw:p.p_raw, calib_key:p.calib_key, predicted:p.predicted, regime:p.regime, decision_context:{ source:"bybit_futures", golden_metrics:p.hedge_metrics }, notional_usd:NOTIONAL, size_bps:p.size_bps, idea_id:p.idea_id, client_order_id:p.client_order_id, hedge_metrics:p.hedge_metrics, status:"planned", entry_ts_ms:null, entry_price:null, qty:null });
              }
              if(state.pending.length>550) state.pending=state.pending.slice(-550);
              log("DEBUG: Appended",picks.length,"plans. New pending length=",(state.pending||[]).length);
            }catch(e){ log("state update warn",e?.message||e); }

            const auditOut=buildAuditOutputs(state);
            await saveState(persist,state,auditOut,2,true);

            for(const p of picks){
              const winProb = p.side==="long" ? p.mtf_analysis?.long_prob_pct : p.mtf_analysis?.short_prob_pct;
              log(`idea ${p.symbol_full} ${p.side} conf=${p.confidence} long=${p.mtf_analysis?.long_prob_pct??'?'}% short=${p.mtf_analysis?.short_prob_pct??'?'}% win_prob=${winProb??'?'}% mtf_override=${p.mtf_overridden}`);
            }

            const ideaLogs=picks.map(p=>({ symbol:p.symbol_full, side:p.side, flipped:p.predicted?.flipped||false, confidence:p.confidence, hedge_confidence:p.predicted?.hedge_confidence||0, vol_1h_pct:+(p.predicted?.vol_1h_pct||0).toFixed(2), funding_rate:+(p.predicted?.funding_rate||0).toFixed(5), oi_delta_pct:+(p.predicted?.oi_delta_pct||0).toFixed(1), volume_1h_usd:Math.round((p.predicted?.volume_1h_usd||0)/1e6)+"M", reasons:p.reasons_text, p_cal:+p.p_lcb.toFixed(3), ev_bps:p.ev_bps, idea_id:p.idea_id, mtf_long_prob:p.mtf_analysis?.long_prob_pct??null, mtf_short_prob:p.mtf_analysis?.short_prob_pct??null, mtf_confidence:p.mtf_analysis?.confidence_pct??null, mtf_overridden:p.mtf_overridden||false, mtf_reasons:p.mtf_analysis?.reasons?.slice(0,3)||[] }));

            const meta={ origin:"github_actions", reason, exchange:"bybit_futures", execution_exchange:"bybit_futures", strategy:STRATEGY_NAME, model_version:MODEL_VERSION, schema_version:SCHEMA_VERSION, git_sha:GIT_SHA, config_hash:CONFIG_HASH, counts:{ bybit_universe:bybitSymbols.length, metrics_fetched:allMetrics.length, refined:refined.length, selected_pre_mtf:selected.length, selected_post_mtf:finalSelected.length, mtf_stats:mtfStats, final_picks:picks.length }, dd_gate:{ pnl24_bps, peak_dd_bps, throttle }, tod:{ active:S_H!=null&&E_H!=null, start:S_H, end:E_H }, heartbeat:{ mismatches:0, zombies:0 }, tier:selectionTier, idea_logs:ideaLogs, calibration_health:calibHealth, market_health:{ median_vol:+medianVol.toFixed(2), dynamic_vol_gate:DYNAMIC_VOL_GATE, dynamic_top_n:DYNAMIC_TOP_N, btc_crash:btcCrash, alt_crash:altCrash, alt_pump:altPump, macro_bull:isMacroBull, macro_bear:isMacroBear, fetch_ratio:+fetchRatio.toFixed(3) }, extras:{ v2_ideas:picksV2, features_requested:["maker_join","post_only","futures","hedge_trading","bybit_execution","mtf_direction_analysis_v2"] } };

            const payload={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta, top_n:picks.length||0, ideas:picks||[] };
            log(`pushing ${picks.length} ideas (${selectionTier}) to ${PUSH_URL}`);
            try{ const r=await fetchWithTimeout(PUSH_URL,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payload) },15000); let txt=""; try{ txt=await r.text(); }catch{} log("push status",r?.status||"ERR",(txt||"").slice(0,400)); }catch(e){ log("push failed",e?.message||e); }

            if(PUSH_URL_V2){
              const payloadV2={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta:{ origin:"github_actions_v2_bybit", strategy:"bybit-hedge-ultimate", data_source:"bybit_futures", golden_metrics:true, execution:"bybit_futures" }, top_n:picksV2.length, ideas:picksV2 };
              log(`pushing ${picksV2.length} v2 ideas to ${PUSH_URL_V2}`);
              try{ const r2=await fetchWithTimeout(PUSH_URL_V2,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payloadV2) },15000); let txt2=""; try{ txt2=await r2.text(); }catch{} log("push v2 status",r2?.status||"ERR",(txt2||"").slice(0,400)); }catch(e){ log("push v2 failed",e?.message||e); }
            }

          }catch(e){
            reason=reason!=="ok"?reason:"data_error";
            const payload={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta:{ origin:"github_actions", reason, error:(e?.message||String(e)).slice(0,220), exchange:"bybit_futures" }, top_n:0, ideas:[] };
            log("pushing 0 ideas to",PUSH_URL);
            try{ const r=await fetchWithTimeout(PUSH_URL,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payload) },15000); let txt=""; try{ txt=await r.text(); }catch{} log("push status",r?.status||"ERR",(txt||"").slice(0,200)); }catch(e2){ log("push failed",e2?.message||e2); }
          }
          })();
          NODE

          EXIT_CODE=$?
          set -e
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "[gha] pusher exited with code $EXIT_CODE — sending minimal payload"
            raw_push_url="$(printf '%s' "${WORKER_PUSH_URL}" | tr -d '\r\n')"
            health_url="$(printf '%s' "${raw_push_url}" | sed -E 's#/signals/push(\?.*)?$#/health#')"
            echo "[gha] fallback health GET ${health_url}"
            http_code_h=$(curl -g -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${PUSH_TOKEN}" --max-time 8 "${health_url}" || true)
            echo "[gha] fallback health status ${http_code_h}"
            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            payload='{"ts":"'"${now}"'","mode":"normal","source":"external_pusher","meta":{"origin":"github_actions","reason":"fallback_node_error","exchange":"bybit_futures"},"top_n":0,"ideas":[]}'
            echo "[gha] pushing 0 ideas to ${raw_push_url}"
            mkdir -p /tmp
            : > /tmp/push_resp.txt
            http_code=$(curl -g -sS -o /tmp/push_resp.txt -w "%{http_code}" -X POST -H "Content-Type: application/json" -H "Authorization: Bearer ${PUSH_TOKEN}" --data-raw "${payload}" --max-time 12 "${raw_push_url}" || true)
            body="$(head -c 400 /tmp/push_resp.txt || true)"
            echo "[gha] push status ${http_code} ${body}"
            exit 0
          fi
