
name: Ideas Pusher (MEXC Ultimate 7.7.8 - Corrected)

on:
  repository_dispatch:
    types: [run_B]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ideas-mexc-ultimate
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      WORKER_PUSH_URL: ${{ secrets.WORKER_PUSH_URL }}
      PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
      WORKER_PUSH_URL_V2: ${{ secrets.WORKER_PUSH_URL_V2 }}
      MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
      MEXC_SECRET_KEY: ${{ secrets.MEXC_SECRET_KEY }}
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      GIST_ID: ${{ secrets.GIST_ID }}
      EXCHANGE: mexc
      MIN_QV_USD: ${{ vars.MIN_QV_USD }}
      TOP_N: ${{ vars.TOP_N }}
      MAX_SPREAD_BPS: ${{ vars.MAX_SPREAD_BPS }}
      EXP_LCB_MIN_BPS: ${{ vars.EXP_LCB_MIN_BPS }}
      FEES_BPS: ${{ vars.FEES_BPS }}
      NOTIONAL_USD: ${{ vars.NOTIONAL_USD }}
      MEXC_DEPTH_LIMIT: ${{ vars.MEXC_DEPTH_LIMIT }}
      OBI_TOPN: ${{ vars.OBI_TOPN }}
      ACTIVE_UTC_START: ${{ vars.ACTIVE_UTC_START }}
      ACTIVE_UTC_END: ${{ vars.ACTIVE_UTC_END }}
      MEXC_BASE: ${{ vars.MEXC_BASE }}
      FORCE_SIZE_BPS: ${{ vars.FORCE_SIZE_BPS }}
      DIRECTION: ${{ vars.DIRECTION }}
      MR_SLOPE_MAX_ATR50: ${{ vars.MR_SLOPE_MAX_ATR50 }}
      MR_BREAKOUT_DC_N: ${{ vars.MR_BREAKOUT_DC_N }}
      MR_BREAKOUT_RET15_ATR: ${{ vars.MR_BREAKOUT_RET15_ATR }}
      MR_LOCKOUT_SEC: ${{ vars.MR_LOCKOUT_SEC }}
      MAX_COST_BPS_HARD: ${{ vars.MAX_COST_BPS_HARD }}
      MIN_VOL_1H_USD: ${{ vars.MIN_VOL_1H_USD }}
      TOP_NNN: ${{ vars.TOP_NNN }}
      MIN_PUSH_DEPTH_USD: ${{ vars.MIN_PUSH_DEPTH_USD }}
      DEPTH_1P_MIN_USD: ${{ vars.DEPTH_1P_MIN_USD }}
      NO_LONG_DOWN_ENABLE: ${{ vars.NO_LONG_DOWN_ENABLE }}
      LONG_DOWN_RSI_CUTOFF: ${{ vars.LONG_DOWN_RSI_CUTOFF }}
      LONG_MR_DIVERGENCE_REQ: ${{ vars.LONG_MR_DIVERGENCE_REQ }}
      LONG_EDGE_MULT_MIN: ${{ vars.LONG_EDGE_MULT_MIN }}
      LONG_BOUNCE_SL_ATR: ${{ vars.LONG_BOUNCE_SL_ATR }}
      LONG_BOUNCE_TP_ATR: ${{ vars.LONG_BOUNCE_TP_ATR }}
      LONG_SIMILARITY_RHO: ${{ vars.LONG_SIMILARITY_RHO }}
      HEDGE: ${{ vars.HEDGE }}
      REG_INTERVAL: ${{ vars.REG_INTERVAL }}
      REG_LIMIT: ${{ vars.REG_LIMIT }}
      REG_SLOPE_THRESHOLD: ${{ vars.REG_SLOPE_THRESHOLD }}
      SLOPE_EXIT_RATIO: ${{ vars.SLOPE_EXIT_RATIO }}
      REG_RANGING_THRESHOLD: ${{ vars.REG_RANGING_THRESHOLD }}
      REG_RANGE_THRESHOLD: ${{ vars.REG_RANGE_THRESHOLD }}
      ATR_VOLATILE_THRESHOLD: ${{ vars.ATR_VOLATILE_THRESHOLD }}
      REG_CONFIRM_BARS: ${{ vars.REG_CONFIRM_BARS }}
      MIN_ALT_SCORE: ${{ vars.MIN_ALT_SCORE }}
      MIN_TF_ALIGN: ${{ vars.MIN_TF_ALIGN }}
      TF_WEIGHTS: ${{ vars.TF_WEIGHTS }}
      STRATEGY_NAME: ${{ vars.STRATEGY_NAME }}
      MODEL_VERSION: ${{ vars.MODEL_VERSION }}
      SCHEMA_VERSION: ${{ vars.SCHEMA_VERSION }}
      ATR_MIN_PCT: ${{ vars.ATR_MIN_PCT }}
      GIT_SHA: ${{ github.sha }}

    steps:
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run pusher (always-push + clear logs)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${WORKER_PUSH_URL:-}" || -z "${PUSH_TOKEN:-}" ]]; then
            echo "[gha] Missing WORKER_PUSH_URL or PUSH_TOKEN"
            exit 1
          fi
          set +e
          node - <<'NODE'
          (async ()=>{
          'use strict';
          const crypto = require('crypto');
          const MODEL_VERSION=(process.env.MODEL_VERSION||"7.0.0");
          const UA = `gh-actions-ideas-hedge/${MODEL_VERSION} (+https://github.com/)`;

          const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
          const sum=(a)=>a.reduce((x,y)=>x+y,0);
          const mean=(a)=>a.length?sum(a)/a.length:0;
          const std=(a)=>{ const m=mean(a); let v=0; for(const x of a) v+=(x-m)*(x-m); return a.length>1?Math.sqrt(v/(a.length-1)):0; };
          const rsi=(cl,p=14)=>{ if(!cl||cl.length<=p) return null; let g=0,l=0; for(let i=1;i<=p;i++){ const d=cl[i]-cl[i-1]; g+=Math.max(0,d); l+=Math.max(0,-d); } let ag=g/p, al=l/p; for(let i=p+1;i<cl.length;i++){ const d=cl[i]-cl[i-1]; ag=(ag*(p-1)+Math.max(0,d))/p; al=(al*(p-1)+Math.max(0,-d))/p; } const rs=al===0?100:ag/al; return 100-100/(1+rs); };
          const computeADX_ATR=(h,l,c,p=14)=>{ const n=c.length; if(n<p+2) return null; const TR=[],plusDM=[],minusDM=[]; for(let i=1;i<n;i++){ const up=h[i]-h[i-1], down=l[i-1]-l[i]; plusDM.push((up>down&&up>0)?up:0); minusDM.push((down>up&&down>0)?down:0); TR.push(Math.max(h[i]-l[i], Math.abs(h[i]-c[i-1]), Math.abs(l[i]-c[i-1]))); } let trN=0,pdmN=0,ndmN=0; for(let i=0;i<p;i++){ trN+=TR[i]; pdmN+=plusDM[i]; ndmN+=minusDM[i]; } let pDI=100*(pdmN/(trN||1)), nDI=100*(ndmN/(trN||1)); let dx=100*Math.abs(pDI-nDI)/((pDI+nDI)||1), adx=dx; for(let i=p;i<TR.length;i++){ trN=trN-(trN/p)+TR[i]; pdmN=pdmN-(pdmN/p)+plusDM[i]; ndmN=ndmN-(ndmN/p)+minusDM[i]; pDI=100*(pdmN/(trN||1)); nDI=100*(ndmN/(trN||1)); dx=100*Math.abs(pDI-nDI)/((pDI+nDI)||1); adx=((adx*(p-1))+dx)/p; } const atr=trN/p; return { adx, atr, trLast: TR.at(-1) }; };
          const corr=(a,b)=>{ const n=Math.min(a?.length||0,b?.length||0); if(n<5) return 0; const as=a.slice(-n), bs=b.slice(-n); const ma=mean(as), mb=mean(bs); let num=0,da=0,db=0; for(let i=0;i<n;i++){ const xa=as[i]-ma, xb=bs[i]-mb; num+=xa*xb; da+=xa*xa; db+=xb*xb; } const den=Math.sqrt(da*db)||1; return num/den; };
          const wilsonLCB=(p,n,z=1.34)=>{ if(n<=0) return p; const z2=z*z; const a=p + z2/(2*n); const b=z*Math.sqrt((p*(1-p)+z2/(4*n))/n); const c=1+z2/n; return clamp((a-b)/c, 0, 1); };
          const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
          const jitter=(ms)=>ms + Math.floor(Math.random()*ms*0.25);
          const log=(...a)=>console.log("[gha]",...a);
          const softmax=(arr,t=20)=>{ const m=Math.max(...arr,0); const ex=arr.map(x=>Math.exp((x-m)/t)); const s=ex.reduce((a,b)=>a+b,0)||1; return ex.map(x=>x/s); };
          const sigmoid=(z)=>1/(1+Math.exp(-z));
          const logit=(p)=>{ const eps=1e-6; const pp=Math.min(1-eps,Math.max(eps,p)); return Math.log(pp/(1-pp)); };
          let bmSpare=null;
          const randn=()=>{ if(bmSpare!=null){ const v=bmSpare; bmSpare=null; return v; } let u=0,v=0; while(u===0) u=Math.random(); while(v===0) v=Math.random(); const r=Math.sqrt(-2*Math.log(u)); const th=2*Math.PI*v; bmSpare=r*Math.sin(th); return r*Math.cos(th); };
          const randt=(df)=>{ if(df<=2) df=2.01; const z=randn(); let x2=0; for(let i=0;i<Math.floor(df);i++){ const z2=randn(); x2+=z2*z2; } const frac=df-Math.floor(df); if(frac>0){ const zf=randn(); x2+=frac*zf*zf; } const chi=x2||1e-6; return z/Math.sqrt(chi/df); };
          const uuidv4=()=>{ try{ return crypto.randomUUID(); }catch{ const b=crypto.randomBytes(16); b[6]=(b[6]&0x0f)|0x40; b[8]=(b[8]&0x3f)|0x80; const h=b.toString("hex"); return [h.slice(0,8),h.slice(8,12),h.slice(12,16),h.slice(16,20),h.slice(20)].join("-"); } };
          const mkClientOrderId=(prefix="mxu")=>{ const raw=(crypto.randomUUID?crypto.randomUUID():uuidv4()).replace(/-/g,""); const base=(prefix+"_"+raw).replace(/[^A-Za-z0-9_-]/g,"").slice(0,30); return base.padEnd(Math.max(24,base.length),"0"); };
          const hashObj=(o)=>{ const norm=(x)=>{ if(x&&typeof x==="object"&&!Array.isArray(x)){ const ks=Object.keys(x).sort(); const y={}; for(const k of ks) y[k]=norm(x[k]); return y; } if(Array.isArray(x)) return x.map(norm); return x; }; const s=JSON.stringify(norm(o)); return crypto.createHash("sha256").update(s).digest("hex"); };
          const slopeBps=(arr,len=21)=>{ if(!arr?.length||arr.length<Math.max(5,len)) return 0; const s=arr.slice(-len); const n=s.length; const last=s[n-1]||1; const mx=(n-1)/2; let num=0,den=0; for(let i=0;i<n;i++){ const x=i, y=((s[i]||last)-last)/last*10000; num+=(x-mx)*y; den+=(x-mx)*(x-mx); } return den>0?num/den:0; };

          const bbPosition=(closes,period=20,mult=2.0)=>{
            if(!closes||closes.length<period) return 0.5;
            const recent=closes.slice(-period);
            const m=mean(recent);
            const s=std(recent)||1e-8;
            const upper=m+mult*s, lower=m-mult*s;
            const last=closes[closes.length-1];
            return clamp((last-lower)/(upper-lower||1),0,1);
          };

          const calcVWAP=(candles)=>{
            if(!candles||candles.length<2) return null;
            let cumVol=0, cumTP=0;
            for(const c of candles){
              const tp=(+c[2]+ +c[3]+ +c[4])/3;
              const vol=+c[5]||0;
              cumTP+=tp*vol;
              cumVol+=vol;
            }
            return cumVol>0?cumTP/cumVol:null;
          };

          const ema=(arr,period)=>{
            if(!arr||arr.length<period) return arr;
            const k=2/(period+1);
            const result=[mean(arr.slice(0,period))];
            for(let i=period;i<arr.length;i++){
              result.push(arr[i]*k+result[result.length-1]*(1-k));
            }
            return result;
          };

          const volumeExpansion=(candles,lookback=20,recent=5)=>{
            if(!candles||candles.length<lookback) return 1.0;
            const vols=candles.map(c=>+c[5]||0);
            const avgAll=mean(vols.slice(-lookback));
            const avgRecent=mean(vols.slice(-recent));
            return avgAll>0?avgRecent/avgAll:1.0;
          };

          const quickADX=(candles,period=14)=>{
            if(!candles||candles.length<period+2) return 15;
            const h=candles.map(c=>+c[2]);
            const l=candles.map(c=>+c[3]);
            const c=candles.map(c=>+c[4]);
            const result=computeADX_ATR(h,l,c,period);
            return result?result.adx:15;
          };

          const priceCorrelation=(closesA,closesB)=>{
            const n=Math.min(closesA?.length||0,closesB?.length||0);
            if(n<10) return 0;
            const a=closesA.slice(-n).map((v,i,arr)=>i>0?(v/arr[i-1]-1):0).slice(1);
            const b=closesB.slice(-n).map((v,i,arr)=>i>0?(v/arr[i-1]-1):0).slice(1);
            return corr(a,b);
          };

          function computeSmartDirection(regime, metrics, v5Result, bbPos, vwapDist, adxValue, volExpansion){
            const reasons=[];
            let longScore=0, shortScore=0;

            const funding_raw=metrics.funding_rate_raw||0;
            const oi_delta=metrics.oi_delta_pct||0;
            const price1h=metrics.price_change_1h||0;
            const slope=v5Result?v5Result.slopePct:0;

            if(regime==="trend"){
              const slopeSignal=clamp(slope/0.15,-1,1);
              if(slopeSignal>0) longScore+=slopeSignal*0.35;
              else shortScore+=Math.abs(slopeSignal)*0.35;
              reasons.push(`slope=${slope.toFixed(3)}% → ${slopeSignal>0?"BULL":"BEAR"}`);

              const adxMult=adxValue>=25?1.2:adxValue>=20?1.0:0.7;
              longScore*=adxMult; shortScore*=adxMult;
              reasons.push(`ADX=${adxValue.toFixed(0)} mult=${adxMult}`);

              const oiConfirms=(oi_delta>0&&price1h>0)||(oi_delta<0&&price1h<0);
              const oiSignal=oiConfirms?Math.sign(price1h)*Math.min(1,Math.abs(oi_delta)/15):0;
              if(oiSignal>0) longScore+=oiSignal*0.20;
              else shortScore+=Math.abs(oiSignal)*0.20;
              reasons.push(`OI_delta=${oi_delta.toFixed(1)}% confirms=${oiConfirms}`);

              const volExpBonus=volExpansion>1.3?0.15:volExpansion>1.0?0.08:0;
              if(slope>0) longScore+=volExpBonus;
              else shortScore+=volExpBonus;
              reasons.push(`vol_expansion=${volExpansion.toFixed(2)}`);

              const fundingExtreme=Math.abs(funding_raw)>0.003;
              if(fundingExtreme){
                if(funding_raw>0) shortScore+=0.10;
                else longScore+=0.10;
                reasons.push(`funding_extreme=${(funding_raw*100).toFixed(3)}% → FADE`);
              } else {
                if(funding_raw>0&&slope>0) longScore+=0.05;
                else if(funding_raw<0&&slope<0) shortScore+=0.05;
              }

              if(vwapDist!==null){
                const vwapSignal=clamp(vwapDist/0.005,-1,1);
                if(vwapSignal>0) longScore+=vwapSignal*0.15;
                else shortScore+=Math.abs(vwapSignal)*0.15;
                reasons.push(`vwap_dist=${(vwapDist*100).toFixed(2)}%`);
              }

            } else { // Mean-revert regime
              const bbSignal=(0.5-bbPos)*2;
              if(bbSignal>0) longScore+=bbSignal*0.35;
              else shortScore+=Math.abs(bbSignal)*0.35;
              reasons.push(`BB_pos=${bbPos.toFixed(2)} → ${bbSignal>0?"LONG(oversold)":"SHORT(overbought)"}`);

              const fundFade=clamp(-funding_raw/0.001,-1,1);
              if(fundFade>0) longScore+=fundFade*0.25;
              else shortScore+=Math.abs(fundFade)*0.25;
              reasons.push(`funding_fade=${(funding_raw*100).toFixed(3)}% → ${fundFade>0?"LONG":"SHORT"}`);

              const extensionFade=clamp(-price1h/0.02,-1,1);
              if(extensionFade>0) longScore+=extensionFade*0.20;
              else shortScore+=Math.abs(extensionFade)*0.20;
              reasons.push(`price_ext_fade=${(price1h*100).toFixed(2)}% → ${extensionFade>0?"LONG(dip)":"SHORT(pump)"}`);

              // ★ FIX [CHANGE #11]: Scale OI Divergence signal by its magnitude.
              const oiDiverge=(price1h>0&&oi_delta<0)||(price1h<0&&oi_delta>0);
              if(oiDiverge){
                const divMagnitude = Math.min(1.0, Math.abs(oi_delta) / 15); // Cap at 15% OI delta
                const baseSignal = 0.10;
                const scaledSignal = baseSignal * (1 + divMagnitude * 2); // Up to 0.30 for extreme divergence
                
                if(price1h>0) shortScore += scaledSignal;
                else longScore += scaledSignal;
                
                reasons.push(`OI_diverge=true (${Math.abs(oi_delta).toFixed(1)}% delta) → FADE (weak move)`);
              }

              if(vwapDist!==null){
                const vwapFade=clamp(-vwapDist/0.003,-1,1);
                if(vwapFade>0) longScore+=vwapFade*0.10;
                else shortScore+=Math.abs(vwapFade)*0.10;
                reasons.push(`vwap_fade=${(vwapDist*100).toFixed(2)}%`);
              }
              
              if (adxValue > 35) {
                const adxPenalty = clamp(1 - (adxValue - 35) / 30, 0.5, 1.0);
                longScore *= adxPenalty;
                shortScore *= adxPenalty;
                reasons.push(`ADX=${adxValue.toFixed(0)} high for MR — penalty=${adxPenalty.toFixed(2)}`);
              }
            }

            const totalScore=longScore-shortScore;
            const edge=Math.abs(totalScore);
            const side=totalScore>=0?"long":"short";
            const confidence=Math.round(clamp(edge*100,5,95));

            return { side, edge:+totalScore.toFixed(4), confidence, reasons,
                     longScore:+longScore.toFixed(4), shortScore:+shortScore.toFixed(4) };
          }

          // ============================================================
          // V5 REGIME ENGINE
          // ============================================================
          function calcLinearRegressionSlope(closes){
            const n=closes.length; if(n<2) return 0;
            let sumX=0,sumY=0,sumXY=0,sumX2=0;
            for(let i=0;i<n;i++){ sumX+=i; sumY+=closes[i]; sumXY+=i*closes[i]; sumX2+=i*i; }
            const denom=(n*sumX2-sumX*sumX); if(denom===0) return 0;
            const slope=(n*sumXY-sumX*sumY)/denom;
            const avgPrice=sumY/n; if(avgPrice===0) return 0;
            return (slope/avgPrice)*100;
          }

          function computeATR(candles,period=14){
            if(!candles||candles.length<period+1) return 0;
            const closes=candles.map(c=>+c[4]);
            const trueRanges=candles.slice(1).map((c,i)=>{ const prevClose=closes[i]; return Math.max(+c[2]-+c[3],Math.abs(+c[2]-prevClose),Math.abs(+c[3]-prevClose)); });
            return trueRanges.slice(-period).reduce((a,b)=>a+b,0)/Math.min(period,trueRanges.length);
          }

          function detectV5Regime(state,symbol,candleData){
            const V5_SLOPE_THRESHOLD=Number(process.env.REG_SLOPE_THRESHOLD||"0.06");
            const V5_RANGE_THRESHOLD=Number(process.env.REG_RANGE_THRESHOLD||"0.25");
            const V5_RANGING_THRESHOLD=Number(process.env.REG_RANGING_THRESHOLD||"0.15");
            const V5_ATR_VOLATILE=Number(process.env.ATR_VOLATILE_THRESHOLD||"3.50");
            const V5_SLOPE_EXIT_RATIO=Number(process.env.SLOPE_EXIT_RATIO||"0.60");
            const V5_CONFIRM_BARS=Number(process.env.REG_CONFIRM_BARS||"2");
            const MIN_CANDLES_REQUIRED=15;
            if(!candleData||candleData.length<MIN_CANDLES_REQUIRED){
              return { regime:"Choppy",candidate:"Choppy",confirmed:false,slopePct:0,atrPercent:0,rangePct:0,slopeThreshold:V5_SLOPE_THRESHOLD,detail:"Not enough data" };
            }
            const closes=candleData.map(c=>+c[4]);
            const highs=candleData.map(c=>+c[2]);
            const lows=candleData.map(c=>+c[3]);
            const sma=closes.reduce((a,b)=>a+b,0)/closes.length;
            const currentPrice=closes[closes.length-1];
            const atr=computeATR(candleData,14);
            const atrPercent=sma>0?(atr/sma)*100:0;
            const slopePct=calcLinearRegressionSlope(closes);
            const highestHigh=Math.max(...highs);
            const lowestLow=Math.min(...lows);
            const rangePct=sma>0?((highestHigh-lowestLow)/sma)*100:0;
            const SLOPE_ENTER=V5_SLOPE_THRESHOLD;
            const SLOPE_EXIT=V5_SLOPE_THRESHOLD*V5_SLOPE_EXIT_RATIO;
            const lastRegime=state.regime_state?.[symbol]||"Choppy";
            let candidateRegime;
            if(atrPercent>V5_ATR_VOLATILE){ candidateRegime="Volatile"; }
            else if(rangePct<V5_RANGING_THRESHOLD){ candidateRegime="Ranging"; }
            else if(lastRegime==="Trending Up"){
              if(slopePct>SLOPE_EXIT&&currentPrice>sma&&rangePct>V5_RANGE_THRESHOLD) candidateRegime="Trending Up";
              else if(slopePct<-SLOPE_EXIT&&currentPrice<sma) candidateRegime="Trending Down";
              else candidateRegime="Choppy";
            } else if(lastRegime==="Trending Down"){
              if(slopePct<-SLOPE_EXIT&&currentPrice<sma&&rangePct>V5_RANGE_THRESHOLD) candidateRegime="Trending Down";
              else if(slopePct>SLOPE_EXIT&&currentPrice>sma) candidateRegime="Trending Up";
              else candidateRegime="Choppy";
            } else {
              if(slopePct>SLOPE_ENTER&&currentPrice>sma&&rangePct>V5_RANGE_THRESHOLD) candidateRegime="Trending Up";
              else if(slopePct<-SLOPE_ENTER&&currentPrice<sma&&rangePct>V5_RANGE_THRESHOLD) candidateRegime="Trending Down";
              else candidateRegime="Choppy";
            }
            if(!state.regime_history) state.regime_history={};
            if(!state.regime_history[symbol]) state.regime_history[symbol]=[];
            const history=state.regime_history[symbol];
            history.push({ regime:candidateRegime, ts:Date.now() });
            if(history.length>10) history.shift();
            const recentHistory=history.slice(-V5_CONFIRM_BARS);
            const matchCount=recentHistory.filter(h=>h.regime===candidateRegime).length;
            const needed=Math.min(V5_CONFIRM_BARS,recentHistory.length);
            let confirmedRegime; let isConfirmed=false;
            
            if (recentHistory.length < V5_CONFIRM_BARS) {
                confirmedRegime = lastRegime;
                isConfirmed = false;
            } else if (matchCount >= needed) {
                confirmedRegime = candidateRegime;
                isConfirmed = true;
            } else {
                confirmedRegime = lastRegime;
                isConfirmed = false;
            }

            if(!state.regime_state) state.regime_state={};
            if(!state.regime_last_update) state.regime_last_update={};
            state.regime_state[symbol]=confirmedRegime;
            state.regime_last_update[symbol]=Date.now();
            const detail=`ATR=${atrPercent.toFixed(2)}% slope=${slopePct.toFixed(3)}% range=${rangePct.toFixed(2)}% confirm=${matchCount}/${needed}`;
            return { regime:confirmedRegime, candidate:candidateRegime, confirmed:isConfirmed, slopePct, atrPercent, rangePct, slopeThreshold:V5_SLOPE_THRESHOLD, detail };
          }

          const DROPPABLE_STATUSES=new Set(["planned","placed","pending","queued","ready"]);
