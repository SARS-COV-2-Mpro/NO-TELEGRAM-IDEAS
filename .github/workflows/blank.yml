          function checkRecentStability(klines, maxPct, interval = "1") {
            if (!klines || !Array.isArray(klines) || klines.length === 0) return false;
            
            for (const candle of klines) {
              const high = +candle[2];
              const low = +candle[3];
              const close = +candle[4];
              if (close <= 0) continue;
              
              const fluctuation = ((high - low) / close) * 100;
              if (fluctuation > maxPct) return false;
            }
            return true;
          }

          async function fetchGoldenMetricsWithSpread(symbol) {
            try {
              const [kline, ticker, oiHist] = await Promise.all([
                fetchBybit1hKline(symbol),
                fetchBybitTicker(symbol),
                fetchBybitOIHist(symbol),
              ]);
              
              if (!kline || !ticker) return null;
              
              let spread_bps = 999;
              let mid = ticker.markPrice || kline.currClose || 0;
              if (ticker.bid && ticker.ask && ticker.bid > 0) {
                mid = (ticker.bid + ticker.ask) / 2;
                spread_bps = Math.round(((ticker.ask - ticker.bid) / mid) * 10000);
              }
              
              let oi_delta_pct = 0, oi_delta_1h_pct = 0, oi_delta_2h_pct = 0;
              let current_oi_usd = ticker.openInterestValue;
              if (oiHist && mid > 0) {
                const currentOI = oiHist.currentContracts * mid;
                const prev1hOI = oiHist.prev1hContracts * mid;
                const prev2hOI = oiHist.prev2hContracts * mid;
                
                const oiDelta1h = prev1hOI > 0 ? ((currentOI - prev1hOI) / prev1hOI) : 0;
                const oiDelta2h = prev2hOI > 0 ? ((currentOI - prev2hOI) / prev2hOI) : 0;
                
                oi_delta_1h_pct = Math.abs(oiDelta1h) * 100;
                oi_delta_2h_pct = Math.abs(oiDelta2h) * 100;
                oi_delta_pct = Math.max(oi_delta_1h_pct, oi_delta_2h_pct);
                current_oi_usd = currentOI;
              }

              return {
                symbol,
                vol_1h_pct: kline.vol1hPct || 0,
                price_change_1h: kline.priceChange1h || 0,
                funding_rate: Math.abs(ticker.lastFundingRate || 0),
                funding_rate_raw: ticker.lastFundingRate || 0,
                oi_delta_pct, oi_delta_1h_pct, oi_delta_2h_pct,
                current_oi_usd,
                volume_1h_usd: kline.volume1hUSD || 0,
                mark_price: mid,
                basis_bps: 0,
                spread_bps,
                bid: ticker.bid || 0,
                ask: ticker.ask || 0,
                ts: Date.now()
              };
            } catch (e) { return null; }
          }

          function calculateHedgeConfidence(metrics) {
            if (!metrics) return 0;
            const volNorm = Math.tanh((metrics.vol_1h_pct || 0) / IDEAL_VOL_1H_PCT);
            const fundingNorm = Math.tanh((metrics.funding_rate || 0) / IDEAL_FUNDING_RATE);
            const oiNorm = Math.tanh((metrics.oi_delta_pct || 0) / IDEAL_OI_DELTA_PCT);
            const volUsdNorm = Math.tanh((metrics.volume_1h_usd || 0) / IDEAL_VOLUME_1H_USD);
            const spreadScore = metrics.spread_bps != null ? Math.max(0, 1 - (metrics.spread_bps - IDEAL_SPREAD_BPS) / 12) : 0.5;
            const rawScore = WEIGHT_VOL_1H * volNorm + WEIGHT_FUNDING * fundingNorm + WEIGHT_OI_DELTA * oiNorm + WEIGHT_VOLUME * volUsdNorm + WEIGHT_SPREAD * spreadScore;
            return clamp(Math.round(rawScore * 100), 0, 100);
          }

          // ============ STATE MANAGEMENT ============
          async function loadState(){
            const token=process.env.GIST_TOKEN, id=process.env.GIST_ID;
            const init={ v:"bybit-ultimate-1.0",
              run_counter: 0,
              cooldown:{}, cooldown_side:{}, pending:[], equity:[], closed:[],
              mr_lockout:{}, sym_stats:{}, sym_stats_real:{}, calibCoeffs:{}, lastReconcileTs:0,
              calibration_holdout:[],
              learned_trade_keys: [],
              calib_symbol_counts: {}
            };
            if(!token||!id) return { state:init, persist:null };
            try{
              const r=await fetchWithTimeout(`https://api.github.com/gists/${id}`,{
                headers:{Authorization:`Bearer ${token}`,"Accept":"application/vnd.github+json","User-Agent":UA}
              });
              if(!r.ok) return { state:init, persist:null };
              const etag=r.headers.get("etag");
              const g=await r.json();
              const c=g.files?.["state.json"]?.content;
              const s=c?JSON.parse(c):init;

              if(!s.cooldown)s.cooldown={};
              if(!s.cooldown_side)s.cooldown_side={};
              if(!Array.isArray(s.pending))s.pending=[];
              if(!Array.isArray(s.closed))s.closed=[];
              if(!Array.isArray(s.equity))s.equity=[];
              if(!s.mr_lockout)s.mr_lockout={};
              if(!s.sym_stats)s.sym_stats={};
              if(!s.sym_stats_real)s.sym_stats_real={};
              if(!s.calibCoeffs)s.calibCoeffs={};
              if(!Array.isArray(s.calibration_holdout))s.calibration_holdout=[];
              if(!s.lastReconcileTs)s.lastReconcileTs=0;
              if (!Array.isArray(s.learned_trade_keys)) s.learned_trade_keys = [];
              if (!s.calib_symbol_counts) s.calib_symbol_counts = {};
              if (s.run_counter == null) s.run_counter = 0;

              return { state:s, persist:{ id, token, etag } };
            }catch(e){ log("loadState warn", e?.message||e); return { state:init, persist:null }; }
          }

          function mergeStates(remote, local) {
            const merged = { ...remote };
            merged.run_counter = Math.max(local.run_counter || 0, remote.run_counter || 0);
            
            const remoteKeys = Array.isArray(remote.learned_trade_keys) ? remote.learned_trade_keys : [];
            const localKeys = Array.isArray(local.learned_trade_keys) ? local.learned_trade_keys : [];
            const localSet = new Set(localKeys);
            const uniqueRemote = remoteKeys.filter(k => !localSet.has(k));
            merged.learned_trade_keys = [...uniqueRemote, ...localKeys].slice(-2000);

            const dropSet = new Set((local.__drop_pending_cids || []).map(x => String(x).trim()).filter(Boolean));
            const id = (p) => String(p?.client_order_id || p?.clientOrderId || p?.idea_id || "").trim();
            const remotePending = (remote.pending || []).filter(p => !dropSet.has(id(p)));
            const remoteIds = new Set(remotePending.map(id));
            const newLocalPending = (local.pending || []).filter(p => { const k = id(p); return k && !remoteIds.has(k); });
            merged.pending = [...remotePending, ...newLocalPending];

            merged.equity = Array.isArray(remote.equity) ? remote.equity : [];
            merged.sym_stats_real = remote.sym_stats_real || {};
            merged.sym_stats = remote.sym_stats || {};
            merged.lastReconcileTs = remote.lastReconcileTs || 0;
            if ('fees' in remote) merged.fees = remote.fees;

            merged.cooldown = local.cooldown || {};
            merged.cooldown_side = local.cooldown_side || {};
            merged.mr_lockout = local.mr_lockout || {};
            merged.calibCoeffs = local.calibCoeffs || remote.calibCoeffs || {};
            merged.calib_symbol_counts = local.calib_symbol_counts || remote.calib_symbol_counts || {};

            const keyClosed = (c) => {
              const cid = c?.trade_details?.client_order_id || c.client_order_id || c.idea_id || "";
              const tx  = c?.ts_exit_ms || c?.exit_ts_ms || "";
              return `${cid}|${tx}`;
            };
            const localClosedMap = new Map((local.closed||[]).map(c => [keyClosed(c), c]));
            merged.closed = (remote.closed || []).map(rc => {
              const lc = localClosedMap.get(keyClosed(rc));
              if (!lc) return rc;
              const learned = Boolean(rc.learned || lc.learned);
              const learned_at_ts = learned ? (rc.learned_at_ts || lc.learned_at_ts || Date.now()) : undefined;
              return { ...rc, learned, learned_at_ts };
            });

            merged.version_ts = Date.now();
            log("[gha] mergeStates: remote_pending_after_drops", remotePending.length, "appended_new_local", newLocalPending.length, "merged_pending", merged.pending.length);
            return merged;
          }

          async function saveState(persist, state, retries=2, blindFallback=true) {
            if (!persist) { log("WARN: No persist—skipping Gist save."); return; }
            const gistUrl = `https://api.github.com/gists/${persist.id}`;
            const mkFiles = (s) => ({ "state.json": { content: JSON.stringify(s) } });

            async function patch(files, etag) {
              const headers = {
                Authorization: `Bearer ${persist.token}`,
                "Accept": "application/vnd.github+json",
                "Content-Type": "application/json",
                "User-Agent": UA
              };
              if (etag) headers["If-Match"] = etag;
              return await fetchWithTimeout(gistUrl, {
                method: "PATCH",
                headers,
                body: JSON.stringify({ files })
              }, 15000);
            }

            let toSave = state;
            let etag = persist.etag || null;

            for (let attempt = 0; attempt <= retries; attempt++) {
              log("DEBUG: saveState attempt", attempt, "etag?", !!etag, "pending=", (toSave.pending||[]).length);
              const r = await patch(mkFiles(toSave), etag);
              if (r.ok) {
                const newEtag = r.headers.get("etag");
                persist.etag = newEtag || persist.etag;
                log("SUCCESS: Gist updated! Status=", r.status, "pending now=", (toSave.pending||[]).length);
                return;
              }

              const body = (await r.text().catch(()=> ""))?.slice(0, 300) || "";
              log("WARN: saveState failed status=", r.status, "body=", body);

              if (r.status === 429) {
                const ra = Number(r.headers.get("retry-after") || 2);
                log("WARN: Rate limited. Backing off", ra, "s");
                await sleep(ra * 1000);
                continue;
              }

              if (r.status === 412) {
                const r2 = await fetchWithTimeout(gistUrl, {
                  headers: {
                    Authorization: `Bearer ${persist.token}`,
                    "Accept": "application/vnd.github+json",
                    "User-Agent": UA
                  }
                }, 12000);
                if (!r2.ok) {
                  log("ERROR: Refetch for merge failed status=", r2.status);
                  break;
                }
                const remoteEtag = r2.headers.get("etag");
                const remoteGist = await r2.json();
                const remoteContent = remoteGist.files?.["state.json"]?.content;
                const remoteState = remoteContent ? JSON.parse(remoteContent) : {};
                toSave = mergeStates(remoteState, state);
                etag = remoteEtag || null;
                await sleep(250 + Math.floor(Math.random()*250));
                continue;
              }
              break;
            }

            if (blindFallback) {
              log("WARN: Falling back to blind PATCH (no If-Match).");
              try {
                const r2 = await fetchWithTimeout(gistUrl, {
                  headers: {
                    Authorization: `Bearer ${persist.token}`,
                    "Accept": "application/vnd.github+json",
                    "User-Agent": UA
                  }
                }, 12000);

                if (r2.ok) {
                  const remoteGist = await r2.json();
                  const remoteContent = remoteGist.files?.["state.json"]?.content;
                  const remoteState = remoteContent ? JSON.parse(remoteContent) : {};
                  toSave = mergeStates(remoteState, state);
                  log("DEBUG: Pre-blind-patch merge successful.");
                } else {
                  log("WARN: Pre-blind-patch re-fetch failed status=", r2.status, ". Will save local state.");
                }
              } catch (e) {
                log("ERROR: Exception during pre-blind-patch re-fetch:", e?.message || String(e));
              }

              const r3 = await patch(mkFiles(toSave), null);
              if (r3.ok) {
                const newEtag = r3.headers.get("etag");
                persist.etag = newEtag || persist.etag;
                log("SUCCESS: Blind Gist update ok. pending=", (toSave.pending||[]).length);
              } else {
                const body = (await r3.text().catch(()=> ""))?.slice(0, 300) || "";
                log("ERROR: Blind save failed status=", r3.status, "body=", body);
              }
            }
          }

          function cleanExpiredCooldowns(state) {
            const now = Date.now();
            if (state.cooldown) {
              for (const [base, ts] of Object.entries(state.cooldown)) {
                if (now - ts >= COOLDOWN_MS) delete state.cooldown[base];
              }
            }
            if (state.cooldown_side) {
              for (const [base, obj] of Object.entries(state.cooldown_side)) {
                if (now - (obj.ts_ms || 0) >= COOLDOWN_MS) delete state.cooldown_side[base];
              }
            }
            if (state.mr_lockout) {
              for (const [sym, expiry] of Object.entries(state.mr_lockout)) {
                if (now >= expiry) delete state.mr_lockout[sym];
              }
            }
            log(`🧹 Cleaned cooldowns: ${Object.keys(state.cooldown || {}).length} base, ${Object.keys(state.cooldown_side || {}).length} side, ${Object.keys(state.mr_lockout || {}).length} mr_lockout`);
          }

          function cleanExpiredClosedTrades(state) {
            const MAX_CLOSED_TRADES = 10;
            if (!Array.isArray(state.closed)) { state.closed = []; return; }
            const before = state.closed.length;
            if (before <= MAX_CLOSED_TRADES) {
              log(`📦 Closed trades: ${before}/${MAX_CLOSED_TRADES} (no cleanup needed)`);
              return;
            }
            state.closed.sort((a, b) => {
              const aTime = a.ts_exit_ms || a.exit_ts_ms || 0;
              const bTime = b.ts_exit_ms || b.exit_ts_ms || 0;
              return bTime - aTime;
            });
            state.closed = state.closed.slice(0, MAX_CLOSED_TRADES);
            const removed = before - state.closed.length;
            log(`🗑️  Kept ${MAX_CLOSED_TRADES} most recent closed trades, removed ${removed} old ones`);
          }

          const getCoeffs = (state, side, regime) => {
            const key = `${side}_${regime}`;
            if (!state.calibCoeffs) state.calibCoeffs = {};
            if (!state.calibCoeffs[key]) return null;
            return state.calibCoeffs[key];
          };

          const calibrateP = (state, side, regime, pRaw) => {
            const coeff = getCoeffs(state, side, regime);
            if (!coeff || pRaw == null || !isFinite(pRaw)) return pRaw || 0.5;
            const x = Math.max(-5, Math.min(5, logit(pRaw)));
            return sigmoid(coeff.a + coeff.b * x);
          };

          // ============ HEAVY ANALYSIS (HEDGE=off mode) ============
          async function analyzeSymbolHeavy(symbol, state, btcUp1h) {
            try {
              log(`🔍 [Heavy Analysis] ${symbol}...`);
              
              // Fetch MTF klines
              log(`   📊 Fetching MTF klines`);
              const km = await fetchBybitKMultiTF(symbol);
              if (!km["5m"] || km["5m"].length < Math.max(EMA_SLOW + 5, ATR_P + 5)) {
                log(`   ❌ Insufficient 5m data`);
                return null;
              }

              // Reverse klines (Bybit returns newest first)
              for (const tf of Object.keys(km)) {
                if (km[tf]) km[tf] = km[tf].reverse();
              }

              // 5m analysis with Kalman filter
              const k5 = km["5m"];
              const c5_raw = k5.map(x => +x[4]);
              const c5 = kalman1D(c5_raw, { q: 1e-4, r: 5e-4 });
              const h5 = k5.map(x => +x[2]);
              const l5 = k5.map(x => +x[3]);
              const v5 = k5.map(x => +x[6]);

              log(`   ✅ Kalman filter applied to 5m (${c5.length} candles)`);

              // Technical indicators
              const adxatr = computeADX_ATR(h5, l5, c5, ADX_P) || {};
              const adx5 = adxatr.adx || 0;
              const atr5 = adxatr.atr || 0;
              const atr_bps = Math.round((atr5 / (c5.at(-1) || 1)) * 10000);

              if (atr_bps < 4 || atr_bps > 260) {
                log(`   ❌ ATR out of range: ${atr_bps}bps`);
                return null;
              }

              const vwap5 = vwapAnchored(h5, l5, c5, v5, VWAP_5M_WIN);
              const last = c5.at(-1);
              const roc1 = (last / (c5.at(-2) || last)) - 1;
              const roc3 = (last / (c5.at(-4) || last)) - 1;
              const z_vwap = (last - vwap5) / (atr5 || 1);
              const rsi14 = rsi(c5, 14);
              const ema21 = ema(c5, 21);
              const ema50 = ema(c5, 50);

              log(`   📈 5m indicators: RSI=${rsi14?.toFixed(1)} ADX=${adx5.toFixed(1)} ATR=${atr_bps}bps EMA21=${ema21?.toFixed(2)} EMA50=${ema50?.toFixed(2)} z_vwap=${z_vwap.toFixed(2)}`);

              // Breakout detection
              const highs = h5, lows = l5;
              const win = MR_BREAKOUT_DC_N;
              const dcHi = Math.max(...highs.slice(-win));
              const dcLo = Math.min(...lows.slice(-win));
              const atrPct = (atr5 / last);
              const ret15abs = Math.abs((last / (c5.at(-4) || last)) - 1);
              const breakout = (last > dcHi) || (last < dcLo) || (ret15abs >= MR_BREAKOUT_RET15_ATR * atrPct);
              
              if (breakout) state.mr_lockout[symbol] = Date.now() + MR_LOCKOUT_SEC * 1000;
              const mrLocked = (Date.now() < (state.mr_lockout?.[symbol] || 0));
              const regime = mrLocked ? "trend" : "meanrevert";

              log(`   🔒 MR Lockout: breakout=${breakout} → mrLocked=${mrLocked} → regime=${regime}`);

              // Calculate probabilities
              const adxF = clamp((adx5 - 16) / 14, 0, 1);
              const pTrend = clamp(0.5 + 0.27 * (0.6 * tanh(roc1 / 0.003) + 0.4 * tanh(roc3 / 0.0065)) * adxF, 0.32, 0.93);
              const pMR = clamp(0.5 + 0.23 * (0.7 * tanh(Math.abs(z_vwap)) * Math.sign(-z_vwap) + 0.3 * (-(rsi14 - 50) / 50)) * (1 - adxF), 0.35, 0.90);
              const pLong0 = clamp(0.45 * pTrend + 0.55 * pMR, 0.3, 0.97);
              const pShort0 = clamp(0.45 * (1 - pTrend) + 0.55 * (1 - pMR), 0.3, 0.97);

              log(`   🧮 Raw probabilities: pLong0=${pLong0.toFixed(4)} pShort0=${pShort0.toFixed(4)}`);

              // Calibrate (read-only)
              const pLong = calibrateP(state, "long", regime, pLong0);
              const pShort = calibrateP(state, "short", regime, pShort0);
              
              const coeffInfo = state.calibCoeffs?.[`long_${regime}`];
              if (coeffInfo) {
                log(`   🎯 Calibrated (read-only): pLong=${pLong.toFixed(4)} pShort=${pShort.toFixed(4)} (using existing coeffs a=${coeffInfo.a?.toFixed(4)} b=${coeffInfo.b?.toFixed(4)})`);
              } else {
                log(`   🎯 Calibrated (no coeffs): pLong=${pLong.toFixed(4)} pShort=${pShort.toFixed(4)} (using raw)`);
              }

              const pLong_lcb = wilsonLCB(pLong, 80, WILSON_Z);
              const pShort_lcb = wilsonLCB(pShort, 80, WILSON_Z);

              log(`   📉 Wilson LCB: pLong_lcb=${pLong_lcb.toFixed(4)} pShort_lcb=${pShort_lcb.toFixed(4)}`);

              // Get depth for cost estimation
              const depth = await fetchBybitOrderbook(symbol);
              const ticker = await fetchBybitTicker(symbol);
              let mid = last;
              let spread_bps = 10;
              if (ticker?.bid && ticker?.ask) {
                mid = (ticker.bid + ticker.ask) / 2;
                spread_bps = Math.round(((ticker.ask - ticker.bid) / mid) * 10000);
              }

              const sideSlipL = depth ? slipFromDepth(depth, mid, "long", NOTIONAL) : { slip_bps: Math.round(spread_bps / 2) };
              const sideSlipS = depth ? slipFromDepth(depth, mid, "short", NOTIONAL) : { slip_bps: Math.round(spread_bps / 2) };
              const slipL = sideSlipL?.slip_bps ?? Math.round(spread_bps / 2);
              const slipS = sideSlipS?.slip_bps ?? Math.round(spread_bps / 2);
              const costLong = COST_BPS + slipL;
              const costShort = COST_BPS + slipS;

              // Return series for Monte Carlo
              const yR = [];
              for (let i = 1; i < c5.length; i++) yR.push(Math.log(c5[i] / c5[i - 1]));
              const mu5 = mean(yR) || 0;
              const sig5 = Math.max(1e-4, std(yR));

              // Monte Carlo for both sides
              const MAX_SL_BPS = 80;
              let tp_long = Math.round(LONG_BOUNCE_TP_ATR * atr_bps);
              let sl_long = Math.round(LONG_BOUNCE_SL_ATR * atr_bps);
              sl_long = Math.min(sl_long, MAX_SL_BPS);
              tp_long = Math.max(tp_long, Math.round(sl_long * 1.5));

              let tp_short = Math.round(atr_bps * 1.0);
              let sl_short = Math.round(atr_bps * 0.5);
              sl_short = Math.min(sl_short, MAX_SL_BPS);
              tp_short = Math.max(tp_short, Math.round(sl_short * 1.5));

              log(`   🎲 Monte Carlo simulation (192 paths, 4 steps):`);
              const simLong = pathEVHeavy({ entry: mid, tp_bps: tp_long, sl_bps: sl_long, side: "long", retSeries: yR, mu: mu5, sigma: sig5, steps: 4, N: 192, cost_bps: costLong });
              const simShort = pathEVHeavy({ entry: mid, tp_bps: tp_short, sl_bps: sl_short, side: "short", retSeries: yR, mu: mu5, sigma: sig5, steps: 4, N: 192, cost_bps: costShort });
              
              const evLCB_long = Math.round(pLong_lcb * tp_long - (1 - pLong_lcb) * sl_long - costLong);
              const evLCB_short = Math.round(pShort_lcb * tp_short - (1 - pShort_lcb) * sl_short - costShort);

              log(`      → Long: tp=${tp_long}bps sl=${sl_long}bps ev_lcb=${evLCB_long}bps`);
              log(`      → Short: tp=${tp_short}bps sl=${sl_short}bps ev_lcb=${evLCB_short}bps`);

              // Gates
              const noLongDown = NO_LONG_DOWN_ENABLE && ((rsi14 || 100) < LONG_DOWN_RSI_CUTOFF);
              const gBTC = btcUp1h ? 1.0 : 0.85;
              const gMR = mrLocked ? 0.7 : 1.05;
              const gDir = 1.0;
              const gSpread = clamp(1 - Math.max(0, (spread_bps - MAX_SPREAD_BPS)) / MAX_SPREAD_BPS, 0.2, 1.1);

              const d1 = depth ? depthWithinPctUSD(depth, mid, 0.01) : { asksUSD: 0, bidsUSD: 0 };
              const depth1pUSD = (d1.asksUSD || 0) + (d1.bidsUSD || 0);

              const gCost = 1.0;
              const gVol = clamp(depth1pUSD / Math.max(1, DEPTH_1P_MIN_USD), 0.2, 1.1);

              log(`   🚪 Gates: atr_bps=${atr_bps}✅ noLongDown=${noLongDown} btcUp1h=${btcUp1h}✅ DIRECTION=${DIRECTION}✅`);
              log(`   📊 Multipliers: gBTC=${gBTC.toFixed(2)} gMR=${gMR.toFixed(2)} gSpread=${gSpread.toFixed(2)} gCost=${gCost.toFixed(2)} gVol=${gVol.toFixed(2)}`);

              // Choose better side
              let chosen = null;
              if (DIRECTION === "long") {
                chosen = { side: "long", p_lcb: pLong_lcb, p_raw: pLong0, ev_bps: simLong.ev_bps, exp_lcb_bps: evLCB_long, tp_bps: tp_long, sl_bps: sl_long, cost_bps: costLong, regime };
              } else if (DIRECTION === "short") {
                chosen = { side: "short", p_lcb: pShort_lcb, p_raw: pShort0, ev_bps: simShort.ev_bps, exp_lcb_bps: evLCB_short, tp_bps: tp_short, sl_bps: sl_short, cost_bps: costShort, regime };
              } else {
                // Choose by EV
                if (evLCB_long >= evLCB_short && !noLongDown) {
                  chosen = { side: "long", p_lcb: pLong_lcb, p_raw: pLong0, ev_bps: simLong.ev_bps, exp_lcb_bps: evLCB_long, tp_bps: tp_long, sl_bps: sl_long, cost_bps: costLong, regime };
                } else {
                  chosen = { side: "short", p_lcb: pShort_lcb, p_raw: pShort0, ev_bps: simShort.ev_bps, exp_lcb_bps: evLCB_short, tp_bps: tp_short, sl_bps: sl_short, cost_bps: costShort, regime };
                }
              }

              if (!chosen) {
                log(`   ❌ No viable direction`);
                return null;
              }

              // Confidence score
              const microQ = (Math.max(0, 1 - (spread_bps || 0) / 20));
              const regimeQ = 0.7 + 0.4 * 0.5; // tfAlign not available
              const gateMult = clamp(gSpread * gCost * gVol * gMR * gDir * gBTC, 0.2, 1.4);

              const conf = confidenceScore({
                p_cal: chosen.p_lcb,
                ev_bps: chosen.ev_bps,
                atr_bps: atr_bps,
                micro: microQ,
                regime: regimeQ,
                reliability: 1,
                riskAdj: 1
              }) * gateMult;

              log(`   🎯 ConfidenceScore: base=${(conf/gateMult).toFixed(0)} × gateMult=${gateMult.toFixed(3)} → ${Math.round(conf)}`);
              log(`   ✅ ${symbol}: ${chosen.side.toUpperCase()} chosen (ev_lcb=${chosen.exp_lcb_bps}) conf=${Math.round(conf)} regime=${regime}`);

              return {
                symbol,
                side: chosen.side,
                p_lcb: chosen.p_lcb,
                p_raw: chosen.p_raw,
                ev_bps: chosen.ev_bps,
                exp_lcb_bps: chosen.exp_lcb_bps,
                tp_bps: chosen.tp_bps,
                sl_bps: chosen.sl_bps,
                cost_bps: chosen.cost_bps,
                rrr: +(chosen.tp_bps / Math.max(1, chosen.sl_bps)).toFixed(2),
                regime: chosen.regime,
                confidence: Math.round(conf),
                spread_bps,
                atr_bps,
                mark_price: mid,
                reasons: reasonBuilder({ adx1h: adx5, spread_bps, slip_bps_est: chosen.side === "long" ? slipL : slipS }),
                ret5: yR.slice(-36)
              };

            } catch (e) {
              log(`   ❌ Heavy analysis error: ${e?.message || e}`);
              return null;
            }
          }

          // ============ MAIN ============
          let reason = "ok", selectionTier = "confidence";
          try {
            const { state, persist } = await loadState();

            state.run_counter = (state.run_counter || 0) + 1;
            log(`🔄 Run ${state.run_counter}/6`);

            const SHOULD_WIPE = (state.run_counter >= 6);
            if (SHOULD_WIPE) {
              log("🗑️  RUN 6: WIPE GIST AND RESTART FRESH");
              await saveState(persist, { run_counter: 0 }, 2, true);
              state.v = "bybit-ultimate-1.0";
              state.run_counter = 1;
              state.cooldown = {}; state.cooldown_side = {}; state.pending = [];
              state.equity = []; state.closed = []; state.mr_lockout = {};
              state.sym_stats = {}; state.sym_stats_real = {}; state.calibCoeffs = {};
              state.lastReconcileTs = 0; state.calibration_holdout = [];
              state.learned_trade_keys = []; state.calib_symbol_counts = {};
              log("♻️  State reset to fresh. Continuing with idea generation...");
            }

            // Skip learning if HEDGE=off
            if (!HEDGE_MODE) {
              log("⏭️  Skipping learning (HEDGE=off uses read-only calibration)");
            }

            cleanExpiredCooldowns(state);
            cleanExpiredClosedTrades(state);

            const preserved = {
              v: state.v || "bybit-ultimate-1.0",
              run_counter: state.run_counter || 0,
              cooldown: state.cooldown || {},
              cooldown_side: state.cooldown_side || {},
              mr_lockout: state.mr_lockout || {},
              calibCoeffs: state.calibCoeffs || {},
              learned_trade_keys: state.learned_trade_keys || [],
              calib_symbol_counts: state.calib_symbol_counts || {},
              pending: [],
              closed: state.closed || [],
              equity: state.equity || [],
              sym_stats_real: state.sym_stats_real || {},
              sym_stats: {},
              calibration_holdout: [],
              lastReconcileTs: 0
            };
            Object.assign(state, preserved);

            log(`♻️  Fresh cycle: ${Object.keys(state.cooldown).length} cooldowns, ${(state.closed || []).length} closed trades, ${Object.keys(state.calibCoeffs || {}).length} calib models ${HEDGE_MODE ? "" : "(read-only)"}`);

            if (!HEDGE_MODE) {
              log("📊 Calibration Health (read-only):");
              for (const [key, coeff] of Object.entries(state.calibCoeffs || {})) {
                if (coeff.n >= 10) {
                  log(`   ${key}: n=${coeff.n} a=${coeff.a?.toFixed(4)} b=${coeff.b?.toFixed(4)} (frozen)`);
                } else {
                  log(`   ${key}: n=${coeff.n} (insufficient, using defaults)`);
                }
              }
            }

            if (!todOK) reason = "tod_gate";

            // Fetch Bybit universe
            log("📡 Fetching Bybit Linear universe...");
            const bybitSymbols = await fetchBybitLinearSymbols();
            if (!bybitSymbols || bybitSymbols.length === 0) {
              log("❌ No Bybit Linear symbols found - cannot proceed");
              reason = "no_bybit_symbols";
              throw new Error("No Bybit Linear symbols available");
            }
            log(`✅ Bybit Linear universe: ${bybitSymbols.length} USDT perpetuals found`);

            const equityStats = (eq) => {
              const day = Date.now() - 24 * 3600 * 1000;
              let pnl24 = 0, cum = 0, peak = 0, dd = 0;
              for (const e of eq || []) {
                if (e.ts_ms >= day) pnl24 += e.pnl_bps;
                cum += e.pnl_bps;
                if (cum > peak) peak = cum;
                dd = Math.min(dd, cum - peak);
              }
              return { pnl24_bps: Math.round(pnl24), peak_dd_bps: Math.round(dd) };
            };
            const { pnl24_bps, peak_dd_bps } = equityStats(state.equity);
            const throttle = (pnl24_bps <= DD_24H_LIMIT_BPS) || (peak_dd_bps <= DD_PEAK_LIMIT_BPS);

            // Fetch golden metrics
            log("📊 Fetching golden metrics for all symbols...");
            const BATCH_SIZE = 10;
            const BATCH_DELAY = 500;
            const allMetrics = [];

            const eligibleSymbols = bybitSymbols.filter(sym => {
              const lastTs = state.cooldown?.[sym.base] || 0;
              return !(lastTs && (Date.now() - lastTs) < COOLDOWN_MS);
            });
            log(`📋 Eligible symbols after cooldown filter: ${eligibleSymbols.length}/${bybitSymbols.length}`);

            for (let i = 0; i < eligibleSymbols.length; i += BATCH_SIZE) {
              const batch = eligibleSymbols.slice(i, i + BATCH_SIZE);
              const batchResults = await Promise.all(
                batch.map(async (sym) => {
                  try {
                    const metrics = await fetchGoldenMetricsWithSpread(sym.symbol);
                    if (!metrics) return null;
                    return { ...sym, ...metrics, hedge_confidence: calculateHedgeConfidence(metrics) };
                  } catch (e) { return null; }
                })
              );
              for (const r of batchResults) if (r && r.mark_price > 0) allMetrics.push(r);
              if (i + BATCH_SIZE < eligibleSymbols.length) await sleep(BATCH_DELAY);
            }
            log(`📈 Fetched metrics for ${allMetrics.length}/${eligibleSymbols.length} symbols`);

            allMetrics.sort((a, b) => b.hedge_confidence - a.hedge_confidence);

            const TOP_10_COUNT = 10;
            const topCandidates = allMetrics.slice(0, TOP_10_COUNT);
            log(`🏆 Top 10 by hedge confidence (${HEDGE_MODE ? "HEDGE=on" : "Pusher 2 method"}):`);
            topCandidates.forEach((m, i) => log(`   ${i + 1}. ${m.symbol} conf=${m.hedge_confidence} vol1h=${m.vol_1h_pct.toFixed(2)}% fund=${(m.funding_rate * 100).toFixed(4)}% oi_delta=${m.oi_delta_pct.toFixed(1)}% vol=$${Math.round(m.volume_1h_usd / 1e6)}M spread=${m.spread_bps}bps`));

            const btcMetrics = allMetrics.find(m => m.symbol === "BTCUSDT");
            const btcUp1h = btcMetrics ? (btcMetrics.price_change_1h > 0) : true;
            const TARGET_TOP_N = Math.max(1, TOP_N || 3);

            let selected = [];

            // Determine stability check interval
            const stabilityIntervalMap = {
              "1": "1",
              "3": "3",
              "5": "5",
              "15": "15",
              "30": "30",
              "60": "60"
            };
            const stabilityInterval = stabilityIntervalMap[STABILITY_INTERVAL] || "1";
            log(`🔍 Stability filter: ${stabilityInterval}m candles (max ${MAX_1M_FLUCTUATION_PCT}% fluctuation)`);

            for (const cand of topCandidates) {
              if (selected.length >= TARGET_TOP_N) break;
              if (selected.some(s => s.base === cand.base)) continue;

              // Stability filter
              const klines = await fetchBybitKlines(cand.symbol, stabilityInterval, 5);
              const isStable = checkRecentStability(klines, MAX_1M_FLUCTUATION_PCT, stabilityInterval);
              if (!isStable) {
                log(`   ⏭️  Skip ${cand.symbol}: ${stabilityInterval}m fluctuation exceeds ${MAX_1M_FLUCTUATION_PCT}%`);
                continue;
              }

              selected.push(cand);
            }

            log(`✅ Selected ${selected.length} candidates (after stability filter)`);

            let picksV2 = [];

            if (HEDGE_MODE) {
              // ============ HEDGE=on: Original behavior ============
              log("📊 HEDGE=on: Using funding-rate based side selection + flip");

              const withSide = selected.map(cand => {
                const side = cand.funding_rate_raw > 0 ? "short" : "long";
                const atr_bps = Math.round(cand.vol_1h_pct * 100);
                const tp_bps = Math.max(30, Math.round(atr_bps * 0.9));
                const sl_bps = Math.min(80, Math.max(20, Math.round(atr_bps * 0.5)));
                const cost_bps = COST_BPS + Math.round(cand.spread_bps / 2);
                const p_win = 0.50 + 0.15 * Math.tanh(cand.vol_1h_pct / 3);
                const ev_bps = Math.round(p_win * tp_bps - (1 - p_win) * sl_bps - cost_bps);

                return {
                  symbol: cand.symbol, base: cand.base, quote: cand.quote, side,
                  mark_price: cand.mark_price, spread_bps: cand.spread_bps,
                  tp_bps, sl_bps, cost_bps, rrr: +(tp_bps / sl_bps).toFixed(2),
                  p_win: +p_win.toFixed(3), p_lcb: +p_win.toFixed(3), p_raw: +p_win.toFixed(3),
                  ev_bps, exp_lcb_bps: ev_bps, regime: "hedge", style: "hedge",
                  vol_1h_pct: cand.vol_1h_pct, funding_rate: cand.funding_rate, funding_rate_raw: cand.funding_rate_raw,
                  oi_delta_pct: cand.oi_delta_pct, volume_1h_usd: cand.volume_1h_usd, basis_bps: cand.basis_bps,
                  current_oi_usd: cand.current_oi_usd, confidence: cand.hedge_confidence, hedge_confidence: cand.hedge_confidence,
                  hold_sec: 3600,
                  reasons: reasonBuilder({
                    vol_1h_pct: cand.vol_1h_pct, funding_rate: cand.funding_rate, oi_delta_pct: cand.oi_delta_pct,
                    volume_1h_usd: cand.volume_1h_usd, basis_bps: cand.basis_bps
                  }),
                  ret5: []
                };
              });

              const flipped = withSide.map(orig => ({ ...orig, side: orig.side === "long" ? "short" : "long", flipped: true }));
              const selectedWithFlipped = [...withSide, ...flipped];

              const wEv = softmax(selectedWithFlipped.map(x => x.exp_lcb_bps), 20);
              picksV2 = selectedWithFlipped.map((x, i) => {
                const mid = x.mark_price;
                let entry_limit = null, tp_abs = null, sl_abs = null;
                if (mid != null) {
                  const slF = x.sl_bps / 10000, tpF = x.tp_bps / 10000;
                  if (x.side === "long") {
                    entry_limit = mid * (1 - Math.max(0.001, slF * 0.5));
                    tp_abs = entry_limit * (1 + tpF);
                    sl_abs = entry_limit * (1 - slF);
                  } else {
                    entry_limit = mid * (1 + slF);
                    tp_abs = entry_limit * (1 - tpF);
                    sl_abs = entry_limit * (1 + slF);
                  }
                }

                const idea_id = uuidv4();
                const client_order_id = mkClientOrderId("byh");
                const ttl = clamp(Math.round((x.hold_sec || 3600) + i * 12), TTL_MIN, TTL_MAX);
                const size_bps = (Number(process.env.FORCE_SIZE_BPS || "0") > 0) ? Math.round(Number(process.env.FORCE_SIZE_BPS)) : (x.sl_bps > 0 ? Math.min(220, Math.round((wEv[i] * TARGET_PORT_RISK_BPS / x.sl_bps) * 100)) : 0);

                return {
                  idea_id, client_order_id, symbol: x.base, symbol_full: x.symbol, symbolFull: x.symbol, quote: x.quote,
                  side: x.side, rank: i + 1, target_exchange: TARGET_EXCHANGE, market_type: MARKET_TYPE,
                  margin_mode: MARGIN_MODE, leverage: LEVERAGE, entry_policy: "maker_join", exec: { exec: "post_only" },
                  entry_mid: mid, entry_limit, tp_abs, sl_abs, tp_bps: x.tp_bps, sl_bps: x.sl_bps, rrr: x.rrr,
                  exp_lcb_bps: x.exp_lcb_bps, ev_bps: x.ev_bps, cost_bps: x.cost_bps, p_win: x.p_lcb, p_lcb: x.p_lcb,
                  p_raw: x.p_raw, calib_key: `side:${x.side}|regime:${x.regime}`, regime: x.regime, ttl_sec: ttl, size_bps,
                  predicted: {
                    ts_ms: Date.now(), p_cal: x.p_lcb, ev_bps: x.exp_lcb_bps ?? x.ev_bps, confidence_score: x.confidence,
                    flipped: x.flipped || false, vol_1h_pct: x.vol_1h_pct, funding_rate: x.funding_rate,
                    oi_delta_pct: x.oi_delta_pct, volume_1h_usd: x.volume_1h_usd, basis_bps: x.basis_bps,
                    hedge_confidence: x.hedge_confidence
                  },
                  confidence: x.confidence, reasons: x.reasons,
                  reasons_text: (x.reasons || []).slice(0, 3).map(r => `${r.factor}:${r.value}(${r.contribution >= 0 ? "+" : ""}${r.contribution})`),
                  hedge_metrics: {
                    vol_1h_pct: x.vol_1h_pct, funding_rate_raw: x.funding_rate_raw, oi_delta_pct: x.oi_delta_pct,
                    volume_1h_usd: x.volume_1h_usd, basis_bps: x.basis_bps, mark_price: x.mark_price,
                    current_oi_usd: x.current_oi_usd
                  }
                };
              });

            } else {
              // ============ HEDGE=off: Heavy analysis ============
              log("📊 HEDGE=off: Using heavy analysis (Pusher 1 method, read-only calibration)");

              const analyzed = [];
              for (const cand of selected) {
                const result = await analyzeSymbolHeavy(cand.symbol, state, btcUp1h);
                if (result) analyzed.push({ ...cand, ...result });
                await sleep(500); // Rate limiting
              }

              log(`✅ Heavy analysis complete: ${analyzed.length}/${selected.length} viable ideas`);

              analyzed.sort((a, b) => b.confidence - a.confidence);
              const finalPicks = analyzed.slice(0, TARGET_TOP_N);

              const wEv = softmax(finalPicks.map(x => x.exp_lcb_bps), 20);
              picksV2 = finalPicks.map((x, i) => {
                const mid = x.mark_price;
                let entry_limit = null, tp_abs = null, sl_abs = null;
                if (mid != null) {
                  const slF = x.sl_bps / 10000, tpF = x.tp_bps / 10000;
                  if (x.side === "long") {
                    entry_limit = mid * (1 - Math.max(0.001, slF * 0.5));
                    tp_abs = entry_limit * (1 + tpF);
                    sl_abs = entry_limit * (1 - slF);
                  } else {
                    entry_limit = mid * (1 + slF);
                    tp_abs = entry_limit * (1 - tpF);
                    sl_abs = entry_limit * (1 + slF);
                  }
                }

                const idea_id = uuidv4();
                const client_order_id = mkClientOrderId("byu");
                const ttl = clamp(Math.round(3600 + i * 12), TTL_MIN, TTL_MAX);
                const size_bps = (Number(process.env.FORCE_SIZE_BPS || "0") > 0) ? Math.round(Number(process.env.FORCE_SIZE_BPS)) : (x.sl_bps > 0 ? Math.min(220, Math.round((wEv[i] * TARGET_PORT_RISK_BPS / x.sl_bps) * 100)) : 0);

                return {
                  idea_id, client_order_id, symbol: x.base, symbol_full: x.symbol, symbolFull: x.symbol, quote: x.quote,
                  side: x.side, rank: i + 1, target_exchange: TARGET_EXCHANGE, market_type: MARKET_TYPE,
                  margin_mode: MARGIN_MODE, leverage: LEVERAGE, entry_policy: "maker_join", exec: { exec: "post_only" },
                  entry_mid: mid, entry_limit, tp_abs, sl_abs, tp_bps: x.tp_bps, sl_bps: x.sl_bps, rrr: x.rrr,
                  exp_lcb_bps: x.exp_lcb_bps, ev_bps: x.ev_bps, cost_bps: x.cost_bps, p_win: x.p_lcb, p_lcb: x.p_lcb,
                  p_raw: x.p_raw, calib_key: `side:${x.side}|regime:${x.regime}`, regime: x.regime, ttl_sec: ttl, size_bps,
                  predicted: {
                    ts_ms: Date.now(), p_cal: x.p_lcb, ev_bps: x.exp_lcb_bps ?? x.ev_bps, confidence_score: x.confidence,
                    flipped: false, hedge_mode: "off"
                  },
                  confidence: x.confidence, reasons: x.reasons,
                  reasons_text: (x.reasons || []).slice(0, 3).map(r => `${r.factor}:${r.value}(${r.contribution >= 0 ? "+" : ""}${r.contribution})`)
                };
              });
            }

            // Convert to v1 compat
            const toV1Compat = (pv2) => ({
              idea_id: pv2.idea_id, client_order_id: pv2.client_order_id, symbol: pv2.symbol, symbol_full: pv2.symbol_full,
              quote: pv2.quote, side: pv2.side, rank: pv2.rank, entry_policy: "smart_swing_limit", entry_type: "limit",
              activation: "on_fill", entry_mid: pv2.entry_mid, entry_limit: pv2.entry_limit, tp_abs: pv2.tp_abs, sl_abs: pv2.sl_abs,
              tp_bps: pv2.tp_bps, sl_bps: pv2.sl_bps, rrr: pv2.rrr, exp_lcb_bps: pv2.exp_lcb_bps, ev_bps: pv2.ev_bps,
              cost_bps: pv2.cost_bps, p_win: pv2.p_lcb, p_lcb: pv2.p_lcb, p_raw: pv2.p_raw, calib_key: pv2.calib_key,
              regime: pv2.regime, ttl_sec: pv2.ttl_sec, size_bps: pv2.size_bps,
              predicted: { ...pv2.predicted, meta: {
                  strategy: STRATEGY_NAME, model_version: MODEL_VERSION, schema_version: SCHEMA_VERSION, git_sha: GIT_SHA,
                  config_hash: CONFIG_HASH, futures_hint: {
                    target_exchange: pv2.target_exchange, market_type: pv2.market_type, margin_mode: pv2.margin_mode,
                    leverage: pv2.leverage, entry_policy_override: pv2.entry_policy, exec: pv2.exec }
              }},
              confidence: pv2.confidence, reasons: pv2.reasons, reasons_text: pv2.reasons_text, hedge_metrics: pv2.hedge_metrics
            });

            let picks = picksV2.map(toV1Compat);

            // Update state
            try {
              const nowMs = Date.now();
              const ideasTs = new Date(nowMs).toISOString();
              for (const p of picks) {
                state.cooldown[p.symbol] = nowMs;
                state.cooldown_side[p.symbol] = { side: p.side, ts_ms: nowMs };
                state.pending.push({
                  ts: ideasTs, ts_ms: nowMs, ttl_ts_ms: nowMs + p.ttl_sec * 1000,
                  symbolFull: p.symbol_full, flipped: p.predicted?.flipped || false, base: p.symbol, quote: p.quote, side: p.side,
                  entry_limit: p.entry_limit, tp_abs: p.tp_abs, sl_abs: p.sl_abs, hold_sec: p.ttl_sec, tp_bps: p.tp_bps, sl_bps: p.sl_bps,
                  cost_bps: p.cost_bps, tier: p.tier || "confidence", p_lcb: p.p_lcb, p_raw: p.p_raw, calib_key: p.calib_key,
                  predicted: p.predicted, regime: p.regime, decision_context: { source: "bybit_linear", hedge_mode: HEDGE_MODE ? "on" : "off" },
                  notional_usd: NOTIONAL, size_bps: p.size_bps, idea_id: p.idea_id, client_order_id: p.client_order_id,
                  hedge_metrics: p.hedge_metrics, status: "planned", entry_ts_ms: null, entry_price: null, qty: null
                });
              }
              if (state.pending.length > 550) state.pending = state.pending.slice(-550);
              log("DEBUG: Appended", picks.length, "plans. New pending length=", (state.pending || []).length);
            } catch (e) { log("state update warn", e?.message || e); }

            await saveState(persist, state, 2, true);

            for (const p of picks) {
              const hedgeInfo = HEDGE_MODE ? `vol1h=${(p.predicted?.vol_1h_pct || 0).toFixed(2)}% fund=${((p.hedge_metrics?.funding_rate_raw || 0) * 100).toFixed(4)}%` : `p_lcb=${p.p_lcb.toFixed(3)} ev=${p.ev_bps}bps`;
              log(`idea ${p.symbol_full} ${p.side} conf=${p.confidence} ${hedgeInfo} reasons=${(p.reasons_text || []).join("; ")}`);
            }

            const ideaLogs = picks.map(p => ({
              symbol: p.symbol_full, side: p.side, flipped: p.predicted?.flipped || false, confidence: p.confidence,
              p_cal: +p.p_lcb.toFixed(3), ev_bps: p.ev_bps, idea_id: p.idea_id
            }));

            const meta = {
              origin: "github_actions", reason, exchange: "bybit_linear", execution_exchange: "bybit_linear",
              strategy: STRATEGY_NAME, model_version: MODEL_VERSION, schema_version: SCHEMA_VERSION, git_sha: GIT_SHA,
              config_hash: CONFIG_HASH,
              hedge_mode: HEDGE_MODE ? "on" : "off",
              stability_interval: stabilityInterval + "m",
              counts: { bybit_universe: bybitSymbols.length, metrics_fetched: allMetrics.length, selected: picks.length },
              dd_gate: { pnl24_bps, peak_dd_bps, throttle },
              tod: { active: S_H != null && E_H != null, start: S_H, end: E_H },
              tier: selectionTier, idea_logs: ideaLogs,
              extras: { v2_ideas: picksV2, features_requested: ["maker_join", "post_only", "linear", HEDGE_MODE ? "hedge_trading" : "directional_trading", "bybit_execution"] }
            };

            const payload = { ts: new Date().toISOString(), mode: "normal", source: "external_pusher", meta, top_n: picks.length || 0, ideas: picks || [] };

            log(`pushing ${picks.length} ideas (${selectionTier}, hedge=${HEDGE_MODE ? "on" : "off"}) to ${PUSH_URL}`);
            try {
              const r = await fetchWithTimeout(PUSH_URL, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUSH_TOKEN }, body: JSON.stringify(payload) }, 15000);
              let txt = ""; try { txt = await r.text(); } catch { }
              log("push status", r?.status || "ERR", (txt || "").slice(0, 400));
            } catch (e) { log("push failed", e?.message || e); }

            if (PUSH_URL_V2) {
              const payloadV2 = { ts: new Date().toISOString(), mode: "normal", source: "external_pusher",
                meta: { origin: "github_actions_v2_bybit", strategy: "bybit-ultimate", data_source: "bybit_linear", hedge_mode: HEDGE_MODE ? "on" : "off", execution: "bybit_linear" },
                top_n: picksV2.length, ideas: picksV2 };
              log(`pushing ${picksV2.length} v2 ideas to ${PUSH_URL_V2}`);
              try {
                const r2 = await fetchWithTimeout(PUSH_URL_V2, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUSH_TOKEN }, body: JSON.stringify(payloadV2) }, 15000);
                let txt2 = ""; try { txt2 = await r2.text(); } catch { }
                log("push v2 status", r2?.status || "ERR", (txt2 || "").slice(0, 400));
              } catch (e) { log("push v2 failed", e?.message || e); }
            }

          } catch (e) {
            reason = reason !== "ok" ? reason : "data_error";
            const payload = {
              ts: new Date().toISOString(), mode: "normal", source: "external_pusher",
              meta: { origin: "github_actions", reason, error: (e?.message || String(e)).slice(0, 220), exchange: "bybit_linear", hedge_mode: HEDGE_MODE ? "on" : "off" },
              top_n: 0, ideas: []
            };
            log("pushing 0 ideas to", PUSH_URL);
            try {
              const r = await fetchWithTimeout(PUSH_URL, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + PUSH_TOKEN }, body: JSON.stringify(payload) }, 15000);
              let txt = ""; try { txt = await r.text(); } catch { }
              log("push status", r?.status || "ERR", (txt || "").slice(0, 200));
            } catch (e2) { log("push failed", e2?.message || e2); }
          }
          })();
          NODE

          EXIT_CODE=$?

          set -e
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "[gha] pusher exited with code $EXIT_CODE — sending minimal payload"
            raw_push_url="$(printf '%s' "${WORKER_PUSH_URL}" | tr -d '\r\n')"
            health_url="$(printf '%s' "${raw_push_url}" | sed -E 's#/signals/push(\?.*)?$#/health#')"

            echo "[gha] fallback health GET ${health_url}"
            http_code_h=$(curl -g -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${PUSH_TOKEN}" --max-time 8 "${health_url}" || true)
            echo "[gha] fallback health status ${http_code_h}"

            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            payload='{"ts":"'"${now}"'","mode":"normal","source":"external_pusher","meta":{"origin":"github_actions","reason":"fallback_node_error","exchange":"bybit_linear"},"top_n":0,"ideas":[]}'
            echo "[gha] pushing 0 ideas to ${raw_push_url}"
            mkdir -p /tmp
            : > /tmp/push_resp.txt
            http_code=$(curl -g -sS -o /tmp/push_resp.txt -w "%{http_code}" -X POST -H "Content-Type: application/json" -H "Authorization: Bearer ${PUSH_TOKEN}" --data-raw "${payload}" --max-time 12 "${raw_push_url}" || true)
            body="$(head -c 400 /tmp/push_resp.txt || true)"
            echo "[gha] push status ${http_code} ${body}"
            exit 0
          fi
