            if(state.regime_state&&Object.keys(state.regime_state).length>300){ const sorted=Object.entries(state.regime_last_update||{}).sort((a,b)=>b[1]-a[1]).slice(0,300).map(x=>x[0]); const keep={}; for(const sym of sorted) keep[sym]=state.regime_state[sym]; state.regime_state=keep; }
            if(state.regime_history&&Object.keys(state.regime_history).length>100){ const sorted=Object.entries(state.regime_last_update||{}).sort((a,b)=>b[1]-a[1]).slice(0,100).map(x=>x[0]); const keep={}; for(const sym of sorted) if(state.regime_history[sym]) keep[sym]=state.regime_history[sym]; state.regime_history=keep; }
            const preserved={ v:state.v||"bybit-hedge-7.0", run_counter:state.run_counter||0, cooldown:state.cooldown||{}, cooldown_side:state.cooldown_side||{}, cooldown_side_regime:state.cooldown_side_regime||{}, mr_lockout:state.mr_lockout||{}, calibCoeffs:state.calibCoeffs||{}, learned_trade_keys:state.learned_trade_keys||[], calib_symbol_counts:state.calib_symbol_counts||{}, calib_last_version:state.calib_last_version||CALIB_VERSION, regime_state:state.regime_state||{}, regime_history:state.regime_history||{}, regime_last_update:state.regime_last_update||{}, pending:state.pending||[], closed:state.closed||[], equity:state.equity||[], sym_stats_real:state.sym_stats_real||{}, sym_stats:{}, calibration_holdout:[], lastReconcileTs:0 };
            Object.assign(state,preserved);

            const cooldownCount=Object.keys(state.cooldown||{}).length;
