                  atrPenalty=clamp(v5Result.atrPercent/ATR_MIN_PCT, 0.4, 1.0);
                  log(`[ATR-WARN] ${cand.symbol} ATR=${v5Result.atrPercent.toFixed(2)}% penalty=${atrPenalty.toFixed(2)}`);
