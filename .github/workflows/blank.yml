name: Ideas Pusher (Bybit Hybrid Probability 2.0.0)

on:
  repository_dispatch:
    types: [run_B]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ideas-bybit-hybrid-probability
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      # Required secrets
      WORKER_PUSH_URL: ${{ secrets.WORKER_PUSH_URL }}
      PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
      WORKER_PUSH_URL_V2: ${{ secrets.WORKER_PUSH_URL_V2 }}

      # Kept for compatibility / reconciliation
      BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
      BYBIT_SECRET_KEY: ${{ secrets.BYBIT_SECRET_KEY }}

      # Optional state persistence
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      GIST_ID: ${{ secrets.GIST_ID }}

      # Existing knobs kept from Bybit Ultimate infra
      EXCHANGE: bybit
      MIN_QV_USD: ${{ vars.MIN_QV_USD }}
      TOP_N: ${{ vars.TOP_N }}
      MAX_SPREAD_BPS: ${{ vars.MAX_SPREAD_BPS }}
      FEES_BPS: ${{ vars.FEES_BPS }}
      NOTIONAL_USD: ${{ vars.NOTIONAL_USD }}
      BYBIT_DEPTH_LIMIT: ${{ vars.BYBIT_DEPTH_LIMIT }}
      OBI_TOPN: ${{ vars.OBI_TOPN }}
      MAX_1M_FLUCTUATION_PCT: ${{ vars.MAX_1M_FLUCTUATION_PCT }}
      ACTIVE_UTC_START: ${{ vars.ACTIVE_UTC_START }}
      ACTIVE_UTC_END: ${{ vars.ACTIVE_UTC_END }}
      BYBIT_BASE: ${{ vars.BYBIT_BASE }}
      FORCE_SIZE_BPS: ${{ vars.FORCE_SIZE_BPS }}

      # Only trading envs you asked for
      TP_ATR_MULT: ${{ vars.TP_ATR_MULT }}
      SL_ATR_MULT: ${{ vars.SL_ATR_MULT }}

      # Provenance
      STRATEGY_NAME: ${{ vars.STRATEGY_NAME }}
      MODEL_VERSION: ${{ vars.MODEL_VERSION }}
      SCHEMA_VERSION: ${{ vars.SCHEMA_VERSION }}
      GIT_SHA: ${{ github.sha }}

    steps:
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run pusher (hybrid probability + visible logs)
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${WORKER_PUSH_URL:-}" || -z "${PUSH_TOKEN:-}" ]]; then
            echo "[gha] Missing WORKER_PUSH_URL or PUSH_TOKEN"
            exit 1
          fi

          set +e
          node - <<'NODE'
          (async ()=>{
            'use strict';

            const crypto = require('crypto');
            const MODEL_VERSION = (process.env.MODEL_VERSION || "2.0.0");
            const UA = `gh-actions-bybit-hybrid/${MODEL_VERSION} (+https://github.com/)`;

            // ============================================================
            // UTILS
            // ============================================================
            const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
            const sum=(a)=>a.reduce((x,y)=>x+y,0);
            const mean=(a)=>a.length?sum(a)/a.length:0;
            const std=(a)=>{
              const m=mean(a); let v=0;
              for(const x of a) v+=(x-m)*(x-m);
              return a.length>1 ? Math.sqrt(v/(a.length-1)) : 0;
            };
            const log=(...a)=>console.log("[gha]",...a);
            const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
            const jitter=(ms)=>ms + Math.floor(Math.random()*ms*0.25);
            const tanh=(x)=>Math.tanh(x);
            const softmax=(arr,t=20)=>{
              const m=Math.max(...arr,0);
              const ex=arr.map(x=>Math.exp((x-m)/t));
              const s=ex.reduce((a,b)=>a+b,0)||1;
              return ex.map(x=>x/s);
            };
            const wilsonLCB=(p,n,z=1.34)=>{
              if(n<=0) return p;
              const z2=z*z;
              const a=p + z2/(2*n);
              const b=z*Math.sqrt((p*(1-p)+z2/(4*n))/n);
              const c=1+z2/n;
              return clamp((a-b)/c, 0, 1);
            };
            const ema=(arr,p)=>{
              if(!arr || arr.length<p) return null;
              const k=2/(p+1);
              let e=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
              for(let i=p;i<arr.length;i++) e=arr[i]*k + e*(1-k);
              return e;
            };
            const corr=(a,b)=>{
              const n=Math.min(a?.length||0,b?.length||0);
              if(n<5) return 0;
              const as=a.slice(-n), bs=b.slice(-n);
              const ma=mean(as), mb=mean(bs);
              let num=0,da=0,db=0;
              for(let i=0;i<n;i++){
                const xa=as[i]-ma, xb=bs[i]-mb;
                num+=xa*xb; da+=xa*xa; db+=xb*xb;
              }
              const den=Math.sqrt(da*db)||1;
              return num/den;
            };
            const uuidv4=()=>{
              try { return crypto.randomUUID(); }
              catch {
                const b=crypto.randomBytes(16);
                b[6]=(b[6]&0x0f)|0x40;
                b[8]=(b[8]&0x3f)|0x80;
                const h=b.toString("hex");
                return [h.slice(0,8),h.slice(8,12),h.slice(12,16),h.slice(16,20),h.slice(20)].join("-");
              }
            };
            const mkClientOrderId=(prefix="byh")=>{
              const raw=(crypto.randomUUID ? crypto.randomUUID() : uuidv4()).replace(/-/g,"");
              const base=(prefix+"_"+raw).replace(/[^A-Za-z0-9_-]/g,"").slice(0,30);
              return base.padEnd(Math.max(24,base.length),"0");
            };
            const hashObj=(o)=>{
              const norm=(x)=>{
                if(x && typeof x==="object" && !Array.isArray(x)){
                  const ks=Object.keys(x).sort();
                  const y={};
                  for(const k of ks) y[k]=norm(x[k]);
                  return y;
                }
                if(Array.isArray(x)) return x.map(norm);
                return x;
              };
              const s=JSON.stringify(norm(o));
              return crypto.createHash("sha256").update(s).digest("hex");
            };
            const toCSVLine=(row,keys)=>keys.map(k=>{
              let v=row?.[k];
              if(v==null) return "";
              if(typeof v==="object") v=JSON.stringify(v);
              const s=String(v);
              return s.includes(",")||s.includes("\n")||s.includes('"')
                ? `"${s.replace(/"/g,'""')}"`
                : s;
            }).join(",");

            function slopePctLinearRegression(closes){
              const n=closes.length;
              if(n<2) return 0;
              let sumX=0,sumY=0,sumXY=0,sumX2=0;
              for(let i=0;i<n;i++){
                sumX+=i;
                sumY+=closes[i];
                sumXY+=i*closes[i];
                sumX2+=i*i;
              }
              const den = (n*sumX2 - sumX*sumX);
              if(den===0) return 0;
              const slope = (n*sumXY - sumX*sumY)/den;
              const avg = sumY/n;
              if(avg===0) return 0;
              return (slope/avg)*100;
            }

            function computeATRFromKlines(klines, period=14){
              if(!Array.isArray(klines) || klines.length < period+1) return null;
              const highs=klines.map(k=>+k[2]);
              const lows =klines.map(k=>+k[3]);
              const closes=klines.map(k=>+k[4]);
              const trs=[];
              for(let i=1;i<klines.length;i++){
                trs.push(Math.max(
                  highs[i]-lows[i],
                  Math.abs(highs[i]-closes[i-1]),
                  Math.abs(lows[i]-closes[i-1])
                ));
              }
              const atr = mean(trs.slice(-period));
              const lastClose = closes.at(-1)||1;
              return {
                atr,
                atr_pct: lastClose>0 ? atr/lastClose : 0,
                lastClose
              };
            }

            function computeWickNoise(klines){
              if(!Array.isArray(klines) || !klines.length) return 0.5;
              const vals=[];
              for(const k of klines){
                const o=+k[1], h=+k[2], l=+k[3], c=+k[4];
                const range=h-l;
                if(!(range>0)) continue;
                const body=Math.abs(c-o);
                const wick=range-body;
                vals.push(wick/range);
              }
              return vals.length ? mean(vals) : 0.5;
            }

            function checkRecentStability(klines, maxPct){
              if(!Array.isArray(klines) || !klines.length) return false;
              for(const candle of klines){
                const h=+candle[2], l=+candle[3], c=+candle[4];
                if(!(c>0)) continue;
                const fluct = ((h-l)/c)*100;
                if(fluct > maxPct) return false;
              }
              return true;
            }

            function logReturnsFromKlines(klines){
              const c = klines.map(k=>+k[4]).filter(x=>x>0);
              const out=[];
              for(let i=1;i<c.length;i++) out.push(Math.log(c[i]/c[i-1]));
              return out;
            }

            // ============================================================
            // PROBABILITY MODEL: P(TP before SL)
            // ============================================================
            function firstPassageProb(mu, sigma, upDist, downDist){
              const eps=1e-12;
              const varStep=Math.max(eps, sigma*sigma);
              if(!(upDist>0) || !(downDist>0)) return 0.5;

              // Zero-drift closed form
              if(Math.abs(mu) < 1e-12){
                return clamp(downDist/(upDist+downDist), 0, 1);
              }

              // Shift boundaries to [0, up+down], start at x=down
              // P(hit upper before lower)
              const num = 1 - Math.exp((-2*mu*downDist)/varStep);
              const den = 1 - Math.exp((-2*mu*(upDist+downDist))/varStep);

              if(Math.abs(den) < 1e-12){
                return mu>0 ? 0.999 : 0.001;
              }
              return clamp(num/den, 0.001, 0.999);
            }

            function bootstrapHitProb(sideReturns, tpPct, slPct, steps=60, N=180, block=4){
              if(!Array.isArray(sideReturns) || sideReturns.length<8) return 0.5;
              const up = Math.log(1+tpPct);
              const dn = Math.abs(Math.log(1-slPct));
              let wins=0;

              const bootPath=()=>{
                const out=[];
                while(out.length<steps){
                  const start=Math.floor(Math.random()*Math.max(1, sideReturns.length-block));
                  for(let i=0;i<block && out.length<steps;i++){
                    out.push(sideReturns[start+i] || 0);
                  }
                }
                return out;
              };

              for(let n=0;n<N;n++){
                let x=0;
                const path=bootPath();
                let done=false;
                for(const r of path){
                  x += r;
                  if(x >= up){ wins++; done=true; break; }
                  if(x <= -dn){ done=true; break; }
                }
                if(!done){
                  if(x>0) wins += 1;
                }
              }
              return clamp(wins/N, 0.001, 0.999);
            }

            function estimateSideProbability({
              side,
              returns1m,
              atrPct,
              tpAtrMult,
              slAtrMult,
              spreadBps,
              costBps
            }){
              const tpPctRaw = atrPct * tpAtrMult;
              const slPctRaw = atrPct * slAtrMult;

              // Hard clamps for sanity
              const tpPct = clamp(tpPctRaw, 0.0010, 0.0900); // 0.10% .. 9.00%
              const slPct = clamp(slPctRaw, 0.0008, 0.0700); // 0.08% .. 7.00%

              const tp_bps = Math.round(tpPct * 10000);
              const sl_bps = Math.round(slPct * 10000);

              const sideReturns = side==="long"
                ? returns1m.slice()
                : returns1m.map(r=>-r);

              const muRaw = mean(sideReturns);
              const sigmaRaw = std(sideReturns) || 1e-4;

              // Slight shrinkage to avoid unrealistically large drift from tiny samples
              const snr = Math.abs(muRaw)/(sigmaRaw||1e-9);
              const shrink = clamp(snr*8, 0.25, 1.0);
              const mu = muRaw * shrink;
              const sigma = sigmaRaw;

              const up = Math.log(1+tpPct);
              const dn = Math.abs(Math.log(1-slPct));

              const pAnalytic = firstPassageProb(mu, sigma, up, dn);
              const pBoot     = bootstrapHitProb(sideReturns, tpPct, slPct, 60, 180, 4);

              // Final blended probability
              let pFinal = clamp(0.72*pAnalytic + 0.28*pBoot, 0.001, 0.999);

              // Small spread execution penalty only on confidence, not on the raw math
              const spreadPenalty = clamp(1 - Math.max(0, spreadBps-2)/30, 0.84, 1.00);
              pFinal = clamp(0.5 + (pFinal-0.5)*spreadPenalty, 0.001, 0.999);

              const ev_bps = Math.round(pFinal*tp_bps - (1-pFinal)*sl_bps - costBps);

              return {
                side,
                p_analytic: pAnalytic,
                p_boot: pBoot,
                p_final: pFinal,
                p_lcb: wilsonLCB(pFinal, 180, 1.34),
                mu,
                sigma,
                tpPct,
                slPct,
                tp_bps,
                sl_bps,
                ev_bps
              };
            }

            // ============================================================
            // FALLBACK LOGIC (exactly per your requested rule)
            // - use last 1h trend from 1m candles
            // - if price is at extreme peak/bottom and NOT in resistance/support part
            //   => reverse direction
            // - else => trend direction
            // ============================================================
            function detectFallbackDecision(klines1m, longModel, shortModel){
              if(!Array.isArray(klines1m) || klines1m.length < 30) return null;

              const O = klines1m.map(k=>+k[1]);
              const H = klines1m.map(k=>+k[2]);
              const L = klines1m.map(k=>+k[3]);
              const C = klines1m.map(k=>+k[4]);

              const current = C.at(-1);
              const hh = Math.max(...H);
              const ll = Math.min(...L);
              const range = Math.max(1e-12, hh-ll);
              const pos = (current-ll)/range; // 0 = bottom, 1 = top

              const slopePct = slopePctLinearRegression(C);
              const ret1m = [];
              for(let i=1;i<C.length;i++) ret1m.push(Math.log(C[i]/C[i-1]));
              const drift = mean(ret1m);

              let green=0;
              for(let i=0;i<O.length;i++) if(C[i]>O[i]) green++;
              const greenFrac = O.length ? green/O.length : 0.5;

              const trendSide = (slopePct>0 || drift>0 || greenFrac>=0.5) ? "long" : "short";

              const topExtreme = pos >= 0.90;
              const botExtreme = pos <= 0.10;
              const inExtreme = topExtreme || botExtreme;

              const tolPct = 0.0015; // 0.15%
              const touchTol = current * tolPct;

              let touches = 0;
              if(topExtreme){
                for(const x of H){
                  if(Math.abs(x-current) <= touchTol) touches++;
                }
              } else if(botExtreme){
                for(const x of L){
                  if(Math.abs(x-current) <= touchTol) touches++;
                }
              }

              const hasCluster = touches >= 3;
              const reverse = (s)=>s==="long" ? "short" : "long";

              let chosenSide = trendSide;
              let rule = "midrange_trend";

              if(inExtreme){
                if(!hasCluster){
                  // Your requested fallback rule:
                  // extreme + no resistance/support cluster => reverse
                  chosenSide = reverse(trendSide);
                  rule = topExtreme
                    ? "top_extreme_without_resistance_reverse"
                    : "bottom_extreme_without_support_reverse";
                } else {
                  // else => trend direction
                  chosenSide = trendSide;
                  rule = topExtreme
                    ? "top_extreme_with_resistance_trend"
                    : "bottom_extreme_with_support_trend";
                }
              }

              const wickNoise = computeWickNoise(klines1m.slice(-60));
              const trendStrength =
                Math.abs(slopePct)*25 +
                Math.abs(greenFrac-0.5)*2 +
                Math.abs(drift)*5000;

              const chosenModel = chosenSide==="long" ? longModel : shortModel;
              const fallbackScore =
                (chosenModel?.p_final || 0.5) *
                clamp(1.20 - wickNoise, 0.35, 1.10) *
                clamp(1 + trendStrength, 0.80, 2.20);

              return {
                side: chosenSide,
                rule,
                trend_side: trendSide,
                slope_pct: slopePct,
                drift,
                green_frac: greenFrac,
                range_pos: pos,
                top_extreme: topExtreme,
                bottom_extreme: botExtreme,
                cluster_touches: touches,
                has_cluster: hasCluster,
                wick_noise: wickNoise,
                fallback_score: fallbackScore
              };
            }

            // ============================================================
            // MICROSTRUCTURE
            // ============================================================
            const computeOBI=(depth, topN=12)=>{
              if(!depth?.asks?.length || !depth?.bids?.length) return 0;
              const w=(i)=>Math.exp(-i*0.18);
              let bidNot=0, askNot=0;
              for(let i=0;i<Math.min(topN, depth.bids.length); i++){
                const p=+depth.bids[i][0], q=+depth.bids[i][1];
                if(p>0&&q>0) bidNot += p*q*w(i);
              }
              for(let i=0;i<Math.min(topN, depth.asks.length); i++){
                const p=+depth.asks[i][0], q=+depth.asks[i][1];
                if(p>0&&q>0) askNot += p*q*w(i);
              }
              return (bidNot+askNot>0) ? (bidNot-askNot)/(bidNot+askNot) : 0;
            };

            const vwapFillLevels=(levels,targetUSD)=>{
              let remain=targetUSD, val=0, qty=0;
              for(const [ps,qs] of levels){
                const p=+ps, q=+qs;
                if(!(p>0&&q>0)) continue;
                const can=p*q;
                const take=Math.min(remain,can);
                const tq=take/p;
                val+=p*tq;
                qty+=tq;
                remain-=take;
                if(remain<=1e-6) break;
              }
              return { px: qty>0 ? val/qty : null, filledUSD: (targetUSD-remain) };
            };

            const slipFromDepth=(depth,mid,side,notionalUSD)=>{
              if(!depth?.asks?.length || !depth?.bids?.length || !(mid>0)) return { slip_bps:null, fill_prob:null };
              if(side==="long"){
                const buy=vwapFillLevels(depth.asks, Math.max(50,notionalUSD));
                const slip=buy.px ? Math.max(0, Math.round((buy.px-mid)/mid*10000)) : null;
                const fill=Math.min(1, (buy.filledUSD||0)/Math.max(1,notionalUSD));
                return { slip_bps: slip, fill_prob: +fill.toFixed(4) };
              } else {
                const sell=vwapFillLevels(depth.bids, Math.max(50,notionalUSD));
                const slip=sell.px ? Math.max(0, Math.round((mid-sell.px)/mid*10000)) : null;
                const fill=Math.min(1, (sell.filledUSD||0)/Math.max(1,notionalUSD));
                return { slip_bps: slip, fill_prob: +fill.toFixed(4) };
              }
            };

            const depthWithinPctUSD=(depth, mid, pct=0.01)=>{
              if(!depth?.asks?.length || !depth?.bids?.length || !(mid>0)) return { bidsUSD:0, asksUSD:0 };
              const askLim=mid*(1+pct), bidLim=mid*(1-pct);
              let asksUSD=0, bidsUSD=0;
              for(const [ps,qs] of depth.asks){
                const p=+ps, q=+qs;
                if(!(p>0&&q>0)) continue;
                if(p<=askLim) asksUSD += p*q; else break;
              }
              for(const [ps,qs] of depth.bids){
                const p=+ps, q=+qs;
                if(!(p>0&&q>0)) continue;
                if(p>=bidLim) bidsUSD += p*q; else break;
              }
              return { bidsUSD, asksUSD };
            };

            function buildReasons(ctx){
              const out=[];
              if((ctx.p_hit||0)>=0.51) out.push({factor:"P_hit", value:`${(ctx.p_hit*100).toFixed(2)}%`, contribution:+((ctx.p_hit-0.5)*100).toFixed(1)});
              if((ctx.atr_pct||0)>0) out.push({factor:"ATR", value:`${(ctx.atr_pct*100).toFixed(2)}%`, contribution:+Math.min(20, ctx.atr_pct*700).toFixed(1)});
              if((ctx.vol_1h_usd||0)>=5000000) out.push({factor:"Vol_1h", value:Math.round(ctx.vol_1h_usd/1e6)+"M", contribution:+Math.min(10, ctx.vol_1h_usd/1e7).toFixed(1)});
              if((ctx.oi_delta_pct||0)>=4) out.push({factor:"OI_delta", value:`${ctx.oi_delta_pct.toFixed(1)}%`, contribution:+Math.min(10, ctx.oi_delta_pct).toFixed(1)});
              if((ctx.spread_bps||999)<=6) out.push({factor:"Spread", value:`${ctx.spread_bps}bps`, contribution:+Math.max(1, 8-ctx.spread_bps).toFixed(1)});
              return out.slice(0,5);
            }

            // ============================================================
            // HTTP + CACHE
            // ============================================================
            async function fetchWithTimeout(url,opts={},ms=12000){
              const ac=new AbortController();
              const t=setTimeout(()=>ac.abort(),ms);
              try{
                return await fetch(url,{
                  ...opts,
                  signal:ac.signal,
                  headers:{"User-Agent":UA,...(opts?.headers||{})}
                });
              } finally {
                clearTimeout(t);
              }
            }

            async function getJSON(url,ms=12000,tries=2){
              for(let a=0;a<tries;a++){
                try{
                  const r=await fetchWithTimeout(url,{},ms);
                  if(r?.ok) return await r.json();
                }catch{}
                await sleep(jitter(220));
              }
              return null;
            }

            const cache={ bybit:new Map() };
            const TTL={ bybit:30_000 };
            const getCached=(map,key,ttl)=>{
              const e=map.get(key);
              return e && (Date.now()-e.ts<ttl) ? e.v : null;
            };
            const setCached=(map,key,v)=>map.set(key,{ v, ts:Date.now() });

            // ============================================================
            // CONFIG
            // ============================================================
            const TARGET_EXCHANGE = "bybit_linear";
            const MARKET_TYPE     = "linear";
            const MARGIN_MODE     = "isolated";
            const LEVERAGE        = 1;

            const BYBIT_API = process.env.BYBIT_BASE || "https://api.bybit.com";
            const EXCHANGE=(process.env.EXCHANGE||"bybit").toLowerCase();

            const TOP_N = Math.max(1, Number(process.env.TOP_N||"3") || 3);
            const MIN_QV_ENV = Number(process.env.MIN_QV_USD || "5000000") || 5000000;
            const MAX_SPREAD_BPS = Number(process.env.MAX_SPREAD_BPS || "12");
            const COST_BPS = Number(process.env.FEES_BPS || "10");
            const NOTIONAL = Number(process.env.NOTIONAL_USD || "300");
            const DEPTH_LIMIT = Number(process.env.BYBIT_DEPTH_LIMIT || "25");
            const OBI_TOPN = Number(process.env.OBI_TOPN || "12");
            const MAX_1M_FLUCTUATION_PCT = Number(process.env.MAX_1M_FLUCTUATION_PCT || "1.2");

            const TP_ATR_MULT = Number(process.env.TP_ATR_MULT || "1.20");
            const SL_ATR_MULT = Number(process.env.SL_ATR_MULT || "0.80");

            const STRATEGY_NAME=(process.env.STRATEGY_NAME||"bybit-hybrid-probability");
            const SCHEMA_VERSION=(process.env.SCHEMA_VERSION||"1");
            const GIT_SHA=(process.env.GIT_SHA||"unknown");

            const S_H=process.env.ACTIVE_UTC_START?Number(process.env.ACTIVE_UTC_START):null;
            const E_H=process.env.ACTIVE_UTC_END?Number(process.env.ACTIVE_UTC_END):null;
            const nowH=new Date().getUTCHours();
            const todOK=(S_H==null||E_H==null)
              ? true
              : (S_H<=E_H ? (nowH>=S_H&&nowH<=E_H) : (nowH>=S_H||nowH<=E_H));

            const COOLDOWN_MS = 3*60*60*1000;
            const TTL_MIN=540, TTL_MAX=7200;
            const TARGET_PORT_RISK_BPS=52;

            const DEEP_SCAN_LIMIT = 50;
            const LIGHT_BATCH = 12;
            const DEEP_BATCH  = 5;

            const CONFIG_HASH = hashObj({
              TOP_N,
              MIN_QV_ENV,
              MAX_SPREAD_BPS,
              COST_BPS,
              NOTIONAL,
              DEPTH_LIMIT,
              OBI_TOPN,
              MAX_1M_FLUCTUATION_PCT,
              TP_ATR_MULT,
              SL_ATR_MULT,
              TARGET_EXCHANGE,
              MARKET_TYPE,
              MARGIN_MODE,
              LEVERAGE
            });

            // ============================================================
            // WORKER ENDPOINTS
            // ============================================================
            const PUSH_URL=process.env.WORKER_PUSH_URL||"";
            const PUSH_TOKEN=process.env.PUSH_TOKEN||"";
            const PUSH_URL_V2=process.env.WORKER_PUSH_URL_V2||"";
            const HEALTH_URL=(()=>{
              try{
                const u=new URL(PUSH_URL);
                return `${u.origin}${u.pathname.replace(/\/signals\/push(\?.*)?$/,"/health")}`;
              }catch{
                return PUSH_URL.replace(/\/signals\/push(\?.*)?$/,"/health");
              }
            })();

            log("health GET", HEALTH_URL);
            try{
              const r=await fetchWithTimeout(HEALTH_URL,{
                headers:{ "Authorization":`Bearer ${PUSH_TOKEN}`,"User-Agent":UA }
              },5000);
              let t="";
              try{ t=await r.text(); }catch{}
              log("health status", r?.status||"ERR", (t||"").slice(0,160));
            }catch(e){
              log("health error", e?.message||e);
            }

            log("🔥 Pre-warming Bybit API...");
            try{
              const warmResp = await fetchWithTimeout(`${BYBIT_API}/v5/market/tickers?category=linear&symbol=BTCUSDT`, {}, 15000);
              let warmText=""; try{ warmText=await warmResp.text(); }catch{}
              log("✅ Pre-warm status:", warmResp?.status || "ERR", warmText.slice(0,120));
            }catch(e){
              log("⚠️ Pre-warm failed:", e?.message || e);
            }

            // ============================================================
            // BYBIT API HELPERS
            // ============================================================
            async function checkBybitResponse(data, context=""){
              if(!data){
                log(`[${context}] No response data`);
                return false;
              }
              if(data.retCode !== 0){
                log(`[${context}] Bybit error ${data.retCode}: ${data.retMsg}`);
                if(data.retCode === 10006) await sleep(2000);
                return false;
              }
              return true;
            }

            async function fetchBybitLinearSymbols(){
              const cacheKey="bybit_linear_symbols";
              const cached=getCached(cache.bybit, cacheKey, 300_000);
              if(cached) return cached;

              const url=`${BYBIT_API}/v5/market/instruments-info?category=linear&limit=1000`;
              for(let attempt=0; attempt<3; attempt++){
                try{
                  log(`📡 Fetching Bybit instruments (attempt ${attempt+1}/3): ${url}`);
                  const data=await getJSON(url, 25000, 2);
                  if(!await checkBybitResponse(data,"fetchBybitLinearSymbols")) continue;

                  const symbols=(data.result.list||[])
                    .filter(s=>s.contractType==="LinearPerpetual" && s.quoteCoin==="USDT" && s.status==="Trading")
                    .map(s=>({
                      symbol:s.symbol,
                      base:s.baseCoin,
                      quote:s.quoteCoin
                    }));

                  setCached(cache.bybit, cacheKey, symbols);
                  return symbols;
                }catch(e){
                  log(`fetchBybitLinearSymbols attempt ${attempt+1} failed:`, e?.message||e);
                  if(attempt<2) await sleep(2000 + attempt*1000);
                }
              }
              return [];
            }

            async function fetchBybitTicker(symbol){
              const cacheKey=`bybit_ticker_${symbol}`;
              const cached=getCached(cache.bybit, cacheKey, TTL.bybit);
              if(cached) return cached;
              try{
                const url=`${BYBIT_API}/v5/market/tickers?category=linear&symbol=${symbol}`;
                const data=await getJSON(url, 10000, 2);
                if(!await checkBybitResponse(data,"fetchBybitTicker")) return null;
                const t=data.result.list?.[0];
                if(!t) return null;
                const out={
                  symbol,
                  markPrice:+t.markPrice||0,
                  indexPrice:+t.indexPrice||0,
                  fundingRate:+t.fundingRate||0,
                  openInterestValue:+t.openInterestValue||0,
                  bid:+t.bid1Price||0,
                  ask:+t.ask1Price||0,
                  ts:Date.now()
                };
                setCached(cache.bybit, cacheKey, out);
                return out;
              }catch{
                return null;
              }
            }

            async function fetchBybitOIHist(symbol){
              const cacheKey=`bybit_oi_hist_${symbol}`;
              const cached=getCached(cache.bybit, cacheKey, TTL.bybit);
              if(cached) return cached;
              try{
                const url=`${BYBIT_API}/v5/market/open-interest?category=linear&symbol=${symbol}&intervalTime=1h&limit=3`;
                const data=await getJSON(url, 10000, 2);
                if(!await checkBybitResponse(data,"fetchBybitOIHist")) return null;
                const list=data.result.list;
                if(!Array.isArray(list) || list.length<2) return null;
                const current = +list[0]?.openInterest || 0;
                const prev1h  = +list[1]?.openInterest || 0;
                const prev2h  = list[2] ? +list[2]?.openInterest : prev1h;
                const out={ symbol, current, prev1h, prev2h, ts:Date.now() };
                setCached(cache.bybit, cacheKey, out);
                return out;
              }catch{
                return null;
              }
            }

            async function fetchBybitKlines(symbol, interval, limit){
              const cacheKey=`bybit_kl_${symbol}_${interval}_${limit}`;
              const cached=getCached(cache.bybit, cacheKey, TTL.bybit);
              if(cached) return cached;
              try{
                const url=`${BYBIT_API}/v5/market/kline?category=linear&symbol=${symbol}&interval=${interval}&limit=${limit}`;
                const data=await getJSON(url, 12000, 2);
                if(!await checkBybitResponse(data,`fetchBybitKlines:${interval}`)) return null;
                const list=data.result.list;
                if(!Array.isArray(list) || !list.length) return null;

                // Bybit newest first -> oldest first
                const normalized=list.slice().reverse().map(k=>[
                  k[0], k[1], k[2], k[3], k[4], k[5], k[6]
                ]);

                setCached(cache.bybit, cacheKey, normalized);
                return normalized;
              }catch{
                return null;
              }
            }

            async function fetchBybitOrderbook(symbol){
              const cacheKey=`bybit_depth_${symbol}`;
              const cached=getCached(cache.bybit, cacheKey, 5000);
              if(cached) return cached;
              try{
                const validLimit=[1,25,50,100,200].find(x=>x>=DEPTH_LIMIT) || 25;
                const url=`${BYBIT_API}/v5/market/orderbook?category=linear&symbol=${symbol}&limit=${validLimit}`;
                const data=await getJSON(url, 10000, 2);
                if(!await checkBybitResponse(data,"fetchBybitOrderbook")) return null;
                const r=data.result;
                if(!r?.b || !r?.a) return null;
                const out={ bids:r.b, asks:r.a, ts:r.ts||Date.now() };
                setCached(cache.bybit, cacheKey, out);
                return out;
              }catch{
                return null;
              }
            }

            async function fetchLightMetrics(symbol){
              const [ticker, oi, k1h2] = await Promise.all([
                fetchBybitTicker(symbol),
                fetchBybitOIHist(symbol),
                fetchBybitKlines(symbol, "60", 2)
              ]);
              if(!ticker || !k1h2 || k1h2.length<2) return null;

              const prevClose = +k1h2[k1h2.length-2][4] || 0;
              const curr = k1h2[k1h2.length-1];
              const currOpen = +curr[1] || 0;
              const currHigh = +curr[2] || 0;
              const currLow  = +curr[3] || 0;
              const currClose= +curr[4] || 0;
              const turnover1h = +curr[6] || 0;

              let spread_bps = 999;
              let mid = ticker.markPrice || currClose || 0;
              if(ticker.bid && ticker.ask && ticker.bid>0 && ticker.ask>0){
                mid=(ticker.bid+ticker.ask)/2;
                spread_bps=Math.round(((ticker.ask-ticker.bid)/mid)*10000);
              }

              const price_change_1h = prevClose>0 ? ((currClose-prevClose)/prevClose) : 0;
              const vol_1h_pct = Math.abs(price_change_1h)*100;
              const body_ratio = (currHigh-currLow)>0 ? Math.abs(currClose-currOpen)/(currHigh-currLow) : 0;

              let oi_delta_pct=0;
              if(oi && mid>0){
                const currentOI = oi.current*mid;
                const prev1hOI  = oi.prev1h*mid;
                const prev2hOI  = oi.prev2h*mid;
                const d1 = prev1hOI>0 ? Math.abs((currentOI-prev1hOI)/prev1hOI)*100 : 0;
                const d2 = prev2hOI>0 ? Math.abs((currentOI-prev2hOI)/prev2hOI)*100 : 0;
                oi_delta_pct=Math.max(d1,d2);
              }

              return {
                symbol,
                mark_price: mid,
                bid: ticker.bid || 0,
                ask: ticker.ask || 0,
                spread_bps,
                funding_rate_raw: ticker.fundingRate || 0,
                funding_rate: Math.abs(ticker.fundingRate || 0),
                current_oi_usd: ticker.openInterestValue || 0,
                oi_delta_pct,
                volume_1h_usd: turnover1h,
                vol_1h_pct,
                price_change_1h,
                body_ratio
              };
            }

            // ============================================================
            // STATE / GIST (kept compatible with Bybit Ultimate style)
            // ============================================================
            const TRADE_CSV_KEYS=[
              "ts_close_iso","idea_id","client_order_id","symbol","side","pnl_bps",
              "entry_ts_ms","exit_ts_ms","entry_price","exit_price","qty",
              "commission_bps","calib_key","p_raw","p_pred","regime","source"
            ];

            async function loadState(){
              const token=process.env.GIST_TOKEN, id=process.env.GIST_ID;
              const init={
                v:"bybit-hybrid-2.0",
                run_counter:0,
                cooldown:{},
                cooldown_side:{},
                pending:[],
                equity:[],
                closed:[],
                lastReconcileTs:0,
                sym_stats:{},
                sym_stats_real:{},
                calibration_holdout:[],
                learned_trade_keys:[],
                calib_symbol_counts:{},
                calibCoeffs:{},
                direction_history:[]
              };
              if(!token || !id) return { state:init, persist:null };
              try{
                const r=await fetchWithTimeout(`https://api.github.com/gists/${id}`,{
                  headers:{
                    Authorization:`Bearer ${token}`,
                    "Accept":"application/vnd.github+json",
                    "User-Agent":UA
                  }
                }, 12000);
                if(!r.ok) return { state:init, persist:null };
                const g=await r.json();
                const c=g.files?.["state.json"]?.content;
                const s=c ? JSON.parse(c) : init;

                if(!s.cooldown) s.cooldown={};
                if(!s.cooldown_side) s.cooldown_side={};
                if(!Array.isArray(s.pending)) s.pending=[];
                if(!Array.isArray(s.closed)) s.closed=[];
                if(!Array.isArray(s.equity)) s.equity=[];
                if(!s.sym_stats) s.sym_stats={};
                if(!s.sym_stats_real) s.sym_stats_real={};
                if(!Array.isArray(s.calibration_holdout)) s.calibration_holdout=[];
                if(!Array.isArray(s.learned_trade_keys)) s.learned_trade_keys=[];
                if(!s.calib_symbol_counts) s.calib_symbol_counts={};
                if(!s.calibCoeffs) s.calibCoeffs={};
                if(!Array.isArray(s.direction_history)) s.direction_history=[];
                if(!s.lastReconcileTs) s.lastReconcileTs=0;
                if(s.run_counter==null) s.run_counter=0;

                return { state:s, persist:{ id, token } };
              }catch(e){
                log("loadState warn", e?.message||e);
                return { state:init, persist:null };
              }
            }

            function mergeStates(remote, local){
              const merged={ ...remote };
              merged.run_counter=Math.max(local.run_counter||0, remote.run_counter||0);

              const idOf=(p)=>String(p?.client_order_id || p?.clientOrderId || p?.idea_id || "").trim();
              const dropSet=new Set((local.__drop_pending_cids || []).map(x=>String(x).trim()).filter(Boolean));
              const remotePending=(remote.pending||[]).filter(p=>!dropSet.has(idOf(p)));
              const remoteIds=new Set(remotePending.map(idOf));
              const newLocalPending=(local.pending||[]).filter(p=>{
                const k=idOf(p);
                return k && !remoteIds.has(k);
              });
              merged.pending=[...remotePending, ...newLocalPending];

              merged.cooldown=local.cooldown || {};
              merged.cooldown_side=local.cooldown_side || {};
              merged.closed=Array.isArray(remote.closed) ? remote.closed : [];
              merged.equity=Array.isArray(remote.equity) ? remote.equity : [];
              merged.sym_stats=remote.sym_stats || {};
              merged.sym_stats_real=remote.sym_stats_real || {};
              merged.lastReconcileTs=remote.lastReconcileTs || 0;
              merged.direction_history=Array.isArray(remote.direction_history) ? remote.direction_history : [];
              merged.version_ts=Date.now();
              return merged;
            }

            async function saveState(persist, state, auditOut, retries=2, blindFallback=true){
              if(!persist){
                log("WARN: No persist — skipping Gist save.");
                return;
              }

              const gistUrl=`https://api.github.com/gists/${persist.id}`;
              const mkFiles=(s)=>({ "state.json": { content: JSON.stringify(s) } });

              async function patch(files){
                return await fetchWithTimeout(gistUrl,{
                  method:"PATCH",
                  headers:{
                    Authorization:`Bearer ${persist.token}`,
                    "Accept":"application/vnd.github+json",
                    "Content-Type":"application/json",
                    "User-Agent":UA
                  },
                  body:JSON.stringify({ files })
                },15000);
              }

              let toSave=state;
              for(let attempt=0; attempt<=retries; attempt++){
                log("DEBUG saveState attempt", attempt, "pending=", (toSave.pending||[]).length);
                const r=await patch(mkFiles(toSave));
                if(r.ok){
                  log("SUCCESS Gist updated, status=", r.status);
                  return;
                }
                const body=(await r.text().catch(()=> ""))?.slice(0,300)||"";
                log("WARN saveState failed status=", r.status, "body=", body);

                if(r.status===429){
                  const ra=Number(r.headers.get("retry-after")||2);
                  await sleep(ra*1000);
                  continue;
                }
                if(r.status>=500){
                  await sleep(1000 + attempt*500);
                  continue;
                }
                break;
              }

              if(blindFallback){
                log("WARN falling back to merge + blind PATCH");
                try{
                  const r2=await fetchWithTimeout(gistUrl,{
                    headers:{
                      Authorization:`Bearer ${persist.token}`,
                      "Accept":"application/vnd.github+json",
                      "User-Agent":UA
                    }
                  },12000);
                  if(r2.ok){
                    const remoteGist=await r2.json();
                    const remoteContent=remoteGist.files?.["state.json"]?.content;
                    const remoteState=remoteContent ? JSON.parse(remoteContent) : {};
                    toSave=mergeStates(remoteState,state);
                  }
                }catch(e){
                  log("WARN merge fallback refetch failed:", e?.message||e);
                }

                const r3=await patch(mkFiles(toSave));
                if(r3.ok){
                  log("SUCCESS blind Gist update ok");
                }else{
                  const body=(await r3.text().catch(()=> ""))?.slice(0,300)||"";
                  log("ERROR blind save failed status=", r3.status, "body=", body);
                }
              }
            }

            function cleanExpiredCooldowns(state){
              const now=Date.now();
              if(state.cooldown){
                for(const [base, ts] of Object.entries(state.cooldown)){
                  if(now - ts >= COOLDOWN_MS) delete state.cooldown[base];
                }
              }
              if(state.cooldown_side){
                for(const [base, obj] of Object.entries(state.cooldown_side)){
                  if(now - (obj.ts_ms||0) >= COOLDOWN_MS) delete state.cooldown_side[base];
                }
              }
              log(`🧹 Cooldowns: ${Object.keys(state.cooldown||{}).length} base, ${Object.keys(state.cooldown_side||{}).length} side`);
            }

            function cleanExpiredClosedTrades(state){
              const MAX_CLOSED_TRADES=10;
              if(!Array.isArray(state.closed)){ state.closed=[]; return; }
              if(state.closed.length<=MAX_CLOSED_TRADES){
                log(`📦 Closed trades: ${state.closed.length}/${MAX_CLOSED_TRADES}`);
                return;
              }
              state.closed.sort((a,b)=>(b.ts_exit_ms||b.exit_ts_ms||0)-(a.ts_exit_ms||a.exit_ts_ms||0));
              const removed=state.closed.length-MAX_CLOSED_TRADES;
              state.closed=state.closed.slice(0,MAX_CLOSED_TRADES);
              log(`🗑️ Kept ${MAX_CLOSED_TRADES} closed trades, removed ${removed}`);
            }

            function buildAuditOutputs(state){
              const lastNClosed=(state.closed||[]).slice(-5000);
              const closedAudit=lastNClosed.map(x=>JSON.stringify(x)).join("\n");
              const rows=[];
              for(const c of lastNClosed){
                const td=c.trade_details||{};
                const row={
                  ts_close_iso:new Date(c.ts_exit_ms||Date.now()).toISOString(),
                  idea_id:td.idea_id||"",
                  client_order_id:td.client_order_id||"",
                  symbol:c.symbolFull||"",
                  side:c.side||"",
                  pnl_bps:c.pnl_bps,
                  entry_ts_ms:c.ts_entry_ms||"",
                  exit_ts_ms:c.ts_exit_ms||"",
                  entry_price:c.price_entry||"",
                  exit_price:c.price_exit||"",
                  qty:c.qty||"",
                  commission_bps:td.commission_bps!=null?td.commission_bps:"",
                  calib_key:c.calib_key||"",
                  p_raw:c.p_raw!=null?c.p_raw:"",
                  p_pred:c.p_pred!=null?c.p_pred:"",
                  regime:c.regime||"",
                  source:c.reconciliation||""
                };
                rows.push(toCSVLine(row, TRADE_CSV_KEYS));
              }
              const tradesCsv=[TRADE_CSV_KEYS.join(","),...rows].join("\n");
              return { closedAudit, disagreements:"", tradesCsv };
            }

            // ============================================================
            // MAIN
            // ============================================================
            let reason="ok";
            let selectionTier="probability_primary";

            try{
              const { state, persist } = await loadState();

              state.run_counter=(state.run_counter||0)+1;
              log(`🔄 Run ${state.run_counter}/6`);

              const SHOULD_WIPE=(state.run_counter>=6);
              if(SHOULD_WIPE){
                log("🗑️ RUN 6: WIPE GIST AND RESTART FRESH");
                await saveState(persist, { run_counter:0 }, {}, 2, true);

                state.v="bybit-hybrid-2.0";
                state.run_counter=1;
                state.cooldown={};
                state.cooldown_side={};
                state.pending=[];
                state.equity=[];
                state.closed=[];
                state.lastReconcileTs=0;
                state.sym_stats={};
                state.sym_stats_real={};
                state.calibration_holdout=[];
                state.learned_trade_keys=[];
                state.calib_symbol_counts={};
                state.calibCoeffs={};
                state.direction_history=[];
              }

              cleanExpiredCooldowns(state);
              cleanExpiredClosedTrades(state);

              // Fresh cycle style kept from prior code
              const preserved={
                v:state.v||"bybit-hybrid-2.0",
                run_counter:state.run_counter||0,
                cooldown:state.cooldown||{},
                cooldown_side:state.cooldown_side||{},
                pending:[],
                closed:state.closed||[],
                equity:state.equity||[],
                lastReconcileTs:0,
                sym_stats_real:state.sym_stats_real||{},
                sym_stats:{},
                calibration_holdout:[],
                learned_trade_keys:state.learned_trade_keys||[],
                calib_symbol_counts:state.calib_symbol_counts||{},
                calibCoeffs:state.calibCoeffs||{},
                direction_history:state.direction_history||[]
              };
              Object.assign(state,preserved);

              if(!todOK){
                reason="tod_gate";
                log("⏰ Outside active UTC window, pushing 0 ideas.");
                const payload={
                  ts:new Date().toISOString(),
                  mode:"normal",
                  source:"external_pusher",
                  meta:{ origin:"github_actions", reason, exchange:"bybit_linear" },
                  top_n:0,
                  ideas:[]
                };
                const r=await fetchWithTimeout(PUSH_URL,{
                  method:"POST",
                  headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN },
                  body:JSON.stringify(payload)
                },15000);
                let txt=""; try{ txt=await r.text(); }catch{}
                log("push status", r?.status||"ERR", (txt||"").slice(0,200));
                return;
              }

              log("════════════════════════════════════════════════════════════════════");
              log("🚀 HYBRID PROBABILITY SCANNER START");
              log(`Config: TOP_N=${TOP_N} TP_ATR_MULT=${TP_ATR_MULT} SL_ATR_MULT=${SL_ATR_MULT} MAX_SPREAD_BPS=${MAX_SPREAD_BPS}`);
              log("Probability = P(TP before SL)");
              log("Fallback rule = extreme without cluster => reverse, else => trend direction");
              log("════════════════════════════════════════════════════════════════════");

              // ----------------------------------------------------------------
              // 1) Universe
              // ----------------------------------------------------------------
              log("📡 Fetching Bybit linear universe...");
              const bybitSymbols = await fetchBybitLinearSymbols();
              if(!bybitSymbols || bybitSymbols.length===0){
                reason="no_bybit_symbols";
                throw new Error("No Bybit linear symbols found");
              }
              log(`✅ Universe size: ${bybitSymbols.length}`);

              // ----------------------------------------------------------------
              // 2) Light scan on all symbols
              // ----------------------------------------------------------------
              const eligibleSymbols = bybitSymbols.filter(sym=>{
                const lastTs=state.cooldown?.[sym.base]||0;
                return !(lastTs && (Date.now()-lastTs)<COOLDOWN_MS);
              });
              log(`📋 Eligible after cooldown filter: ${eligibleSymbols.length}/${bybitSymbols.length}`);

              const lightRows=[];
              for(let i=0;i<eligibleSymbols.length;i+=LIGHT_BATCH){
                const batch=eligibleSymbols.slice(i,i+LIGHT_BATCH);
                const batchResults=await Promise.all(batch.map(async(sym)=>{
                  try{
                    const m=await fetchLightMetrics(sym.symbol);
                    if(!m) return null;
                    return { ...sym, ...m };
                  }catch{
                    return null;
                  }
                }));
                for(const r of batchResults){
                  if(!r) continue;
                  if(!(r.mark_price>0)) continue;
                  if((r.volume_1h_usd||0) < MIN_QV_ENV) continue;

                  const spreadScore = clamp(1 - Math.max(0,(r.spread_bps||999)-2)/14, 0, 1);
                  const volScore    = clamp(Math.log10(Math.max(1,r.volume_1h_usd))/8, 0, 1.2);
                  const oiScore     = clamp((r.oi_delta_pct||0)/15, 0, 1.0);
                  const moveScore   = clamp((r.vol_1h_pct||0)/3, 0, 1.0);
                  const prelimScore = 0.35*volScore + 0.25*oiScore + 0.25*moveScore + 0.15*spreadScore;

                  lightRows.push({
                    ...r,
                    prelim_score: prelimScore
                  });
                }
                if(i+LIGHT_BATCH<eligibleSymbols.length) await sleep(250);
              }

              if(lightRows.length===0){
                reason="no_liquid_symbols";
                throw new Error("No symbols passed light scan");
              }

              lightRows.sort((a,b)=>b.prelim_score-a.prelim_score);
              log("📊 Top 20 after light scan:");
              lightRows.slice(0,20).forEach((x,i)=>{
                log(
                  `   ${String(i+1).padStart(2)}. ${x.symbol.padEnd(12)} prelim=${x.prelim_score.toFixed(3)} ` +
                  `vol1h=$${Math.round(x.volume_1h_usd/1e6)}M spread=${x.spread_bps}bps move=${x.vol_1h_pct.toFixed(2)}% oiΔ=${x.oi_delta_pct.toFixed(1)}%`
                );
              });

              const deepUniverse = lightRows.slice(0, DEEP_SCAN_LIMIT);
              log(`🔎 Deep scan universe: ${deepUniverse.length} symbols`);

              // ----------------------------------------------------------------
              // 3) Deep scan with ATR + probability math
              // ----------------------------------------------------------------
              const primaryQualified=[];
              const fallbackUniverse=[];

              log("════════ PRIMARY SCAN: PER-SYMBOL PROBABILITY (TP before SL) ════════");

              for(let i=0;i<deepUniverse.length;i+=DEEP_BATCH){
                const batch=deepUniverse.slice(i,i+DEEP_BATCH);

                const batchResults = await Promise.all(batch.map(async(cand)=>{
                  try{
                    const [k1m, k1h, depth] = await Promise.all([
                      fetchBybitKlines(cand.symbol, "1", 120),
                      fetchBybitKlines(cand.symbol, "60", 40),
                      fetchBybitOrderbook(cand.symbol)
                    ]);

                    if(!k1m || !k1h || !depth) return null;
                    if(k1m.length<60 || k1h.length<20) return null;

                    const atrInfo = computeATRFromKlines(k1h, 14);
                    if(!atrInfo || !(atrInfo.atr_pct>0)) return null;

                    const returns1m = logReturnsFromKlines(k1m);
                    if(returns1m.length<50) return null;

                    const bid = cand.bid || +depth.bids?.[0]?.[0] || 0;
                    const ask = cand.ask || +depth.asks?.[0]?.[0] || 0;
                    const mid = (bid>0 && ask>0) ? (bid+ask)/2 : cand.mark_price;
                    const spreadBps = (bid>0 && ask>0 && mid>0)
                      ? Math.round(((ask-bid)/mid)*10000)
                      : (cand.spread_bps || 999);

                    const depth1p = depthWithinPctUSD(depth, mid, 0.01);
                    const sideSlipL = slipFromDepth(depth, mid, "long", NOTIONAL);
                    const sideSlipS = slipFromDepth(depth, mid, "short", NOTIONAL);
                    const slipL = sideSlipL?.slip_bps ?? Math.round(spreadBps/2);
                    const slipS = sideSlipS?.slip_bps ?? Math.round(spreadBps/2);
                    const costLong = COST_BPS + slipL;
                    const costShort= COST_BPS + slipS;
                    const obi = computeOBI(depth, OBI_TOPN);

                    const recentStable = checkRecentStability(k1m.slice(-5), MAX_1M_FLUCTUATION_PCT);

                    const longModel = estimateSideProbability({
                      side:"long",
                      returns1m,
                      atrPct:atrInfo.atr_pct,
                      tpAtrMult:TP_ATR_MULT,
                      slAtrMult:SL_ATR_MULT,
                      spreadBps,
                      costBps:costLong
                    });

                    const shortModel = estimateSideProbability({
                      side:"short",
                      returns1m,
                      atrPct:atrInfo.atr_pct,
                      tpAtrMult:TP_ATR_MULT,
                      slAtrMult:SL_ATR_MULT,
                      spreadBps,
                      costBps:costShort
                    });

                    const best = longModel.p_final >= shortModel.p_final ? longModel : shortModel;
                    const qualified =
                      best.p_final >= 0.51 &&
                      best.ev_bps > 0 &&
                      spreadBps <= MAX_SPREAD_BPS &&
                      recentStable;

                    const reasons = buildReasons({
                      p_hit:best.p_final,
                      atr_pct:atrInfo.atr_pct,
                      vol_1h_usd:cand.volume_1h_usd,
                      oi_delta_pct:cand.oi_delta_pct,
                      spread_bps:spreadBps
                    });

                    return {
                      symbol:cand.symbol,
                      base:cand.base,
                      quote:cand.quote,
                      mark_price:mid,
                      spread_bps:spreadBps,
                      depth1p_usd:(depth1p.bidsUSD||0)+(depth1p.asksUSD||0),
                      obi,
                      recent_stable:recentStable,
                      volume_1h_usd:cand.volume_1h_usd,
                      vol_1h_pct:cand.vol_1h_pct,
                      price_change_1h:cand.price_change_1h,
                      funding_rate:cand.funding_rate,
                      funding_rate_raw:cand.funding_rate_raw,
                      oi_delta_pct:cand.oi_delta_pct,
                      current_oi_usd:cand.current_oi_usd,
                      atr_pct:atrInfo.atr_pct,
                      atr_abs:atrInfo.atr,
                      longModel,
                      shortModel,
                      best,
                      qualified,
                      reasons,
                      k1m,
                      k1h
                    };
                  }catch(e){
                    log(`deep scan error ${cand.symbol}:`, e?.message||e);
                    return null;
                  }
                }));

                for(const row of batchResults){
                  if(!row) continue;

                  log(
                    `• ${row.symbol.padEnd(12)} ` +
                    `ATR=${(row.atr_pct*100).toFixed(2)}% ` +
                    `TP=${(row.best.tpPct*100).toFixed(2)}% ` +
                    `SL=${(row.best.slPct*100).toFixed(2)}% ` +
                    `| LONG A/B/F=${(row.longModel.p_analytic*100).toFixed(1)}/${(row.longModel.p_boot*100).toFixed(1)}/${(row.longModel.p_final*100).toFixed(1)} ` +
                    `| SHORT A/B/F=${(row.shortModel.p_analytic*100).toFixed(1)}/${(row.shortModel.p_boot*100).toFixed(1)}/${(row.shortModel.p_final*100).toFixed(1)} ` +
                    `| BEST=${row.best.side.toUpperCase()} ${(row.best.p_final*100).toFixed(2)}% ` +
                    `EV=${row.best.ev_bps}bps spread=${row.spread_bps}bps stable=${row.recent_stable?"Y":"N"} qualified=${row.qualified?"Y":"N"}`
                  );

                  fallbackUniverse.push(row);
                  if(row.qualified) primaryQualified.push(row);
                }

                if(i+DEEP_BATCH<deepUniverse.length){
                  log(`... deep scan progress ${Math.min(i+DEEP_BATCH, deepUniverse.length)}/${deepUniverse.length}`);
                  await sleep(300);
                }
              }

              // ----------------------------------------------------------------
              // 4) Primary selection: show 99% down to 51%
              // ----------------------------------------------------------------
              primaryQualified.sort((a,b)=>{
                if(b.best.p_final !== a.best.p_final) return b.best.p_final - a.best.p_final;
                return b.best.ev_bps - a.best.ev_bps;
              });

              log("════════ PRIMARY QUALIFIED LIST (99% → 51%) ════════");
              if(primaryQualified.length===0){
                log("No symbol reached the primary threshold: P(TP before SL) >= 51%");
              } else {
                primaryQualified.forEach((x,i)=>{
                  log(
                    `   ${String(i+1).padStart(2)}. ${x.symbol.padEnd(12)} ` +
                    `${x.best.side.toUpperCase().padEnd(5)} ` +
                    `P_hit=${(x.best.p_final*100).toFixed(2)}% ` +
                    `LCB=${(x.best.p_lcb*100).toFixed(2)}% ` +
                    `TP=${x.best.tp_bps}bps ` +
                    `SL=${x.best.sl_bps}bps ` +
                    `EV=${x.best.ev_bps}bps`
                  );
                });
              }

              // ----------------------------------------------------------------
              // 5) Primary picks or fallback
              // ----------------------------------------------------------------
              let selectedRaw=[];
              let modeUsed="primary";
              if(primaryQualified.length>0){
                selectionTier="probability_primary";
                for(const cand of primaryQualified){
                  if(selectedRaw.length>=TOP_N) break;
                  if(selectedRaw.some(s=>s.base===cand.base)) continue;

                  selectedRaw.push({
                    mode:"primary",
                    symbol:cand.symbol,
                    base:cand.base,
                    quote:cand.quote,
                    side:cand.best.side,
                    p_hit:cand.best.p_final,
                    p_lcb:cand.best.p_lcb,
                    p_analytic:cand.best.p_analytic,
                    p_boot:cand.best.p_boot,
                    ev_bps:cand.best.ev_bps,
                    tp_bps:cand.best.tp_bps,
                    sl_bps:cand.best.sl_bps,
                    tp_pct:cand.best.tpPct,
                    sl_pct:cand.best.slPct,
                    atr_pct:cand.atr_pct,
                    cost_bps:cand.best.side==="long" ? (COST_BPS + (slipFromDepth(await fetchBybitOrderbook(cand.symbol), cand.mark_price, "long", NOTIONAL)?.slip_bps ?? Math.round(cand.spread_bps/2))) : (COST_BPS + (slipFromDepth(await fetchBybitOrderbook(cand.symbol), cand.mark_price, "short", NOTIONAL)?.slip_bps ?? Math.round(cand.spread_bps/2))),
                    mark_price:cand.mark_price,
                    spread_bps:cand.spread_bps,
                    obi:cand.obi,
                    depth1p_usd:cand.depth1p_usd,
                    volume_1h_usd:cand.volume_1h_usd,
                    vol_1h_pct:cand.vol_1h_pct,
                    funding_rate:cand.funding_rate,
                    funding_rate_raw:cand.funding_rate_raw,
                    oi_delta_pct:cand.oi_delta_pct,
                    current_oi_usd:cand.current_oi_usd,
                    reason_text:`Primary probability ${(cand.best.p_final*100).toFixed(2)}%`,
                    reasons:cand.reasons,
                    hold_sec:3600
                  });
                }
              } else {
                selectionTier="fallback_1h_rule";
                modeUsed="fallback";
                reason="fallback_no_primary_candidates";

                log("════════ FALLBACK SCAN START ════════");
                const fallbackRows=[];

                for(const cand of fallbackUniverse){
                  const fb = detectFallbackDecision(cand.k1m.slice(-60), cand.longModel, cand.shortModel);
                  if(!fb) continue;

                  const chosenModel = fb.side==="long" ? cand.longModel : cand.shortModel;
                  const reasons = buildReasons({
                    p_hit:chosenModel.p_final,
                    atr_pct:cand.atr_pct,
                    vol_1h_usd:cand.volume_1h_usd,
                    oi_delta_pct:cand.oi_delta_pct,
                    spread_bps:cand.spread_bps
                  });

                  log(
                    `↪ ${cand.symbol.padEnd(12)} ` +
                    `trend=${fb.trend_side.toUpperCase()} ` +
                    `rule=${fb.rule} ` +
                    `pos=${(fb.range_pos*100).toFixed(1)}% ` +
                    `touches=${fb.cluster_touches} ` +
                    `noise=${fb.wick_noise.toFixed(2)} ` +
                    `chosen=${fb.side.toUpperCase()} ` +
                    `P_hit=${(chosenModel.p_final*100).toFixed(2)}% ` +
                    `fallbackScore=${fb.fallback_score.toFixed(3)}`
                  );

                  fallbackRows.push({
                    mode:"fallback",
                    symbol:cand.symbol,
                    base:cand.base,
                    quote:cand.quote,
                    side:fb.side,
                    p_hit:chosenModel.p_final,
                    p_lcb:chosenModel.p_lcb,
                    p_analytic:chosenModel.p_analytic,
                    p_boot:chosenModel.p_boot,
                    ev_bps:chosenModel.ev_bps,
                    tp_bps:chosenModel.tp_bps,
                    sl_bps:chosenModel.sl_bps,
                    tp_pct:chosenModel.tpPct,
                    sl_pct:chosenModel.slPct,
                    atr_pct:cand.atr_pct,
                    cost_bps:fb.side==="long" ? (COST_BPS + Math.round(cand.spread_bps/2)) : (COST_BPS + Math.round(cand.spread_bps/2)),
                    mark_price:cand.mark_price,
                    spread_bps:cand.spread_bps,
                    obi:cand.obi,
                    depth1p_usd:cand.depth1p_usd,
                    volume_1h_usd:cand.volume_1h_usd,
                    vol_1h_pct:cand.vol_1h_pct,
                    funding_rate:cand.funding_rate,
                    funding_rate_raw:cand.funding_rate_raw,
                    oi_delta_pct:cand.oi_delta_pct,
                    current_oi_usd:cand.current_oi_usd,
                    fallback:fb,
                    reason_text:`Fallback ${fb.rule}`,
                    reasons,
                    hold_sec:3600
                  });
                }

                fallbackRows.sort((a,b)=>{
                  const as = (a.fallback?.fallback_score||0);
                  const bs = (b.fallback?.fallback_score||0);
                  if(bs!==as) return bs-as;
                  return (b.p_hit||0) - (a.p_hit||0);
                });

                log("════════ FALLBACK RANKED LIST ════════");
                fallbackRows.forEach((x,i)=>{
                  log(
                    `   ${String(i+1).padStart(2)}. ${x.symbol.padEnd(12)} ${x.side.toUpperCase().padEnd(5)} ` +
                    `score=${(x.fallback?.fallback_score||0).toFixed(3)} ` +
                    `P_hit=${(x.p_hit*100).toFixed(2)}% ` +
                    `rule=${x.fallback?.rule}`
                  );
                });

                for(const cand of fallbackRows){
                  if(selectedRaw.length>=TOP_N) break;
                  if(selectedRaw.some(s=>s.base===cand.base)) continue;
                  if(cand.spread_bps > MAX_SPREAD_BPS) continue;
                  selectedRaw.push(cand);
                }
              }

              log("════════ FINAL SELECTION ════════");
              if(selectedRaw.length===0){
                log("No final ideas selected.");
              } else {
                selectedRaw.forEach((x,i)=>{
                  log(
                    `   PICK ${i+1}: ${x.symbol} ${x.side.toUpperCase()} ` +
                    `P_hit=${(x.p_hit*100).toFixed(2)}% ` +
                    `TP=${(x.tp_pct*100).toFixed(2)}% ` +
                    `SL=${(x.sl_pct*100).toFixed(2)}% ` +
                    `mode=${x.mode}`
                  );
                });
              }

              // ----------------------------------------------------------------
              // 6) Convert to ideas
              // ----------------------------------------------------------------
              const weights = softmax(selectedRaw.map(x=>Math.max(1,x.ev_bps)), 20);

              const picksV2 = selectedRaw.map((x,i)=>{
                const mid = x.mark_price;
                const tpF = x.tp_bps/10000;
                const slF = x.sl_bps/10000;

                let entry_limit=null, tp_abs=null, sl_abs=null;
                if(mid!=null){
                  if(x.side==="long"){
                    entry_limit = mid * (1 - Math.min(0.0025, slF*0.25));
                    tp_abs = entry_limit * (1 + tpF);
                    sl_abs = entry_limit * (1 - slF);
                  } else {
                    entry_limit = mid * (1 + Math.min(0.0025, slF*0.25));
                    tp_abs = entry_limit * (1 - tpF);
                    sl_abs = entry_limit * (1 + slF);
                  }
                }

                const idea_id = uuidv4();
                const client_order_id = mkClientOrderId("byh");
                const ttl = clamp(Math.round((x.hold_sec||3600) + i*12), TTL_MIN, TTL_MAX);
                const size_bps = (Number(process.env.FORCE_SIZE_BPS||"0")>0)
                  ? Math.round(Number(process.env.FORCE_SIZE_BPS))
                  : (x.sl_bps>0 ? Math.min(220, Math.round((weights[i]*TARGET_PORT_RISK_BPS/x.sl_bps)*100)) : 0);

                return {
                  idea_id,
                  client_order_id,
                  symbol:x.base,
                  symbol_full:x.symbol,
                  symbolFull:x.symbol,
                  quote:x.quote,
                  side:x.side,
                  rank:i+1,

                  target_exchange:TARGET_EXCHANGE,
                  market_type:MARKET_TYPE,
                  margin_mode:MARGIN_MODE,
                  leverage:LEVERAGE,

                  entry_policy:"maker_join",
                  exec:{ exec:"post_only" },

                  entry_mid:mid,
                  entry_limit,
                  tp_abs,
                  sl_abs,

                  tp_bps:x.tp_bps,
                  sl_bps:x.sl_bps,
                  rrr:+(x.tp_bps/Math.max(1,x.sl_bps)).toFixed(2),
                  exp_lcb_bps:x.ev_bps,
                  ev_bps:x.ev_bps,
                  cost_bps:x.cost_bps,

                  p_win:x.p_hit,
                  p_lcb:x.p_lcb,
                  p_raw:x.p_hit,

                  calib_key:`side:${x.side}|regime:${x.mode}`,
                  regime:x.mode,
                  ttl_sec:ttl,
                  size_bps,

                  predicted:{
                    ts_ms:Date.now(),
                    p_cal:x.p_hit,
                    p_analytic:x.p_analytic,
                    p_boot:x.p_boot,
                    p_hit:x.p_hit,
                    ev_bps:x.ev_bps,
                    confidence_score:Math.round(x.p_hit*100),
                    mode_used:x.mode,
                    tp_pct:x.tp_pct,
                    sl_pct:x.sl_pct,
                    atr_pct:x.atr_pct,
                    vol_1h_pct:x.vol_1h_pct,
                    funding_rate:x.funding_rate,
                    oi_delta_pct:x.oi_delta_pct,
                    volume_1h_usd:x.volume_1h_usd,
                    depth1p_usd:x.depth1p_usd,
                    spread_bps:x.spread_bps,
                    obi:x.obi,
                    fallback_rule:x.fallback?.rule || null,
                    fallback_meta:x.fallback || null
                  },

                  confidence:Math.round(x.p_hit*100),
                  reasons:x.reasons,
                  reasons_text:[
                    `P_hit:${(x.p_hit*100).toFixed(2)}%`,
                    `TP:${(x.tp_pct*100).toFixed(2)}%`,
                    `SL:${(x.sl_pct*100).toFixed(2)}%`,
                    x.mode==="fallback" ? `FB:${x.fallback?.rule}` : "Primary"
                  ],

                  hedge_metrics:{
                    vol_1h_pct:x.vol_1h_pct,
                    funding_rate_raw:x.funding_rate_raw,
                    oi_delta_pct:x.oi_delta_pct,
                    volume_1h_usd:x.volume_1h_usd,
                    mark_price:x.mark_price,
                    current_oi_usd:x.current_oi_usd,
                    spread_bps:x.spread_bps,
                    depth1p_usd:x.depth1p_usd,
                    obi:x.obi
                  }
                };
              });

              const toV1Compat=(pv2)=>({
                idea_id:pv2.idea_id,
                client_order_id:pv2.client_order_id,
                symbol:pv2.symbol,
                symbol_full:pv2.symbol_full,
                quote:pv2.quote,
                side:pv2.side,
                rank:pv2.rank,

                entry_policy:"smart_swing_limit",
                entry_type:"limit",
                activation:"on_fill",

                entry_mid:pv2.entry_mid,
                entry_limit:pv2.entry_limit,
                tp_abs:pv2.tp_abs,
                sl_abs:pv2.sl_abs,

                tp_bps:pv2.tp_bps,
                sl_bps:pv2.sl_bps,
                rrr:pv2.rrr,
                exp_lcb_bps:pv2.exp_lcb_bps,
                ev_bps:pv2.ev_bps,
                cost_bps:pv2.cost_bps,

                p_win:pv2.p_lcb,
                p_lcb:pv2.p_lcb,
                p_raw:pv2.p_raw,

                calib_key:pv2.calib_key,
                regime:pv2.regime,
                ttl_sec:pv2.ttl_sec,
                size_bps:pv2.size_bps,

                predicted:{
                  ...pv2.predicted,
                  meta:{
                    strategy:STRATEGY_NAME,
                    model_version:MODEL_VERSION,
                    schema_version:SCHEMA_VERSION,
                    git_sha:GIT_SHA,
                    config_hash:CONFIG_HASH,
                    futures_hint:{
                      target_exchange:pv2.target_exchange,
                      market_type:pv2.market_type,
                      margin_mode:pv2.margin_mode,
                      leverage:pv2.leverage,
                      entry_policy_override:pv2.entry_policy,
                      exec:pv2.exec
                    }
                  }
                },

                confidence:pv2.confidence,
                reasons:pv2.reasons,
                reasons_text:pv2.reasons_text,
                hedge_metrics:pv2.hedge_metrics
              });

              let picks = picksV2.map(toV1Compat);

              // ----------------------------------------------------------------
              // 7) Persist plans to state
              // ----------------------------------------------------------------
              try{
                const nowMs=Date.now();
                const ideasTs=new Date(nowMs).toISOString();

                for(const p of picks){
                  state.cooldown[p.symbol]=nowMs;
                  state.cooldown_side[p.symbol]={ side:p.side, ts_ms:nowMs };
                  state.pending.push({
                    ts:ideasTs,
                    ts_ms:nowMs,
                    ttl_ts_ms:nowMs + p.ttl_sec*1000,
                    symbolFull:p.symbol_full,
                    flipped:false,
                    base:p.symbol,
                    quote:p.quote,
                    side:p.side,
                    entry_limit:p.entry_limit,
                    tp_abs:p.tp_abs,
                    sl_abs:p.sl_abs,
                    hold_sec:p.ttl_sec,
                    tp_bps:p.tp_bps,
                    sl_bps:p.sl_bps,
                    cost_bps:p.cost_bps,
                    tier:selectionTier,
                    p_lcb:p.p_lcb,
                    p_raw:p.p_raw,
                    calib_key:p.calib_key,
                    predicted:p.predicted,
                    regime:p.regime,
                    decision_context:{
                      source:"bybit_linear",
                      hybrid_probability:true,
                      tp_atr_mult:TP_ATR_MULT,
                      sl_atr_mult:SL_ATR_MULT
                    },
                    notional_usd:NOTIONAL,
                    size_bps:p.size_bps,
                    idea_id:p.idea_id,
                    client_order_id:p.client_order_id,
                    hedge_metrics:p.hedge_metrics,
                    status:"planned",
                    entry_ts_ms:null,
                    entry_price:null,
                    qty:null
                  });
                }

                if(state.pending.length>550) state.pending=state.pending.slice(-550);
                log("DEBUG pending length now =", (state.pending||[]).length);
              }catch(e){
                log("state update warn", e?.message||e);
              }

              const auditOut=buildAuditOutputs(state);
              await saveState(persist, state, auditOut, 2, true);

              // ----------------------------------------------------------------
              // 8) Push payloads
              // ----------------------------------------------------------------
              const ideaLogs = picks.map(p=>({
                symbol:p.symbol_full,
                side:p.side,
                confidence:p.confidence,
                p_hit:+(p.predicted?.p_hit||0).toFixed(4),
                p_analytic:+(p.predicted?.p_analytic||0).toFixed(4),
                p_boot:+(p.predicted?.p_boot||0).toFixed(4),
                tp_pct:+((p.predicted?.tp_pct||0)*100).toFixed(2),
                sl_pct:+((p.predicted?.sl_pct||0)*100).toFixed(2),
                atr_pct:+((p.predicted?.atr_pct||0)*100).toFixed(2),
                vol_1h_pct:+(p.predicted?.vol_1h_pct||0).toFixed(2),
                spread_bps:p.predicted?.spread_bps||0,
                mode_used:p.predicted?.mode_used||"unknown",
                fallback_rule:p.predicted?.fallback_rule||null,
                idea_id:p.idea_id
              }));

              const meta={
                origin:"github_actions",
                reason,
                exchange:"bybit_linear",
                execution_exchange:"bybit_linear",
                strategy:STRATEGY_NAME,
                model_version:MODEL_VERSION,
                schema_version:SCHEMA_VERSION,
                git_sha:GIT_SHA,
                config_hash:CONFIG_HASH,

                counts:{
                  bybit_universe:bybitSymbols.length,
                  eligible_after_cooldown:eligibleSymbols.length,
                  light_scan_passed:lightRows.length,
                  deep_scaned:deepUniverse.length,
                  primary_qualified:primaryQualified.length,
                  selected:picks.length
                },

                tier:selectionTier,
                mode_used:modeUsed,
                idea_logs:ideaLogs,

                probability_model:{
                  definition:"P(TP before SL)",
                  tp_atr_mult:TP_ATR_MULT,
                  sl_atr_mult:SL_ATR_MULT,
                  primary_threshold:0.51,
                  primary_sort:"descending_probability",
                  primary_components:["analytic_first_passage","bootstrap_path_estimate"],
                  fallback_rule:"extreme_without_cluster_reverse_else_trend_direction"
                },

                calibration_health:{
                  disabled:true,
                  note:"hybrid_probability_model_no_online_calibration"
                }
              };

              const payload={
                ts:new Date().toISOString(),
                mode:"normal",
                source:"external_pusher",
                meta,
                top_n:picks.length||0,
                ideas:picks||[]
              };

              log(`📤 pushing ${picks.length} ideas [mode=${modeUsed}] to ${PUSH_URL}`);
              try{
                const r=await fetchWithTimeout(PUSH_URL,{
                  method:"POST",
                  headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer "+PUSH_TOKEN
                  },
                  body:JSON.stringify(payload)
                },15000);
                let txt=""; try{ txt=await r.text(); }catch{}
                log("push status", r?.status||"ERR", (txt||"").slice(0,400));
              }catch(e){
                log("push failed", e?.message||e);
              }

              if(PUSH_URL_V2){
                const payloadV2={
                  ts:new Date().toISOString(),
                  mode:"normal",
                  source:"external_pusher",
                  meta:{
                    origin:"github_actions_v2_bybit_hybrid",
                    strategy:STRATEGY_NAME,
                    data_source:"bybit_linear",
                    execution:"bybit_linear",
                    mode_used:modeUsed,
                    probability_model:"first_passage_plus_bootstrap"
                  },
                  top_n:picksV2.length,
                  ideas:picksV2
                };

                log(`📤 pushing ${picksV2.length} v2 ideas to ${PUSH_URL_V2}`);
                try{
                  const r2=await fetchWithTimeout(PUSH_URL_V2,{
                    method:"POST",
                    headers:{
                      "Content-Type":"application/json",
                      "Authorization":"Bearer "+PUSH_TOKEN
                    },
                    body:JSON.stringify(payloadV2)
                  },15000);
                  let txt2=""; try{ txt2=await r2.text(); }catch{}
                  log("push v2 status", r2?.status||"ERR", (txt2||"").slice(0,400));
                }catch(e){
                  log("push v2 failed", e?.message||e);
                }
              }

              log("✅ HYBRID PROBABILITY SCANNER FINISHED");

            }catch(e){
              reason = reason!=="ok" ? reason : "data_error";
              const payload={
                ts:new Date().toISOString(),
                mode:"normal",
                source:"external_pusher",
                meta:{
                  origin:"github_actions",
                  reason,
                  error:(e?.message||String(e)).slice(0,220),
                  exchange:"bybit_linear"
                },
                top_n:0,
                ideas:[]
              };

              log("pushing 0 ideas to", PUSH_URL);
              try{
                const r=await fetchWithTimeout(PUSH_URL,{
                  method:"POST",
                  headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer "+PUSH_TOKEN
                  },
                  body:JSON.stringify(payload)
                },15000);
                let txt=""; try{ txt=await r.text(); }catch{}
                log("push status", r?.status||"ERR", (txt||"").slice(0,200));
              }catch(e2){
                log("push failed", e2?.message||e2);
              }
            }
          })();
          NODE

          EXIT_CODE=$?

          set -e
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "[gha] pusher exited with code $EXIT_CODE — sending minimal payload"
            raw_push_url="$(printf '%s' "${WORKER_PUSH_URL}" | tr -d '\r\n')"
            health_url="$(printf '%s' "${raw_push_url}" | sed -E 's#/signals/push(\?.*)?$#/health#')"

            echo "[gha] fallback health GET ${health_url}"
            http_code_h=$(curl -g -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${PUSH_TOKEN}" \
              --max-time 8 \
              "${health_url}" || true)
            echo "[gha] fallback health status ${http_code_h}"

            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            payload='{"ts":"'"${now}"'","mode":"normal","source":"external_pusher","meta":{"origin":"github_actions","reason":"fallback_node_error","exchange":"bybit_linear"},"top_n":0,"ideas":[]}'
            echo "[gha] pushing 0 ideas to ${raw_push_url}"
            mkdir -p /tmp
            : > /tmp/push_resp.txt
            http_code=$(curl -g -sS -o /tmp/push_resp.txt -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${PUSH_TOKEN}" \
              --data-raw "${payload}" \
              --max-time 12 \
              "${raw_push_url}" || true)
            body="$(head -c 400 /tmp/push_resp.txt || true)"
            echo "[gha] push status ${http_code} ${body}"
            exit 0
          fi
