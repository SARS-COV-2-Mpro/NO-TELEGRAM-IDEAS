                const trendWithWeakADX = regime === "trend" && adxValue < 20;
                if(trendWithWeakADX) {
                  liquidityPenalty *= 0.60;
                  log(`[ADX-WARN] ${cand.symbol} trend regime but ADX=${adxValue.toFixed(0)} < 20 — penalizing`);
                }

                if(Math.abs(dirEdge)<0.08){
                  log(`[EDGE-WARN] ${cand.symbol} weak edge=${dirEdge.toFixed(3)} — penalizing`);
                  liquidityPenalty*=0.6;
                }

                let macroPenalty=1.0;
                if((btcCrash||altCrash)&&forcedSide==="long"){ macroPenalty*=0.5; log(`[CRASH-WARN] ${cand.symbol} long in crash — penalty`); }
                if(altPump&&forcedSide==="short"&&regime==="meanrevert"){ macroPenalty*=0.6; log(`[PUMP-WARN] ${cand.symbol} short in pump — penalty`); }
                if(isMacroBear&&regime==="meanrevert"&&forcedSide==="long"){ macroPenalty*=0.65; }
                if(isMacroBull&&regime==="meanrevert"&&forcedSide==="short"){ macroPenalty*=0.65; }

                let corrPenalty=1.0;
                if(btcCloses.length>10&&regCloses.length>10){
                  const btcCorr=priceCorrelation(regCloses,btcCloses);
                  if(Math.abs(btcCorr)>0.85){ corrPenalty=0.75; log(`[CORR-WARN] ${cand.symbol} BTC_corr=${btcCorr.toFixed(2)} — too correlated`); }
                }

                const pBase=0.45+0.35*Math.tanh(cand.vol_1h_pct/3);
                const pSide0=clamp(pBase+Math.abs(dirEdge)*0.25, 0.28, 0.88);
                const coeff=getCoeffs(state,forcedSide,regime);
                const nCoeff=Math.max(1,Math.min(500,coeff?.n||0));
                const pCal=calibrateP(state,forcedSide,regime,pSide0);
                const pLcb=wilsonLCB(pCal,nCoeff,WILSON_Z);

                const atr_bps=Math.round((v5Result?v5Result.atrPercent:cand.vol_1h_pct)*100);
                const MAX_SL_BPS=80;
                let tp=Math.round(atr_bps*LONG_BOUNCE_TP_ATR);
                let sl=Math.round(atr_bps*LONG_BOUNCE_SL_ATR);
                sl=Math.min(sl,MAX_SL_BPS);
                tp=Math.max(tp,Math.round(sl*2.5));
                sl=clamp(sl, 30, 80);
                tp=clamp(tp, 100, 300);

                const costSide=forcedSide==="long"?costLong:costShort;
                const slipSide=forcedSide==="long"?slipL:slipS;
                const evLCB=Math.round(pLcb*tp-(1-pLcb)*sl-costSide);
                const rrr=+(tp/Math.max(1,sl)).toFixed(2);

                const baseConf=cand.hedge_confidence;
                const allPenalties=liquidityPenalty*volPenalty*atrPenalty*macroPenalty*corrPenalty;

                const dirClarityMult=clamp(0.7+Math.abs(dirEdge)*2, 0.7, 1.3);
                const regimeStable=v5Result&&v5Result.confirmed?1.08:0.92;
                const volExpMult=regime==="trend"?clamp(0.85+volExp*0.15,0.85,1.15):1.0;
                const evMult=clamp(0.5+evLCB/40, 0.4, 1.3);
                const obiAligned=(forcedSide==="long"&&obi>0.15)||(forcedSide==="short"&&obi<-0.15);
                const obiMult=obiAligned?1.08:1.0;
                const btcMult=(forcedSide==="long"&&!btcUp1h)?0.88:(forcedSide==="short"&&btcUp1h)?0.92:1.0;
                const fundAligned=(forcedSide==="short"&&(cand.funding_rate_raw||0)>0.0001)||(forcedSide==="long"&&(cand.funding_rate_raw||0)<-0.0001);
                const fundMult=fundAligned?1.10:1.0;
                
                // ★ FIX [CHANGE #7]: Add bonus for collecting funding income.
                const fundingIncome = forcedSide === "short" && cand.funding_rate_raw > 0 
                  ? cand.funding_rate_raw * 3 * 10000
                  : forcedSide === "long" && cand.funding_rate_raw < 0
                  ? Math.abs(cand.funding_rate_raw) * 3 * 10000
                  : 0;
                const fundingIncomeBonus = fundingIncome > 100 ? 1.25 :
                                           fundingIncome > 50  ? 1.15 :
                                           1.0;

                const symbolAdjustment = getSymbolAdj(state, cand.base);

                const finalConf=Math.round(
                  baseConf * allPenalties * dirClarityMult * regimeStable *
                  volExpMult * evMult * obiMult * btcMult * fundMult * 
                  fundingIncomeBonus * symbolAdjustment
                );

                // ★ FIX [CHANGE #12]: Add a unified confidence score for better ranking.
                const unifiedConfidence = Math.round(
                  finalConf * 0.60 +
                  baseConf * 0.40
                );

                const reasons=reasonBuilder({ vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate, oi_delta_pct:Math.abs(cand.oi_delta_pct), volume_1h_usd:cand.volume_1h_usd, basis_bps:cand.basis_bps });

                refined.push({
                  symbol:cand.symbol, base:cand.base, quote:cand.quote,
                  side:forcedSide, p_lcb:+pLcb.toFixed(3), p_raw:+pSide0.toFixed(3),
                  exp_bps:evLCB, exp_lcb_bps:evLCB,
                  tp_bps:tp, sl_bps:sl, rrr,
                  spread_bps:spreadBps, cost_bps:costSide, atr_bps, regime,
                  style:regime==="trend"?"trend_follow":"mean_revert",
                  vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate,
                  funding_rate_raw:cand.funding_rate_raw,
                  oi_delta_pct:cand.oi_delta_pct, volume_1h_usd:cand.volume_1h_usd,
                  basis_bps:cand.basis_bps, current_oi_usd:cand.current_oi_usd,
                  mark_price:cand.mark_price,
                  depth1p_usd:depth1pUSD, obi, slip_est:slipSide,
                  hold_sec:clamp(3600,TTL_MIN,TTL_MAX),
                  confidence:clamp(finalConf,1,100), 
                  unified_confidence: clamp(unifiedConfidence, 1, 100),
                  hedge_confidence:cand.hedge_confidence,
                  dir_analysis:{
                    bb_pos:+bbPos.toFixed(3), vwap_dist:vwapDist?+(vwapDist*100).toFixed(3):null,
                    adx:+adxValue.toFixed(1), vol_expansion:+volExp.toFixed(2),
                    dir_edge:+dirEdge.toFixed(4), regime_confirmed:v5Result?.confirmed||false,
                    dir_reasons:dirResult.reasons.slice(0,4),
                    penalties:{ liquidity:+liquidityPenalty.toFixed(2), vol:+volPenalty.toFixed(2),
                                atr:+atrPenalty.toFixed(2), macro:+macroPenalty.toFixed(2),
                                corr:+corrPenalty.toFixed(2) }
                  },
                  reasons, ret5:[]
                });

              }catch(e){ log(`Refine error for ${cand.symbol}:`,e?.message||e); }
            }

            log(`🔍 Refined ${refined.length} candidates`);

            const refinedLongs  = refined.filter(r => r.side === "long");
            const refinedShorts = refined.filter(r => r.side === "short");
            log(`📊 Refined pool: ${refinedLongs.length} longs, ${refinedShorts.length} shorts`);

            // ★ FIX [CHANGE #6]: Use a more robust edge-ranking formula.
            const scoreCandidate = (c) => {
              const edge = Math.abs(c.dir_analysis?.dir_edge || 0);
              const confirmedBonus = c.dir_analysis?.regime_confirmed ? 1.25 : 0.90;
              const adxValue = c.dir_analysis?.adx || 15;
              const adxBonus = c.regime === 'trend' 
                ? Math.min(1.5, Math.max(0.8, adxValue / 30))
                : 1.0;
              const fundingFade = 
                (c.side === "short" && (c.funding_rate_raw || 0) > 0.001) ||
                (c.side === "long"  && (c.funding_rate_raw || 0) < -0.001);
              const fundingBonus = fundingFade ? (1 + Math.abs(c.funding_rate_raw || 0) * 50) : 1.0;
              const oiAligned = 
                (c.side === "long"  && (c.oi_delta_pct || 0) > 5) ||
                (c.side === "short" && (c.oi_delta_pct || 0) < -5);
              const oiBonus = oiAligned ? 1.15 : 1.0;
              return edge * confirmedBonus * adxBonus * fundingBonus * oiBonus;
            };
            const edgeRanked = [...refined].sort((a, b) => scoreCandidate(b) - scoreCandidate(a));

            const DYNAMIC_TOP_N_LOCAL = Math.max(6, TOP_N||6);
            let topByEdge = edgeRanked.slice(0, DYNAMIC_TOP_N_LOCAL);
            const hasLong  = topByEdge.some(c => c.side === "long");
            const hasShort = topByEdge.some(c => c.side === "short");

            if(!hasShort && refinedShorts.length > 0){
              topByEdge.push(refinedShorts[0]);
              log(`⚠️ Soft balance: added 1 short ${refinedShorts[0].symbol}`);
            }
            if(!hasLong && refinedLongs.length > 0){
              topByEdge.push(refinedLongs[0]);
              log(`⚠️ Soft balance: added 1 long ${refinedLongs[0].symbol}`);
            }
            
            // ★ FIX [CHANGE #12]: Simplify selection logic to use the new unified_confidence score.
            const processingOrder = [...refined].sort((a,b) => b.unified_confidence - a.unified_confidence);
            log(`✅ Top candidates sorted by unified confidence`);

            const TARGET_TOP_N=Math.max(2, DYNAMIC_TOP_N);

            let selected=[];
            const MIN_CONF_TO_TRADE=qualityFloor;
            const usedBases=new Set();

            for(const cand of processingOrder){
              if(selected.length>=TARGET_TOP_N) break;
              if(cand.unified_confidence < MIN_CONF_TO_TRADE) continue;
              if(usedBases.has(cand.base)) continue;
              let tooCorrelated=false;
              for(const sel of selected){
                const selKlines=regimeCandlesMap.get(sel.symbol);
                const candKlines=regimeCandlesMap.get(cand.symbol);
                if(selKlines&&candKlines){
                  const selCloses=selKlines.map(c=>+c[4]);
                  const candCloses=candKlines.map(c=>+c[4]);
                  const pCorr=priceCorrelation(selCloses,candCloses);
                  if(Math.abs(pCorr)>0.80){
                    log(`[CORR-SKIP] ${cand.symbol} corr=${pCorr.toFixed(2)} with ${sel.symbol} — skipping`);
                    tooCorrelated=true;
                    break;
                  }
                }
              }
              if(tooCorrelated) continue;
              selected.push(cand);
              usedBases.add(cand.base);
            }

            if(selected.length<TARGET_TOP_N){
              log(`⚠️ Only ${selected.length}/${TARGET_TOP_N} passed quality floor (conf>=${MIN_CONF_TO_TRADE}). Relaxing...`);
              const RELAXED_CONF=Math.max(10, Math.floor(MIN_CONF_TO_TRADE*0.65));
              for(const cand of processingOrder){
                if(selected.length>=TARGET_TOP_N) break;
                if(usedBases.has(cand.base)) continue;
                if(selected.some(s=>s.symbol===cand.symbol)) continue;
                if(cand.unified_confidence < RELAXED_CONF) continue;
                const candATR = cand.atr_bps ? (cand.atr_bps/100) : 0;
                if(candATR < 0.25){
                  log(`[RELAXED-ATR-SKIP] ${cand.symbol} ATR=${candATR.toFixed(2)}% too dead`);
                  continue;
                }
                selected.push(cand);
                usedBases.add(cand.base);
                log(`[RELAXED] ${cand.symbol} conf=${cand.unified_confidence} (relaxed floor=${RELAXED_CONF})`);
              }
            }

            if(selected.length<1&&refined.length>0){
              log(`🚨 FORCE-PICK: Taking top candidate regardless of confidence`);
              selected.push(processingOrder[0]);
              usedBases.add(processingOrder[0].base);
            }

            if(selected.length < TARGET_TOP_N && refined.length > 0){
              log(`⚠️ Only ${selected.length} selected — expanding pool from full refined list`);
              for(const cand of processingOrder){
                if(selected.length >= TARGET_TOP_N) break;
                if(selected.some(s=>s.symbol===cand.symbol)) continue;
                if(usedBases.has(cand.base)) continue;
                selected.push(cand);
                usedBases.add(cand.base);
                log(`[POOL-EXPAND] Added ${cand.symbol} conf=${cand.unified_confidence}`);
              }
            }
            log(`✅ Selected ${selected.length} ideas before MTF analysis (target=${TARGET_TOP_N})`);

            log("\n🔬 ════════════════════════════════════════════════════════");
            log("🔬  FINAL MTF DIRECTION ANALYSIS — running for all selected ideas");
            log("🔬 ════════════════════════════════════════════════════════\n");

            const selectedAfterMTF = [];
            let mtfStats = { dropped_coinflip:0, dropped_low_prob:0, overridden:0, confirmed:0 };

            for(const cand of selected) {
              try {
                const mtf = await runMTFDirectionAnalysis(cand.symbol, cand.side, cand.mark_price);
                cand._kept_original = false;
                
                if(mtf.overridden && mtf.confidence_pct >= MTF_OVERRIDE_MIN_CONF) {
                  const newSide = mtf.final_side;
                  const isMeanRevert = cand.regime === "meanrevert";
                  const origSide = cand.side;
                  const bbPos = cand.dir_analysis?.bb_pos ?? 0.5;
                  const rsiValue = mtf.signals?.find(s => s.name === "rsi_condition")?.rsiValue ?? null;
                  
                  if((isMeanRevert && origSide === "short" && newSide === "long" && bbPos > 0.80 && rsiValue && rsiValue > 65) ||
                     (isMeanRevert && origSide === "long" && newSide === "short" && bbPos < 0.20 && rsiValue && rsiValue < 35)) {
                    log(`[MTF-REGIME-BLOCK] ${cand.symbol}: mean-revert signal protected from override — keeping ${origSide.toUpperCase()}`);
                    cand.mtf_overridden = false;
                    mtfStats.confirmed++;
                  } else {
                    const newPRaw = newSide === "long" ? clamp(mtf.long_prob_pct/100,0.28,0.88) : clamp(mtf.short_prob_pct/100,0.28,0.88);
                    const newPLcb  = calibrateP(state, newSide, cand.regime, newPRaw);
                    const newN     = getCoeffs(state, newSide, cand.regime)?.n || 0;
                    const newPLcbW = wilsonLCB(newPLcb, Math.max(1, Math.min(500, newN)), WILSON_Z);
                    cand.side = newSide;
                    cand.p_raw = +newPRaw.toFixed(3);
                    cand.p_lcb = +newPLcbW.toFixed(3);
                    cand.mtf_overridden = true;
                    mtfStats.overridden++;
                    log(`[MTF-OVERRIDE] ${cand.symbol}: flipped to ${newSide.toUpperCase()} (conf=${mtf.confidence_pct}%)`);
                  }
                }
                else if(mtf.overridden && mtf.confidence_pct < MTF_OVERRIDE_MIN_CONF) {
                  cand.mtf_overridden = false;
                  cand._kept_original = true;
                  mtfStats.confirmed++;
                  log(`[MTF-KEEP-ORIG] ${cand.symbol}: conf=${mtf.confidence_pct}% < ${MTF_OVERRIDE_MIN_CONF}% — keeping ${cand.side.toUpperCase()}`);
                }
                else {
                  cand.mtf_overridden = false;
                  mtfStats.confirmed++;
                }

                const currentWinProb = cand._kept_original
                  ? Math.round(cand.p_raw * 100)
                  : (cand.side === "long" ? mtf.long_prob_pct : mtf.short_prob_pct);

                if(currentWinProb < MTF_DROP_MIN_PROB) {
                  log(`[MTF-DROP] ${cand.symbol}: ${cand.side} win_prob=${currentWinProb}% < ${MTF_DROP_MIN_PROB}% — dropping`);
                  mtfStats.dropped_low_prob++;
                  continue;
                }

                const mtfMaxProb = Math.max(mtf.long_prob_pct, mtf.short_prob_pct);
                if(mtfMaxProb < MTF_COINFLIP_GATE) {
                  log(`[MTF-COINFLIP] ${cand.symbol}: max_prob=${mtfMaxProb}% < ${MTF_COINFLIP_GATE}% — no conviction, dropping`);
                  mtfStats.dropped_coinflip++;
                  continue;
                }

                cand.mtf = {
                  long_prob_pct:  mtf.long_prob_pct, short_prob_pct: mtf.short_prob_pct,
                  confidence_pct: mtf.confidence_pct, net_score: mtf.net_score,
                  overridden: mtf.overridden, final_side: mtf.final_side,
                  signals: mtf.signals, reasons: mtf.reasons, detail: mtf.detail
                };

                const mtfAlignBonus = (!mtf.overridden && mtf.confidence_pct >= 60) ? 1.08 : (!mtf.overridden && mtf.confidence_pct >= 40) ? 1.03 : mtf.overridden ? 0.92 : 1.00;
                cand.confidence = clamp(Math.round(cand.confidence * mtfAlignBonus), 0, 100);

                selectedAfterMTF.push(cand);

              } catch(e) {
                log(`[MTF] Error for ${cand.symbol}:`, e?.message || e);
                cand.mtf = null;
                cand.mtf_overridden = false;
                selectedAfterMTF.push(cand);
              }
            }

            log(`\n✅ MTF Results: ${selectedAfterMTF.length}/${selected.length} passed`);
            log(`   Dropped (coinflip): ${mtfStats.dropped_coinflip} | Dropped (low prob): ${mtfStats.dropped_low_prob} | Overridden: ${mtfStats.overridden} | Confirmed: ${mtfStats.confirmed}`);
            log("📋 Final ideas summary:");
            for(const c of selectedAfterMTF) {
              const winProb = c.side === "long" ? c.mtf?.long_prob_pct : c.mtf?.short_prob_pct;
              log(`   ${c.symbol} → ${c.side.toUpperCase()} | conf=${c.confidence} | long=${c.mtf?.long_prob_pct??'?'}% short=${c.mtf?.short_prob_pct??'?'}% | win_prob=${winProb??'?'}% | ${c.mtf_overridden?"⚠️ OVERRIDDEN":"✅ CONFIRMED"}`);
            }

            let finalSelected = selectedAfterMTF;
            if(finalSelected.length === 0) {
              log("🚨 MTF killed all trades — re-scanning full refined pool...");
              const evaluated = new Set(selected.map(s => s.symbol));
              const unevaluated = refined.filter(r => !evaluated.has(r.symbol));

              for(const cand of unevaluated.slice(0, 8)) {
                try {
                  const mtf = await runMTFDirectionAnalysis(cand.symbol, cand.side, cand.mark_price);
                  const winProb   = cand.side === "long" ? mtf.long_prob_pct  : mtf.short_prob_pct;
                  const flipSide  = cand.side === "long" ? "short" : "long";
                  const flipProb  = cand.side === "long" ? mtf.short_prob_pct : mtf.long_prob_pct;

                  if(winProb >= 50) {
                    cand.mtf = mtf;
                    cand.mtf_overridden = false;
                    selectedAfterMTF.push(cand);
                    log(`[RESCUE] ${cand.symbol} ${cand.side.toUpperCase()} win_prob=${winProb}%`);
                    if(selectedAfterMTF.length >= 2) break;
                    continue;
                  }
                  if(flipProb >= 60) {
                    cand.side = flipSide;
                    cand.mtf  = mtf;
                    cand.mtf_overridden = true;
                    selectedAfterMTF.push(cand);
                    log(`[RESCUE-FLIP] ${cand.symbol} → ${flipSide.toUpperCase()} win_prob=${flipProb}%`);
                    if(selectedAfterMTF.length >= 2) break;
                    continue;
                  }
                  log(`[RESCUE-SKIP] ${cand.symbol} orig=${winProb}% flip=${flipProb}% — not good enough`);
                } catch(e) {
                  log(`[RESCUE-ERR] ${cand.symbol}:`, e?.message || e);
                }
              }

              if(selectedAfterMTF.length === 0) {
                log("🚫 No valid trades found even after rescue scan. Market is truly dead.");
              }
              finalSelected = selectedAfterMTF;
            }

            const preDiversityCount = finalSelected.length;
            const longs  = finalSelected.filter(c => c.side === "long");
            const shorts = finalSelected.filter(c => c.side === "short");
            
            if(longs.length >= 3 && shorts.length === 0 && refined.length > 0) {
              log(`⚠️ Directional imbalance: ${longs.length} LONGs, 0 SHORTs — searching for quality SHORT...`);
              const refinedShorts = refined.filter(r => r.side === "short" && !finalSelected.some(f => f.symbol === r.symbol));
              const diversityEvaluated = new Set();
              
              for(const candShort of refinedShorts.slice(0, 5)) {
                if (diversityEvaluated.has(candShort.symbol)) continue;
                diversityEvaluated.add(candShort.symbol);
                try {
                  const mtfShort = await runMTFDirectionAnalysis(candShort.symbol, candShort.side, candShort.mark_price);
                  const shortWinProb = mtfShort.short_prob_pct;
                  
                  if(shortWinProb >= 52 && mtfShort.confidence_pct >= 25) {
                    candShort.mtf = mtfShort;
                    candShort.mtf_overridden = false;
                    candShort.confidence = Math.round(candShort.confidence * 0.90);
                    finalSelected.push(candShort);
                    log(`✅ Diversity: added ${candShort.symbol} SHORT (win_prob=${shortWinProb}%, conf=${mtfShort.confidence_pct}%)`);
                    break;
                  } else {
                    log(`[DIVERSITY-SKIP] ${candShort.symbol} SHORT: win_prob=${shortWinProb}% conf=${mtfShort.confidence_pct}% — not strong enough`);
                  }
                } catch(e) {
                  log(`[DIVERSITY-ERR] ${candShort.symbol}:`, e?.message || e);
                }
              }
            } else if(shorts.length >= 3 && longs.length === 0 && refined.length > 0) {
              log(`⚠️ Directional imbalance: ${shorts.length} SHORTs, 0 LONGs — searching for quality LONG...`);
              const refinedLongs = refined.filter(r => r.side === "long" && !finalSelected.some(f => f.symbol === r.symbol));
              const diversityEvaluated = new Set();
              
              for(const candLong of refinedLongs.slice(0, 5)) {
                if (diversityEvaluated.has(candLong.symbol)) continue;
                diversityEvaluated.add(candLong.symbol);
                try {
                  const mtfLong = await runMTFDirectionAnalysis(candLong.symbol, candLong.side, candLong.mark_price);
                  const longWinProb = mtfLong.long_prob_pct;
                  
                  if(longWinProb >= 52 && mtfLong.confidence_pct >= 25) {
                    candLong.mtf = mtfLong;
                    candLong.mtf_overridden = false;
                    candLong.confidence = Math.round(candLong.confidence * 0.90);
                    finalSelected.push(candLong);
                    log(`✅ Diversity: added ${candLong.symbol} LONG (win_prob=${longWinProb}%, conf=${mtfLong.confidence_pct}%)`);
                    break;
                  } else {
                    log(`[DIVERSITY-SKIP] ${candLong.symbol} LONG: win_prob=${longWinProb}% conf=${mtfLong.confidence_pct}% — not strong enough`);
                  }
                } catch(e) {
                  log(`[DIVERSITY-ERR] ${candLong.symbol}:`, e?.message || e);
                }
              }
            } else {
              log(`✅ Directional balance OK: ${longs.length} LONGs, ${shorts.length} SHORTs`);
            }
            
            if(finalSelected.length > preDiversityCount) {
              log(`📊 Diversity adjustment: ${preDiversityCount} → ${finalSelected.length} ideas`);
            }
            
            finalSelected = applySignalContradictionCheck(finalSelected);
            log(`📋 After contradiction check: ${finalSelected.length} ideas remain`);

            const selectedWithFlipped=finalSelected; log(`📦 Ideas: ${finalSelected.length} original (HEDGE flip, if enabled, applied after TOP_NNN cut)`);


            const wEv=softmax(selectedWithFlipped.map(x=>x.exp_lcb_bps),20);

            let picksV2=selectedWithFlipped.map((x,i)=>{
              const mid=x.mark_price;
              let entry_limit=null, tp_abs=null, sl_abs=null;
              if(mid!=null){
                const slF=x.sl_bps/10000, tpF=x.tp_bps/10000;
                const entryOffset=Math.max(0.0005, slF*0.15);
                if(x.side==="long"){
                  entry_limit=mid*(1-entryOffset);
                  tp_abs=entry_limit*(1+tpF);
                  sl_abs=entry_limit*(1-slF);
                } else {
                  entry_limit=mid*(1+entryOffset);
                  tp_abs=entry_limit*(1-tpF);
                  sl_abs=entry_limit*(1+slF);
                }
              }
              const idea_id=uuidv4();
              const client_order_id=mkClientOrderId("byh");
              const ttl=clamp(Math.round((x.hold_sec||3600)+i*12),TTL_MIN,TTL_MAX);
              const size_bps=(Number(process.env.FORCE_SIZE_BPS||"0")>0)?Math.round(Number(process.env.FORCE_SIZE_BPS)):(x.sl_bps>0?Math.min(220,Math.round((wEv[i]*TARGET_PORT_RISK_BPS/x.sl_bps)*100)):0);
              return {
                idea_id, client_order_id,
                symbol:x.base, symbol_full:x.symbol, symbolFull:x.symbol, quote:x.quote, side:x.side, rank:i+1,
