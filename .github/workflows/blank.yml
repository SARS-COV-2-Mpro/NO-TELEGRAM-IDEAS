          // Bybit interval: 1=1min, 3=3min, 5=5min, 15=15min, 30=30min, 60=1h, 120=2h, 240=4h, D=1day
          function toBybitInterval(minutes) {
            const map = { 1:"1", 3:"3", 5:"5", 15:"15", 30:"30", 60:"60", 120:"120", 240:"240" };
            return map[String(minutes)] || String(minutes);
          }

          async function fetchBybitKlines(symbol, intervalMin, limit) {
            const cacheKey = `bybit_klines_${symbol}_${intervalMin}_${limit}`;
            const cached = getCached(cache.bybit, cacheKey, TTL.bybit);
            if (cached) return cached;
            try {
              const interval = toBybitInterval(intervalMin);
              const url = `${BYBIT_API}/v5/market/kline?category=linear&symbol=${symbol}&interval=${interval}&limit=${limit}`;
              const data = await getJSON(url, 10000, 2);
              if (!data?.result?.list || !data.result.list.length) return null;
              // Bybit kline format: [startTime, open, high, low, close, volume, turnover]
              // Bybit returns newest first — reverse to oldest first
              const klines = data.result.list.reverse().map(k => [
                k[0], // timestamp
                k[1], // open
                k[2], // high
                k[3], // low
                k[4], // close
                k[5], // volume
                k[6]  // turnover
              ]);
              setCached(cache.bybit, cacheKey, klines);
              return klines;
            } catch (e) { return null; }
          }

          // Golden metrics from Bybit (single ticker call gets most data)
          async function fetchGoldenMetrics(symbol) {
            try {
              const [ticker, oiHist] = await Promise.all([
                fetchBybitTicker(symbol),
                fetchBybitOIHist(symbol)
              ]);
              if (!ticker) return null;
              const vol1hPct = Math.abs(ticker.price1hPcnt) * 100;
              return {
                symbol,
                vol_1h_pct: vol1hPct,
                price_change_1h: ticker.price1hPcnt,
                funding_rate: Math.abs(ticker.fundingRate),
                funding_rate_raw: ticker.fundingRate,
                oi_delta_pct: Math.max(oiHist?.oiDelta1hPct || 0, oiHist?.oiDelta2hPct || 0),
                oi_delta_1h_pct: oiHist?.oiDelta1hPct || 0,
                current_oi_usd: oiHist?.currentOI_USD || ticker.openInterestValue || 0,
                volume_1h_usd: ticker.turnover24h / 24, // estimate 1h from 24h
                turnover_24h: ticker.turnover24h,
                mark_price: ticker.markPrice || ticker.lastPrice,
                bid1: ticker.bid1Price,
                ask1: ticker.ask1Price,
                bid1Size: ticker.bid1Size,
                ask1Size: ticker.ask1Size,
                basis_bps: Math.round(((ticker.markPrice - ticker.indexPrice) / (ticker.indexPrice || 1)) * 10000),
                ts: Date.now()
              };
            } catch (e) {
              log(`fetchGoldenMetrics error for ${symbol}:`, e?.message || e);
              return null;
            }
          }

          function calculateHedgeConfidence(metrics) {
            if (!metrics) return 0;
            const volNorm    = Math.tanh((metrics.vol_1h_pct   || 0) / IDEAL_VOL_1H_PCT);
            const fundNorm   = Math.tanh((metrics.funding_rate || 0) / IDEAL_FUNDING_RATE);
            const oiNorm     = Math.tanh((metrics.oi_delta_pct || 0) / IDEAL_OI_DELTA_PCT);
            const volUsdNorm = Math.tanh((metrics.volume_1h_usd|| 0) / IDEAL_VOLUME_1H_USD);
            const rawScore   = WEIGHT_VOL_1H*volNorm + WEIGHT_FUNDING*fundNorm + WEIGHT_OI_DELTA*oiNorm + WEIGHT_VOLUME*volUsdNorm;
            return clamp(Math.round(rawScore * 100), 0, 100);
          }

          async function pushAuditSecondary(path, payload){ return { ok:true, path }; }
          async function heartbeatCheck(state){ return { mismatches:0, zombies:0, details:[] }; }

          // ---------- State (Gist) ----------
          async function loadState(){
            const token=process.env.GIST_TOKEN, id=process.env.GIST_ID;
            const init={ v:"bybit-hedge-7.0",
              run_counter: 0,
              cooldown:{}, cooldown_side:{}, pending:[], equity:[], closed:[],
              mr_lockout:{}, sym_stats:{}, sym_stats_real:{}, calibCoeffs:{}, lastReconcileTs:0,
              calibration_holdout:[], learned_trade_keys:[], calib_symbol_counts:{},
              calib_last_version: CALIB_VERSION,
              regime_state:{}, regime_history:{}, regime_last_update:{}
            };
            if(!token||!id) return { state:init, persist:null };
            try{
              const r=await fetchWithTimeout(`https://api.github.com/gists/${id}`,{
                headers:{Authorization:`Bearer ${token}`,"Accept":"application/vnd.github+json","User-Agent":UA}
              });
              if(!r.ok) return { state:init, persist:null };
              const etag=r.headers.get("etag");
              const g=await r.json();
              const c=g.files?.["state.json"]?.content;
              const s=c?JSON.parse(c):init;
              if(!s.cooldown)s.cooldown={};
              if(!s.cooldown_side)s.cooldown_side={};
              if(!Array.isArray(s.pending))s.pending=[];
              if(!Array.isArray(s.closed))s.closed=[];
              if(!Array.isArray(s.equity))s.equity=[];
              if(!s.mr_lockout)s.mr_lockout={};
              if(!s.sym_stats)s.sym_stats={};
              if(!s.sym_stats_real)s.sym_stats_real={};
              if(!s.calibCoeffs)s.calibCoeffs={};
              if(!Array.isArray(s.calibration_holdout))s.calibration_holdout=[];
              if(!s.lastReconcileTs)s.lastReconcileTs=0;
              if(!Array.isArray(s.learned_trade_keys))s.learned_trade_keys=[];
              if(!s.calib_symbol_counts)s.calib_symbol_counts={};
              if(s.run_counter==null)s.run_counter=0;
              if(!s.regime_state)s.regime_state={};
              if(!s.regime_history)s.regime_history={};
              if(!s.regime_last_update)s.regime_last_update={};
              if(s.calib_last_version!==CALIB_VERSION){
                log(`🔄 Calibration version change: ${s.calib_last_version} → ${CALIB_VERSION}`);
                s.calibCoeffs={}; s.calib_last_version=CALIB_VERSION;
              }
              return { state:s, persist:{ id, token, etag } };
            }catch(e){ log("loadState warn", e?.message||e); return { state:init, persist:null }; }
          }

          function mergeStates(remote, local) {
            const merged = { ...remote };
            merged.run_counter = Math.max(local.run_counter||0, remote.run_counter||0);
            const remoteKeys=Array.isArray(remote.learned_trade_keys)?remote.learned_trade_keys:[];
            const localKeys=Array.isArray(local.learned_trade_keys)?local.learned_trade_keys:[];
            const localSet=new Set(localKeys);
            merged.learned_trade_keys=[...remoteKeys.filter(k=>!localSet.has(k)),...localKeys].slice(-2000);
            const rCounts=remote.calib_symbol_counts||{}, lCounts=local.calib_symbol_counts||{};
            const mergedCounts={};
            for(const k of new Set([...Object.keys(rCounts),...Object.keys(lCounts)])) mergedCounts[k]=(rCounts[k]||0)+(lCounts[k]||0);
            merged.calib_symbol_counts=mergedCounts;
            const dropSet=new Set((local.__drop_pending_cids||[]).map(x=>String(x).trim()).filter(Boolean));
            const id=(p)=>String(p?.client_order_id||p?.clientOrderId||p?.idea_id||"").trim();
            const remotePending=(remote.pending||[]).filter(p=>!dropSet.has(id(p)));
            const remoteIds=new Set(remotePending.map(id));
            const newLocalPending=(local.pending||[]).filter(p=>{ const k=id(p); return k&&!remoteIds.has(k); });
            merged.pending=[...remotePending,...newLocalPending];
            merged.equity=Array.isArray(remote.equity)?remote.equity:[];
            merged.sym_stats_real=remote.sym_stats_real||{};
            merged.sym_stats=remote.sym_stats||{};
            merged.lastReconcileTs=remote.lastReconcileTs||0;
            if('fees'in remote) merged.fees=remote.fees;
            merged.cooldown=local.cooldown||{};
            merged.cooldown_side=local.cooldown_side||{};
            merged.mr_lockout=local.mr_lockout||{};
            merged.calibCoeffs={};
            const allKeys=new Set([...Object.keys(remote.calibCoeffs||{}),...Object.keys(local.calibCoeffs||{})]);
            for(const key of allKeys){
              const r=remote.calibCoeffs?.[key], l=local.calibCoeffs?.[key];
              if(!r) merged.calibCoeffs[key]=l;
              else if(!l) merged.calibCoeffs[key]=r;
              else{
                const newer=((r.n||0)>=(l.n||0))?r:l, older=((r.n||0)>=(l.n||0))?l:r;
                merged.calibCoeffs[key]={ ...newer,
                  recent_errors:[...(newer.recent_errors||[]),...(older.recent_errors||[])].slice(-CALIB_ERROR_WINDOW),
                  recent_predictions:[...(newer.recent_predictions||[]),...(older.recent_predictions||[])].slice(-100)
                };
              }
            }
            const keyClosed=(c)=>{ const cid=c?.trade_details?.client_order_id||c.client_order_id||c.idea_id||""; const tx=c?.ts_exit_ms||c?.exit_ts_ms||""; return `${cid}|${tx}`; };
            const localClosedMap=new Map((local.closed||[]).map(c=>[keyClosed(c),c]));
            merged.closed=(remote.closed||[]).map(rc=>{ const lc=localClosedMap.get(keyClosed(rc)); if(!lc) return rc; const learned=Boolean(rc.learned||lc.learned); const learned_at_ts=learned?(rc.learned_at_ts||lc.learned_at_ts||Date.now()):undefined; return {...rc,learned,learned_at_ts}; });
            merged.regime_state={...(remote.regime_state||{}),...(local.regime_state||{})};
            merged.regime_history={...(remote.regime_history||{}),...(local.regime_history||{})};
            merged.regime_last_update={...(remote.regime_last_update||{}),...(local.regime_last_update||{})};
            merged.version_ts=Date.now();
            log("[gha] mergeStates: remote_pending_after_drops",remotePending.length,"appended_new_local",newLocalPending.length,"merged_pending",merged.pending.length);
            return merged;
          }

          async function saveState(persist, state, auditOut, retries=2, blindFallback=true) {
            if(!persist){ log("WARN: No persist—skipping Gist save."); return; }
            const gistUrl=`https://api.github.com/gists/${persist.id}`;
            const mkFiles=(s)=>({ "state.json":{ content:JSON.stringify(s) } });
            const wipeToEmpty=state&&Object.keys(state).length===1&&state.run_counter===0;
            async function patch(files,etag){
              const headers={ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json","User-Agent":UA };
              if(etag) headers["If-Match"]=etag;
              return await fetchWithTimeout(gistUrl,{ method:"PATCH", headers, body:JSON.stringify({files}) },15000);
            }
            let toSave=state, etag=persist.etag||null;
            for(let attempt=0;attempt<=retries;attempt++){
              log("DEBUG: saveState attempt",attempt,"etag?",!!etag,"pending=",(toSave.pending||[]).length);
              const r=await patch(mkFiles(toSave),etag);
              if(r.ok){ const newEtag=r.headers.get("etag"); persist.etag=newEtag||persist.etag; log("SUCCESS: Gist updated! Status=",r.status,"pending now=",(toSave.pending||[]).length); return; }
              const body=(await r.text().catch(()=>""))?.slice(0,300)||"";
              log("WARN: saveState failed status=",r.status,"body=",body);
              if(r.status===429){ const ra=Number(r.headers.get("retry-after")||2); await sleep(ra*1000); continue; }
              if(r.status===412){
                if(wipeToEmpty){ log("DEBUG: 412 during wipe - skipping merge"); break; }
                const r2=await fetchWithTimeout(gistUrl,{ headers:{ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","User-Agent":UA } },12000);
                if(!r2.ok){ log("ERROR: Refetch for merge failed status=",r2.status); break; }
                const remoteEtag=r2.headers.get("etag");
                const remoteGist=await r2.json();
                const remoteContent=remoteGist.files?.["state.json"]?.content;
                const remoteState=remoteContent?JSON.parse(remoteContent):{};
                toSave=mergeStates(remoteState,state); etag=remoteEtag||null;
                await sleep(250+Math.floor(Math.random()*250)); continue;
              }
              break;
            }
            if(blindFallback){
              log("WARN: Falling back to blind PATCH (no If-Match).");
              if(!wipeToEmpty){
                try{
                  const r2=await fetchWithTimeout(gistUrl,{ headers:{ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","User-Agent":UA } },12000);
                  if(r2.ok){ const remoteGist=await r2.json(); const remoteContent=remoteGist.files?.["state.json"]?.content; const remoteState=remoteContent?JSON.parse(remoteContent):{}; toSave=mergeStates(remoteState,state); log("DEBUG: Pre-blind-patch merge successful."); }
                  else log("WARN: Pre-blind-patch re-fetch failed status=",r2.status);
                }catch(e){ log("ERROR: Exception during pre-blind-patch re-fetch:",e?.message||String(e)); }
              } else { toSave={run_counter:0}; log("DEBUG: WipeToEmpty=true → skipping pre-merge"); }
              const r3=await patch(mkFiles(toSave),null);
              if(r3.ok){ const newEtag=r3.headers.get("etag"); persist.etag=newEtag||persist.etag; log("SUCCESS: Blind Gist update ok. pending=",(toSave.pending||[]).length); }
              else{ const body=(await r3.text().catch(()=>""))?.slice(0,300)||""; log("ERROR: Blind save failed status=",r3.status,"body=",body); }
            }
          }

          const regFromKey=(k)=>k?.includes("regime:trend")?"trend":k?.includes("regime:meanrevert")?"meanrevert":null;

          function cleanExpiredCooldowns(state){
            const now=Date.now();
            if(state.cooldown) for(const [base,ts] of Object.entries(state.cooldown)) if(now-ts>=COOLDOWN_MS) delete state.cooldown[base];
            if(state.cooldown_side) for(const [base,obj] of Object.entries(state.cooldown_side)) if(now-(obj.ts_ms||0)>=COOLDOWN_MS) delete state.cooldown_side[base];
            if(state.mr_lockout) for(const [sym,expiry] of Object.entries(state.mr_lockout)) if(now>=expiry) delete state.mr_lockout[sym];
            log(`🧹 Cleaned cooldowns: ${Object.keys(state.cooldown||{}).length} base, ${Object.keys(state.cooldown_side||{}).length} side`);
          }

          function cleanExpiredClosedTrades(state){
            const MAX_CLOSED_TRADES=10;
            if(!Array.isArray(state.closed)){ state.closed=[]; return; }
            if(state.closed.length<=MAX_CLOSED_TRADES){ log(`📦 Closed trades: ${state.closed.length}/${MAX_CLOSED_TRADES}`); return; }
            state.closed.sort((a,b)=>(b.ts_exit_ms||b.exit_ts_ms||0)-(a.ts_exit_ms||a.exit_ts_ms||0));
            const removed=state.closed.length-MAX_CLOSED_TRADES;
            state.closed=state.closed.slice(0,MAX_CLOSED_TRADES);
            log(`🗑️  Kept ${MAX_CLOSED_TRADES} most recent closed trades, removed ${removed}`);
          }

          const getCoeffs=(state,side,regime)=>{
            const key=`${side}_${regime}`;
            if(!state.calibCoeffs) state.calibCoeffs={};
            if(!state.calibCoeffs[key]) return null;
            const existing=state.calibCoeffs[key];
            if(existing.version!==CALIB_VERSION){
              const def={ version:CALIB_VERSION, a:0, b:1, n:0, n_tp:0, n_sl:0, momentum_a:0, momentum_b:0, recent_errors:[], recent_predictions:[], last_reset_n:0, created_at:existing.created_at||Date.now(), last_updated:Date.now() };
              state.calibCoeffs[key]=def; return def;
            }
            return existing;
          };

          function learnFromGistRealFills(state){
            if(!Array.isArray(state.learned_trade_keys)) state.learned_trade_keys=[];
            const learnedSet=new Set(state.learned_trade_keys);
            if(!state.calib_symbol_counts) state.calib_symbol_counts={};
            const learnable=(state.closed||[]).filter(c=>c.reconciliation==="exchange_trade_history"&&!c.learned&&c.p_raw!=null&&isFinite(c.p_raw)&&c.p_raw>0.01&&c.p_raw<0.99);
            if(learnable.length===0){ log("📚 No new fills to learn from this cycle."); return; }
            log(`📚 Learning from ${learnable.length} real fills...`);
            const pRawValues=learnable.map(c=>c.p_raw).filter(p=>p!=null);
            const pMean=mean(pRawValues), pStd=std(pRawValues)||0.1;
            const useOutlierFilter=learnable.length>=20&&pStd>0;
            let stats={ learned:0, skipped_ttl:0, skipped_dup:0, skipped_invalid:0, skipped_poison:0, skipped_outlier:0 };
            for(const c of learnable){
              const reg=c.regime||regFromKey(c.calib_key);
              if(!reg||!c.side){ stats.skipped_invalid++; continue; }
              if(useOutlierFilter&&Math.abs((c.p_raw-pMean)/pStd)>OUTLIER_ZSCORE){ stats.skipped_outlier++; continue; }
              const cid=c.client_order_id||c.trade_details?.client_order_id||"";
              const sym=c.symbolFull||c.symbol||"UNK", side=c.side||"?", exit=c.exit_reason||"";
              const tEntry=Math.floor((c.ts_entry_ms||c.entry_ts_ms||0)/1000), tExit=Math.floor((c.ts_exit_ms||c.exit_ts_ms||0)/1000);
              const learn_key=crypto.createHash('sha256').update(`${cid}|${sym}|${side}|${tEntry}|${tExit}|${exit}`).digest('hex').slice(0,32);
              if(learnedSet.has(learn_key)){ stats.skipped_dup++; continue; }
              const symCountKey=`${side}_${reg}_${sym}`;
              const currentTotal=state.calibCoeffs?.[`${side}_${reg}`]?.n||0, currentSymCount=state.calib_symbol_counts[symCountKey]||0;
              if((currentTotal+1)>20&&(currentSymCount+1)/(currentTotal+1)>MAX_SYMBOL_CONTRIBUTION){ stats.skipped_poison++; continue; }
              const tp_hit=exit==="tp"||c.realized?.tp_hit===true, sl_hit=exit==="sl"||c.realized?.sl_hit===true;
              if(!tp_hit&&!sl_hit){ stats.skipped_ttl++; c.learned_skip_reason="ttl_exit"; continue; }
              const pnl=c.pnl_bps||0;
              if((tp_hit&&pnl<-10)||(sl_hit&&pnl>10)){ stats.skipped_invalid++; continue; }
              const outcome=tp_hit?1:0;
              try{ updateCalibration(state,c.side,reg,c.p_raw,outcome); learnedSet.add(learn_key); state.calib_symbol_counts[symCountKey]=currentSymCount+1; c.learned=true; c.learned_at_ts=Date.now(); stats.learned++; }
              catch(e){ stats.skipped_invalid++; }
            }
            state.learned_trade_keys=Array.from(learnedSet).slice(-2000);
            log(`✅ Learned=${stats.learned} | Skipped: TTL=${stats.skipped_ttl} Dup=${stats.skipped_dup} Invalid=${stats.skipped_invalid} Poison=${stats.skipped_poison} Outlier=${stats.skipped_outlier}`);
          }

          function validateCalibration(state){
            const report={};
            for(const key of Object.keys(state.calibCoeffs||{})){
              const coeff=state.calibCoeffs[key];
              if(coeff.n<CALIB_MIN_SAMPLES){ report[key]={ status:"insufficient_data", n:coeff.n }; continue; }
              const predictions=coeff.recent_predictions||[];
              let brier_raw=null, brier_cal=null;
              if(predictions.length>=10){
                const clamp01=p=>Math.max(1e-6,Math.min(1-1e-6,p));
                brier_raw=mean(predictions.map(p=>(p.outcome-clamp01(p.p_raw))**2));
                brier_cal=mean(predictions.map(p=>(p.outcome-clamp01(p.p_cal))**2));
              }
              const avg_error=mean(coeff.recent_errors||[]);
              const win_rate=coeff.n>0?(coeff.n_tp||0)/coeff.n:null;
              const is_healthy=avg_error<0.38&&coeff.b>0.1&&Math.abs(coeff.a)<COEFF_BOUND_A*0.8&&Math.abs(coeff.b)<COEFF_BOUND_B*0.8&&(brier_cal==null||brier_cal<0.23);
              report[key]={ n:coeff.n, n_tp:coeff.n_tp||0, n_sl:coeff.n_sl||0, win_rate:win_rate?.toFixed(3)||"N/A", a:coeff.a.toFixed(4), b:coeff.b.toFixed(4), avg_error:avg_error.toFixed(3), brier_cal:brier_cal?.toFixed(4)||"N/A", status:is_healthy?"healthy":"degraded" };
            }
            if(Object.keys(report).length>0){
              log("📊 Calibration Health:");
              for(const [k,v] of Object.entries(report)) log(`   ${k}: ${v.status} | n=${v.n} wr=${v.win_rate} brier=${v.brier_cal} a=${v.a} b=${v.b}`);
            }
            return report;
          }

          function updateCalibration(state, side, regime, pRaw, outcome){
            if(pRaw==null||!isFinite(pRaw)||pRaw<=0||pRaw>=1) return;
            const coeff=getCoeffs(state,side,regime);
            if(!coeff){ log(`⏭️  Skip learning [${side}_${regime}]: no existing calibration`); return; }
            if(!coeff.recent_predictions) coeff.recent_predictions=[];
            coeff.recent_predictions.push({ p_raw:pRaw, p_cal:calibrateP(state,side,regime,pRaw), outcome, ts:Date.now() });
            if(coeff.recent_predictions.length>100) coeff.recent_predictions.shift();
            const before_a=coeff.a, before_b=coeff.b;
            const warmup_factor=Math.min(1,(coeff.n+1)/20);
            const lr=(MIN_LEARNING_RATE+(MAX_LEARNING_RATE-MIN_LEARNING_RATE)/Math.sqrt(1+coeff.n/10))*warmup_factor;
            const eps=1e-7, pSafe=Math.max(eps,Math.min(1-eps,pRaw));
            const x=Math.max(-6,Math.min(6,Math.log(pSafe/(1-pSafe))));
            const pHat=1/(1+Math.exp(-Math.max(-10,Math.min(10,coeff.a+coeff.b*x))));
            const error=outcome-pHat;
            coeff.momentum_a=MOMENTUM_RATE*coeff.momentum_a-lr*(-error);
            coeff.momentum_b=MOMENTUM_RATE*coeff.momentum_b-lr*(-error*x);
            const a_next=(1-LEARNING_DECAY*lr)*coeff.a+coeff.momentum_a;
            const b_next=(1-LEARNING_DECAY*lr)*coeff.b+coeff.momentum_b;
            if(b_next<0.05){ coeff.b=1.0; coeff.momentum_b=0; coeff.a=clamp(coeff.a,-1.0,1.0); }
            else{ coeff.a=clamp(a_next,-COEFF_BOUND_A,COEFF_BOUND_A); coeff.b=clamp(b_next,-COEFF_BOUND_B,COEFF_BOUND_B); }
            if(!coeff.recent_errors) coeff.recent_errors=[];
            coeff.recent_errors.push(Math.abs(error));
            if(coeff.recent_errors.length>CALIB_ERROR_WINDOW) coeff.recent_errors.shift();
            const alpha=0.1, weights=coeff.recent_errors.map((_,i)=>Math.exp(alpha*i)), ws=weights.reduce((a,b)=>a+b,0)||1;
            const weighted_error=coeff.recent_errors.reduce((acc,e,i)=>acc+e*weights[i],0)/ws;
            if(weighted_error>CALIBRATION_RESET_THRESHOLD&&coeff.n>CALIB_MIN_RESET_N&&(coeff.n-(coeff.last_reset_n||0))>20){
              coeff.a=0; coeff.b=1; coeff.momentum_a=0; coeff.momentum_b=0; coeff.recent_errors=[]; coeff.last_reset_n=coeff.n;
            }
            coeff.n++; if(outcome===1) coeff.n_tp=(coeff.n_tp||0)+1; else coeff.n_sl=(coeff.n_sl||0)+1; coeff.last_updated=Date.now();
            state.calibCoeffs[`${side}_${regime}`]=coeff;
          }

          const calibrateP=(state,side,regime,pRaw)=>{ const coeff=getCoeffs(state,side,regime); if(!coeff||pRaw==null||!isFinite(pRaw)) return 0.5; const x=Math.max(-5,Math.min(5,logit(pRaw))); return sigmoid(coeff.a+coeff.b*x); };
          const calibratorInfo=(state,side,regime)=>{ const coeff=getCoeffs(state,side,regime); if(!coeff) return { type:"logistic",n:0,a:0,b:1 }; return { type:"logistic",n:coeff.n,a:coeff.a,b:coeff.b }; };
          function getSymbolAdj(state,base){ const real=state.sym_stats_real?.[base]; const s=real||state.sym_stats?.[base]; if(!s||s.n<6) return 1.0; const winRate=s.wins/s.n; const avgPnL=s.pnl_sum/s.n; let m=1.0; if(winRate<0.4) m*=0.7; if(avgPnL<0) m*=0.8; return clamp(m,0.5,1.2); }

          const TRADE_CSV_KEYS=["ts_close_iso","idea_id","client_order_id","symbol","side","pnl_bps","entry_ts_ms","exit_ts_ms","entry_price","exit_price","qty","commission_bps","calib_key","p_raw","p_pred","regime","source"];
          function buildAuditOutputs(state){
            const lastNClosed=(state.closed||[]).slice(-5000);
            const closedAudit=lastNClosed.map(x=>JSON.stringify(x)).join("\n");
            const rows=[];
            for(const c of lastNClosed){
              const td=c.trade_details||{};
              rows.push([
                new Date(c.ts_exit_ms||Date.now()).toISOString(),td.idea_id||"",td.client_order_id||"",
                c.symbolFull||"",c.side||"",c.pnl_bps,c.ts_entry_ms||"",c.ts_exit_ms||"",
                c.price_entry||"",c.price_exit||"",c.qty||"",td.commission_bps!=null?td.commission_bps:"",
                c.calib_key||"",c.p_raw!=null?c.p_raw:"",c.p_pred!=null?c.p_pred:"",c.regime||"",c.reconciliation||""
              ].join(","));
            }
            const tradesCsv=[TRADE_CSV_KEYS.join(","),...rows].join("\n");
            return { closedAudit, disagreements:"", tradesCsv };
          }

          async function candleSimForIdea(p){ return { status:"sim_disabled", closed:false }; }

          // ---------- Main ----------
          let reason="ok", selectionTier="confidence";
          try{
            const { state, persist } = await loadState();
            state.run_counter=(state.run_counter||0)+1;
            log(`🔄 Run ${state.run_counter}/6`);
            const SHOULD_WIPE=(state.run_counter>=6);
            if(SHOULD_WIPE){
              log("🗑️  RUN 6: WIPE GIST AND RESTART FRESH");
              await saveState(persist,{ run_counter:0 },{},2,true);
              state.v="bybit-hedge-7.0"; state.run_counter=1; state.cooldown={}; state.cooldown_side={};
              state.pending=[]; state.equity=[]; state.closed=[]; state.mr_lockout={}; state.sym_stats={};
              state.sym_stats_real={}; state.calibCoeffs={}; state.lastReconcileTs=0;
              state.calibration_holdout=[]; state.learned_trade_keys=[]; state.calib_symbol_counts={};
              state.calib_last_version=CALIB_VERSION; state.regime_state={}; state.regime_history={}; state.regime_last_update={};
              log("♻️  State reset to fresh. Continuing with idea generation...");
            }

            learnFromGistRealFills(state);
            cleanExpiredCooldowns(state);
            cleanExpiredClosedTrades(state);

            // Clean old regime state
            if(state.regime_state&&Object.keys(state.regime_state).length>300){
              const sorted=Object.entries(state.regime_last_update||{}).sort((a,b)=>b[1]-a[1]).slice(0,300).map(x=>x[0]);
              const keep={}; for(const sym of sorted) keep[sym]=state.regime_state[sym]; state.regime_state=keep;
            }
            if(state.regime_history&&Object.keys(state.regime_history).length>100){
              const sorted=Object.entries(state.regime_last_update||{}).sort((a,b)=>b[1]-a[1]).slice(0,100).map(x=>x[0]);
              const keep={}; for(const sym of sorted) if(state.regime_history[sym]) keep[sym]=state.regime_history[sym]; state.regime_history=keep;
            }

            const preserved={
              v: state.v||"bybit-hedge-7.0", run_counter:state.run_counter||0,
              cooldown:state.cooldown||{}, cooldown_side:state.cooldown_side||{}, mr_lockout:state.mr_lockout||{},
              calibCoeffs:state.calibCoeffs||{}, learned_trade_keys:state.learned_trade_keys||[],
              calib_symbol_counts:state.calib_symbol_counts||{}, calib_last_version:state.calib_last_version||CALIB_VERSION,
              regime_state:state.regime_state||{}, regime_history:state.regime_history||{}, regime_last_update:state.regime_last_update||{},
              pending:[], closed:state.closed||[], equity:state.equity||[], sym_stats_real:state.sym_stats_real||{},
              sym_stats:{}, calibration_holdout:[], lastReconcileTs:0
            };
            Object.assign(state,preserved);
            log(`♻️  Fresh cycle: ${Object.keys(state.cooldown).length} cooldowns, ${(state.closed||[]).length} closed trades, ${Object.keys(state.calibCoeffs||{}).length} calib models`);

            const calibHealth=validateCalibration(state);
            if(!todOK) reason="tod_gate";

            // ========== BYBIT UNIVERSE ==========
            log("📡 Fetching Bybit universe...");
            const bybitSymbols=await fetchBybitSymbols();
            if(!bybitSymbols||bybitSymbols.length===0){
              log("❌ No Bybit symbols found");
              reason="no_bybit_symbols";
              throw new Error("No Bybit symbols available");
            }
            log(`✅ Bybit universe: ${bybitSymbols.length} USDT linear perpetuals`);

            const equityStats=(eq)=>{ const day=Date.now()-24*3600*1000; let pnl24=0,cum=0,peak=0,dd=0; for(const e of eq||[]){ if(e.ts_ms>=day) pnl24+=e.pnl_bps; cum+=e.pnl_bps; if(cum>peak) peak=cum; dd=Math.min(dd,cum-peak); } return { pnl24_bps:Math.round(pnl24), peak_dd_bps:Math.round(dd) }; };
            const { pnl24_bps, peak_dd_bps }=equityStats(state.equity);
            const throttle=(pnl24_bps<=DD_24H_LIMIT_BPS)||(peak_dd_bps<=DD_PEAK_LIMIT_BPS);

            // ========== FETCH GOLDEN METRICS (BYBIT) ==========
            log("📊 Fetching golden metrics for all symbols...");
            const BATCH_SIZE=15, BATCH_DELAY=300;
            const allMetrics=[];

            for(let i=0;i<bybitSymbols.length;i+=BATCH_SIZE){
              const batch=bybitSymbols.slice(i,i+BATCH_SIZE);
              const batchResults=await Promise.all(batch.map(async(sym)=>{
                try{
                  const lastTs=state.cooldown?.[sym.base]||0;
                  if(lastTs&&(Date.now()-lastTs)<COOLDOWN_MS) return null;
                  const metrics=await fetchGoldenMetrics(sym.symbol);
                  if(!metrics) return null;
                  return { ...sym, ...metrics, hedge_confidence:calculateHedgeConfidence(metrics) };
                }catch(e){ return null; }
              }));
              for(const r of batchResults) if(r&&r.mark_price>0) allMetrics.push(r);
              if(i+BATCH_SIZE<bybitSymbols.length) await sleep(BATCH_DELAY);
            }
            log(`📈 Fetched metrics for ${allMetrics.length}/${bybitSymbols.length} symbols`);

            allMetrics.sort((a,b)=>b.hedge_confidence-a.hedge_confidence);
            log("🏆 Top 10 by hedge confidence:");
            for(let i=0;i<Math.min(10,allMetrics.length);i++){
              const m=allMetrics[i];
              log(`   ${i+1}. ${m.symbol} conf=${m.hedge_confidence} vol1h=${m.vol_1h_pct.toFixed(2)}% fund=${(m.funding_rate*100).toFixed(4)}% oi_delta=${m.oi_delta_pct.toFixed(1)}%`);
            }

            const MAX_DETAILED=30;
            const topCandidates=allMetrics.slice(0,MAX_DETAILED);
            const btcMetrics=allMetrics.find(m=>m.symbol==="BTCUSDT");
            const btcUp1h=btcMetrics?(btcMetrics.price_change_1h>0):true;

            // ========== BATCH PRE-FETCH REGIME CANDLES (BYBIT) ==========
            log("📉 Pre-fetching regime candles...");
            const REG_INTERVAL=Number(process.env.REG_INTERVAL||"3");
            const REG_LIMIT=Number(process.env.REG_LIMIT||"20");
            const regimeCandlesMap=new Map();
            const REG_BATCH_SIZE=15, REG_BATCH_DELAY=300;

            for(let i=0;i<topCandidates.length;i+=REG_BATCH_SIZE){
              const batch=topCandidates.slice(i,i+REG_BATCH_SIZE);
              const results=await Promise.all(batch.map(async(cand)=>{
                try{
                  const klines=await fetchBybitKlines(cand.symbol,REG_INTERVAL,REG_LIMIT);
                  return { symbol:cand.symbol, candles:klines };
                }catch(e){ return { symbol:cand.symbol, candles:null }; }
              }));
              for(const r of results) regimeCandlesMap.set(r.symbol,r.candles);
              if(i+REG_BATCH_SIZE<topCandidates.length) await sleep(REG_BATCH_DELAY);
            }
            log(`📉 Regime candles fetched for ${[...regimeCandlesMap.values()].filter(v=>v).length}/${topCandidates.length} symbols`);

            // ========== DETAILED REFINEMENT ==========
            const refined=[];

            for(const cand of topCandidates){
              try{
                // Execution quality from Bybit depth
                const depth=await fetchBybitDepth(cand.symbol);
                let spreadBps=5, mid=cand.mark_price;
                if(cand.bid1&&cand.ask1){
                  mid=(cand.bid1+cand.ask1)/2;
                  spreadBps=Math.round(((cand.ask1-cand.bid1)/mid)*10000);
                }
                const obi=computeOBI(depth,OBI_TOPN);
                const sideSlipL=slipFromDepth(depth,mid,"long",NOTIONAL);
                const sideSlipS=slipFromDepth(depth,mid,"short",NOTIONAL);
                const slipL=sideSlipL?.slip_bps??Math.round(spreadBps/2);
                const slipS=sideSlipS?.slip_bps??Math.round(spreadBps/2);
                const costLong=COST_BPS+slipL, costShort=COST_BPS+slipS;
                const d1=depthWithinPctUSD(depth,mid,0.01);
                const depth1pUSD=(d1.asksUSD||0)+(d1.bidsUSD||0);

                // ========== STEP 1: V5 REGIME DETECTION ==========
                let regime="meanrevert", slopeDir=0, v5Result=null;
                try{
                  const kReg=regimeCandlesMap.get(cand.symbol);
                  if(Array.isArray(kReg)&&kReg.length>=15){
                    v5Result=detectV5Regime(state,cand.symbol,kReg);
                    if(v5Result.regime==="Trending Up"){ regime="trend"; slopeDir=1; }
                    else if(v5Result.regime==="Trending Down"){ regime="trend"; slopeDir=-1; }
                    else if(v5Result.regime==="Volatile"){
                      if(Math.abs(v5Result.slopePct)>v5Result.slopeThreshold){ regime="trend"; slopeDir=v5Result.slopePct>=0?1:-1; }
                      else{ regime="meanrevert"; slopeDir=v5Result.slopePct>=0?1:-1; }
                    } else { regime="meanrevert"; slopeDir=v5Result.slopePct>=0?1:-1; }
                    log(`[V5-REG] ${cand.symbol} ${v5Result.regime} (${v5Result.candidate}) ${v5Result.confirmed?'✓':'⏳'} ${v5Result.detail}`);
                  } else { log(`[V5-REG] ${cand.symbol} insufficient data — fallback meanrevert`); }
                }catch(e){ log(`[V5-REG] ${cand.symbol} error:`,e?.message||e); regime="meanrevert"; slopeDir=0; }

                // Ranging gate
                if(v5Result&&v5Result.regime==="Ranging"){ log(`[V5-GATE] ${cand.symbol} SKIP: Ranging`); continue; }

                // ========== STEP 2: DIRECTION ==========
                const priceMom1h=cand.price_change_1h||0;
                const momDirection=Math.sign(priceMom1h);
                const momScore=Math.tanh(Math.abs(priceMom1h)/0.02)*momDirection;
                const oiDir=Math.sign(cand.oi_delta_pct||0)*momDirection;
                const oiScore=Math.tanh((cand.oi_delta_pct||0)/10)*oiDir;
                const fundingScore=-Math.sign(cand.funding_rate_raw||0)*Math.tanh(Math.abs(cand.funding_rate_raw||0)/0.001);
                const volConfirm=Math.tanh((cand.volume_1h_usd||0)/IDEAL_VOLUME_1H_USD);
                const btcRegimeScore=btcUp1h?0.1:-0.1;
                const dirEdge=(momScore*0.40+oiScore*0.25+fundingScore*0.20+btcRegimeScore*0.15)*(0.5+0.5*volConfirm);

                // ========== STEP 3: SIDE ==========
                let forcedSide=null;
                if(DIRECTION==="long"){ forcedSide="long"; }
                else if(DIRECTION==="short"){ forcedSide="short"; }
                else if(regime==="trend"){
                  const slopeConfirmed=(slopeDir>0&&dirEdge>0)||(slopeDir<0&&dirEdge<0);
                  forcedSide=slopeDir>0?"long":"short";
                  if(!slopeConfirmed){ log(`[DIR] ${cand.symbol} slope/edge conflict — skipping`); continue; }
                } else {
                  if(fundingScore>0.3) forcedSide="long";
                  else if(fundingScore<-0.3) forcedSide="short";
                  else forcedSide=dirEdge>=0?"long":"short";
                }
                log(`[DIR] ${cand.symbol} regime=${regime} edge=${dirEdge.toFixed(3)} → ${forcedSide}`);

                // ========== STEP 4: PROBABILITIES ==========
                const pBase=0.45+0.35*Math.tanh(cand.vol_1h_pct/3);
                const pLong0=clamp(pBase+dirEdge*0.25,0.28,0.88);
                const pShort0=clamp(pBase-dirEdge*0.25,0.28,0.88);
                const coeffL=getCoeffs(state,"long",regime), coeffS=getCoeffs(state,"short",regime);
                const nL=Math.max(1,Math.min(500,coeffL?.n||0)), nS=Math.max(1,Math.min(500,coeffS?.n||0));
                const pLong=calibrateP(state,"long",regime,pLong0), pShort=calibrateP(state,"short",regime,pShort0);
                const pLong_lcb=wilsonLCB(pLong,nL,WILSON_Z), pShort_lcb=wilsonLCB(pShort,nS,WILSON_Z);

                // ========== STEP 5: BUILD IDEA ==========
                const atr_bps=Math.round(cand.vol_1h_pct*100);
                const MAX_SL_BPS=80;
                let chosen=null;

                if(forcedSide==="long"&&DIRECTION!=="short"){
                  let tp=Math.round(atr_bps*LONG_BOUNCE_TP_ATR), sl=Math.round(atr_bps*LONG_BOUNCE_SL_ATR);
                  sl=Math.min(sl,MAX_SL_BPS); tp=Math.max(tp,Math.round(sl*1.5));
                  const evLCB=Math.round(pLong_lcb*tp-(1-pLong_lcb)*sl-costLong);
                  const edgeL=tp/Math.max(1,LONG_EDGE_MULT_MIN*costLong);
                  const evScoreL=evLCB/Math.max(8,EXP_LCB_MIN_BPS_BASE);
                  const viabMultL=clamp(0.5*clamp(edgeL,0.3,1.4)+0.5*clamp(evScoreL,0.3,1.4),0.3,1.3);
                  chosen={ side:"long", p_lcb:pLong_lcb, p_raw:pLong0, ev_bps:evLCB, exp_lcb_bps:evLCB, tp_bps:tp, sl_bps:sl, cost_bps:costLong, style:regime==="trend"?"trend_follow":"mean_revert", regime, viab_mult:viabMultL, dir_edge:dirEdge, dir_signals:{ momentum:+momScore.toFixed(3), oi_flow:+oiScore.toFixed(3), funding:+fundingScore.toFixed(3), slope_dir:slopeDir, btc_regime:btcRegimeScore } };
                } else if(forcedSide==="short"&&DIRECTION!=="long"){
                  let tp=Math.round(atr_bps*LONG_BOUNCE_TP_ATR), sl=Math.round(atr_bps*LONG_BOUNCE_SL_ATR);
                  sl=Math.min(sl,MAX_SL_BPS); tp=Math.max(tp,Math.round(sl*1.5));
                  const evLCB=Math.round(pShort_lcb*tp-(1-pShort_lcb)*sl-costShort);
                  const edgeS=tp/Math.max(1,4*costShort);
                  const evScoreS=evLCB/Math.max(8,EXP_LCB_MIN_BPS_BASE);
                  const viabMultS=clamp(0.5*clamp(edgeS,0.3,1.4)+0.5*clamp(evScoreS,0.3,1.4),0.3,1.3);
                  chosen={ side:"short", p_lcb:pShort_lcb, p_raw:pShort0, ev_bps:evLCB, exp_lcb_bps:evLCB, tp_bps:tp, sl_bps:sl, cost_bps:costShort, style:regime==="trend"?"trend_follow":"mean_revert", regime, viab_mult:viabMultS, dir_edge:dirEdge, dir_signals:{ momentum:+momScore.toFixed(3), oi_flow:+oiScore.toFixed(3), funding:+fundingScore.toFixed(3), slope_dir:slopeDir, btc_regime:btcRegimeScore } };
                }
                if(!chosen) continue;

                // Confidence
                const baseConf=cand.hedge_confidence;
                const spreadMult=clamp(1-Math.max(0,(spreadBps-5))/30,0.5,1.1);
                const depthMult=clamp(depth1pUSD/Math.max(1,DEPTH_1P_MIN_USD),0.3,1.2);
                const slipMult=clamp(1-Math.max(0,(chosen.cost_bps-COST_BPS))/25,0.5,1.1);
                const oiMult=clamp((cand.current_oi_usd||0)/50_000_000,0.4,1.3);
                const evMult=clamp(chosen.viab_mult||1,0.3,1.3);
                const btcMult=(chosen.side==="long"&&!btcUp1h)?0.85:1.0;
                const fundingAlignBonus=((chosen.side==="short"&&(cand.funding_rate_raw||0)>0)||(chosen.side==="long"&&(cand.funding_rate_raw||0)<0))?1.1:1.0;
                const finalConf=Math.round(baseConf*spreadMult*depthMult*slipMult*oiMult*evMult*btcMult*fundingAlignBonus);
                const reasons=reasonBuilder({ vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate, oi_delta_pct:cand.oi_delta_pct, volume_1h_usd:cand.volume_1h_usd, basis_bps:cand.basis_bps });

                refined.push({
                  symbol:cand.symbol, base:cand.base, quote:cand.quote,
                  side:chosen.side, p_lcb:+chosen.p_lcb.toFixed(3), p_raw:+chosen.p_raw.toFixed(3),
                  exp_bps:chosen.ev_bps, exp_lcb_bps:chosen.exp_lcb_bps,
                  tp_bps:chosen.tp_bps, sl_bps:chosen.sl_bps, rrr:+(chosen.tp_bps/Math.max(1,chosen.sl_bps)).toFixed(2),
                  spread_bps:spreadBps, cost_bps:chosen.cost_bps, atr_bps, regime:chosen.regime, style:chosen.style,
                  vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate, funding_rate_raw:cand.funding_rate_raw,
                  oi_delta_pct:cand.oi_delta_pct, volume_1h_usd:cand.volume_1h_usd, basis_bps:cand.basis_bps,
                  current_oi_usd:cand.current_oi_usd, mark_price:cand.mark_price,
                  depth1p_usd:depth1pUSD, obi, slip_est:chosen.side==="long"?slipL:slipS,
                  hold_sec:clamp(3600,TTL_MIN,TTL_MAX),
                  confidence:clamp(finalConf,0,100), hedge_confidence:cand.hedge_confidence,
                  reasons, ret5:[]
                });

              }catch(e){ log(`Refine error for ${cand.symbol}:`,e?.message||e); }
            }

            log(`🔍 Refined ${refined.length} candidates`);

            // MIN_ALT_SCORE gate
            const MIN_ALT_SCORE=Number(process.env.MIN_ALT_SCORE||"0");
            if(MIN_ALT_SCORE>0){
              const before=refined.length;
              const after=refined.filter(r=>r.confidence>=MIN_ALT_SCORE);
              log(`[V5-GATE] MIN_ALT_SCORE=${MIN_ALT_SCORE} filtered ${before-after.length}/${before}`);
              refined.length=0; refined.push(...after);
            }

            // Final selection
            refined.sort((a,b)=>b.confidence-a.confidence);
            const TARGET_TOP_N=Math.max(1,TOP_N||3);
            const selected=[];
            for(const cand of refined){
              if(selected.length>=TARGET_TOP_N) break;
              if(!selected.some(s=>s.base===cand.base)) selected.push(cand);
            }
            if(selected.length<TARGET_TOP_N){
              const haveSyms=new Set(selected.map(s=>s.symbol));
              for(const c of refined){ if(selected.length>=TARGET_TOP_N) break; if(!haveSyms.has(c.symbol)){ selected.push(c); haveSyms.add(c.symbol); } }
            }
            log(`✅ Selected ${selected.length} ideas`);

            // Flipped hedge ideas
            const flipped=HEDGE?selected.map(orig=>({ ...orig, side:orig.side==="long"?"short":"long", flipped:true, original_idea_id:orig.symbol+"_"+orig.side })):[];
            const selectedWithFlipped=[...selected,...flipped];
            log(`📦 Ideas: ${selected.length} original + ${flipped.length} flipped = ${selectedWithFlipped.length} total`);

            const wEv=softmax(selectedWithFlipped.map(x=>x.exp_lcb_bps),20);

            let picksV2=selectedWithFlipped.map((x,i)=>{
              const mid=x.mark_price;
              let entry_limit=null, tp_abs=null, sl_abs=null;
              if(mid!=null){
                const slF=x.sl_bps/10000, tpF=x.tp_bps/10000;
                if(x.side==="long"){ entry_limit=mid*(1-Math.max(0.001,slF*0.5)); tp_abs=entry_limit*(1+tpF); sl_abs=entry_limit*(1-slF); }
                else{ entry_limit=mid*(1+slF); tp_abs=entry_limit*(1-tpF); sl_abs=entry_limit*(1+slF); }
              }
              const idea_id=uuidv4();
              const client_order_id=mkClientOrderId("byh");
              const ttl=clamp(Math.round((x.hold_sec||3600)+i*12),TTL_MIN,TTL_MAX);
              const size_bps=(Number(process.env.FORCE_SIZE_BPS||"0")>0)?Math.round(Number(process.env.FORCE_SIZE_BPS)):(x.sl_bps>0?Math.min(220,Math.round((wEv[i]*TARGET_PORT_RISK_BPS/x.sl_bps)*100)):0);
              return {
                idea_id, client_order_id,
                symbol:x.base, symbol_full:x.symbol, symbolFull:x.symbol, quote:x.quote, side:x.side, rank:i+1,
                target_exchange:TARGET_EXCHANGE, market_type:MARKET_TYPE, margin_mode:MARGIN_MODE, leverage:LEVERAGE,
                entry_policy:"maker_join", exec:{ exec:"post_only" },
                entry_mid:mid, entry_limit, tp_abs, sl_abs,
                tp_bps:x.tp_bps, sl_bps:x.sl_bps, rrr:x.rrr, exp_lcb_bps:x.exp_lcb_bps, ev_bps:x.exp_bps, cost_bps:x.cost_bps,
                p_win:x.p_lcb, p_lcb:x.p_lcb, p_raw:x.p_raw,
                calib_key:`side:${x.side}|regime:${x.regime}`, regime:x.regime,
                ttl_sec:ttl, size_bps,
                predicted:{ ts_ms:Date.now(), p_cal:x.p_lcb, ev_bps:x.exp_lcb_bps??x.exp_bps, confidence_score:x.confidence, flipped:x.flipped||false, vol_1h_pct:x.vol_1h_pct, funding_rate:x.funding_rate, oi_delta_pct:x.oi_delta_pct, volume_1h_usd:x.volume_1h_usd, basis_bps:x.basis_bps, hedge_confidence:x.hedge_confidence },
                confidence:x.confidence, reasons:x.reasons,
                reasons_text:(x.reasons||[]).slice(0,3).map(r=>`${r.factor}:${r.value}(${r.contribution>=0?"+":""}${r.contribution})`),
                hedge_metrics:{ vol_1h_pct:x.vol_1h_pct, funding_rate_raw:x.funding_rate_raw, oi_delta_pct:x.oi_delta_pct, volume_1h_usd:x.volume_1h_usd, basis_bps:x.basis_bps, mark_price:x.mark_price, current_oi_usd:x.current_oi_usd }
              };
            });

            const toV1Compat=(pv2)=>({
              idea_id:pv2.idea_id, client_order_id:pv2.client_order_id,
              symbol:pv2.symbol, symbol_full:pv2.symbol_full, quote:pv2.quote, side:pv2.side, rank:pv2.rank,
              entry_policy:"smart_swing_limit", entry_type:"limit", activation:"on_fill",
              entry_mid:pv2.entry_mid, entry_limit:pv2.entry_limit, tp_abs:pv2.tp_abs, sl_abs:pv2.sl_abs,
              tp_bps:pv2.tp_bps, sl_bps:pv2.sl_bps, rrr:pv2.rrr, exp_lcb_bps:pv2.exp_lcb_bps, ev_bps:pv2.ev_bps, cost_bps:pv2.cost_bps,
              p_win:pv2.p_lcb, p_lcb:pv2.p_lcb, p_raw:pv2.p_raw, calib_key:pv2.calib_key, regime:pv2.regime,
              ttl_sec:pv2.ttl_sec, size_bps:pv2.size_bps,
              predicted:{ ...pv2.predicted, meta:{ strategy:STRATEGY_NAME, model_version:MODEL_VERSION, schema_version:SCHEMA_VERSION, git_sha:GIT_SHA, config_hash:CONFIG_HASH, futures_hint:{ target_exchange:pv2.target_exchange, market_type:pv2.market_type, margin_mode:pv2.margin_mode, leverage:pv2.leverage, entry_policy_override:pv2.entry_policy, exec:pv2.exec } } },
              confidence:pv2.confidence, reasons:pv2.reasons, reasons_text:pv2.reasons_text, hedge_metrics:pv2.hedge_metrics
            });

            let picks=picksV2.map(toV1Compat);

            // Size scaling on high vol
            try{
              const maxVolPick=Math.max(...picks.map(p=>p.predicted?.vol_1h_pct||1));
              if(maxVolPick>5){ const scale=clamp(5/maxVolPick,0.4,1); picks=picks.map(p=>({...p,size_bps:Math.max(4,Math.round(p.size_bps*scale))})); log("[gha] High volatility detected, scaling sizes by",scale.toFixed(2)); }
            }catch(e){ log("[gha] Portfolio risk adjustment warn",e?.message||e); }

            // Update state
            try{
              const nowMs=Date.now(), ideasTs=new Date(nowMs).toISOString();
              for(const p of picks){
                state.cooldown[p.symbol]=nowMs;
                state.cooldown_side[p.symbol]={ side:p.side, ts_ms:nowMs };
                state.pending.push({
                  ts:ideasTs, ts_ms:nowMs, ttl_ts_ms:nowMs+p.ttl_sec*1000,
                  symbolFull:p.symbol_full, flipped:p.predicted?.flipped||false, base:p.symbol, quote:p.quote, side:p.side,
                  entry_limit:p.entry_limit, tp_abs:p.tp_abs, sl_abs:p.sl_abs,
                  hold_sec:p.ttl_sec, tp_bps:p.tp_bps, sl_bps:p.sl_bps, cost_bps:p.cost_bps, tier:p.tier||"confidence",
                  p_lcb:p.p_lcb, p_raw:p.p_raw, calib_key:p.calib_key, predicted:p.predicted, regime:p.regime,
                  decision_context:{ source:"bybit_futures", golden_metrics:p.hedge_metrics },
                  notional_usd:NOTIONAL, size_bps:p.size_bps,
                  idea_id:p.idea_id, client_order_id:p.client_order_id, hedge_metrics:p.hedge_metrics,
                  status:"planned", entry_ts_ms:null, entry_price:null, qty:null
                });
              }
              if(state.pending.length>550) state.pending=state.pending.slice(-550);
              log("DEBUG: Appended",picks.length,"plans. New pending length=",(state.pending||[]).length);
            }catch(e){ log("state update warn",e?.message||e); }

            const auditOut=buildAuditOutputs(state);
            log("DEBUG: Pre-save: pending length=",(state.pending||[]).length);
            await saveState(persist,state,auditOut,2,true);
            log("DEBUG: saveState call complete.");

            for(const p of picks) log(`idea ${p.symbol_full} ${p.side} conf=${p.confidence} vol1h=${(p.predicted?.vol_1h_pct||0).toFixed(2)}%`);

            const ideaLogs=picks.map(p=>({ symbol:p.symbol_full, side:p.side, flipped:p.predicted?.flipped||false, confidence:p.confidence, hedge_confidence:p.predicted?.hedge_confidence||0, vol_1h_pct:+(p.predicted?.vol_1h_pct||0).toFixed(2), funding_rate:+(p.predicted?.funding_rate||0).toFixed(5), oi_delta_pct:+(p.predicted?.oi_delta_pct||0).toFixed(1), volume_1h_usd:Math.round((p.predicted?.volume_1h_usd||0)/1e6)+"M", reasons:p.reasons_text, p_cal:+p.p_lcb.toFixed(3), ev_bps:p.ev_bps, idea_id:p.idea_id }));

            const meta={
              origin:"github_actions", reason, exchange:"bybit_futures", execution_exchange:"bybit_futures",
              strategy:STRATEGY_NAME, model_version:MODEL_VERSION, schema_version:SCHEMA_VERSION, git_sha:GIT_SHA, config_hash:CONFIG_HASH,
              counts:{ bybit_universe:bybitSymbols.length, metrics_fetched:allMetrics.length, refined:refined.length, selected:picks.length },
              dd_gate:{ pnl24_bps, peak_dd_bps, throttle },
              tod:{ active:S_H!=null&&E_H!=null, start:S_H, end:E_H },
              heartbeat:{ mismatches:0, zombies:0 }, tier:selectionTier,
              idea_logs:ideaLogs, calibration_health:calibHealth,
              golden_metrics_config:{ ideal_vol_1h_pct:IDEAL_VOL_1H_PCT, ideal_funding_rate:IDEAL_FUNDING_RATE, ideal_oi_delta_pct:IDEAL_OI_DELTA_PCT, ideal_volume_1h_usd:IDEAL_VOLUME_1H_USD, weights:{ vol_1h:WEIGHT_VOL_1H, funding:WEIGHT_FUNDING, oi_delta:WEIGHT_OI_DELTA, volume:WEIGHT_VOLUME } },
              extras:{ v2_ideas:picksV2, features_requested:["maker_join","post_only","futures","hedge_trading","bybit_execution"] }
            };

            const payload={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta, top_n:picks.length||0, ideas:picks||[] };
            log(`pushing ${picks.length} ideas (${selectionTier}) to ${PUSH_URL}`);
            try{
              const r=await fetchWithTimeout(PUSH_URL,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payload) },15000);
              let txt=""; try{ txt=await r.text(); }catch{}
              log("push status",r?.status||"ERR",(txt||"").slice(0,400));
            }catch(e){ log("push failed",e?.message||e); }

            if(PUSH_URL_V2){
              const payloadV2={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta:{ origin:"github_actions_v2_bybit", strategy:"bybit-hedge-ultimate", data_source:"bybit_futures", golden_metrics:true, execution:"bybit_futures" }, top_n:picksV2.length, ideas:picksV2 };
              log(`pushing ${picksV2.length} v2 ideas to ${PUSH_URL_V2}`);
              try{
                const r2=await fetchWithTimeout(PUSH_URL_V2,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payloadV2) },15000);
                let txt2=""; try{ txt2=await r2.text(); }catch{}
                log("push v2 status",r2?.status||"ERR",(txt2||"").slice(0,400));
              }catch(e){ log("push v2 failed",e?.message||e); }
            }

          }catch(e){
            reason=reason!=="ok"?reason:"data_error";
            const payload={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta:{ origin:"github_actions", reason, error:(e?.message||String(e)).slice(0,220), exchange:"bybit_futures" }, top_n:0, ideas:[] };
            log("pushing 0 ideas to",PUSH_URL);
            try{
              const r=await fetchWithTimeout(PUSH_URL,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payload) },15000);
              let txt=""; try{ txt=await r.text(); }catch{}
              log("push status",r?.status||"ERR",(txt||"").slice(0,200));
            }catch(e2){ log("push failed",e2?.message||e2); }
          }
          })();
          NODE

          EXIT_CODE=$?

          set -e
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "[gha] pusher exited with code $EXIT_CODE — sending minimal payload"
            raw_push_url="$(printf '%s' "${WORKER_PUSH_URL}" | tr -d '\r\n')"
            health_url="$(printf '%s' "${raw_push_url}" | sed -E 's#/signals/push(\?.*)?$#/health#')"
            echo "[gha] fallback health GET ${health_url}"
            http_code_h=$(curl -g -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${PUSH_TOKEN}" \
              --max-time 8 \
              "${health_url}" || true)
            echo "[gha] fallback health status ${http_code_h}"
            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            payload='{"ts":"'"${now}"'","mode":"normal","source":"external_pusher","meta":{"origin":"github_actions","reason":"fallback_node_error","exchange":"bybit_futures"},"top_n":0,"ideas":[]}'
            echo "[gha] pushing 0 ideas to ${raw_push_url}"
            mkdir -p /tmp
            : > /tmp/push_resp.txt
            http_code=$(curl -g -sS -o /tmp/push_resp.txt -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${PUSH_TOKEN}" \
              --data-raw "${payload}" \
              --max-time 12 \
              "${raw_push_url}" || true)
            body="$(head -c 400 /tmp/push_resp.txt || true)"
            echo "[gha] push status ${http_code} ${body}"
            exit 0
          fi
