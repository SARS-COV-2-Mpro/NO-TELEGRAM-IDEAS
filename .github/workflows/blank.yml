                  if(depth1pUSD<1500){ log(`[LIQ-GATE] ${cand.symbol} skipped: depth1p=$${Math.round(depth1pUSD)} (hard limit)`); continue; }
                  liquidityPenalty*=clamp(depth1pUSD/scaledDepthMin, 0.5, 1.0);
