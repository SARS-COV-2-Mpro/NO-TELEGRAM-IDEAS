            const keyClosed=(c)=>{ const cid=c?.trade_details?.client_order_id||c.client_order_id||c.idea_id||""; const tx=c?.ts_exit_ms||c?.exit_ts_ms||""; return `${cid}|${tx}`; };
            const localClosedMap=new Map((local.closed||[]).map(c=>[keyClosed(c),c]));
            merged.closed=(remote.closed||[]).map(rc=>{ const lc=localClosedMap.get(keyClosed(rc)); if(!lc) return rc; const learned=Boolean(rc.learned||lc.learned); const learned_at_ts=learned?(rc.learned_at_ts||lc.learned_at_ts||Date.now()):undefined; return {...rc,learned,learned_at_ts}; });
            merged.version_ts=Date.now();
            log("[gha] mergeStates: remote_pending_after_drops",remotePending.length,"appended_new_local",newLocalPending.length,"merged_pending",merged.pending.length);
            return merged;
          }

          async function saveState(persist,state,retries=2,blindFallback=true){
            if(!persist){ log("WARN: No persist—skipping Gist save."); return; }
            const gistUrl=`https://api.github.com/gists/${persist.id}`;
            const mkFiles=(s)=>({ "state.json":{ content:JSON.stringify(s) } });
            async function patch(files,etag){ const headers={ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json","User-Agent":UA }; if(etag) headers["If-Match"]=etag; return await fetchWithTimeout(gistUrl,{ method:"PATCH", headers, body:JSON.stringify({ files }) },15000); }
            let toSave=state, etag=persist.etag||null;
            for(let attempt=0;attempt<=retries;attempt++){
              log("DEBUG: saveState attempt",attempt,"etag?",!!etag,"pending=",(toSave.pending||[]).length);
              const r=await patch(mkFiles(toSave),etag);
              if(r.ok){ const newEtag=r.headers.get("etag"); persist.etag=newEtag||persist.etag; log("SUCCESS: Gist updated! Status=",r.status,"pending now=",(toSave.pending||[]).length); return; }
              const body=(await r.text().catch(()=>""))?.slice(0,300)||"";
              log("WARN: saveState failed status=",r.status,"body=",body);
              if(r.status===429){ const ra=Number(r.headers.get("retry-after")||2); log("WARN: Rate limited. Backing off",ra,"s"); await sleep(ra*1000); continue; }
              if(r.status===412){
                const r2=await fetchWithTimeout(gistUrl,{ headers:{ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","User-Agent":UA } },12000);
                if(!r2.ok){ log("ERROR: Refetch for merge failed status=",r2.status); break; }
                const remoteEtag=r2.headers.get("etag");
                const remoteGist=await r2.json();
                const remoteContent=remoteGist.files?.["state.json"]?.content;
                const remoteState=remoteContent?JSON.parse(remoteContent):{};
                toSave=mergeStates(remoteState,state);
                etag=remoteEtag||null;
                await sleep(250+Math.floor(Math.random()*250));
                continue;
              }
              break;
            }
            if(blindFallback){
              log("WARN: Falling back to blind PATCH (no If-Match).");
              try{
                const r2=await fetchWithTimeout(gistUrl,{ headers:{ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","User-Agent":UA } },12000);
                if(r2.ok){ const remoteGist=await r2.json(); const remoteContent=remoteGist.files?.["state.json"]?.content; const remoteState=remoteContent?JSON.parse(remoteContent):{};toSave=mergeStates(remoteState,state); log("DEBUG: Pre-blind-patch merge successful."); }
                else{ log("WARN: Pre-blind-patch re-fetch failed status=",r2.status); }
              }catch(e){ log("ERROR: Exception during pre-blind-patch re-fetch:",e?.message||String(e)); }
              const r3=await patch(mkFiles(toSave),null);
              if(r3.ok){ const newEtag=r3.headers.get("etag"); persist.etag=newEtag||persist.etag; log("SUCCESS: Blind Gist update ok. pending=",(toSave.pending||[]).length); }
              else{ const body=(await r3.text().catch(()=>""))?.slice(0,300)||""; log("ERROR: Blind save failed status=",r3.status,"body=",body); }
            }
          }

          function cleanExpiredCooldowns(state){
            const now=Date.now();
            if(state.cooldown){ for(const [b,ts] of Object.entries(state.cooldown)){ if(now-ts>=COOLDOWN_MS) delete state.cooldown[b]; } }
            if(state.cooldown_side){ for(const [b,obj] of Object.entries(state.cooldown_side)){ if(now-(obj.ts_ms||0)>=COOLDOWN_MS) delete state.cooldown_side[b]; } }
            if(state.mr_lockout){ for(const [sym,expiry] of Object.entries(state.mr_lockout)){ if(now>=expiry) delete state.mr_lockout[sym]; } }
            log(`🧹 Cleaned cooldowns: ${Object.keys(state.cooldown||{}).length} base, ${Object.keys(state.cooldown_side||{}).length} side, ${Object.keys(state.mr_lockout||{}).length} mr_lockout`);
          }

          function cleanExpiredClosedTrades(state){
            const MAX_CLOSED=10;
            if(!Array.isArray(state.closed)){ state.closed=[]; return; }
            const before=state.closed.length;
            if(before<=MAX_CLOSED){ log(`📦 Closed trades: ${before}/${MAX_CLOSED} (no cleanup needed)`); return; }
            state.closed.sort((a,b)=>(b.ts_exit_ms||b.exit_ts_ms||0)-(a.ts_exit_ms||a.exit_ts_ms||0));
            state.closed=state.closed.slice(0,MAX_CLOSED);
            log(`🗑️  Kept ${MAX_CLOSED} most recent closed trades, removed ${before-state.closed.length} old ones`);
          }

          // ============ CALIBRATION (READ-ONLY) ============
          const getCoeffs=(state,side,regime)=>{ const key=`${side}_${regime}`; if(!state.calibCoeffs) state.calibCoeffs={}; return state.calibCoeffs[key]||null; };
          const calibrateP=(state,side,regime,pRaw)=>{ const coeff=getCoeffs(state,side,regime); if(!coeff||pRaw==null||!isFinite(pRaw)) return pRaw||0.5; const x=Math.max(-5,Math.min(5,logit(pRaw))); return sigmoid(coeff.a+coeff.b*x); };

          // ============ SYMBOL PERFORMANCE ADJUSTMENT (READ-ONLY) ============
          function getSymbolAdj(state,base){
            const real=state.sym_stats_real?.[base];
            const s=real||state.sym_stats?.[base];
            if(!s||s.n<6) return 1.0;
            const winRate=s.wins/s.n;
            const avgPnL=s.pnl_sum/s.n;
            let m=1.0;
            if(winRate<0.4) m*=0.7;
            if(avgPnL<0) m*=0.8;
            return clamp(m,0.5,1.2);
          }

          // ============ HEAVY ANALYSIS (HEDGE=off) ============
          async function analyzeSymbolHeavy(symbol, base, state, btcUp1h, btcR5){
            try{
              log(`🔍 [Pusher 1 Heavy Analysis] Analyzing ${symbol}...`);

              // Step 1: MTF klines
              log(`   📊 Fetching MTF klines: 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 12h, 1d`);
              const km=await fetchBybitKMultiTF(symbol);

              if(!km["5m"]||km["5m"].length<Math.max(EMA_SLOW+5,14+5)){
                log(`   ❌ Insufficient 5m data for ${symbol}`);
                return null;
              }

              // Step 2: Kalman filter on 5m
              const k5=km["5m"];
              const c5_raw=k5.map(x=>+x[4]);
              const c5=kalman1D(c5_raw,{q:1e-4,r:5e-4});
              const h5=k5.map(x=>+x[2]);
              const l5=k5.map(x=>+x[3]);
              const v5=k5.map(x=>+x[6]);
              log(`   ✅ Kalman filter applied to 5m (${c5.length} candles)`);

              // Step 3: Technical indicators
              const adxatr=computeADX_ATR(h5,l5,c5,14)||{};
              const adx5=adxatr.adx||0;
              const atr5=adxatr.atr||0;
              const atr_bps=Math.round((atr5/(c5.at(-1)||1))*10000);

              if(atr_bps<4||atr_bps>260){
                log(`   ❌ ATR out of range: ${atr_bps}bps`);
                return null;
              }

              const vwap5=vwapAnchored(h5,l5,c5,v5,VWAP_5M_WIN);
              const last=c5.at(-1);
              const roc1=(last/(c5.at(-2)||last))-1;
              const roc3=(last/(c5.at(-4)||last))-1;
              const z_vwap=(last-vwap5)/(atr5||1);
              const rsi14=rsi(c5,14);
              const ema21=ema(c5,EMA_FAST);
              const ema50=ema(c5,EMA_SLOW);
              const slope=slopeBps(c5,21);
              const roc5m=(c5.at(-1)/(c5.at(-6)||c5.at(-1))-1);
              const roc15m=(c5.at(-1)/(c5.at(-16)||c5.at(-1))-1);
              const dir=(!ema21||!ema50)?"flat":(ema21>ema50?"up":(ema21<ema50?"down":"flat"));

              log(`   📈 5m indicators: RSI=${rsi14?.toFixed(1)} ADX=${adx5.toFixed(1)} ATR=${atr_bps}bps EMA21=${ema21?.toFixed(4)} EMA50=${ema50?.toFixed(4)} z_vwap=${z_vwap.toFixed(2)}`);

              // Step 4: Breakout / MR lockout
              const dcHi=Math.max(...h5.slice(-MR_BREAKOUT_DC_N));
              const dcLo=Math.min(...l5.slice(-MR_BREAKOUT_DC_N));
              const atrPct=atr5/last;
              const ret15abs=Math.abs((last/(c5.at(-4)||last))-1);
              const breakout=(last>dcHi)||(last<dcLo)||(ret15abs>=MR_BREAKOUT_RET15_ATR*atrPct);
              if(breakout) state.mr_lockout[symbol]=Date.now()+MR_LOCKOUT_SEC*1000;
              const mrLocked=(Date.now()<(state.mr_lockout?.[symbol]||0));
              const regime=mrLocked?"trend":"meanrevert";
              log(`   🔒 MR Lockout: breakout=${breakout} → mrLocked=${mrLocked} → regime=${regime}`);

              // Step 5: Raw probabilities
              const adxF=clamp((adx5-16)/14,0,1);
              const pTrend=clamp(0.5+0.27*(0.6*tanh(roc1/0.003)+0.4*tanh(roc3/0.0065))*adxF,0.32,0.93);
              const pMR=clamp(0.5+0.23*(0.7*tanh(Math.abs(z_vwap))*Math.sign(-z_vwap)+0.3*(-(rsi14-50)/50))*(1-adxF),0.35,0.90);
              const pLong0=clamp(0.45*pTrend+0.55*pMR,0.3,0.97);
              const pShort0=clamp(0.45*(1-pTrend)+0.55*(1-pMR),0.3,0.97);
              log(`   🧮 Raw probabilities: pLong0=${pLong0.toFixed(4)} pShort0=${pShort0.toFixed(4)}`);

              // Step 6: Read-only calibration
              const pLong=calibrateP(state,"long",regime,pLong0);
              const pShort=calibrateP(state,"short",regime,pShort0);
              const coeffL=getCoeffs(state,"long",regime);
              const coeffS=getCoeffs(state,"short",regime);
              log(`   🎯 Calibrated (read-only): pLong=${pLong.toFixed(4)} pShort=${pShort.toFixed(4)} (using existing coeffs a=${coeffL?.a?.toFixed(4)||"def"} b=${coeffL?.b?.toFixed(4)||"def"})`);

              // Step 7: Wilson LCB
              const pLong_lcb=wilsonLCB(pLong,80,WILSON_Z);
              const pShort_lcb=wilsonLCB(pShort,80,WILSON_Z);
              log(`   📉 Wilson LCB: pLong_lcb=${pLong_lcb.toFixed(4)} pShort_lcb=${pShort_lcb.toFixed(4)}`);

              // Step 8: MTF aggregation + TF alignment
              const mtf=computeMTFIndicators(km,TF_WEIGHTS);
              const tfAlign=mtf?.tfAlign||0;
              const mtfAgg=mtf?.agg||{ rsi:50, adx:0, atr_bps:0, roc1:0, roc3:0 };
              log(`   📊 MTF: tfAlign=${tfAlign.toFixed(3)} mtf_rsi=${mtfAgg.rsi.toFixed(1)} mtf_adx=${mtfAgg.adx.toFixed(1)}`);

              // Step 9: Orderbook snapshot 1 (for OFI we need 2)
              const depthA=await fetchBybitOrderbook(symbol);
              await sleep(500);
              const depthB=await fetchBybitOrderbook(symbol);
              const depth=depthB||depthA;

              // Step 10: Microstructure
              const ticker=await fetchBybitTicker(symbol);
              let mid=last, spread_bps=10;
              if(ticker?.bid&&ticker?.ask&&ticker.bid>0){ mid=(ticker.bid+ticker.ask)/2; spread_bps=Math.round(((ticker.ask-ticker.bid)/mid)*10000); }
              const bestBid=depth?.bids?.[0]?.[0]?+depth.bids[0][0]:null;
              const bestAsk=depth?.asks?.[0]?.[0]?+depth.asks[0][0]:null;
              const bidQ=depth?.bids?.[0]?.[1]?+depth.bids[0][1]:null;
              const askQ=depth?.asks?.[0]?.[1]?+depth.asks[0][1]:null;
              const obi=depth?computeOBI(depth,OBI_TOPN):0;
              const ofi30s=ofiProxy(depthA,depthB);
              const slopeObj=depth?bookSlope(depth,mid):{ slope:0, r2:0 };
              const micro_bias_bps=(bestBid&&bestAsk&&bidQ&&askQ)?Math.round((microprice(bestBid,bestAsk,bidQ,askQ)-mid)/mid*10000):null;
              log(`   🔬 Microstructure: obi=${obi.toFixed(3)} ofi=${ofi30s.toFixed(3)} micro_bias=${micro_bias_bps}bps spread=${spread_bps}bps bookSlope=${slopeObj.slope.toFixed(3)}`);

              // Step 11: Slip from depth
              const sideSlipL=depth?slipFromDepth(depth,mid,"long",NOTIONAL):{ slip_bps:Math.round(spread_bps/2) };
              const sideSlipS=depth?slipFromDepth(depth,mid,"short",NOTIONAL):{ slip_bps:Math.round(spread_bps/2) };
              const slipL=sideSlipL?.slip_bps??Math.round(spread_bps/2);
              const slipS=sideSlipS?.slip_bps??Math.round(spread_bps/2);
              const costLong=COST_BPS+slipL;
              const costShort=COST_BPS+slipS;

              // Depth 1% USD
              const d1=depth?depthWithinPctUSD(depth,mid,0.01):{ bidsUSD:0, asksUSD:0 };
              const depth1pUSD=(d1.asksUSD||0)+(d1.bidsUSD||0);

              // Step 12: Return series
              const yR=[];
              for(let i=1;i<c5.length;i++) yR.push(Math.log(c5[i]/c5[i-1]));
              const mu5=mean(yR)||0;
              const sig5=Math.max(1e-4,std(yR));

              // Step 13: Monte Carlo for both sides
              const MAX_SL_BPS=80;
              let tp_long=Math.round(LONG_BOUNCE_TP_ATR*atr_bps);
              let sl_long=Math.round(LONG_BOUNCE_SL_ATR*atr_bps);
              sl_long=Math.min(sl_long,MAX_SL_BPS);
              tp_long=Math.max(tp_long,Math.round(sl_long*1.5));

              let tp_short=Math.round(atr_bps*1.0);
              let sl_short=Math.round(atr_bps*0.5);
              sl_short=Math.min(sl_short,MAX_SL_BPS);
              tp_short=Math.max(tp_short,Math.round(sl_short*1.5));

              log(`   🎲 Monte Carlo simulation (192 paths, 4 steps):`);
              const simLong=pathEVHeavy({ entry:mid, tp_bps:tp_long, sl_bps:sl_long, side:"long", retSeries:yR, mu:mu5, sigma:sig5, steps:4, N:192, cost_bps:costLong });
              const simShort=pathEVHeavy({ entry:mid, tp_bps:tp_short, sl_bps:sl_short, side:"short", retSeries:yR, mu:mu5, sigma:sig5, steps:4, N:192, cost_bps:costShort });
              const evLCB_long=Math.round(pLong_lcb*tp_long-(1-pLong_lcb)*sl_long-costLong);
              const evLCB_short=Math.round(pShort_lcb*tp_short-(1-pShort_lcb)*sl_short-costShort);
              log(`      → Long: tp=${tp_long}bps sl=${sl_long}bps ev_lcb=${evLCB_long}bps`);
              log(`      → Short: tp=${tp_short}bps sl=${sl_short}bps ev_lcb=${evLCB_short}bps`);

              // Step 14: Gates
              const noLongDown=NO_LONG_DOWN_ENABLE&&((rsi14||100)<LONG_DOWN_RSI_CUTOFF);
              const gBTC=btcUp1h?1.0:0.85;
              const gMR=mrLocked?0.7:1.05;
              const gSpread=clamp(1-Math.max(0,(spread_bps-MAX_SPREAD_BPS))/MAX_SPREAD_BPS,0.2,1.1);
              const gCost_l=clamp(1-Math.max(0,(costLong-COST_BPS))/20,0.2,1.1);
              const gCost_s=clamp(1-Math.max(0,(costShort-COST_BPS))/20,0.2,1.1);
              const gVol=clamp(depth1pUSD/Math.max(1,DEPTH_1P_MIN_USD),0.2,1.1);
              const gTF=clamp(0.4+0.8*tfAlign,0.2,1.2);
              const gDir_l=(DIRECTION==="short")?0:1;
              const gDir_s=(DIRECTION==="long")?0:1;
              const gNoLong=(noLongDown&&DIRECTION!=="short")?0.8:1.0;

              log(`   🚪 Gates: atr_bps=${atr_bps}✅ noLongDown=${noLongDown} btcUp1h=${btcUp1h}✅ DIRECTION=${DIRECTION}✅`);

              // Edge mult for viability
              const edgeL=tp_long/Math.max(1,LONG_EDGE_MULT_MIN*costLong);
              const evScoreL=evLCB_long/Math.max(8,EXP_LCB_MIN_BPS_BASE);
              const viabL=clamp(0.5*clamp(edgeL,0.3,1.4)+0.5*clamp(evScoreL,0.3,1.4),0.3,1.3);
              const edgeS=tp_short/Math.max(1,4*costShort);
              const evScoreS=evLCB_short/Math.max(8,EXP_LCB_MIN_BPS_BASE);
              const viabS=clamp(0.5*clamp(edgeS,0.3,1.4)+0.5*clamp(evScoreS,0.3,1.4),0.3,1.3);

              const gateMultL=clamp(gSpread*gCost_l*gVol*gMR*gDir_l*gBTC*gTF*viabL*gNoLong,0.2,1.4);
              const gateMultS=clamp(gSpread*gCost_s*gVol*gMR*gDir_s*gBTC*gTF*viabS,0.2,1.4);
              log(`   📊 Multipliers: gBTC=${gBTC.toFixed(2)} gMR=${gMR.toFixed(2)} gSpread=${gSpread.toFixed(2)} gCost_l=${gCost_l.toFixed(2)} gVol=${gVol.toFixed(2)} gTF=${gTF.toFixed(2)}`);

              // Step 15: Microstructure quality
              const microQL=(Math.max(0,1-(spread_bps||0)/20))*(1-Math.min(0.6,(costLong-COST_BPS)/20))*(1+clamp(obi,-0.2,0.2));
              const microQS=(Math.max(0,1-(spread_bps||0)/20))*(1-Math.min(0.6,(costShort-COST_BPS)/20))*(1+clamp(-obi,-0.2,0.2));
              const regimeQ=0.7+0.4*tfAlign;

              // Step 16: Confidence scores
              const confL=confidenceScore({ p_cal:pLong_lcb, ev_bps:simLong.ev_bps, atr_bps, micro:microQL, regime:regimeQ, reliability:1, riskAdj:1 })*gateMultL;
              const confS=confidenceScore({ p_cal:pShort_lcb, ev_bps:simShort.ev_bps, atr_bps, micro:microQS, regime:regimeQ, reliability:1, riskAdj:1 })*gateMultS;
              log(`   🎯 ConfidenceScore: Long=${Math.round(confL)} Short=${Math.round(confS)}`);

              // Step 17: BTC correlation
              const btcCorr=corr(yR.slice(-120),btcR5);

              // Step 18: Choose side by EV
              let chosen=null;
              if(DIRECTION==="long"){
                if(noLongDown){ log(`   ⏭️  LONG blocked by noLongDown`); return null; }
                chosen={ side:"long", p_lcb:pLong_lcb, p_raw:pLong0, ev_bps:simLong.ev_bps, exp_lcb_bps:evLCB_long, tp_bps:tp_long, sl_bps:sl_long, cost_bps:costLong, regime, conf:Math.round(confL), slip_est:slipL };
              } else if(DIRECTION==="short"){
                chosen={ side:"short", p_lcb:pShort_lcb, p_raw:pShort0, ev_bps:simShort.ev_bps, exp_lcb_bps:evLCB_short, tp_bps:tp_short, sl_bps:sl_short, cost_bps:costShort, regime, conf:Math.round(confS), slip_est:slipS };
              } else {
                const longOK=!noLongDown;
                if(evLCB_long>=evLCB_short&&longOK){
                  chosen={ side:"long", p_lcb:pLong_lcb, p_raw:pLong0, ev_bps:simLong.ev_bps, exp_lcb_bps:evLCB_long, tp_bps:tp_long, sl_bps:sl_long, cost_bps:costLong, regime, conf:Math.round(confL), slip_est:slipL };
                } else {
                  chosen={ side:"short", p_lcb:pShort_lcb, p_raw:pShort0, ev_bps:simShort.ev_bps, exp_lcb_bps:evLCB_short, tp_bps:tp_short, sl_bps:sl_short, cost_bps:costShort, regime, conf:Math.round(confS), slip_est:slipS };
                }
              }

              if(!chosen){ log(`   ❌ No viable direction for ${symbol}`); return null; }
              log(`   ✅ ${symbol}: ${chosen.side.toUpperCase()} chosen (ev_lcb=${chosen.exp_lcb_bps}) conf=${chosen.conf} regime=${regime}`);

              const reasons=reasonBuilder({ adx1h:adx5, ofi30s, tfAlign, spread_bps, slip_bps_est:chosen.slip_est, mtf_rsi:mtfAgg.rsi });

              return {
                symbol, base, side:chosen.side,
                p_lcb:chosen.p_lcb, p_raw:chosen.p_raw,
                ev_bps:chosen.ev_bps, exp_lcb_bps:chosen.exp_lcb_bps,
                tp_bps:chosen.tp_bps, sl_bps:chosen.sl_bps,
                rrr:+(chosen.tp_bps/Math.max(1,chosen.sl_bps)).toFixed(2),
                cost_bps:chosen.cost_bps, regime:chosen.regime,
                confidence:chosen.conf, spread_bps, atr_bps,
                mark_price:mid, depth1p_usd:depth1pUSD,
                obi, ofi30s, micro_bias_bps, tfAlign,
                mtf_agg:mtfAgg, mtf_weights:mtf?.weights||{},
                btc_corr:+btcCorr.toFixed(3),
                vol1h_est_usd:0,
                trend5m:{ ema21, ema50, rsi:rsi14, roc5:roc5m, roc15:roc15m, adx:adx5, ema_slope_bps:slope, dir },
                reasons, ret5:yR.slice(-36)
              };

            }catch(e){ log(`   ❌ Heavy analysis error for ${symbol}:`,e?.message||e); return null; }
          }

          // ============ MAIN ============
          let reason="ok", selectionTier="confidence";
          try{
            const { state, persist }=await loadState();

            state.run_counter=(state.run_counter||0)+1;
            log(`🔄 Run ${state.run_counter}/6`);

            const SHOULD_WIPE=(state.run_counter>=6);
            if(SHOULD_WIPE){
              log("🗑️  RUN 6: WIPE GIST AND RESTART FRESH");
              await saveState(persist,{ run_counter:0 },2,true);
              state.v="bybit-ultimate-1.0"; state.run_counter=1;
              state.cooldown={}; state.cooldown_side={}; state.pending=[];
              state.equity=[]; state.closed=[]; state.mr_lockout={};
              state.sym_stats={}; state.sym_stats_real={}; state.calibCoeffs={};
              state.lastReconcileTs=0; state.calibration_holdout=[];
              state.learned_trade_keys=[]; state.calib_symbol_counts={};
              log("♻️  State reset to fresh. Continuing with idea generation...");
            }

            if(!HEDGE_MODE){
              log("⏭️  Skipping learning (HEDGE=off uses read-only calibration)");
            }

            cleanExpiredCooldowns(state);
            cleanExpiredClosedTrades(state);

            const preserved={
              v:state.v||"bybit-ultimate-1.0", run_counter:state.run_counter||0,
              cooldown:state.cooldown||{}, cooldown_side:state.cooldown_side||{},
              mr_lockout:state.mr_lockout||{}, calibCoeffs:state.calibCoeffs||{},
              learned_trade_keys:state.learned_trade_keys||[],
              calib_symbol_counts:state.calib_symbol_counts||{},
              pending:[], closed:state.closed||[], equity:state.equity||[],
              sym_stats_real:state.sym_stats_real||{}, sym_stats:state.sym_stats||{},
              calibration_holdout:[], lastReconcileTs:0
            };
            Object.assign(state,preserved);

            log(`♻️  Fresh cycle: ${Object.keys(state.cooldown).length} cooldowns, ${(state.closed||[]).length} closed trades, ${Object.keys(state.calibCoeffs||{}).length} calib models ${HEDGE_MODE?"":"(read-only)"}`);

            if(!HEDGE_MODE){
              log("📊 Calibration Health (read-only):");
              for(const [key,coeff] of Object.entries(state.calibCoeffs||{})){
                if(coeff.n>=10) log(`   ${key}: n=${coeff.n} a=${coeff.a?.toFixed(4)} b=${coeff.b?.toFixed(4)} (frozen)`);
                else log(`   ${key}: n=${coeff.n||0} (insufficient, using defaults)`);
              }
              if(Object.keys(state.calibCoeffs||{}).length===0) log("   (no calibration coefficients available yet — using raw probabilities)");
            }

            if(!todOK) reason="tod_gate";

            // Fetch universe
            log("📡 Fetching Bybit Linear universe...");
            const bybitSymbols=await fetchBybitLinearSymbols();
            if(!bybitSymbols||bybitSymbols.length===0){ reason="no_bybit_symbols"; throw new Error("No Bybit Linear symbols available"); }

            const equityStats=(eq)=>{ const day=Date.now()-24*3600*1000; let pnl24=0,cum=0,peak=0,dd=0; for(const e of eq||[]){ if(e.ts_ms>=day) pnl24+=e.pnl_bps; cum+=e.pnl_bps; if(cum>peak) peak=cum; dd=Math.min(dd,cum-peak); } return { pnl24_bps:Math.round(pnl24), peak_dd_bps:Math.round(dd) }; };
            const { pnl24_bps, peak_dd_bps }=equityStats(state.equity);
            const throttle=(pnl24_bps<=DD_24H_LIMIT_BPS)||(peak_dd_bps<=DD_PEAK_LIMIT_BPS);

            // Fetch golden metrics for all eligible symbols
            log("📊 Fetching golden metrics for all symbols...");
            const BATCH_SIZE=10, BATCH_DELAY=500;
            const allMetrics=[];
            const eligibleSymbols=bybitSymbols.filter(sym=>{ const lastTs=state.cooldown?.[sym.base]||0; return !(lastTs&&(Date.now()-lastTs)<COOLDOWN_MS); });
            log(`📋 Eligible symbols after cooldown filter: ${eligibleSymbols.length}/${bybitSymbols.length}`);

            for(let i=0;i<eligibleSymbols.length;i+=BATCH_SIZE){
              const batch=eligibleSymbols.slice(i,i+BATCH_SIZE);
              const batchResults=await Promise.all(batch.map(async(sym)=>{ try{ const metrics=await fetchGoldenMetrics(sym.symbol); if(!metrics) return null; return { ...sym, ...metrics, hedge_confidence:calculateHedgeConfidence(metrics) }; }catch(e){ return null; } }));
              for(const r of batchResults) if(r&&r.mark_price>0) allMetrics.push(r);
              if(i+BATCH_SIZE<eligibleSymbols.length) await sleep(BATCH_DELAY);
            }
            log(`📈 Fetched metrics for ${allMetrics.length}/${eligibleSymbols.length} symbols`);

            allMetrics.sort((a,b)=>b.hedge_confidence-a.hedge_confidence);

            const TOP_10_COUNT=10;
            const topCandidates=allMetrics.slice(0,TOP_10_COUNT);
            log(`🏆 Top 10 by hedge confidence (${HEDGE_MODE?"HEDGE=on":"Pusher 2 method"}):`);
            topCandidates.forEach((m,i)=>log(`   ${i+1}. ${m.symbol} conf=${m.hedge_confidence} vol1h=${m.vol_1h_pct.toFixed(2)}% fund=${(m.funding_rate*100).toFixed(4)}% oi_delta=${m.oi_delta_pct.toFixed(1)}% vol=$${Math.round(m.volume_1h_usd/1e6)}M spread=${m.spread_bps}bps`));

            const btcMetrics=allMetrics.find(m=>m.symbol==="BTCUSDT");
            const btcUp1h=btcMetrics?(btcMetrics.price_change_1h>0):true;
            const TARGET_TOP_N=Math.max(1,TOP_N||3);

            // Stability filter interval
            const stabilityIntervalMap={"1":"1","3":"3","5":"5","15":"15","30":"30","60":"60"};
            const stabilityInterval=stabilityIntervalMap[STABILITY_INTERVAL]||"1";
            log(`🔍 Stability filter: ${stabilityInterval}m candles (max ${MAX_FLUCT_PCT}% fluctuation)`);

            // Select candidates after stability filter
            let stableCandidates=[];
            for(const cand of topCandidates){
              if(stableCandidates.length>=TARGET_TOP_N) break;
              if(stableCandidates.some(s=>s.base===cand.base)) continue;
              const klines=await fetchBybitKlines(cand.symbol,stabilityInterval,5);
              const isStable=checkRecentStability(klines,MAX_FLUCT_PCT);
              if(!isStable){ log(`   ⏭️  Skip ${cand.symbol}: ${stabilityInterval}m fluctuation exceeds ${MAX_FLUCT_PCT}%`); continue; }
              stableCandidates.push(cand);
            }
            log(`✅ ${HEDGE_MODE?"Pusher 2":"Pusher 2"} symbol selection: ${stableCandidates.length} candidates (after ${stabilityInterval}m stability filter)`);

            let picksV2=[];

            if(HEDGE_MODE){
              // ============ HEDGE=on: Original behavior ============
              log("📊 HEDGE=on: Using funding-rate based side selection + flip");

              const withSide=stableCandidates.map(cand=>{
                const side=cand.funding_rate_raw>0?"short":"long";
                const atr_bps=Math.round(cand.vol_1h_pct*100);
                const tp_bps=Math.max(30,Math.round(atr_bps*0.9));
                const sl_bps=Math.min(80,Math.max(20,Math.round(atr_bps*0.5)));
                const cost_bps=COST_BPS+Math.round(cand.spread_bps/2);
                const p_win=0.50+0.15*Math.tanh(cand.vol_1h_pct/3);
                const ev_bps=Math.round(p_win*tp_bps-(1-p_win)*sl_bps-cost_bps);
                return {
                  symbol:cand.symbol, base:cand.base, quote:cand.quote, side, mark_price:cand.mark_price, spread_bps:cand.spread_bps,
                  tp_bps, sl_bps, cost_bps, rrr:+(tp_bps/sl_bps).toFixed(2),
                  p_win:+p_win.toFixed(3), p_lcb:+p_win.toFixed(3), p_raw:+p_win.toFixed(3),
                  ev_bps, exp_lcb_bps:ev_bps, regime:"hedge", style:"hedge",
                  vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate, funding_rate_raw:cand.funding_rate_raw,
                  oi_delta_pct:cand.oi_delta_pct, volume_1h_usd:cand.volume_1h_usd, basis_bps:cand.basis_bps,
                  current_oi_usd:cand.current_oi_usd, confidence:cand.hedge_confidence, hedge_confidence:cand.hedge_confidence,
                  hold_sec:3600,
                  reasons:reasonBuilder({ vol_1h_pct:cand.vol_1h_pct, funding_rate:cand.funding_rate, oi_delta_pct:cand.oi_delta_pct, volume_1h_usd:cand.volume_1h_usd, basis_bps:cand.basis_bps }),
                  ret5:[]
                };
              });

              const flipped=withSide.map(orig=>({ ...orig, side:orig.side==="long"?"short":"long", flipped:true }));
              const selectedWithFlipped=[...withSide,...flipped];
              const wEv=softmax(selectedWithFlipped.map(x=>x.exp_lcb_bps),20);

              picksV2=selectedWithFlipped.map((x,i)=>{
                const mid=x.mark_price;
                let entry_limit=null, tp_abs=null, sl_abs=null;
                if(mid!=null){ const slF=x.sl_bps/10000, tpF=x.tp_bps/10000; if(x.side==="long"){ entry_limit=mid*(1-Math.max(0.001,slF*0.5)); tp_abs=entry_limit*(1+tpF); sl_abs=entry_limit*(1-slF); }else{ entry_limit=mid*(1+slF); tp_abs=entry_limit*(1-tpF); sl_abs=entry_limit*(1+slF); } }
                const idea_id=uuidv4(), client_order_id=mkClientOrderId("byh");
                const ttl=clamp(Math.round((x.hold_sec||3600)+i*12),TTL_MIN,TTL_MAX);
                const size_bps=Number(process.env.FORCE_SIZE_BPS||"0")>0?Math.round(Number(process.env.FORCE_SIZE_BPS)):(x.sl_bps>0?Math.min(220,Math.round((wEv[i]*TARGET_PORT_RISK_BPS/x.sl_bps)*100)):0);
                return {
                  idea_id, client_order_id, symbol:x.base, symbol_full:x.symbol, symbolFull:x.symbol, quote:x.quote,
                  side:x.side, rank:i+1, target_exchange:TARGET_EXCHANGE, market_type:MARKET_TYPE,
                  margin_mode:MARGIN_MODE, leverage:LEVERAGE, entry_policy:"maker_join", exec:{ exec:"post_only" },
                  entry_mid:mid, entry_limit, tp_abs, sl_abs, tp_bps:x.tp_bps, sl_bps:x.sl_bps, rrr:x.rrr,
                  exp_lcb_bps:x.exp_lcb_bps, ev_bps:x.ev_bps, cost_bps:x.cost_bps, p_win:x.p_lcb, p_lcb:x.p_lcb,
                  p_raw:x.p_raw, calib_key:`side:${x.side}|regime:${x.regime}`, regime:x.regime, ttl_sec:ttl, size_bps,
                  predicted:{ ts_ms:Date.now(), p_cal:x.p_lcb, ev_bps:x.exp_lcb_bps??x.ev_bps, confidence_score:x.confidence, flipped:x.flipped||false, vol_1h_pct:x.vol_1h_pct, funding_rate:x.funding_rate, oi_delta_pct:x.oi_delta_pct, volume_1h_usd:x.volume_1h_usd, basis_bps:x.basis_bps, hedge_confidence:x.hedge_confidence },
                  confidence:x.confidence, reasons:x.reasons,
                  reasons_text:(x.reasons||[]).slice(0,3).map(r=>`${r.factor}:${r.value}(${r.contribution>=0?"+":""}${r.contribution})`),
                  hedge_metrics:{ vol_1h_pct:x.vol_1h_pct, funding_rate_raw:x.funding_rate_raw, oi_delta_pct:x.oi_delta_pct, volume_1h_usd:x.volume_1h_usd, basis_bps:x.basis_bps, mark_price:x.mark_price, current_oi_usd:x.current_oi_usd }
                };
              });

            } else {
              // ============ HEDGE=off: Full Pusher 1 analysis (NO learning) ============
              log("📊 HEDGE=off: Using full heavy analysis (read-only calibration, no learning)");

              // BTC 5m return series for correlation
              const kBTC5=await fetchBybitKlines("BTCUSDT","5",K5M);
              const btcR5=(()=>{ if(!kBTC5) return []; const c=[...kBTC5].reverse().map(x=>+x[4]); const r=[]; for(let i=1;i<c.length;i++) r.push(Math.log(c[i]/c[i-1])); return r.slice(-120); })();

              // Heavy analysis per symbol
              const analyzed=[];
              for(const cand of stableCandidates){
                const result=await analyzeSymbolHeavy(cand.symbol,cand.base,state,btcUp1h,btcR5);
                if(result) analyzed.push(result);
                await sleep(500);
              }
              log(`\n🎯 HEDGE=off final ideas: ${analyzed.length} directional (1 side per symbol)`);

              if(analyzed.length===0){
                log("⚠️  No ideas passed heavy analysis. Pushing 0 ideas.");
              }

              // Step A: Uniqueness filtering (correlation-based dedup)
              for(let i=0;i<analyzed.length;i++){
                let mx=0;
                for(let j=0;j<analyzed.length;j++){
                  if(i===j) continue;
                  const r=corr(analyzed[i].ret5||[],analyzed[j].ret5||[]);
                  mx=Math.max(mx,r||0);
                }
                analyzed[i].uniqMult=clamp(1-Math.max(0,mx-0.6)/0.4,0.6,1.1);
              }

              // Step B: Symbol historical performance adjustment (read from state)
              for(const x of analyzed){
                const symMult=getSymbolAdj(state,x.base);
                x.confidence=Math.round(x.confidence*x.uniqMult*symMult);
              }

              analyzed.sort((a,b)=>b.confidence-a.confidence);

              // Step C: Correlation dedup for final selection
              const finalPicks=[];
              for(const cand of analyzed){
                if(finalPicks.length>=TARGET_TOP_N) break;
                let ok=true;
                for(const s of finalPicks){
                  const r=corr(cand.ret5||[],s.ret5||[]);
                  if(r>0.98&&cand.side===s.side){ ok=false; break; }
                }
                if(ok) finalPicks.push(cand);
              }
              // Fill remaining if needed
              if(finalPicks.length<TARGET_TOP_N){
                const have=new Set(finalPicks.map(s=>s.symbol+":"+s.side));
                for(const c of analyzed){
                  if(finalPicks.length>=TARGET_TOP_N) break;
                  const k=c.symbol+":"+c.side;
                  if(!have.has(k)){ finalPicks.push(c); have.add(k); }
                }
              }
              if(finalPicks.length>TARGET_TOP_N) finalPicks.splice(TARGET_TOP_N);

              const wEv=softmax(finalPicks.map(x=>x.exp_lcb_bps),20);

              // Step D: Portfolio VaR/ES (t-Copula)
              let varStats={ VaR95_bps:0, ES95_bps:0 };
              try{
                varStats=portfolioVaR_ES_tCopula(finalPicks.map((p,i)=>({ ret5:p.ret5||[], size_bps:p.sl_bps>0?Math.min(220,Math.round((wEv[i]*TARGET_PORT_RISK_BPS/p.sl_bps)*100)):0, ttl_sec:3600 })),6);
                log(`📊 Portfolio VaR/ES: VaR95=${varStats.VaR95_bps}bps ES95=${varStats.ES95_bps}bps`);
              }catch(e){ log("VaR/ES warn",e?.message||e); }

              const varScale=(varStats.ES95_bps<-220)?clamp(-220/Math.min(-1e-6,varStats.ES95_bps),0.35,1):1;
              if(varScale<1) log(`📉 VaR/ES throttle: scaling sizes by ${varScale.toFixed(2)}`);

              picksV2=finalPicks.map((x,i)=>{
                const mid=x.mark_price;
                let entry_limit=null, tp_abs=null, sl_abs=null;
                if(mid!=null){ const slF=x.sl_bps/10000, tpF=x.tp_bps/10000; if(x.side==="long"){ entry_limit=mid*(1-Math.max(0.001,slF*0.5)); tp_abs=entry_limit*(1+tpF); sl_abs=entry_limit*(1-slF); }else{ entry_limit=mid*(1+slF); tp_abs=entry_limit*(1-tpF); sl_abs=entry_limit*(1+slF); } }
                const idea_id=uuidv4(), client_order_id=mkClientOrderId("byu");
                const ttl=clamp(Math.round(3600+i*12),TTL_MIN,TTL_MAX);
                const raw_size=x.sl_bps>0?Math.min(220,Math.round((wEv[i]*TARGET_PORT_RISK_BPS/x.sl_bps)*100)):0;
                const size_bps=Number(process.env.FORCE_SIZE_BPS||"0")>0?Math.round(Number(process.env.FORCE_SIZE_BPS)):Math.max(4,Math.round(raw_size*varScale));
                return {
                  idea_id, client_order_id, symbol:x.base, symbol_full:x.symbol, symbolFull:x.symbol, quote:"USDT",
                  side:x.side, rank:i+1, target_exchange:TARGET_EXCHANGE, market_type:MARKET_TYPE,
                  margin_mode:MARGIN_MODE, leverage:LEVERAGE, entry_policy:"maker_join", exec:{ exec:"post_only" },
                  entry_mid:mid, entry_limit, tp_abs, sl_abs, tp_bps:x.tp_bps, sl_bps:x.sl_bps, rrr:x.rrr,
                  exp_lcb_bps:x.exp_lcb_bps, ev_bps:x.ev_bps, cost_bps:x.cost_bps, p_win:x.p_lcb, p_lcb:x.p_lcb,
                  p_raw:x.p_raw, calib_key:`side:${x.side}|regime:${x.regime}`, regime:x.regime, ttl_sec:ttl, size_bps,
                  predicted:{ ts_ms:Date.now(), p_cal:x.p_lcb, ev_bps:x.exp_lcb_bps??x.ev_bps, confidence_score:x.confidence, flipped:false, hedge_mode:"off", tfAlign:x.tfAlign, obi:x.obi, ofi30s:x.ofi30s, micro_bias_bps:x.micro_bias_bps, btc_corr:x.btc_corr, mtf_agg:x.mtf_agg },
                  confidence:x.confidence, reasons:x.reasons,
                  reasons_text:(x.reasons||[]).slice(0,3).map(r=>`${r.factor}:${r.value}(${r.contribution>=0?"+":""}${r.contribution})`),
                  trend5m:x.trend5m,
                  uniq_mult:x.uniqMult
                };
              });
            }

            // ============ CONVERT TO V1 COMPAT ============
            const toV1Compat=(pv2)=>({
              idea_id:pv2.idea_id, client_order_id:pv2.client_order_id, symbol:pv2.symbol, symbol_full:pv2.symbol_full,
              quote:pv2.quote, side:pv2.side, rank:pv2.rank, entry_policy:"smart_swing_limit", entry_type:"limit",
              activation:"on_fill", entry_mid:pv2.entry_mid, entry_limit:pv2.entry_limit, tp_abs:pv2.tp_abs, sl_abs:pv2.sl_abs,
              tp_bps:pv2.tp_bps, sl_bps:pv2.sl_bps, rrr:pv2.rrr, exp_lcb_bps:pv2.exp_lcb_bps, ev_bps:pv2.ev_bps,
              cost_bps:pv2.cost_bps, p_win:pv2.p_lcb, p_lcb:pv2.p_lcb, p_raw:pv2.p_raw, calib_key:pv2.calib_key,
              regime:pv2.regime, ttl_sec:pv2.ttl_sec, size_bps:pv2.size_bps,
              predicted:{ ...pv2.predicted, meta:{ strategy:STRATEGY_NAME, model_version:MODEL_VERSION, schema_version:SCHEMA_VERSION, git_sha:GIT_SHA, config_hash:CONFIG_HASH, futures_hint:{ target_exchange:pv2.target_exchange, market_type:pv2.market_type, margin_mode:pv2.margin_mode, leverage:pv2.leverage, entry_policy_override:pv2.entry_policy, exec:pv2.exec } } },
              confidence:pv2.confidence, reasons:pv2.reasons, reasons_text:pv2.reasons_text,
              hedge_metrics:pv2.hedge_metrics, trend5m:pv2.trend5m
            });

            let picks=picksV2.map(toV1Compat);

            // ============ UPDATE STATE ============
            try{
              const nowMs=Date.now(), ideasTs=new Date(nowMs).toISOString();
              for(const p of picks){
                state.cooldown[p.symbol]=nowMs;
                state.cooldown_side[p.symbol]={ side:p.side, ts_ms:nowMs };
                state.pending.push({
                  ts:ideasTs, ts_ms:nowMs, ttl_ts_ms:nowMs+p.ttl_sec*1000,
                  symbolFull:p.symbol_full, flipped:p.predicted?.flipped||false, base:p.symbol, quote:p.quote, side:p.side,
                  entry_limit:p.entry_limit, tp_abs:p.tp_abs, sl_abs:p.sl_abs, hold_sec:p.ttl_sec,
                  tp_bps:p.tp_bps, sl_bps:p.sl_bps, cost_bps:p.cost_bps, tier:"confidence",
                  p_lcb:p.p_lcb, p_raw:p.p_raw, calib_key:p.calib_key, predicted:p.predicted, regime:p.regime,
                  decision_context:{ source:"bybit_linear", hedge_mode:HEDGE_MODE?"on":"off" },
                  notional_usd:NOTIONAL, size_bps:p.size_bps, idea_id:p.idea_id, client_order_id:p.client_order_id,
                  hedge_metrics:p.hedge_metrics, trend5m:p.trend5m,
                  status:"planned", entry_ts_ms:null, entry_price:null, qty:null
                });
              }
              if(state.pending.length>550) state.pending=state.pending.slice(-550);
              log("DEBUG: Appended",picks.length,"plans. New pending length=",(state.pending||[]).length,"example ID:",state.pending.slice(-1)[0]?.client_order_id||"none");
            }catch(e){ log("state update warn",e?.message||e); }

            await saveState(persist,state,2,true);

            // ============ LOGGING ============
            log("\n💡 Sending ideas:");
            for(const p of picks){
              if(HEDGE_MODE) log(`idea ${p.symbol_full} ${p.side} conf=${p.confidence} vol1h=${(p.predicted?.vol_1h_pct||0).toFixed(2)}% fund=${((p.hedge_metrics?.funding_rate_raw||0)*100).toFixed(4)}% reasons=${(p.reasons_text||[]).join("; ")}`);
              else log(`idea ${p.symbol_full} ${p.side} conf=${p.confidence} p_lcb=${p.p_lcb.toFixed(3)} ev=${p.ev_bps}bps tp=${p.tp_bps}bps sl=${p.sl_bps}bps regime=${p.regime}`);
            }

            const ideaLogs=picks.map(p=>({ symbol:p.symbol_full, side:p.side, flipped:p.predicted?.flipped||false, confidence:p.confidence, p_cal:+p.p_lcb.toFixed(3), ev_bps:p.ev_bps, idea_id:p.idea_id }));

            const meta={
              origin:"github_actions", reason, exchange:"bybit_linear", execution_exchange:"bybit_linear",
              strategy:STRATEGY_NAME, model_version:MODEL_VERSION, schema_version:SCHEMA_VERSION, git_sha:GIT_SHA,
              config_hash:CONFIG_HASH, hedge_mode:HEDGE_MODE?"on":"off", stability_interval:stabilityInterval+"m",
              counts:{ bybit_universe:bybitSymbols.length, metrics_fetched:allMetrics.length, stable_candidates:stableCandidates.length, selected:picks.length },
              dd_gate:{ pnl24_bps, peak_dd_bps, throttle },
              tod:{ active:S_H!=null&&E_H!=null, start:S_H, end:E_H },
              tier:selectionTier, idea_logs:ideaLogs,
              extras:{ v2_ideas:picksV2, features_requested:["maker_join","post_only","linear",HEDGE_MODE?"hedge_trading":"directional_trading","bybit_execution"] }
            };

            const payload={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta, top_n:picks.length||0, ideas:picks||[] };
            log(`\npushing ${picks.length} ideas (${selectionTier}, hedge=${HEDGE_MODE?"on":"off"}) to ${PUSH_URL}`);
            try{
              const r=await fetchWithTimeout(PUSH_URL,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payload) },15000);
              let txt=""; try{ txt=await r.text(); }catch{}
              log("push status",r?.status||"ERR",(txt||"").slice(0,400));
            }catch(e){ log("push failed",e?.message||e); }

            if(PUSH_URL_V2){
              const payloadV2={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta:{ origin:"github_actions_v2_bybit", strategy:STRATEGY_NAME, data_source:"bybit_linear", hedge_mode:HEDGE_MODE?"on":"off", execution:"bybit_linear" }, top_n:picksV2.length, ideas:picksV2 };
              log(`pushing ${picksV2.length} v2 ideas to ${PUSH_URL_V2}`);
              try{
                const r2=await fetchWithTimeout(PUSH_URL_V2,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payloadV2) },15000);
                let txt2=""; try{ txt2=await r2.text(); }catch{}
                log("push v2 status",r2?.status||"ERR",(txt2||"").slice(0,400));
              }catch(e){ log("push v2 failed",e?.message||e); }
            }

          }catch(e){
            reason=reason!=="ok"?reason:"data_error";
            const payload={ ts:new Date().toISOString(), mode:"normal", source:"external_pusher", meta:{ origin:"github_actions", reason, error:(e?.message||String(e)).slice(0,220), exchange:"bybit_linear", hedge_mode:HEDGE_MODE?"on":"off" }, top_n:0, ideas:[] };
            log("pushing 0 ideas to",PUSH_URL);
            try{
              const r=await fetchWithTimeout(PUSH_URL,{ method:"POST", headers:{ "Content-Type":"application/json","Authorization":"Bearer "+PUSH_TOKEN }, body:JSON.stringify(payload) },15000);
              let txt=""; try{ txt=await r.text(); }catch{}
              log("push status",r?.status||"ERR",(txt||"").slice(0,200));
            }catch(e2){ log("push failed",e2?.message||e2); }
          }
          })();
          NODE

          EXIT_CODE=$?

          set -e
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "[gha] pusher exited with code $EXIT_CODE — sending minimal payload"
            raw_push_url="$(printf '%s' "${WORKER_PUSH_URL}" | tr -d '\r\n')"
            health_url="$(printf '%s' "${raw_push_url}" | sed -E 's#/signals/push(\?.*)?$#/health#')"
            echo "[gha] fallback health GET ${health_url}"
            http_code_h=$(curl -g -sS -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${PUSH_TOKEN}" --max-time 8 "${health_url}" || true)
            echo "[gha] fallback health status ${http_code_h}"
            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            payload='{"ts":"'"${now}"'","mode":"normal","source":"external_pusher","meta":{"origin":"github_actions","reason":"fallback_node_error","exchange":"bybit_linear"},"top_n":0,"ideas":[]}'
            echo "[gha] pushing 0 ideas to ${raw_push_url}"
            mkdir -p /tmp
            : > /tmp/push_resp.txt
            http_code=$(curl -g -sS -o /tmp/push_resp.txt -w "%{http_code}" -X POST -H "Content-Type: application/json" -H "Authorization: Bearer ${PUSH_TOKEN}" --data-raw "${payload}" --max-time 12 "${raw_push_url}" || true)
            body="$(head -c 400 /tmp/push_resp.txt || true)"
            echo "[gha] push status ${http_code} ${body}"
            exit 0
          fi
