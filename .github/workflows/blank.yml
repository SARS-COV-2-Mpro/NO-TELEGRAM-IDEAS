              if(!s.cooldown)s.cooldown={}; if(!s.cooldown_side)s.cooldown_side={}; if(!s.cooldown_side_regime)s.cooldown_side_regime={}; if(!Array.isArray(s.pending))s.pending=[]; if(!Array.isArray(s.closed))s.closed=[]; if(!Array.isArray(s.equity))s.equity=[]; if(!s.mr_lockout)s.mr_lockout={}; if(!s.sym_stats)s.sym_stats={}; if(!s.sym_stats_real)s.sym_stats_real={}; if(!s.calibCoeffs)s.calibCoeffs={}; if(!Array.isArray(s.calibration_holdout))s.calibration_holdout=[]; if(!s.lastReconcileTs)s.lastReconcileTs=0; if(!Array.isArray(s.learned_trade_keys))s.learned_trade_keys=[]; if(!s.calib_symbol_counts)s.calib_symbol_counts={}; if(s.run_counter==null)s.run_counter=0; if(!s.regime_state)s.regime_state={}; if(!s.regime_history)s.regime_history={}; if(!s.regime_last_update)s.regime_last_update={};
              if(s.calib_last_version!==CALIB_VERSION){ log(`🔄 Calibration version change: ${s.calib_last_version} → ${CALIB_VERSION}`); s.calibCoeffs={}; s.calib_last_version=CALIB_VERSION; }
              return { state:s, persist:{ id, token, etag } };
            }catch(e){ log("loadState warn",e?.message||e); return { state:init, persist:null }; }
          }

          function mergeStates(remote,local){
            const merged={...remote};
            merged.run_counter=Math.max(local.run_counter||0,remote.run_counter||0);
            const remoteKeys=Array.isArray(remote.learned_trade_keys)?remote.learned_trade_keys:[];
            const localKeys=Array.isArray(local.learned_trade_keys)?local.learned_trade_keys:[];
            const localSet=new Set(localKeys);
            merged.learned_trade_keys=[...remoteKeys.filter(k=>!localSet.has(k)),...localKeys].slice(-2000);
            const rCounts=remote.calib_symbol_counts||{}, lCounts=local.calib_symbol_counts||{};
            const mergedCounts={};
            for(const k of new Set([...Object.keys(rCounts),...Object.keys(lCounts)])) mergedCounts[k]=(rCounts[k]||0)+(lCounts[k]||0);
            merged.calib_symbol_counts=mergedCounts;
            const dropSet=new Set((local.__drop_pending_cids||[]).map(x=>String(x).trim()).filter(Boolean));
            const id=(p)=>String(p?.client_order_id||p?.clientOrderId||p?.idea_id||"").trim();
            const remotePending=(remote.pending||[]).filter(p=>!dropSet.has(id(p)));
            const remoteIds=new Set(remotePending.map(id));
            const newLocalPending=(local.pending||[]).filter(p=>{ const k=id(p); return k&&!remoteIds.has(k); });
            merged.pending=[...remotePending,...newLocalPending];
            merged.equity=Array.isArray(remote.equity)?remote.equity:[];
            merged.sym_stats_real=remote.sym_stats_real||{};
            merged.sym_stats=remote.sym_stats||{};
            merged.lastReconcileTs=remote.lastReconcileTs||0;
            if('fees'in remote) merged.fees=remote.fees;
            merged.cooldown=local.cooldown||{};
            merged.cooldown_side=local.cooldown_side||{};
            merged.mr_lockout=local.mr_lockout||{};
            merged.calibCoeffs={};
            const allKeys=new Set([...Object.keys(remote.calibCoeffs||{}),...Object.keys(local.calibCoeffs||{})]);
            for(const key of allKeys){
              const r=remote.calibCoeffs?.[key], l=local.calibCoeffs?.[key];
              if(!r) merged.calibCoeffs[key]=l;
              else if(!l) merged.calibCoeffs[key]=r;
              else{ const newer=((r.n||0)>=(l.n||0))?r:l, older=((r.n||0)>=(l.n||0))?l:r; merged.calibCoeffs[key]={ ...newer, recent_errors:[...(newer.recent_errors||[]),...(older.recent_errors||[])].slice(-CALIB_ERROR_WINDOW), recent_predictions:[...(newer.recent_predictions||[]),...(older.recent_predictions||[])].slice(-100) }; }
            }
            const keyClosed=(c)=>{ const cid=c?.trade_details?.client_order_id||c.client_order_id||c.idea_id||""; const tx=c?.ts_exit_ms||c?.exit_ts_ms||""; return `${cid}|${tx}`; };
            const localClosedMap=new Map((local.closed||[]).map(c=>[keyClosed(c),c]));
            merged.closed=(remote.closed||[]).map(rc=>{ const lc=localClosedMap.get(keyClosed(rc)); if(!lc) return rc; const learned=Boolean(rc.learned||lc.learned); const learned_at_ts=learned?(rc.learned_at_ts||lc.learned_at_ts||Date.now()):undefined; return {...rc,learned,learned_at_ts}; });
            merged.regime_state={...(remote.regime_state||{}),...(local.regime_state||{})};
            merged.regime_history={...(remote.regime_history||{}),...(local.regime_history||{})};
            merged.regime_last_update={...(remote.regime_last_update||{}),...(local.regime_last_update||{})};
            merged.version_ts=Date.now();
            log("[gha] mergeStates: remote_pending_after_drops",remotePending.length,"appended_new_local",newLocalPending.length,"merged_pending",merged.pending.length);
            return merged;
          }

          async function saveState(persist,state,auditOut,retries=2,blindFallback=true){
            if(!persist){ log("WARN: No persist—skipping Gist save."); return; }
            const gistUrl=`https://api.github.com/gists/${persist.id}`;
            const mkFiles=(s)=>({ "state.json":{ content:JSON.stringify(s) } });
            const wipeToEmpty=state&&Object.keys(state).length===1&&state.run_counter===0;
            async function patch(files,etag){ const headers={ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json","User-Agent":UA }; if(etag) headers["If-Match"]=etag; return await fetchWithTimeout(gistUrl,{ method:"PATCH", headers, body:JSON.stringify({files}) },15000); }
            let toSave=state, etag=persist.etag||null;
            for(let attempt=0;attempt<=retries;attempt++){
              log("DEBUG: saveState attempt",attempt,"etag?",!!etag,"pending=",(toSave.pending||[]).length);
              const r=await patch(mkFiles(toSave),etag);
              if(r.ok){ const newEtag=r.headers.get("etag"); persist.etag=newEtag||persist.etag; log("SUCCESS: Gist updated! Status=",r.status,"pending now=",(toSave.pending||[]).length); return; }
              const body=(await r.text().catch(()=>""))?.slice(0,300)||"";
              log("WARN: saveState failed status=",r.status,"body=",body);
              if(r.status===429){ const ra=Number(r.headers.get("retry-after")||2); await sleep(ra*1000); continue; }
              if(r.status===412){
                if(wipeToEmpty){ log("DEBUG: 412 during wipe - skipping merge"); break; }
                const r2=await fetchWithTimeout(gistUrl,{ headers:{ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","User-Agent":UA } },12000);
                if(!r2.ok){ log("ERROR: Refetch for merge failed status=",r2.status); break; }
                const remoteEtag=r2.headers.get("etag"); const remoteGist=await r2.json(); const remoteContent=remoteGist.files?.["state.json"]?.content; const remoteState=remoteContent?JSON.parse(remoteContent):{};
                toSave=mergeStates(remoteState,state); etag=remoteEtag||null;
                await sleep(250+Math.floor(Math.random()*250)); continue;
              }
              break;
            }
            if(blindFallback){
              log("WARN: Falling back to blind PATCH (no If-Match).");
              if(!wipeToEmpty){
                try{ const r2=await fetchWithTimeout(gistUrl,{ headers:{ Authorization:`Bearer ${persist.token}`,"Accept":"application/vnd.github+json","User-Agent":UA } },12000); if(r2.ok){ const remoteGist=await r2.json(); const remoteContent=remoteGist.files?.["state.json"]?.content; const remoteState=remoteContent?JSON.parse(remoteContent):{}; toSave=mergeStates(remoteState,state); log("DEBUG: Pre-blind-patch merge successful."); } else log("WARN: Pre-blind-patch re-fetch failed status=",r2.status); }catch(e){ log("ERROR: Exception during pre-blind-patch re-fetch:",e?.message||String(e)); }
              } else { toSave={run_counter:0}; log("DEBUG: WipeToEmpty=true → skipping pre-merge"); }
              const r3=await patch(mkFiles(toSave),null);
              if(r3.ok){ const newEtag=r3.headers.get("etag"); persist.etag=newEtag||persist.etag; log("SUCCESS: Blind Gist update ok. pending=",(toSave.pending||[]).length); }
              else{ const body=(await r3.text().catch(()=>""))?.slice(0,300)||""; log("ERROR: Blind save failed status=",r3.status,"body=",body); }
            }
          }

          const regFromKey=(k)=>k?.includes("regime:trend")?"trend":k?.includes("regime:meanrevert")?"meanrevert":null;

          function cleanExpiredCooldowns(state){
            const now=Date.now();
            if(state.cooldown) for(const [base,ts] of Object.entries(state.cooldown)) if(now-ts>=COOLDOWN_MS) delete state.cooldown[base];
            if(state.cooldown_side) for(const [base,obj] of Object.entries(state.cooldown_side)) if(now-(obj.ts_ms||0)>=COOLDOWN_MS) delete state.cooldown_side[base];
            if(state.mr_lockout) for(const [sym,expiry] of Object.entries(state.mr_lockout)) if(now>=expiry) delete state.mr_lockout[sym];
            if(state.cooldown_side_regime) for(const [key,ts] of Object.entries(state.cooldown_side_regime)) if(now-ts>=COOLDOWN_MS) delete state.cooldown_side_regime[key];
            log(`🧹 Cleaned cooldowns: ${Object.keys(state.cooldown||{}).length} base, ${Object.keys(state.cooldown_side||{}).length} side, ${Object.keys(state.cooldown_side_regime||{}).length} side_regime`);
          }

          function cleanExpiredClosedTrades(state){
            const MAX_CLOSED_TRADES=10;
            if(!Array.isArray(state.closed)){ state.closed=[]; return; }
            if(state.closed.length<=MAX_CLOSED_TRADES){ log(`📦 Closed trades: ${state.closed.length}/${MAX_CLOSED_TRADES}`); return; }
            state.closed.sort((a,b)=>(b.ts_exit_ms||b.exit_ts_ms||0)-(a.ts_exit_ms||a.exit_ts_ms||0));
            const removed=state.closed.length-MAX_CLOSED_TRADES;
            state.closed=state.closed.slice(0,MAX_CLOSED_TRADES);
            log(`🗑️  Kept ${MAX_CLOSED_TRADES} most recent closed trades, removed ${removed}`);
          }

          const getCoeffs=(state,side,regime)=>{ const key=`${side}_${regime}`; if(!state.calibCoeffs) state.calibCoeffs={}; if(!state.calibCoeffs[key]) return null; const existing=state.calibCoeffs[key]; if(existing.version!==CALIB_VERSION){ const def={ version:CALIB_VERSION, a:0, b:1, n:0, n_tp:0, n_sl:0, momentum_a:0, momentum_b:0, recent_errors:[], recent_predictions:[], last_reset_n:0, created_at:existing.created_at||Date.now(), last_updated:Date.now() }; state.calibCoeffs[key]=def; return def; } return existing; };

          function learnFromGistRealFills(state){
            if(!Array.isArray(state.learned_trade_keys)) state.learned_trade_keys=[];
            const learnedSet=new Set(state.learned_trade_keys);
            if(!state.calib_symbol_counts) state.calib_symbol_counts={};
            const learnable=(state.closed||[]).filter(c=>c.reconciliation==="exchange_trade_history"&&!c.learned&&c.p_raw!=null&&isFinite(c.p_raw)&&c.p_raw>0.01&&c.p_raw<0.99);
            if(learnable.length===0){ log("📚 No new fills to learn from this cycle."); return; }
            log(`📚 Learning from ${learnable.length} real fills...`);
            const pRawValues=learnable.map(c=>c.p_raw).filter(p=>p!=null);
            const pMean=mean(pRawValues), pStd=std(pRawValues)||0.1;
            const useOutlierFilter=learnable.length>=20&&pStd>0;
            let stats={ learned:0, skipped_ttl:0, skipped_dup:0, skipped_invalid:0, skipped_poison:0, skipped_outlier:0 };
            for(const c of learnable){
              const reg=c.regime||regFromKey(c.calib_key);
              if(!reg||!c.side){ stats.skipped_invalid++; continue; }
              if(useOutlierFilter&&Math.abs((c.p_raw-pMean)/pStd)>OUTLIER_ZSCORE){ stats.skipped_outlier++; continue; }
              const cid=c.client_order_id||c.trade_details?.client_order_id||"";
              const sym=c.symbolFull||c.symbol||"UNK", side=c.side||"?", exit=c.exit_reason||"";
              const tEntry=Math.floor((c.ts_entry_ms||c.entry_ts_ms||0)/1000), tExit=Math.floor((c.ts_exit_ms||c.exit_ts_ms||0)/1000);
              const learn_key=crypto.createHash('sha256').update(`${cid}|${sym}|${side}|${tEntry}|${tExit}|${exit}`).digest('hex').slice(0,32);
              if(learnedSet.has(learn_key)){ stats.skipped_dup++; continue; }
              const symCountKey=`${side}_${reg}_${sym}`;
              const currentTotal=state.calibCoeffs?.[`${side}_${reg}`]?.n||0, currentSymCount=state.calib_symbol_counts[symCountKey]||0;
              if((currentTotal+1)>20&&(currentSymCount+1)/(currentTotal+1)>MAX_SYMBOL_CONTRIBUTION){ stats.skipped_poison++; continue; }
              const tp_hit=exit==="tp"||c.realized?.tp_hit===true, sl_hit=exit==="sl"||c.realized?.sl_hit===true;
              if(!tp_hit&&!sl_hit){ stats.skipped_ttl++; c.learned_skip_reason="ttl_exit"; continue; }
              const pnl=c.pnl_bps||0;
              if((tp_hit&&pnl<-10)||(sl_hit&&pnl>10)){ stats.skipped_invalid++; continue; }
              const outcome=tp_hit?1:0;
              try{ updateCalibration(state,c.side,reg,c.p_raw,outcome); learnedSet.add(learn_key); state.calib_symbol_counts[symCountKey]=currentSymCount+1; c.learned=true; c.learned_at_ts=Date.now(); stats.learned++; }
              catch(e){ stats.skipped_invalid++; }
            }
            state.learned_trade_keys=Array.from(learnedSet).slice(-2000);
            log(`✅ Learned=${stats.learned} | Skipped: TTL=${stats.skipped_ttl} Dup=${stats.skipped_dup} Invalid=${stats.skipped_invalid} Poison=${stats.skipped_poison} Outlier=${stats.skipped_outlier}`);
          }

          function validateCalibration(state){
            const report={};
            for(const key of Object.keys(state.calibCoeffs||{})){
              const coeff=state.calibCoeffs[key];
              if(coeff.n<CALIB_MIN_SAMPLES){ report[key]={ status:"insufficient_data", n:coeff.n }; continue; }
              const predictions=coeff.recent_predictions||[];
              let brier_cal=null;
              if(predictions.length>=10){ const clamp01=p=>Math.max(1e-6,Math.min(1-1e-6,p)); brier_cal=mean(predictions.map(p=>(p.outcome-clamp01(p.p_cal))**2)); }
              const avg_error=mean(coeff.recent_errors||[]);
              const win_rate=coeff.n>0?(coeff.n_tp||0)/coeff.n:null;
              const is_healthy=avg_error<0.38&&coeff.b>0.1&&Math.abs(coeff.a)<COEFF_BOUND_A*0.8&&Math.abs(coeff.b)<COEFF_BOUND_B*0.8&&(brier_cal==null||brier_cal<0.23);
              report[key]={ n:coeff.n, n_tp:coeff.n_tp||0, n_sl:coeff.n_sl||0, win_rate:win_rate?.toFixed(3)||"N/A", a:coeff.a.toFixed(4), b:coeff.b.toFixed(4), avg_error:avg_error.toFixed(3), brier_cal:brier_cal?.toFixed(4)||"N/A", status:is_healthy?"healthy":"degraded" };
            }
            if(Object.keys(report).length>0){ log("📊 Calibration Health:"); for(const [k,v] of Object.entries(report)) log(`   ${k}: ${v.status} | n=${v.n} wr=${v.win_rate} brier=${v.brier_cal} a=${v.a} b=${v.b}`); }
            return report;
          }

          function updateCalibration(state,side,regime,pRaw,outcome){
            if(pRaw==null||!isFinite(pRaw)||pRaw<=0||pRaw>=1) return;
            const coeff=getCoeffs(state,side,regime);
            if(!coeff){ log(`⏭️  Skip learning [${side}_${regime}]: no existing calibration`); return; }
            if(!coeff.recent_predictions) coeff.recent_predictions=[];
            coeff.recent_predictions.push({ p_raw:pRaw, p_cal:calibrateP(state,side,regime,pRaw), outcome, ts:Date.now() });
            if(coeff.recent_predictions.length>100) coeff.recent_predictions.shift();
            const warmup_factor=Math.min(1,(coeff.n+1)/20);
            const lr=(MIN_LEARNING_RATE+(MAX_LEARNING_RATE-MIN_LEARNING_RATE)/Math.sqrt(1+coeff.n/10))*warmup_factor;
            const eps=1e-7, pSafe=Math.max(eps,Math.min(1-eps,pRaw));
            const x=Math.max(-6,Math.min(6,Math.log(pSafe/(1-pSafe))));
            const pHat=1/(1+Math.exp(-Math.max(-10,Math.min(10,coeff.a+coeff.b*x))));
            const error=outcome-pHat;
            coeff.momentum_a=MOMENTUM_RATE*coeff.momentum_a-lr*(-error);
            coeff.momentum_b=MOMENTUM_RATE*coeff.momentum_b-lr*(-error*x);
            const a_next=(1-LEARNING_DECAY*lr)*coeff.a+coeff.momentum_a;
            const b_next=(1-LEARNING_DECAY*lr)*coeff.b+coeff.momentum_b;
            if(b_next<0.05){ coeff.b=1.0; coeff.momentum_b=0; coeff.a=clamp(coeff.a,-1.0,1.0); }
            else{ coeff.a=clamp(a_next,-COEFF_BOUND_A,COEFF_BOUND_A); coeff.b=clamp(b_next,-COEFF_BOUND_B,COEFF_BOUND_B); }
            if(!coeff.recent_errors) coeff.recent_errors=[];
            coeff.recent_errors.push(Math.abs(error));
            if(coeff.recent_errors.length>CALIB_ERROR_WINDOW) coeff.recent_errors.shift();
            const alpha=0.1, weights=coeff.recent_errors.map((_,i)=>Math.exp(alpha*i)), ws=weights.reduce((a,b)=>a+b,0)||1;
            const weighted_error=coeff.recent_errors.reduce((acc,e,i)=>acc+e*weights[i],0)/ws;
            if(weighted_error>CALIBRATION_RESET_THRESHOLD&&coeff.n>CALIB_MIN_RESET_N&&(coeff.n-(coeff.last_reset_n||0))>20){ coeff.a=0; coeff.b=1; coeff.momentum_a=0; coeff.momentum_b=0; coeff.recent_errors=[]; coeff.last_reset_n=coeff.n; }
            coeff.n++; if(outcome===1) coeff.n_tp=(coeff.n_tp||0)+1; else coeff.n_sl=(coeff.n_sl||0)+1; coeff.last_updated=Date.now();
            state.calibCoeffs[`${side}_${regime}`]=coeff;
          }

          const calibrateP=(state,side,regime,pRaw)=>{ const coeff=getCoeffs(state,side,regime); if(!coeff||pRaw==null||!isFinite(pRaw)) return 0.5; const x=Math.max(-5,Math.min(5,logit(pRaw))); return sigmoid(coeff.a+coeff.b*x); };
          
          function getSymbolAdj(state,base){ const real=state.sym_stats_real?.[base]; const s=real||state.sym_stats?.[base]; if(!s||s.n<6) return 1.0; const winRate=s.wins/s.n; const avgPnL=s.pnl_sum/s.n; let m=1.0; if(winRate<0.4) m*=0.7; if(avgPnL<0) m*=0.8; return clamp(m,0.5,1.2); }
          
          function buildAuditOutputs(state){ const lastNClosed=(state.closed||[]).slice(-5000); const closedAudit=lastNClosed.map(x=>JSON.stringify(x)).join("\n"); return { closedAudit, disagreements:"", tradesCsv:"" }; }

          // ★ ================================================================
          // ★ MTF DIRECTION ANALYSIS ENGINE v2
          // ★ ================================================================
          async function runMTFDirectionAnalysis(symbol, originalSide, markPrice) {
            log(`\n🔬 [MTF] Starting deep direction analysis for ${symbol}...`);
            const result = {
              symbol, original_side: originalSide, final_side: originalSide,
              overridden: false, long_prob_pct: 50, short_prob_pct: 50,
              confidence_pct: 0, signals: [], reasons: [], detail: ""
            };

            try {
              const [k1m, k5m, k15m, k1h] = await Promise.all([
                fetchBybitKlines(symbol, 1,  30),
                fetchBybitKlines(symbol, 5,  96),
                fetchBybitKlines(symbol, 15, 64),
                fetchBybitKlines(symbol, 60, 48)
              ]);

              const signals = [];

              // ═══ SIGNAL 1: MULTI-TF SLOPE CONSENSUS (weight: 0.25) ═══
              const slopes = {};
              if(k5m  && k5m.length  >= 10) slopes["5m"]  = calcLinearRegressionSlope(k5m.map(c=>+c[4]));
              if(k15m && k15m.length >= 10) slopes["15m"] = calcLinearRegressionSlope(k15m.map(c=>+c[4]));
              if(k1h  && k1h.length  >= 10) slopes["1h"]  = calcLinearRegressionSlope(k1h.map(c=>+c[4]));

              const slopeEntries = Object.entries(slopes).filter(([,v]) => v !== null);
              if(slopeEntries.length >= 2) {
                const slopeDirs = slopeEntries.map(([,v]) => Math.sign(v));
                const allAgree  = slopeDirs.every(d => d === slopeDirs[0]);
                const majorDir  = slopeDirs.filter(d=>d>0).length >= slopeDirs.filter(d=>d<0).length ? 1 : -1;
                const tfWeight = { "5m": 0.25, "15m": 0.35, "1h": 0.40 };
                let wScore = 0;
                for(const [tf, slope] of slopeEntries) {
                  const w = tfWeight[tf] || 0.30;
                  wScore += Math.sign(slope) * Math.min(1, Math.abs(slope) / 0.12) * w;
                }
                const score = clamp(wScore, -1, 1) * (allAgree ? 1.0 : 0.6);
                const reason = allAgree
                  ? `All TFs aligned ${majorDir>0?"BULLISH":"BEARISH"}: ` + slopeEntries.map(([tf,v])=>`${tf}=${v.toFixed(3)}%`).join(", ")
                  : `TF conflict: ` + slopeEntries.map(([tf,v])=>`${tf}=${v.toFixed(3)}%`).join(", ");
                signals.push({ name:"multi_tf_slope", score, weight:0.25, reason });
              }

              // ═══ SIGNAL 2: RSI CONDITION + DIVERGENCE (weight: 0.15) ═══
              if(k5m && k5m.length >= 20) {
                const closes5m = k5m.map(c => +c[4]);
                const lows5m   = k5m.map(c => +c[3]);
                const highs5m  = k5m.map(c => +c[2]);
                const rsi5m    = rsi(closes5m, 14);

                if(rsi5m !== null) {
                  let rsiScore = 0, rsiReason = "";
                  if(rsi5m >= 75)      { rsiScore = -0.90; rsiReason = `RSI=${rsi5m.toFixed(1)} EXTREME OVERBOUGHT`; }
                  else if(rsi5m >= 65) { rsiScore = -0.45; rsiReason = `RSI=${rsi5m.toFixed(1)} overbought zone`; }
                  else if(rsi5m <= 25) { rsiScore =  0.90; rsiReason = `RSI=${rsi5m.toFixed(1)} EXTREME OVERSOLD`; }
                  else if(rsi5m <= 35) { rsiScore =  0.45; rsiReason = `RSI=${rsi5m.toFixed(1)} oversold zone`; }
                  else                 { rsiScore = (50 - rsi5m) / 60; rsiReason = `RSI=${rsi5m.toFixed(1)} neutral`; }

                  const rsiSeries = [];
                  for(let i=14; i<closes5m.length; i++) {
                    const r = rsi(closes5m.slice(0, i+1), 14);
                    if(r !== null) rsiSeries.push(r);
                  }

                  if(rsiSeries.length >= 10) {
                    const windowSize = Math.min(10, rsiSeries.length);
                    const recentLows  = lows5m.slice(-windowSize);
                    const recentHighs = highs5m.slice(-windowSize);
                    const recentRsi   = rsiSeries.slice(-windowSize);
                    const lowestIdx  = recentLows.indexOf(Math.min(...recentLows));
                    const highestIdx = recentHighs.indexOf(Math.max(...recentHighs));
                    const priceNewLow  = lowestIdx  >= windowSize - 3;
                    const priceNewHigh = highestIdx >= windowSize - 3;
                    const rsiAtLow  = recentRsi[lowestIdx];
                    const rsiAtHigh = recentRsi[highestIdx];
                    const rsiNow    = recentRsi[recentRsi.length - 1];
                    if(priceNewLow && rsiNow > rsiAtLow + 3 && rsiNow < 45) {
                      rsiScore = 0.80;
                      rsiReason += ` + BULLISH DIVERGENCE (price new low but RSI rising ${rsiAtLow.toFixed(0)}→${rsiNow.toFixed(0)})`;
                    } else if(priceNewHigh && rsiNow < rsiAtHigh - 3 && rsiNow > 55) {
                      rsiScore = -0.80;
                      rsiReason += ` + BEARISH DIVERGENCE (price new high but RSI falling ${rsiAtHigh.toFixed(0)}→${rsiNow.toFixed(0)})`;
                    }
                  }
                  signals.push({ name:"rsi_condition", score:rsiScore, weight:0.15, reason:rsiReason, rsiValue:+rsi5m.toFixed(1) });
                }
              }

              // ═══ SIGNAL 3: VOLUME-WEIGHTED DIRECTION (weight: 0.20) ═══
              if(k5m && k5m.length >= 12) {
                const last12 = k5m.slice(-12);
                let bullVolW = 0, bearVolW = 0;
                for(let i=0; i<last12.length; i++) {
                  const c     = last12[i];
                  const open  = +c[1], close = +c[4], vol = +c[5];
                  const weight = 0.5 + 0.5 * (i / (last12.length - 1));
                  const bodyRatio = Math.abs(close - open) / (Math.max(+c[2] - +c[3], 0.0001));
                  if(close >= open) bullVolW += vol * weight * bodyRatio;
                  else              bearVolW += vol * weight * bodyRatio;
                }
                const totalVol = bullVolW + bearVolW || 1;
                const volRatio = (bullVolW - bearVolW) / totalVol;
                const score    = clamp(volRatio * 1.5, -1, 1);
                const vols = k5m.map(c => +c[5]);
                const recentVol = mean(vols.slice(-4));
                const olderVol  = mean(vols.slice(-12, -4));
                const expanding = olderVol > 0 ? recentVol / olderVol : 1;
                const reason = `Vol direction: bull=${(bullVolW/totalVol*100).toFixed(0)}% bear=${(bearVolW/totalVol*100).toFixed(0)}%`
                  + ` | expansion=${expanding.toFixed(2)}x`
                  + ` → ${score > 0.2 ? "BUYERS" : score < -0.2 ? "SELLERS" : "balanced"}`;
                signals.push({ name:"volume_direction", score: score * Math.min(1.2, expanding), weight:0.20, reason });
              }

              // ═══ SIGNAL 4: PRICE STRUCTURE — HH/HL/LH/LL (weight: 0.10) ═══
              if(k15m && k15m.length >= 12) {
                const highs = k15m.map(c => +c[2]);
                const lows  = k15m.map(c => +c[3]);
                const recentHighs = highs.slice(-4);
                const recentLows  = lows.slice(-4);
                const priorHighs  = highs.slice(-8, -4);
                const priorLows   = lows.slice(-8, -4);
                const maxRecentH = Math.max(...recentHighs);
                const maxPriorH  = Math.max(...priorHighs);
                const minRecentL = Math.min(...recentLows);
                const minPriorL  = Math.min(...priorLows);
                const hh = maxRecentH > maxPriorH;
                const hl = minRecentL > minPriorL;
                const lh = maxRecentH < maxPriorH;
                const ll = minRecentL < minPriorL;
                let score = 0, reason = "", patternType = "no_pattern";
                if(hh && hl)       { score =  0.80; reason = "Structure: HH+HL = UPTREND (15m)"; patternType="uptrend"; }
                else if(lh && ll)  { score = -0.80; reason = "Structure: LH+LL = DOWNTREND (15m)"; patternType="downtrend"; }
                else if(hh && ll)  { score =  0.10; reason = "Structure: HH+LL = expanding range (volatile)"; patternType="expanding"; }
                else if(lh && hl)  { score = -0.05; reason = "Structure: LH+HL = contracting (squeeze)"; patternType="squeeze"; }
                else if(hh)        { score =  0.30; reason = "Structure: HH only — weakening uptrend"; patternType="weak_uptrend"; }
                else if(ll)        { score = -0.30; reason = "Structure: LL only — weakening downtrend"; patternType="weak_downtrend"; }
                else               { score =  0.00; reason = "Structure: no clear pattern"; patternType="no_pattern"; }
                signals.push({ name:"price_structure", score, weight:0.10, reason, patternType });
              }

              // ═══ SIGNAL 5: 1H MACRO DIRECTION (weight: 0.30) ═══
              if(k1h && k1h.length >= 12) {
                const closes1h = k1h.map(c => +c[4]);
                const slope1h  = calcLinearRegressionSlope(closes1h);
                const ema8  = ema(closes1h, 8);
                const ema21 = ema(closes1h, Math.min(21, closes1h.length));
                let emaCross = 0;
                if(ema8.length >= 2 && ema21.length >= 2) {
                  const ema8Last  = ema8[ema8.length - 1];
                  const ema21Last = ema21[ema21.length - 1];
                  emaCross = ema8Last > ema21Last ? 1 : -1;
                }
                const slopeScore = clamp(slope1h / 0.08, -1, 1);
                const score      = (slopeScore * 0.6 + emaCross * 0.4);
                const reason     = `1h macro: slope=${slope1h.toFixed(3)}% EMA8${emaCross>0?">":"<"}EMA21 → ${score>0.2?"BULLISH":score<-0.2?"BEARISH":"NEUTRAL"}`;
                signals.push({ name:"macro_1h", score: clamp(score, -1, 1), weight:0.30, reason });
              }

              // ═══ WEIGHTED SCORE AGGREGATION ═══
              let totalWeight = 0, weightedScore = 0;
              for(const sig of signals) {
                weightedScore += sig.score * sig.weight;
                totalWeight   += sig.weight;
              }
              const netScore = totalWeight > 0 ? weightedScore / totalWeight : 0;

              const rawLongProb  = clamp(0.5 + netScore * 0.45, 0.08, 0.92);
              const rawShortProb = 1 - rawLongProb;

              const signalDirs   = signals.map(s => Math.sign(s.score));
              const longSignals  = signalDirs.filter(d => d > 0).length;
              const shortSignals = signalDirs.filter(d => d < 0).length;
              const totalSignals = signals.length || 1;
              const agreementRatio = Math.max(longSignals, shortSignals) / totalSignals;

              const confidencePct = Math.round(clamp(Math.abs(netScore) * 100 * agreementRatio * 1.2, 5, 95));
              const longProbPct   = Math.round(rawLongProb  * 100);
              const shortProbPct  = Math.round(rawShortProb * 100);
              const mtfSide       = longProbPct >= 50 ? "long" : "short";
              const overridden    = mtfSide !== originalSide;

              const reasons = [];
              for(const sig of signals.sort((a,b) => Math.abs(b.score * b.weight) - Math.abs(a.score * a.weight))) {
                const dir = sig.score > 0.1 ? "📈" : sig.score < -0.1 ? "📉" : "➡️";
                reasons.push(`${dir} [${sig.name}] ${sig.reason}`);
              }

              log(`\n╔══════════════════════════════════════════════════════════`);
              log(`║ 🔬 MTF DIRECTION ANALYSIS v2: ${symbol}`);
              log(`║ Original side: ${originalSide.toUpperCase()} | MTF suggests: ${mtfSide.toUpperCase()}${overridden ? " ⚠️ OVERRIDE" : " ✅ CONFIRMED"}`);
              log(`║ Long probability:  ${longProbPct}%`);
              log(`║ Short probability: ${shortProbPct}%`);
              log(`║ Net score: ${netScore.toFixed(3)} | Confidence: ${confidencePct}%`);
              log(`║ Signal agreement: ${longSignals}L / ${shortSignals}S / ${totalSignals - longSignals - shortSignals}N out of ${totalSignals}`);
              log(`╠══════════════════════════════════════════════════════════`);
              for(const r of reasons) log(`║ ${r}`);
              log(`╠══════════════════════════════════════════════════════════`);
              if(overridden) {
                log(`║ ⚠️  MTF OVERRIDE: ${originalSide.toUpperCase()} → ${mtfSide.toUpperCase()} (prob: ${mtfSide === "long" ? longProbPct : shortProbPct}%)`);
              } else {
                log(`║ ✅ MTF CONFIRMED: ${originalSide.toUpperCase()} (prob: ${originalSide === "long" ? longProbPct : shortProbPct}%)`);
              }
              log(`╚══════════════════════════════════════════════════════════\n`);

              result.final_side     = mtfSide;
              result.overridden     = overridden;
              result.long_prob_pct  = longProbPct;
              result.short_prob_pct = shortProbPct;
              result.confidence_pct = confidencePct;
              result.net_score      = +netScore.toFixed(4);
              result.signals        = signals.map(s => ({ name:s.name, score:+s.score.toFixed(3), weight:s.weight, ...(s.rsiValue!=null?{rsiValue:s.rsiValue}:{}), ...(s.patternType?{patternType:s.patternType}:{}) }));
              result.reasons        = reasons;
              result.detail         = `score=${netScore.toFixed(3)} agree=${agreementRatio.toFixed(2)} long=${longProbPct}% short=${shortProbPct}% conf=${confidencePct}%`;

            } catch(e) {
              log(`[MTF] Error for ${symbol}:`, e?.message || e);
              result.detail = `error: ${e?.message || e}`;
            }

            return result;
          }

          // ================================================================
          // SIGNAL CONTRADICTION CHECK
          // ================================================================
          function applySignalContradictionCheck(candidates){
            const VOL_THRESH=0.15;
            const MACRO_THRESH=0.20;
            const RSI_HIGH=70, RSI_LOW=30;
            const WINPROB_FLOOR=55;
            const survivors=[];

            for(const cand of candidates){
              const isMeanRevert = cand.regime === "meanrevert";
              const STRUCT_AGAINST_LONG = isMeanRevert ? new Set([]) : new Set(["downtrend","weak_downtrend"]);
              const STRUCT_AGAINST_SHORT = isMeanRevert ? new Set([]) : new Set(["uptrend","weak_uptrend"]);
              const signals=cand.mtf?.signals||[];
              const getSig=(name)=>signals.find(s=>s.name===name);
              let strikes=0;
              const strikeReasons=[];

              // CHECK 1: Volume vs Direction
              const volScore=getSig("volume_direction")?.score??0;
              if(
                (cand.side==="long"  && volScore < -VOL_THRESH) ||
                (cand.side==="short" && volScore >  VOL_THRESH)
              ){
                strikes++;
                strikeReasons.push(`volume_against(${volScore.toFixed(2)})`);
              }

              // ★ FIX [CHANGE #8]: Add check for volume expansion in trend trades.
              if(cand.regime === "trend") {
                const volExp = cand.dir_analysis?.vol_expansion ?? 1.0;
                if(volExp < 0.70) {
                  strikes++;
                  strikeReasons.push(`vol_contracting(${volExp.toFixed(2)}x)`);
                  log(`[CONTRA-VOL-WARN] ${cand.symbol} ${cand.side.toUpperCase()} in trend with contracting volume — strike`);
                }
              }

              // CHECK 2: Price Structure vs Direction (categorical)
              const structPattern=getSig("price_structure")?.patternType??"no_pattern";
              if(
                (cand.side==="long"  && STRUCT_AGAINST_LONG.has(structPattern))  ||
                (cand.side==="short" && STRUCT_AGAINST_SHORT.has(structPattern))
              ){
                strikes++;
                strikeReasons.push(`structure_against(${structPattern})`);
              }

              // CHECK 3: 1h Macro vs Direction
              const macroScore=getSig("macro_1h")?.score??0;
              if(
                (cand.side==="long"  && macroScore <= -MACRO_THRESH) ||
                (cand.side==="short" && macroScore >=  MACRO_THRESH)
              ){
                strikes++;
                strikeReasons.push(`macro_1h_against(${macroScore.toFixed(2)})`);
              }

              // ★ FIX [CHANGE #5]: Make RSI check ADX-aware for strong trends.
              const rsiValue=getSig("rsi_condition")?.rsiValue??null;
              const adxValue = cand.dir_analysis?.adx ?? 15;
              if(rsiValue!=null){
                if(!isMeanRevert){
                  const strongTrend = adxValue >= 50;
                  const veryStrongTrend = adxValue >= 60;
                  const RSI_HIGH_ADJ = veryStrongTrend ? 85 : strongTrend ? 78 : RSI_HIGH;
                  const RSI_LOW_ADJ  = veryStrongTrend ? 15 : strongTrend ? 22 : RSI_LOW;
                  
                  if(
                    (cand.side==="long"  && rsiValue > RSI_HIGH_ADJ) ||
                    (cand.side==="short" && rsiValue < RSI_LOW_ADJ)
                  ){
                    strikes++;
                    strikeReasons.push(`rsi_extreme(${rsiValue})`);
                    if(strongTrend) {
                      log(`[CONTRA-ADX-NOTE] ${cand.symbol} RSI=${rsiValue} in strong trend (ADX=${adxValue.toFixed(0)}) — strike with adjusted threshold`);
                    }
                  }
                } else {
                  if(
                    (cand.side==="long"  && rsiValue < RSI_LOW) ||
                    (cand.side==="short" && rsiValue > RSI_HIGH)
                  ){
                    log(`[CONTRA-MR-CONFIRM] ${cand.symbol} RSI=${rsiValue} confirms mean-revert ${cand.side}`);
                  }
                }
              }

              // CHECK 5: Win Probability Floor
              const winProb=cand.side==="long"
                ? cand.mtf?.long_prob_pct
                : cand.mtf?.short_prob_pct;
              if((winProb??0) < WINPROB_FLOOR){
                strikes++;
                strikeReasons.push(`win_prob_low(${winProb}%)`);
              }

              cand.contradiction_strikes=strikes;
              cand.contradiction_reasons=strikeReasons;

              // DECISION
              if(strikes>=3){
                log(`[CONTRA-DROP] ${cand.symbol} ${cand.side.toUpperCase()} strikes=${strikes} [${strikeReasons.join(", ")}] — dropped`);
                continue;
              }
              if(strikes===2){
                const hasVolumeContra = strikeReasons.some(r => r.includes("volume_against"));
                const hasLowWinProb = strikeReasons.some(r => r.includes("win_prob_low"));
                if(hasVolumeContra && hasLowWinProb) {
                  log(`[CONTRA-DROP] ${cand.symbol} strikes=2 WITH volume+winprob conflict [${strikeReasons.join(", ")}] — hard drop`);
                  continue;
                }
                const before=cand.confidence;
                cand.confidence=Math.round(cand.confidence*0.65);
                log(`[CONTRA-WARN2] ${cand.symbol} strikes=2 [${strikeReasons.join(", ")}] confidence ${before}→${cand.confidence}`);
                if(cand.confidence<12){
                  log(`[CONTRA-DROP] ${cand.symbol} post-penalty confidence=${cand.confidence} below floor=12 — dropped`);
                  continue;
                }
              } else if(strikes===1){
                const before=cand.confidence;
                cand.confidence=Math.round(cand.confidence*0.85);
                log(`[CONTRA-WARN1] ${cand.symbol} strikes=1 [${strikeReasons.join(", ")}] confidence ${before}→${cand.confidence}`);
              } else {
                log(`[CONTRA-OK] ${cand.symbol} ${cand.side.toUpperCase()} strikes=0 — clean signal agreement`);
              }

              survivors.push(cand);
            }

            log(`[CONTRA] ${survivors.length}/${candidates.length} survived contradiction check`);
            return survivors;
          }
          
          async function refreshSignalBeforePush(cand, state){
            try{
              const freshTicker = await fetchBybitTicker(cand.symbol_full);
              if(!freshTicker) return cand;

              const freshPrice = freshTicker.markPrice || freshTicker.lastPrice;
              const originalPrice = cand.entry_mid;
              if(!originalPrice || !freshPrice) return cand;

              const priceDrift = Math.abs(freshPrice - originalPrice) / originalPrice;
              const atrFraction = (cand.atr_bps || 50) / 10000;

              if(priceDrift > atrFraction * 1.2){
                log(`[STALE-SIGNAL] ${cand.symbol_full} price drifted ${(priceDrift*100).toFixed(3)}% since analysis (ATR=${(atrFraction*100).toFixed(2)}%) — dropping`);
                return null;
              }

              const fresh1hChange = freshTicker.price1hPcnt || 0;
              
              if(cand.regime !== "meanrevert") {
                  if(cand.side === "long" && fresh1hChange < -0.03){
                    log(`[STALE-DIRECTION] ${cand.symbol_full} LONG signal but ${(fresh1hChange*100).toFixed(1)}% in last hour — dropping`);
                    return null;
                  }
                  if(cand.side === "short" && fresh1hChange > 0.03){
                    log(`[STALE-DIRECTION] ${cand.symbol_full} SHORT signal but +${(fresh1hChange*100).toFixed(1)}% in last hour — dropping`);
                    return null;
                  }
              }

              const slF = cand.sl_bps / 10000;
              const tpF = cand.tp_bps / 10000;
              const entryOffset = Math.max(0.0005, slF * 0.15);

              if(cand.side === "long"){
                cand.entry_mid   = freshPrice;
                cand.entry_limit = freshPrice * (1 - entryOffset);
                cand.tp_abs      = cand.entry_limit * (1 + tpF);
                cand.sl_abs      = cand.entry_limit * (1 - slF);
              } else {
                cand.entry_mid   = freshPrice;
                cand.entry_limit = freshPrice * (1 + entryOffset);
                cand.tp_abs      = cand.entry_limit * (1 - tpF);
                cand.sl_abs = cand.entry_limit * (1 + slF);
              }

              log(`[SIGNAL-FRESH] ${cand.symbol_full} ${originalPrice.toFixed(6)} → ${freshPrice.toFixed(6)} drift=${(priceDrift*100).toFixed(3)}%`);
              return cand;

            }catch(e){
              log(`[REFRESH-ERR] ${cand.symbol_full}:`, e?.message||e);
              return cand;
            }
          }

          // ================================================================
          // TOP_NNN SCORING FUNCTION
          // ================================================================
          function scoreIdeaForPush(p) {
            // ★ FIX [CHANGE #9]: Replace fixed win_prob floor with Kelly-adjusted edge check.
            const winProb = p.side === "long"
              ? (p.mtf_analysis?.long_prob_pct  ?? 0)
              : (p.mtf_analysis?.short_prob_pct ?? 0);
            const rrr = p.rrr || 1.5;
            const kellyEdge = (winProb/100) * rrr - (1 - winProb/100);
            const MIN_KELLY_EDGE = 0.10;

            const freshDepth = p._fresh_depth_usd ?? 0;
            const mtfOverridden = p.mtf_overridden === true;
            const mtfConf = p.mtf_analysis?.confidence_pct ?? 0;

            if (mtfOverridden && mtfConf < 65) {
              log(`[TOP_NNN-DQ] ${p.symbol_full}: MTF overridden + conf=${mtfConf}% < 65% → score=0`);
              return 0;
            }
            if (kellyEdge < MIN_KELLY_EDGE) {
              const expectedEdge = ((winProb/100) * rrr - (1 - winProb/100)) * 100;
              log(`[TOP_NNN-DQ] ${p.symbol_full}: Kelly edge=${expectedEdge.toFixed(1)}% < ${MIN_KELLY_EDGE*100}% (win_prob=${winProb}%, rrr=${rrr}) → score=0`);
              return 0;
            }
            if (freshDepth < MIN_PUSH_DEPTH_USD) {
              log(`[TOP_NNN-DQ] ${p.symbol_full}: depth=$${Math.round(freshDepth)} < $${MIN_PUSH_DEPTH_USD} → score=0`);
              return 0;
            }

            const signals = p.mtf_analysis?.signals || [];
            const getSig = (name) => signals.find(s => s.name === name);

            // ── STAGE 1: CRITICAL (65% of total score) ──
            let criticalScore = 0;

            // Rank 1 — MTF Signal Agreement (how many of 5 signals agree with final side)
            const finalSide = p.side;
            const agreeCount = signals.filter(s =>
              (finalSide === "long"  && s.score > 0.05) ||
              (finalSide === "short" && s.score < -0.05)
            ).length;
            const totalSigs = signals.length || 1;
            
            // ★ FIX [CHANGE #4]: Use ratio-based scoring for sparse data environments.
            const agreementRatio = agreeCount / totalSigs;
            let mtfAgreementScore;
            if(totalSigs <= 2) {
              mtfAgreementScore = agreementRatio >= 1.0 ? 0.90 :
                                  agreementRatio >= 0.5 ? 0.50 :
                                  0.20;
            } else {
              mtfAgreementScore = 
                agreeCount >= 4 ? 1.0 :
                agreeCount === 3 ? 0.6 :
                agreeCount === 2 ? 0.2 : 0.0;
            }
            criticalScore += mtfAgreementScore * 0.25;

            // Rank 2 — All TFs Aligned
            const slopeSig = getSig("multi_tf_slope");
            const allTFAligned = slopeSig?.reason?.includes("All TFs aligned") ?? false;
            const tfConflict   = slopeSig?.reason?.includes("TF conflict") ?? false;
            const tfAlignScore = allTFAligned ? 1.0 : tfConflict ? 0.0 : 0.4;
            criticalScore += tfAlignScore * 0.20;

            // Rank 3 — MTF Override Status
            let overrideScore;
            if (!mtfOverridden && mtfConf >= 65)       overrideScore = 1.0;
            else if (!mtfOverridden && mtfConf >= 45)  overrideScore = 0.75;
            else if (!mtfOverridden)                   overrideScore = 0.50;
            else if (mtfOverridden && mtfConf >= 65)   overrideScore = 0.35;
            else                                       overrideScore = 0.0;
            criticalScore += overrideScore * 0.20;

            const criticalMax = 0.25 + 0.20 + 0.20;
            const criticalNorm = criticalScore / criticalMax;
            const stage1 = criticalNorm * 0.65;

            // ── STAGE 2: HIGH TIER (25% of total score) ──
            let highScore = 0;

            // Rank 4 — RSI Extreme
            const rsiSig = getSig("rsi_condition");
            const rsiVal = rsiSig?.rsiValue ?? 50;
            const rsiScore =
              (rsiVal <= 25 || rsiVal >= 75) ? 1.0 :
              (rsiVal <= 35 || rsiVal >= 65) ? 0.6 :
              (rsiVal >= 45 && rsiVal <= 55) ? 0.0 : 0.3;
            highScore += rsiScore * 0.05;

            // Rank 5 — Price Structure
            const structSig = getSig("price_structure");
            const pattern = structSig?.patternType ?? "no_pattern";
            const structScore =
              (pattern === "uptrend"   && finalSide === "long")  ? 1.0 :
              (pattern === "downtrend" && finalSide === "short") ? 1.0 :
              (pattern === "weak_uptrend"   && finalSide === "long")  ? 0.6 :
              (pattern === "weak_downtrend" && finalSide === "short") ? 0.6 :
              (pattern === "squeeze" || pattern === "expanding") ? 0.2 :
              (pattern === "uptrend"   && finalSide === "short") ? 0.0 :
              (pattern === "downtrend" && finalSide === "long")  ? 0.0 : 0.3;
            highScore += structScore * 0.05;

            // Rank 6 — Win Probability (already >= 58 to reach here)
            const winProbScore = clamp((winProb - 58) / (85 - 58), 0, 1);
            highScore += winProbScore * 0.05;

            // Rank 7 — ATR Value
            const atrPct = (p.atr_bps ?? 0) / 100;
            const atrScore =
              atrPct >= 1.5 ? 1.0 :
              atrPct >= 1.0 ? 0.7 :
              atrPct >= 0.5 ? 0.4 : 0.1;
            highScore += atrScore * 0.05;

            // Rank 8 — Contradiction Strikes
            const strikes = p.contradiction_strikes ?? 0;
            const strikeScore = strikes === 0 ? 1.0 : strikes === 1 ? 0.5 : 0.1;
            highScore += strikeScore * 0.05;

            const highMax = 0.05 * 5;
            const highNorm = highScore / highMax;
            const stage2 = highNorm * 0.25;

            // ── STAGE 3: MEDIUM + LOW TIER (10% of total score) ──
            let secondaryScore = 0;

            // Rank 9 — Volume Direction
            const volSig = getSig("volume_direction");
            const volScore2 = volSig
              ? ((finalSide === "long" && volSig.score > 0) || (finalSide === "short" && volSig.score < 0)
                ? clamp(Math.abs(volSig.score), 0, 1) : 0)
              : 0.5;
            secondaryScore += volScore2 * 0.012;

            // Rank 10 — Macro 1H
            const macroSig = getSig("macro_1h");
            const macroAligned = macroSig
              ? ((finalSide === "long" && macroSig.score > 0) || (finalSide === "short" && macroSig.score < 0))
              : false;
            secondaryScore += (macroAligned ? clamp(Math.abs(macroSig?.score ?? 0), 0, 1) : 0) * 0.012;

            // Rank 11 — Depth
            const depthScore = clamp((freshDepth - MIN_PUSH_DEPTH_USD) / 40000, 0, 1);
            secondaryScore += depthScore * 0.012;

            // Rank 12 — Confidence Score
            const confScore = clamp((p.confidence - 15) / 60, 0, 1);
            secondaryScore += confScore * 0.010;

            // Rank 13 — Signal Drift (lower drift = better)
            const drift = p._price_drift ?? 0;
            const driftScore = clamp(1 - drift / 0.005, 0, 1);
            secondaryScore += driftScore * 0.008;

            // Rank 14 — CONTRA-MR-CONFIRM (bonus for MR trades with RSI confirmation)
            const isMR = p.regime === "meanrevert";
            const mrConfirm = isMR && (
              (finalSide === "long"  && rsiVal <= 35) ||
              (finalSide === "short" && rsiVal >= 65)
            );
            secondaryScore += (mrConfirm ? 1.0 : 0.0) * 0.008;

            // Rank 15 — Spread
            const spreadBps = p._fresh_spread_bps ?? 30;
            const spreadScore = clamp(1 - (spreadBps - 5) / 35, 0, 1);
            secondaryScore += spreadScore * 0.006;

            // Rank 16 — ATR Penalty (from dir_analysis)
            const atrPenalty = p.dir_analysis?.penalties?.atr ?? 1.0;
            secondaryScore += clamp(atrPenalty, 0, 1) * 0.006;

            // Rank 17 — Edge Value
            const edgeVal = Math.abs(p.dir_analysis?.dir_edge ?? 0);
            const edgeScore = clamp(edgeVal / 0.5, 0, 1);
            secondaryScore += edgeScore * 0.006;

            // Rank 18 — OI Delta Confirms
            const oiDelta = p.hedge_metrics?.oi_delta_pct ?? 0;
            const price1h  = p.hedge_metrics?.mark_price   ?? 0;
            const oiConfirms = (oiDelta > 0 && finalSide === "long") || (oiDelta < 0 && finalSide === "short");
            secondaryScore += (oiConfirms ? 1.0 : 0.0) * 0.006;

            // Rank 19 — Regime Confirmed
            const regConfirmed = p.dir_analysis?.regime_confirmed ?? false;
            secondaryScore += (regConfirmed ? 1.0 : 0.5) * 0.006;

            // Rank 20 — Vol Expansion
            const volExp = p.dir_analysis?.vol_expansion ?? 1.0;
            const volExpScore = clamp((volExp - 0.5) / 1.5, 0, 1);
            secondaryScore += volExpScore * 0.006;

            const stage3 = clamp(secondaryScore, 0, 0.10);

            const totalScore = stage1 + stage2 + stage3;

            log(`[TOP_NNN-SCORE] ${p.symbol_full} ${finalSide.toUpperCase()} | ` +
                `crit=${stage1.toFixed(3)} high=${stage2.toFixed(3)} sec=${stage3.toFixed(3)} ` +
                `TOTAL=${totalScore.toFixed(3)} | ` +
                `agree=${agreeCount}/${totalSigs} tfAlign=${allTFAligned} ` +
                `override=${mtfOverridden} winProb=${winProb}%`);

            return totalScore;
          }

          // ================================================================
